celebration:
  title: Office des défunts
  color: violet

invitatory:
  antiphon:
  - Maître et Seigneur de la vie, nous t’adorons.

oration:
  - |-
    Seigneur, toi seul peux nous rendre la confiance quand il nous semble que la mort est victorieuse. Augmente aujourd’hui notre foi en ton Fils Jésus ressuscité des morts ; affermis notre espérance de la résurrection de N., ton serviteur et notre frère. ou Seigneur, tu es la vie de tes fidèles, tu es la gloire des justes, et ton propre Fils nous a rachetés par sa mort et sa résurrection ; regarde avec bonté ton serviteur (ta servante) N : puisqu’il (elle) a cru à la résurrection dans le Christ, accorde-lui de goûter au bonheur qui ne finit pas. pour plusieurs défunts Seigneur, il a fallu que le Christ ton bien-aimé passe par la mort pour la vaincre avant d’entrer dans sa gloire ; renouvelle pour tes serviteurs N. et N. ce que tu as fait pour ton propre Fils : qu’ils soient, eux aussi, victorieux de la mort et puissent contempler dans toute sa gloire ton visage de Père et de Sauveur. pour des frères, proches ou bienfaiteurs Dieu qui es riche en pardon et qui veux le salut de tous, nous implorons ta grande bonté : à nos frères, nos parents et bienfaiteurs qui ont quitté ce monde, accorde, par l’intercession de la Vierge Marie et des saints, d’avoir part au bonheur du ciel pour l’éternité.

morning:
  hymn:
  - la-mort-ne-peut-me-garder
  psalmody:
    - psalm: PSALM_50
      antiphon:
        - Ils danseront pour toi, Seigneur, les os que tu broyas.
    - psalm: OT_23
      antiphon:
        - Des puissances de la mort, délivre-moi, Seigneur.
    - psalm: PSALM_145
      antiphon:
        - Je veux jouer pour le Seigneur tant que je vie, chanter pour mon Dieu tant que je dure.
  reading:
    biblicalReference: 1Th 4, 14
    content: Jésus, nous le croyons, est mort et ressuscité ; de même, nous le croyons, ceux qui se sont endormis, Dieu, à cause de Jésus, les emmènera avec son Fils.
  responsory: |-
    R/ Tu m’as relevé, tu m’as guéri :
    * sans fin, Seigneur, je te rendrai grâce.
    V/ Tu as changé mon deuil en allégresse.
    * Sans fin.
    Gloire au Père.
    R/ Tu m’as relevé.
  evangelicAntiphon:
    common: Je suis la résurrection et la vie ; qui croit en moi, fût-il mort, vivra.
  intercession:
    content: |-
      Prions Dieu le Père tout-puissant qui a ressuscité Jésus d’entre les morts
      et qui donnera la vie à nos corps mortels :
      
      R/ Seigneur, fais-nous vivre dans le Christ.
      
      Père très saint, par le baptême nous avons été ensevelis avec ton Fils, et nous sommes ressuscités avec lui :
      — fais-nous marcher dans une vie nouvelle pour qu’au-delà de la mort nous vivions toujours avec le Christ.
      
      Tu nous as donné le pain vivant qui descend du ciel :
      — fais que nous y trouvions la vie, et la résurrection au dernier jour.
      
      Tu as envoyé un ange pour réconforter ton Fils dans son agonie,
      — à l’heure de notre mort, soutiens notre espérance.
      
      Tu as arraché les trois enfants aux flammes de la fournaise :
      — délivre nos défunts du poids de leurs fautes.
      
      Dieu des vivants et des morts, toi qui as ressuscité Jésus,
      — ressuscite nos morts et place-nous avec eux près de lui.

readings:
  hymn:
  - quel-secret-habitons-nous
  psalmody:
    - psalm: PSALM_39_1
      antiphon:
        - |-
          Toi, Seigneur, ne retiens pas loin de moi ta tendresse : que ton amour et ta vérité me gardent.
    - psalm: PSALM_39_2
      antiphon:
        - Le troisième jour, le Seigneur nous a relevés, nous vivrons à jamais en sa présence.
    - psalm: PSALM_14
      antiphon:
        - Mon âme a soif du Dieu vivant, quand pourrai-je m’avancer et paraître face à Dieu ?
  verse: |-
    V/ Seigneur, ta tendresse est sans mesure,
    fais-nous vivre selon ton amour.
  biblicalReading:
    - title: LECTURE DE LA 1^ère LETTRE AUX CORINTHIENS
      subtitle: La Résurrection du Christ, notre espérance
      ref: 1Co 15, 12-34
      content: |-
        Nous proclamons que le Christ est ressuscité d’entre les morts ; alors, comment certains d’entre vous peuvent-ils affirmer qu’il n’y a pas de résurrection des morts ? S’il n’y a pas de résurrection des morts, le Christ non plus n’est pas ressuscité. Et si le Christ n’est pas ressuscité, notre proclamation est sans contenu, votre foi aussi est sans contenu ; et nous faisons figure de faux témoins de Dieu, pour avoir affirmé, en témoignant au sujet de Dieu, qu’il a ressuscité le Christ, alors qu’il ne l’a pas ressuscité si vraiment les morts ne ressuscitent pas. Car si les morts ne ressuscitent pas, le Christ non plus n’est pas ressuscité. Et si le Christ n’est pas ressuscité, votre foi est sans valeur, vous êtes encore sous l’emprise de vos péchés ; et donc, ceux qui se sont endormis dans le Christ sont perdus. Si nous avons mis notre espoir dans le Christ pour cette vie seulement, nous sommes les plus à plaindre de tous les hommes.
        Mais non ! le Christ est ressuscité d’entre les morts, lui, premier ressuscité parmi ceux qui se sont endormis. Car, la mort étant venue par un homme, c’est par un homme aussi que vient la résurrection des morts. En effet, de même que tous les hommes meurent en Adam, de même c’est dans le Christ que tous recevront la vie, mais chacun à son rang : en premier, le Christ, et ensuite, lors du retour du Christ, ceux qui lui appartiennent. Alors, tout sera achevé, quand le Christ remettra le pouvoir royal à Dieu son Père, après avoir anéanti, parmi les êtres célestes, toute Principauté, toute Souveraineté et Puissance. Car c’est lui qui doit régner jusqu’au jour où Dieu aura mis sous ses pieds tous ses ennemis. Et le dernier ennemi qui sera anéanti, c’est la mort, car il a tout mis sous ses pieds.
        Mais quand le Christ dira : « Tout est soumis désormais », c’est évidemment à l’exclusion de Celui qui lui aura soumis toutes choses. Et, quand tout sera mis sous le pouvoir du Fils, lui-même se mettra alors sous le pouvoir du Père qui lui aura tout soumis, et ainsi, Dieu sera tout en tous.
        Autrement, que feront-ils, ceux qui se font baptiser pour les morts ? Si vraiment les morts ne ressuscitent pas, pourquoi se faire baptiser pour eux ? Et pourquoi nous aussi courons-nous des dangers à chaque instant ? Chaque jour, j’affronte la mort, et cela, frères, est votre fierté, que je partage dans le Christ Jésus notre Seigneur. S’il n’y avait eu que de l’humain dans mon combat contre les bêtes à Éphèse, à quoi cela m’aurait-il servi ? Si les morts ne ressuscitent pas, %mangeons et buvons, car demain nous mourrons%. Ne vous y trompez pas : Les mauvaises compagnies corrompent les bonnes mœurs. Reprenez donc vos esprits, et ne péchez pas : en effet, certains d’entre vous n’ont pas la connaissance de Dieu. Je vous le dis, à votre honte.
      responsory: |-
        R/ Christ a vaincu la mort,
        chantons sa gloire !

        Le Dieu que nous avons est le Dieu des victoires,
        et les portes de la mort sont à Dieu, le Seigneur.

        Le dernier ennemi qu’il détruira, c’est la mort,
        car il a tout mis sous ses pieds.
  patristicReading:
    - title: SERMON DE SAINT ANATASE, ÉVÊQUE D‘ANTIOCHE, SUR LA RÉSURRECTION DU CHRIST
      subtitle: « Tous revivront dans le Christ »
      content: |-
        %Le Christ a connu la mort, puis la vie, pour devenir le Seigneur et des morts et des vivants%. Mais %Dieu n’est pas le Dieu des morts, il est le Dieu des vivants%. Puisqu’il est vivant, le Seigneur des morts, les morts ne sont plus des morts mais des vivants : la vie règne en eux, pour qu’ils vivent et ne craignent plus la mort, de même que %le Christ, ressuscité des morts, ne meurt plus%.
        Ressuscités et délivrés de la corruption, ils ne verront plus la mort ; ils participeront à la résurrection du Christ, comme lui-même a participé à leur mort.
        En effet, s’il est venu sur terre, jusqu’alors prison éternelle, c’est pour %briser les portes de bronze et fracturer les verrous de fer%, pour tirer notre vie de la corruption en l‘attirant à lui, et nous donner la liberté à la place de l‘esclavage.
        Si ce plan de salut n’est pas encore accompli, car les hommes meurent toujours, et leurs corps sont toujours décomposés par la mort, cela ne doit pas être un motif d’incroyance. Déjà nous avons reçu une avance sur tous les biens qui nous sont promis, en la personne de celui qui est notre premier-né ; par lui nous nous sommes élevés vers le ciel, et nous partageons le trône de celui qui nous a emportés dans les hauteurs, ainsi que le dit saint Paul : %Avec lui il nous a ressuscités, avec lui il nous a fait régner aux cieux, dans le Christ Jésus%.
        Nous atteindrons à la réalisation de cette promesse, lorsque viendra le temps fixé par le Père, lorsque nous dépouillerons l’enfance et serons parvenus %à l’état d’homme parfait%. Car le Père des siècles a voulu que le don qu’il nous a fait demeure ferme, et qu’il ne soit pas rejeté par un retour à l’enfance. ~
        Il n’est pas besoin de dire que le Corps du Seigneur est ressuscité à l’état spirituel, puisque saint Paul affirme, au sujet du corps, %qu’il est semé corps animal, et ressuscite corps spirituel%, c’est-à-dire qu’il est transfiguré dans la gloire du Christ, qui nous précède comme guide.
        Aussi l’Apôtre a-t-il dit, car il le savait bien, ce qui arriverait à tout le genre humain, par le Christ, qui %transformera nos pauvres corps à l’image de son corps glorieux%.
        Si la transfiguration est le changement en un corps spirituel, et si ce dernier est conforme au corps glorieux du Christ, cela revient à dire qu’il n’est pas différent du corps %semé dans l’ignominie% mais c’est le même changé en gloire. ~
        Ce que le Christ a réalisé en amenant au Père sa propre humanité, premier exemplaire de notre nature, il le fera pour le genre humain tout entier selon sa promesse : %Quand j’aurai été élevé de terre, j’attirerai à moi tous les hommes%.
      responsory: |-
        R/ Dieu n’est pas le Dieu des morts,
        mais des vivants. 

        Ceux qui ont été jugés dignes de la résurrection
        ne peuvent plus mourir.

        Ils sont enfants de Dieu,
        fils de la résurrection.

        Va, prends ton repos, et tu te lèveras, toi aussi,
        à la fin des jours.

middleOfDay:
  psalmody:
  - psalm: PSALM_69
  - psalm: PSALM_84
  - psalm: PSALM_85
  
  tierce:
    antiphon: Reviens, Seigneur, délivre mon âme.
    reading:
      biblicalReference: Is 25,8
      content: Le Seigneur détruira la mort pour toujours. Il essuiera les larmes sur tous les visages, et par toute la terre il effacera l’humiliation de son peuple ; c’est lui qui l’a promis.
    responsory: |-
      V/ Jusqu’à toi, Seigneur, vient toute chair
      avec son poids de péché.
  sexte:
    antiphon: Guéris mon âme, Seigneur, car j’ai péché contre toi.
    reading:
      biblicalReference: Sg 1, 13-14a.15
      content: Dieu n’a pas fait la mort, il ne se réjouit pas de voir mourir les êtres vivants. Il a crée toutes choses pour qu’elles subsistent. Car la justice est immortelle.
    responsory: |-
      V/ Aux ravins de la mort, je ne crains aucun mal :
      car tu es avec moi, Seigneur.
  none:
    antiphon: Par ton nom, Dieu, sauve-moi ! Par ta puissance, rends-moi justice !
    reading:
      biblicalReference: Is 25,8
      content: Le Seigneur détruira la mort pour toujours. Il essuiera les larmes sur tous les visages, et par toute la terre il effacera l’humiliation de son peuple ; c’est lui qui l’a promis.
    responsory: |-
      V/ Jusqu’à toi, Seigneur, vient toute chair
      avec son poids de péché.

vespers:
  hymn:
  - dieu-tu-reveles-ta-lumiere
  psalmody:
    - psalm: PSALM_120
      antiphon:
        - Le Seigneur te gardera de tout mal, il gardera ta vie.
    - psalm: PSALM_129
      antiphon:
        - Si tu retiens les fautes, Seigneur, Seigneur, qui subsistera ?
    - psalm: NT_5
      antiphon:
        - Comme le Père éveille les morts, ainsi le Fils donne la vie.
  reading:
    biblicalReference: 1Co 15, 55-57
    content: Ô Mort, où est ta victoire ? Ô Mort, où est ton dard venimeux ? Le dard de la mort, c’est le péché ; ce qui renforce le péché, c’est la Loi. Rendons grâce à Dieu qui nous donne la victoire par Jésus Christ notre Seigneur.
  responsory: |-
    R/ Seigneur, mon Dieu, mon espérance,
    * fais-moi vivre car je compte sur toi.
    V/ Ton amour fait pour moi des merveilles. *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Tous ceux que m’a donnés le Père viendront à moi, je les garderai près de moi, à jamais.
  intercession:
    content: |-
      Supplions le Seigneur Jésus qui transformera notre corps mortel à l’image de son corps de gloire :
      
      R/ Tu es notre vie et notre résurrection !
      
      Ô Christ, Fils du Dieu vivant, toi qui as ressuscité ton ami Lazare,
      — conduis à la résurrection ceux que tu as rachetés par ton sang.
      
      Ô Christ, consolateur des affligés, tu as essuyé les larmes de ceux qui avaient perdu l’un des leurs,
      — soutiens aujourd’hui nos frères éprouvés par le deuil.
      
      Ô Christ, vainqueur de la mort, tu as détruit en ton corps le pouvoir du péché,
      — délivre-nous de la mort, fais-nous vivre avec toi.
      
      Ô Christ, lumière du monde, tu as rendu la vue aux aveugles,
      — révèle ton visage aux défunts.
      
      Souviens-toi de ceux qui ne te connaissent pas encore et qui n’ont pas d’espérance,
      — donne-leur de croire à ta résurrection et à la vie sans fin.
      
      Quand nous devrons quitter ce monde qui passe,
      — fais-nous entrer dans ta demeure éternelle.