saturday:
  psalmody:
    - psalm: PSALM_4
      antiphon:
        - |-
          Nos yeux ont vu le salut : qui peut nous ravir notre joie ?
    - psalm: PSALM_133
      antiphon:
        - Sur le pays de l’ombre, une lumière s’est levée.
  evangelicAntiphon:
    common: |-
      J’ai vu de mes yeux le Sauveur : lumière des peuples.

sunday:
  psalmody:
    - psalm: PSALM_90
      antiphon:
        - Il suffit que tu ouvres les yeux, tu verras le salut.
  evangelicAntiphon:
    common: |-
      J’ai vu de mes yeux le Sauveur : lumière des peuples.

monday:
  psalmody:
    - psalm: PSALM_85
      antiphon:
        - Tous les peuples viendront t’adorer, car tu fais des merveilles.

tuesday:
  psalmody:
    - psalm: PSALM_142
      antiphon:
        - Sur l’œuvre de tes mains, je médite, je tends les mains vers toi.

wednesday:
  psalmody:
    - psalm: PSALM_30_1
      antiphon:
        - Plus qu’un veilleur ne guette l’aurore, attends le Seigneur.
    - psalm: PSALM_129
      antiphon:
        - Près de toi se trouve le pardon.
        - J’espère le Seigneur de toute mon âme.

thursday:
  psalmody:
    - psalm: PSALM_15
      antiphon:
        - |-
          J’ai dit au Seigneur : Tu es mon Dieu !

friday:
  psalmody:
    - psalm: PSALM_87
      antiphon:
        - Seigneur, mon Dieu et mon salut !
