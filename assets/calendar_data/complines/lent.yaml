marialHymns:
  - sub-tuum-praesidium
  - sous-l-abri-de-ta-misericorde
  - salut-reine-des-cieux
  - ave-regina-caelorum

saturday:
  psalmody:
    - psalm: PSALM_4
      antiphon:
        - Pitié pour moi, Seigneur, écoute ma prière.
    - psalm: PSALM_133
      antiphon:
        - La nuit est avancée, le jour est proche.
  evangelicAntiphon:
    common: Dieu saint, Dieu fort, Dieu immortel, ta pitié soit sur nous.

sunday:
  psalmody:
    - psalm: PSALM_90
      antiphon:
        - À l’ombre de ses ailes, n’aie plus peur de la nuit.
  evangelicAntiphon:
    common: Dieu saint, Dieu fort, Dieu immortel, ta pitié soit sur nous.

monday:
  psalmody:
    - psalm: PSALM_85
      antiphon:
        - Rassemble mon cœur pour qu’il te craigne.

tuesday:
  hymns:
    - vienne-la-nuit-de-dieu-lent
    - te-lucis-ante-terminum
  psalmody:
    - psalm: PSALM_142
      antiphon:
        - Ne me cache pas ton visage, car je compte sur toi.

wednesday:
  psalmody:
    - psalm: PSALM_30_1
      antiphon:
        - Auprès du Seigneur est la grâce, la pleine délivrance.
    - psalm: PSALM_129
      antiphon:
        - Près de toi se trouve le pardon.
        - J’espère le Seigneur de tout mon âme.

thursday:
  psalmody:
    - psalm: PSALM_15
      antiphon:
        - Mon Dieu, tu ne peux m’abandonner à la mort.

friday:
  psalmody:
    - psalm: PSALM_87
      antiphon:
        - Pourquoi me rejeter, Seigneur ? Pourquoi cacher ta face ?

holy_thursday:
  psalmody:
    - psalm: PSALM_90
      antiphon:
        - À l’ombre de ses ailes, n’aie plus peur de la nuit.
  responsory: |-
    R/ Le Christ s’est fait pour nous obéissant jusqu’à la mort.
    V/ Voici l’heure où le Fils de l’homme a été livré, voici le pouvoir des ténèbres. R/
  evangelicAntiphon:
    common: Dieu saint, Dieu fort, Dieu immortel, ta pitié soit sur nous.

holy_friday:
  psalmody:
    - psalm: PSALM_90
      antiphon:
        - À l’ombre de ses ailes, n’aie plus peur de la nuit.
  responsory: |-
    R/ Le Christ s’est fait pour nous obéissant jusqu’à la mort, et la mort de la croix.
    V/ Lui, le Fils, il a appris l’obéissance par les souffrances de sa passion. R/
  evangelicAntiphon:
    common: Dieu saint, Dieu fort, Dieu immortel, ta pitié soit sur nous.

holy_saturday:
  commentary: Si on ne participe pas à la Veillée pascale, on dit les Complies.
  psalmody:
    - psalm: PSALM_90
      antiphon:
        - À l’ombre de ses ailes, n’aie plus peur de la nuit.
  responsory: |-
    R/ Le Christ s’est fait pour nous obéissant jusqu’à la mort, et la mort de la croix.
    V/ C’est pourquoi Dieu l’a exalté et lui a donné le Nom qui est au-dessus de tout nom. R/
  evangelicAntiphon:
    common: Dieu saint, Dieu fort, Dieu immortel, ta pitié soit sur nous.
