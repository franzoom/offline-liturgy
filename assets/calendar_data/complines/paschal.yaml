marialHymns:
  - o-vierge-marie-quelle-joie
  - reine-du-ciel-rejouis-toi
  - regina-caeli

saturday:
  psalmody:
    - psalm: PSALM_4
      antiphon:
        - Alléluia, alléluia, alléluia !
    - psalm: PSALM_133
      antiphon:
        - Alléluia, alléluia, alléluia !
  responsory: |-
    R/ En tes mains, Seigneur, je remets mon esprit.
    * Alléluia, alléluia
    V/ Tu es le Dieu fidèle qui garde son Alliance.
    * Alléluia, alléluia
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Le Seigneur est ressuscité, alléluia, il nous remplit de sa lumière. Alléluia.

