celebration:
  title: Saint Adalbert
  subtitle: évêque et martyr
  description: Né en Bohême en 956, Adalbert, après avoir étudié à Magdebourg, est ordonné évêque de Prague où il tente, contre son clergé, de réformer l’Église. Il se retire dans un monastère bénédictin, mais revient à Prague où il est très mal reçu par ses fidèles. Il part alors annoncer l’Évangile dans le nord de la Pologne, où il connaît le martyre en 997.
  color: red
  commons:
    - martyr
    - pastors_bishop

oration:
  - Seigneur Dieu, tu as donné la couronne du martyre à l’évêque saint Adalbert, tout enflammé de zèle pour les âmes ; fais qu’à sa prière, le troupeau ne manque pas d’obéir à ses pasteurs, ni les pasteurs de se dévouer à leur troupeau.
