celebration:
  title: Saint Albert le Grand
  subtitle: évêque et docteur de l’Église 
  description: Albert le Grand, dominicain bavarois, enseigna d’abord à Paris, où il eut Thomas d’Aquin pour élève (1245-1248). Son épiscopat à Ratisbonne ne marqua qu’une parenthèse de deux années dans une vie de professeur et de chercheur, soucieux de découvrir les lois des sciences physiques pour y déceler l’intervention du Créateur. Il mourut à Cologne en 1280.
  commons:
  - pastors_bishop
  - pastors_doctors
  color: white

