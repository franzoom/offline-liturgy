celebration:
  title: Saint André
  subtitle: apôtre
  description: André, frère de Pierre et pêcheur comme lui à Bethsaïde, fut le premier des futurs Apôtres à rencontrer Jésus sur le bord du Jourdain. C’est lui qui amena Pierre à Jésus. Selon la tradition il aurait été crucifié à Patras après avoir prêché l’Évangile en Grèce. L’Église de Constantinople a choisi pour patron celui qu’elle honore comme « le Premier appelé ».
  commons:
    - apostles
  color: red

oration: 
- |-
  Seigneur, maître du monde, nous te supplions humblement : permets que l’Apôtre saint André, après avoir évangélisé et guidé ton Église, ne cesse d’intercéder pour nous.

morning:
  hymn:
  - ou-donc-est-ta-demeure
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - L’un des premiers disciples qui suivirent Jésus fut André, le frère de Simon Pierre.
    - psalm: AT_41
      antiphon:
        - Le Seigneur chérissait André, le disciple qu’il avait choisi.
    - psalm: PSALM_149
      antiphon:
        - |-
          André dit à Simon, son frère : Nous avons trouvé le Messie.
  reading:
    biblicalReference: Ep 2, 19-22
    content: Vous n’êtes plus des étrangers ni des gens de passage, vous êtes citoyens du peuple saint, membres de la famille de Dieu, car vous avez été intégrés dans la construction qui a pour fondations les Apôtres et les prophètes ; et la pierre angulaire, c’est le Christ Jésus lui-même. En lui, toute la construction s’élève harmonieusement pour devenir un temple saint dans le Seigneur. En lui, vous êtes, vous aussi, des éléments de la construction pour devenir par l’Esprit Saint la demeure de Dieu.
  responsory: |-
    R/ Par toute la terre s’en va leur message,
    * Et la Bonne Nouvelle aux limites du monde.
    V/ Annoncez à tous les peuples le salut, *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: |-
      Salut, croix inestimable ! Tu as porté le corps de mon maître : reçois son disciple.
      
readings:
  biblicalReading:
    - title: LECTURE DE LA 1^ère LETTRE AUX CORINTHIENS
      subtitle: Nous prêchons un Messie crucifié
      ref: 1Co 1, 18 – 2, 5
      content: |-
        Le langage de la croix est folie pour ceux qui vont à leur perte, mais pour ceux qui vont vers leur salut, pour nous, il est puissance de Dieu. L’Écriture dit en effet : %Je mènerai à sa perte la sagesse des sages, et l’intelligence des intelligents, je la rejetterai%. Où est-il, le sage ? Où est-il, le scribe ? Où est-il, le raisonneur d’ici-bas ? La sagesse du monde, Dieu ne l’a-t-il pas rendue folle ? Puisque, en effet, par une disposition de la sagesse de Dieu, le monde, avec toute sa sagesse, n’a pas su reconnaître Dieu, il a plu à Dieu de sauver les croyants par cette folie qu’est la proclamation de l’Évangile. Alors que les Juifs réclament des signes miraculeux, et que les Grecs recherchent une sagesse, nous, nous proclamons un Messie crucifié, scandale pour les Juifs, folie pour les nations païennes. Mais pour ceux que Dieu appelle, qu’ils soient Juifs ou Grecs, ce Messie, ce Christ, est puissance de Dieu et sagesse de Dieu. Car ce qui est folie de Dieu est plus sage que les hommes, et ce qui est faiblesse de Dieu est plus fort que les hommes.
        Frères, vous qui avez été appelés par Dieu, regardez bien : parmi vous, il n’y a pas beaucoup de sages aux yeux des hommes, ni de gens puissants ou de haute naissance. Au contraire, ce qu’il y a de fou dans le monde, voilà ce que Dieu a choisi, pour couvrir de confusion les sages ; ce qu’il y a de faible dans le monde, voilà ce que Dieu a choisi, pour couvrir de confusion ce qui est fort ; ce qui est d’origine modeste, méprisé dans le monde, ce qui n’est pas, voilà ce que Dieu a choisi, pour réduire à rien ce qui est ; ainsi aucun être de chair ne pourra s’enorgueillir devant Dieu. C’est grâce à Dieu, en effet, que vous êtes dans le Christ Jésus, lui qui est devenu pour nous sagesse venant de Dieu, justice, sanctification, rédemption. Ainsi, comme il est écrit : %Celui qui veut être fier, qu’il mette sa fierté dans le Seigneur%.
        Frères, quand je suis venu chez vous, je ne suis pas venu vous annoncer le mystère de Dieu avec le prestige du langage ou de la sagesse. Parmi vous, je n’ai rien voulu connaître d’autre que Jésus Christ, ce Messie crucifié. Et c’est dans la faiblesse, craintif et tout tremblant, que je me suis présenté à vous. Mon langage, ma proclamation de l’Évangile, n’avaient rien d’un langage de sagesse qui veut convaincre ; mais c’est l’Esprit et sa puissance qui se manifestaient, pour que votre foi repose, non pas sur la sagesse des hommes, mais sur la puissance de Dieu.
      responsory: |-
        R/ Le langage de la croix est puissance de Dieu.

        Celui qui ne porte pas sa croix
        et ne marche pas à ma suite
        ne peut être mon disciple, dit le Seigneur.

        Fixant son regard sur Jésus qui passait,
        le Baptiste dit : 
        Voici l’Agneau de Dieu.

        André, le frère de Simon-Pierre,
        était l’un des deux
        qui avait écouté Jean et suivi Jésus.
  patristicReading:
    - title: HOMÉLIE DE S. JEAN CHRYSOSTOME SUR L’ÉVANGILE DE JEAN
      subtitle: Nous avons trouvé le Messie
      content: |-
        André, après avoir demeuré auprès de Jésus et avoir beaucoup appris, n’a pas gardé ce trésor pour lui : il se hâte de courir auprès de son frère, pour le faire participer aux biens qu’il a reçus. ~ Considère ce qu’il dit à son frère : %Nous avons trouvé le Messie (autrement dit le Christ)%. Vois-tu comment il a fait connaître ce qu’il venait d’apprendre en si peu de temps ? Il montre et l’autorité du Maître qui a persuadé ses disciples, et l’ardeur de ceux-ci qui s’en sont préoccupés d’emblée, dès le début. Son propos vient d’une âme qui désire avec angoisse l’avènement du Messie, qui attend son arrivée du ciel sur la terre, qui est comblée de joie de voir apparaître ce qu’elle attendait, et qui se hâte de faire participer les autres à cette bonne nouvelle. C’est montrer une amitié vraiment fraternelle, une affection profonde et un naturel plein de sincérité, que de se communiquer ainsi les richesses spirituelles. ~
        Remarque combien, dès le début, Pierre a un esprit docile et obéissant, car il accourut sans tarder. %Il le conduisit à Jésus%, dit l’évangéliste. Mais que personne ne condamne cette facilité, comme s’il avait accueilli aveuglément l’invitation de son frère. Il est probable que celui-ci lui avait parlé en détail et longuement. Mais les évangélistes suppriment beaucoup de choses par souci de concision. D’ailleurs on ne dit pas que Pierre a cru aussitôt, mais que son frère %le conduisit à Jésus% pour le lui confier, afin que Pierre soit entièrement instruit par lui. Car l’autre disciple était là et participait à l’entretien.
        Lorsque Jean Baptiste a dit : %C’est l’Agneau%, et : %Il baptise dans l’Esprit Saint%, il a confié au Christ le soin d’enseigner lui-même plus clairement cette doctrine. À plus forte raison André a-t-il fait de même, car il ne se jugeait pas capable de tout expliquer. Il a conduit son frère à la source même de la lumière, avec tant de hâte et de joie, pour ne pas le laisser attendre si peu que ce soit.
      responsory: |-
        R/ Tous ceux qui veulent plaire à Dieu
        connaîtront la souffrance.

        Nous nous affirmons en tout
        comme des ministres de Dieu,
        constants dans les tribulations,
        les détresses, les angoisses.

        On nous tient pour affligés,
        et nous sommes toujours joyeux,
        pour gens qui n’ont rien,
        et nous possédons tout.

        Reste fidèle jusqu’à la mort, dit le Seigneur,
        et je te donnerai la couronne de vie.

vespers:
  hymn:
  - ou-donc-est-ta-demeure
  psalmody:
    - psalm: PSALM_115
      antiphon:
        - Jésus, voyant Pierre et André, les appela.
    - psalm: PSALM_125
      antiphon:
        - |-
          Venez, suivez-moi : je vous ferai pêcheurs d’hommes.
    - psalm: NT_4
      antiphon:
        - Pierre et André, laissant leurs filets, suivirent Jésus, le Sauveur.
  reading:
    biblicalReference: Ep 4, 11-13
    content: Les dons que le Christ a faits aux hommes, ce sont d’abord les Apôtres, puis les prophètes et les missionnaires de l’Évangile, et aussi les pasteurs et ceux qui enseignent. De cette manière, le peuple saint est organisé pour que les tâches du ministère soient accomplies, et que se construise le corps du Christ. Au terme, nous parviendrons tous ensemble à l’unité dans la foi et la vraie connaissance du Fils de Dieu, à l’état de l’Homme parfait, à la plénitude de la stature du Christ.
  responsory: |-
    R/ Racontez à tous les peuples
    * La gloire du Seigneur.
    V/ De jour en jour, proclamez son salut, *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Béni sois-tu, André, Apôtre de Dieu et disciple du Christ ! Pour lui, comme ton frère, tu as subi le martyre.
