celebration:
  title: Saint Antoine-Marie Claret
  subtitle: évêque
  description: Antoine-Marie Claret, né en Catalogne (1807), fut d’abord un prédicateur populaire et il fonda un Institut missionnaire. Puis, après s’être consacré à l’apostolat dans l’île de Cuba comme Archevêque de Santiago, il devint conseiller de la reine d’Espagne, qu’il accompagna dans son exil. Il mourut en France (1870), poursuivi par la haine et la calomnie.
  commons:
  - pastor_bishop
  color: white

