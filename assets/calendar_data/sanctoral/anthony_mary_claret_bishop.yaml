celebration:
  title: Saint Antoine-Marie Claret
  subtitle: évêque
  description: Antoine-Marie Claret, né en Catalogne (1807), fut d’abord un prédicateur populaire et il fonda un Institut missionnaire. Puis, après s’être consacré à l’apostolat dans l’île de Cuba comme Archevêque de Santiago, il devint conseiller de la reine d’Espagne, qu’il accompagna dans son exil. Il mourut en France (1870), poursuivi par la haine et la calomnie.
  commons:
  - pastor_bishop
  color: white

oration:
- Dieu qui as donné à saint Antoine-Marie Claret une charité et un courage admirables pour enseigner aux hommes la pureté de l’Évangile, accorde-nous, à sa prière, de rechercher ce qui est juste et bon, afin de gagner nos frères à Jésus Christ. 

readings:
  patristicReading:
    - title: « L’ÉGOÏSME VAINCU » (1869) DE SAINT ANTOINE-MARIE
      content: |-
        Emportés par le feu du Saint-Esprit, les saints Apôtres ont parcouru toute la terre. Embrasés du même feu, les missionnaires apostoliques sont parvenus, parviennent ou parviendront jusqu’aux extrémités du monde, d’un pôle à l’autre, pour annoncer la parole de Dieu, si bien qu’ils peuvent s’attribuer à juste titre cette parole de l’Apôtre Paul : %L’amour du Christ nous presse%.
        L’amour du Christ nous aiguillonne, nous incite à courir et à voler, comme avec les ailes d’une sainte jalousie. Celui qui aime vraiment Dieu aime aussi le prochain ; celui qui est vraiment jaloux, c’est celui qui aime, mais à un degré supérieur, selon les degrés de l’amour : plus on brûle d’amour, plus on est emporté par un zèle jaloux. Si quelqu’un n’a pas de zèle, c’est le signe que l’amour et la charité sont éteints dans son cœur. Celui qui est emporté par le zèle d’un amour jaloux désire et accomplit les plus grandes choses ; il travaille à ce que Dieu soit davantage connu, aimé et servi, en cette vie et en l’autre, car cet amour sacré ne connaît aucun terme. Il agit de même envers le prochain ; tous ses vœux et ses efforts visent à ce que tous soient contents et joyeux sur cette terre, et bienheureux dans la patrie d’en haut ; à ce que tous soient sauvés ; à ce que nul ne périsse pour toujours ; à ce que nul offense Dieu ni ne demeure un seul instant dans le péché : c’est ce que nous voyons chez les saints Apôtres et chez tous ceux qui sont animés par l’esprit apostolique.
        Je me dis à moi-même : un « Fils du Cœur Immaculé de Marie » est un homme enflammé de charité et qui brûle partout où il passe ; qui désire efficacement que tous les hommes s’embrasent du feu de l’amour divin, et qui y travaille de toutes ses forces. Rien ne l’en décourage ; il se réjouit des privations ; il aborde hardiment les labeurs ; il accueille volontiers les difficultés ; il rit des calomnies ; il est joyeux dans les tourments. Il ne songe à rien d’autre qu’à la manière de suivre Jésus Christ et de l’imiter par la prière, le travail, la patience, en ayant pour perpétuel et unique souci la gloire de Dieu et le salut des âmes.

      responsory: |-
        R/ Heureux ceux qui écoutent la Parole de Dieu
        et qui la gardent.
        
        Que le Seigneur vous fasse croître
        et abonder dans l’amour mutuel.
        
        Que le Seigneur affermisse vos cœurs
        dans une sainteté sans reproche devant lui.
        
        Que Dieu notre Père vous garde vigilants
        pour l’avènement de notre Seigneur Jésus Christ
        avec tous les saints.
