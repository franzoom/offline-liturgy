celebration:
  title: Saint Apollinaire
  subtitle: évêque et martyr
  description: |-
    À la fin du II^ème siècle, Apollinaire est ordonné évêque et envoyé à Ravenne pour y prêcher la foi. Sa prédication rencontre la contradiction des païens qui le font arrêter, torturer et exiler à plusieurs reprises. Chaque exil lui donne d’annoncer ailleurs les insondables richesses du Christ. Finalement, de retour à Ravenne, il reçoit la couronne du martyre.
  commons:
    - martyr
    - pastors_bishop
  color: red

oration:
  - |-
    Conduis tes fidèles, Seigneur, sur la voie du salut éternel que le bienheureux évêque Apollinaire a montrée par son enseignement et son martyre ; accorde-nous, par son intercession, d’observer tes commandements avec persévérance pour obtenir d’être couronnés avec lui dans le ciel.

