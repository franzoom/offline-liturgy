celebration:
  title: Saint Augustin de Cantorbéry
  subtitle: évêque
  description: Augustin fut envoyé par le pape Grégoire le Grand en Angleterre à la tête d’un groupe de moines romains pour annoncer l’Évangile aux Saxons qui venaient de s’y implanter (597). La mission eut plein succès. Ordonné évêque de Cantorbéry, Augustin organisa l’Église et il christianisa le peuple en respectant, autant que possible, ses traditions ancestrales.
  commons:
    - pastors_bishop
  color: white

oration:
  - Dieu qui répandis la lumière de l’Évangile sur les peuples de l’Angleterre par la prédication de saint Augustin de Cantorbéry, permets que ses travaux continuent de porter des fruits dans ton Église.

readings:
  patristicReading:
    - title: LETTRE DE S. GRÉGOIRE LE GRAND À S. AUGUSTIN
      content: |-
        %Gloire à Dieu dans les hauteurs et, sur la terre, paix aux hommes qu’il aime%, parce que le grain de blé est mort en tombant sur la terre, afin de ne pas régner seulement au ciel, lui dont la mort nous fait vivre, lui dont la faiblesse nous fortifie, lui dont la souffrance nous arrache à la souffrance, lui dont l’amour nous fait rechercher en Grande-Bretagne des frères que nous ne connaissons pas, lui dont la grâce nous a fait trouver ceux que nous recherchions sans les connaître.
        Personne ne serait capable d’exprimer quelle joie un tel événement a suscitée dans le cœur des fidèles ! Le peuple anglais, par l’opération de la grâce du Dieu tout-puissant et par ton labeur, mon frère, a chassé les ténèbres de Terreur pour être inondé par la lumière de la foi. Désormais, avec une âme parfaitement saine, il piétine les idoles, devant qui le courbait une crainte déraisonnable. Il S’incline, d’un cœur pur, devant le Dieu tout-puissant. Les règles données par la sainte prédication le préservent de retomber dans le mal. Les enseignements divins soumettent son âme et relèvent son intelligence. Dans la prière, il s’abaisse jusqu’à terre, pour que son esprit ne gise pas à terre. Quel est l’auteur d’une telle œuvre, sinon celui qui dit : %Mon Père, jusqu’à maintenant, est toujours à l’œuvre, et moi aussi je suis à l’œuvre%.
        Pour montrer qu’il ne convertit pas le monde par la sagesse des hommes mais par sa propre vertu, il a choisi comme prédicateurs, pour les envoyer dans le monde, des hommes ignorants. C’est encore ce qu’il fait maintenant, puisqu’il a daigné opérer de si grandes choses, en faveur du peuple anglais, par des hommes aussi faibles. Mais ce don céleste, frère très cher, exige que cette grande joie s’unisse à une très vive crainte.
        Je sais en effet que Dieu tout-puissant a fait voir de grands miracles grâce à ta charité dans ce peuple qu’il a élu. Il est donc nécessaire que ce don céleste te donne de la joie en même temps que la crainte, de la crainte en même temps que la joie : tu dois te réjouir parce que les miracles extérieurs attirent les âmes des Anglais à la grâce intérieure ; mais tu dois craindre que, parmi tant de signes qui s’accomplissent, l’âme faible ne s’enorgueillisse en comptant sur elle-même et que, du fait même de cette élévation et de cette gloire visible, elle ne s’effondre invisiblement par la vaine gloire.
        Nous devons nous rappeler la réponse du divin maître à ses disciples, qui revenaient tout joyeux de leur prédication et lui disaient : %Seigneur, même les esprits mauvais nous sont soumis en ton nom%. Ils entendirent aussitôt cette parole : %Ne vous réjouissez pas de cela, mais de ce que vos noms sont inscrits dans le ciel%.

      responsory: |-
        R/ Seul l’amour porte un fruit de justice.
        
        Laissez l’amour poursuivre en vous son œuvre
        jusqu’au jour de Jésus Christ.
        
        Ouvrez les yeux à la lumière de l’amour,
        vous serez purs et sans reproche
        au jour de Jésus Christ.