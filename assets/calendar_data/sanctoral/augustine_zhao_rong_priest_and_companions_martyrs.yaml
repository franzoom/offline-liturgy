celebration:
  title: Saint Augustin Zhao Rong, prêtre, et ses compagnons
  subtitle: martyrs
  description: Augustin (1746-1815) est le premier prêtre chinois mort en martyr. Alors qu’il était soldat dans l’armée impériale, il fut témoin actif d’une persécution des chrétiens. Bouleversé par leur témoignage, il est baptisé à 30 ans et ordonné prêtre cinq ans plus tard. Remarqué pour son courage et ses capacités, il est envoyé évangéliser dans une région difficile. Arrêté, il meurt d’épuisement en prison.
  commons:
    - martyrs
  color: red

oration:
- Seigneur Dieu, tu as fortifié ton Église de façon admirable par la confession de foi des martyrs de Chine, saint Augustin et ses compagnons ; accorde à ton peuple, fidèle à sa mission, d’être de plus en plus libre pour témoigner de la vérité à la face du monde.

