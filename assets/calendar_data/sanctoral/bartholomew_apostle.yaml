celebration:
  title: Saint Barthélemy
  subtitle: apôtre
  description: Barthélemy, appelé aussi Nathanaël, naquit à Cana. C’est Philippe qui le présenta à Jésus sur le Nord du Jourdain. Il entra dans le groupe des premiers appelés. On ne sait rien de certain sur l’activité apostolique de Barthélemy après la Pentecôte.
  commons:
    - apostles
  color: red

