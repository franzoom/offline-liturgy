celebration:
  title: Saint Bède le vénérable
  subtitle: prêtre et docteur de l'Église
  description: |-
    Bède (673-735) passa toute sa vie à l’abbaye de Jarrow (Angleterre). « Prie et travaille », ordonne saint Benoît. Bède n’eut pas d’autre idéal. Sa tâche fut avant tout d’ordre intellectuel : de l’histoire de l’Angleterre à celle des martyrs et au commentaire de la Bible, rien ne lui était étranger. Mais il ne sacrifia jamais la prière à l’étude.
  commons:
    - pastors_doctors
    - saints-male_religious
  color: white

oration:
  - Dieu qui éclaires ton Église par le savoir de saint Bède le Vénérable, accorde à tes serviteurs la lumière de son enseignement et l’appui de ses mérites.

readings:
  patristicReading:
    - title: Lettre de Cuthbert sur la mort de Saint Bède
      content: |-
        Lorsqu’arriva le mardi avant Ascension du Seigneur, Bède commença à souffrir plus violemment de suffocation et on vit apparaître une légère enflure des pieds. Il passa tout ce jour-là à enseigner et dicter avec bonne humeur. À un moment, il dit entre autres choses : « Hâtez-vous d’apprendre ; je ne sais combien de temps je serai encore là, et si mon Créateur ne va pas me prendre bientôt ». Il nous semblait qu’il était bien averti de sa mort. Et il passa ainsi toute la nuit sans dormir, dans l’action de grâce.
        Au petit jour, donc le mercredi, il ordonna d’écrire rapidement ce que nous avions commencé, et nous l’avons fait jusqu’à neuf heures. Alors nous sommes allés en procession avec les reliques des saints, selon la coutume de ce jour ; mais l’un d’entre nous était resté avec lui, et lui dit : « Maître bien-aimé, il manque un seul chapitre au livre que tu as dicté. Est-ce qu’il te semble difficile de pousser plus loin les questions ? » Il répondit : « C’est facile, prends ta plumé et de l’encre, et écris vite ». Ce qu’il fit.
        À trois heures de l’après-midi, il me dit : « J’ai dans mon coffret quelques objets précieux : du poivre, des étoles, de l’encens ; cours vite, amène-moi les prêtres de notre monastère, et je leur distribuerai ces petits cadeaux, tels que Dieu me les a donnés. » Quand ils furent arrivés, il leur parla, priant chacun d’eux de célébrer des messes et de prier assidûment pour lui, ce qu’ils lui promirent de grand cœur.
        Tous se lamentaient et pleuraient, surtout parce qu’il avait dit qu’à son avis, ils ne verraient plus beaucoup son visage en ce monde. Ils se réjouissaient pourtant parce qu’il avait dit cette parole : « Il est temps, si mon Créateur le juge bon, que je retourne à lui, qui m’a créé et qui, alors que je n’existais pas, m’a fait de rien. J’ai vécu longtemps, mon juge miséricordieux avait prévu pour moi une vie heureuse. %Le temps de mon départ est arrivé. Car je désire disparaître pour être avec le Christ% ; en effet, mon âme désire voir mon Roi, le Christ, dans sa beauté. » Il dit encore beaucoup d’autres choses pour notre édification, et il passa toute la journée jusqu’au soir dans l’allégresse.
        L’enfant Wiberth lui dit : « Maître bien-aimé, il y a encore une phrase qui n’est pas transcrite — Écris tout de suite. » L’enfant répondit : « Maintenant la phrase est transcrite. » Et lui : « Bien, tu as dit la vérité : %Tout est accompli%. Prends ma tête dans tes mains, car j’ai grand plaisir à être assis en face de la chapelle de mon saint, où j’avais coutume de prier, afin de pouvoir, en restant assis, invoquer mon Père. »
        Et ainsi, sur le pavé de sa cellule, tandis qu’il chantait : « Gloire au Père, et au Fils, et au Saint-Esprit », il rendit le dernier soupir. Et (comme il faut le croire sans hésiter), parce qu’ici-bas il avait toujours peiné, avec beaucoup de ferveur, pour chanter les louanges de Dieu, il partit vers les joies célestes qu’il avait désirées.

      responsory: |-
        R/ Enveloppés d’une si grande nuée de témoins,
        fixons nos regards sur le Christ.
        
        Ils aspiraient à une patrie meilleure ;
        c’est pourquoi Dieu n’a pas honte
        de s’appeler leur Dieu,
        car il leur a préparé une ville.
        
        En mourant ils ont salué de loin la promesse,
        car Dieu prévoyait pour nous un sort meilleur,
        aussi ne devaient-ils pas
        atteindre sans nous la perfection.

