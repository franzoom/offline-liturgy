celebration:
  title: La Vierge Marie Médiatrice
  description: Le culte de Marie Médiatrice de toutes grâces a pris son origine en Belgique sous l’impulsion du cardinal Mercier (1921). Le Il^ème Concile du Vatican a reconnu la légitimité de l’expression « entendue de telle sorte que nulle dérogation, nulle addition, n’en résulte quant à la dignité et l’efficacité de l’unique Médiateur, le Christ ».
  commons:
  - virgin-mary
  color: white

oration:
  - |-
    Par son libre consentement à ta volonté, Seigneur, la Vierge Marie est devenue la mère de ton Fils et s’est totalement associée à son œuvre de rédemption ; accorde-nous, à sa prière, de progresser dans la foi, l’espérance et la charité, et de collaborer généreusement à la mission de l’Église.

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT BERNARD SUR LES GLOIRES DE LA VIERGE MÈRE
      content: |-
        %Le nom de la Vierge était Marie%. Parlons un peu de ce nom qui signifie : étoile de la mer et qui convient admirablement à la Vierge Mère. ~ Elle est bien cette noble étoile née de Jacob, dont les rayons illuminent le monde entier, dont l’éclat resplendit au plus haut des cieux et pénètre jusqu’aux abîmes. Elle illumine toute la terre, embrase les esprits encore plus que les corps, fait croître les vertus et dessèche les vices.
        Elle est cette splendide étoile qui se lève sur l’immensité de la mer, brillant par ses mérites, éclairant par ses exemples. Ô toi qui te sens, loin de la terre ferme, emporté sur les flots de ce monde au milieu des orages et des tempêtes, ne quitte pas des yeux la lumière de cet astre si tu ne veux pas sombrer.
        Si les vents des tentations s’élèvent, si tu viens heurter les rochers des tribulations, regarde l’étoile, invoque Marie.
        Si tu es ballotté par les flots de l’orgueil, de l’ambition, de la trahison, de la jalousie, regarde l’étoile, invoque Marie.
        Si la colère ou l’avarice ou les désirs impurs secouent la petite barque de ton âme, regarde Marie.
        Si, troublé par l’énormité de tes crimes, confondu par la malpropreté de ta conscience, glacé d’effroi à la pensée du jugement, tu commences à être englouti par le gouffre de la tristesse, par l’abîme du désespoir, pense à Marie.
        Dans les périls, dans les angoisses, dans le doute, pense à Marie, invoque Marie. Qu’elle ne s’éloigne pas de ta bouche, qu’elle ne s’éloigne pas de ton cœur et, pour obtenir le secours de sa prière, ne néglige pas l’exemple de sa vie.
        Si tu la suis, tu ne dévies pas. Si tu la pries, tu ne désespères pas. Si tu la consultes, tu ne te trompes pas. Si elle te protège, tu ne crains rien. Si elle te conduit, tu ne te fatigues pas. Si elle t’est favorable, tu parviens au but.
        Et ainsi tu éprouves par toi-même à quel juste titre il a été dit : %Et le nom de la Vierge était Marie%.

      responsory: |-
        R/ Réjouis-toi, Marie,
        tu donneras le Sauveur au monde !
        
        Il sera grand,
        on l’appellera Fils du Très-Haut !
        
        Il vient chercher
        ce qui était perdu.
        
        Il rassemblera
        les enfants de Dieu dispersés.