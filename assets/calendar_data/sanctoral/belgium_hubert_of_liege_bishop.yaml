celebration:
  title: Saint Hubert
  subtitle: évêque
  description: Hubert succéda à saint Lambert comme évêque de Maestricht. Il travailla, lui aussi, à l’évangélisation de la Belgique orientale, catéchisant le peuple et détruisant les cultes païens. Il mourut à Tervueren en 727 et fut inhumé à Liège dans l’église des Saints-Apôtres.
  commons:
  - pastors_bishop
  color: white

oration:
  - |-
    Donne-nous, Seigneur, de célébrer dignement la mémoire de l’évêque saint Hubert ; et puisque tu as voulu que sa parole et son exemple soutiennent le peuple dont il avait la charge, accorde encore à tes fidèles d’éprouver le bienfait de son intercession.