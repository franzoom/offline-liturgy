celebration:
  title: Saint Jean Berchmans
  subtitle: religieux
  description: 26 novembre. S. Jean Berchmans, religieux Jean Berchmans (1599-1621), né en Brabant, entra chez les Jésuites de Louvain, d’où il fut envoyé à Rome pour y étudier (1618). Soucieux d’imiter les saints de la Compagnie de Jésus, surtout Louis de Gonzague et Stanislas Kostka, il joignait au travail une vie de pénitence et de prière. Il mourut de la dysenterie rayonnant de joie, à vingt-deux ans.
  commons:
  - saints-male_religious
  color: white

oration:
  - |-
    Accorde-nous, Seigneur, de te servir dans la droiture et dans la foi, à l’exemple de saint Jean Berchmans qui te consacra la pureté de sa jeunesse.

readings:
  patristicReading:
    - title: LETTRE À SES PARENTS (1616)
      content: |-
        %À l’âge de 17 ans, saint Jean Berchmans, désirant se consacrer à Dieu le plus tôt possible et éviter que ses parents ne fassent obstacle à ses désirs, décida de révéler à ces derniers la résolution qu’il avait prise au fond du cœur ; aussi leur écrivit-il de Malines la lettre suivante :%
        
        Vénéré père et très chère mère,
        Il y a déjà trois ou quatre mois que Dieu frappe à la porte de mon cœur ; et, jusqu’à un certain point, je la lui ai tenue fermée jusqu’ici. Mais ayant ensuite réfléchi que, soit pendant que j’étudiais, soit quand je prenais quelque délassement, que j’allais à la promenade ou que je faisais n’importe quoi, aucune chose ne me venait plus souvent à l’esprit que la pensée de me fixer fermement dans un état de vie, je me décidai à la fin, et même, après beaucoup de communions et de bonnes œuvres préparatoires, je fis vœu de servir, avec sa grâce, Dieu notre Maître, en religion.
        Il est vrai que les amis et les parents éprouvent une certaine répugnance à se détacher des leurs enfants.
        Mais, en moi-même, je considère autre chose : si je voyais, devant moi, d’un côté mon père, ma mère, ma sœur, etc... et de l’autre côté Dieu notre Maître avec sa Mère qui est aussi, je l’espère, ma Mère bénie: et que les premiers me diraient: « Ne nous abandonne pas, cher enfant, nous t’en prions par les peines et les fatigues que nous avons endurées pour toi » tandis que, d’autre part, Jésus me dirait: « Suis-moi plutôt, je naquis pour toi, pour toi je fus flagellé, couronné d’épines et enfin crucifié. Vois-tu ces cinq plaies sacrées, n’est-ce pas pour toi que je les ai reçues ? Et ne sais-tu pas que jusqu’à présent j’ai nourri ton âme de ma chair sainte et l’ai vivifiée par mon sang sacré ? Et maintenant tu te montrerais si ingrat ? » Ah ! mes très chers parents, quand je considère tout cela, je m’enflamme de telle manière que, s’il m’était possible, je volerais tout de suite en religion, et mon âme et mon cœur ne se donneraient de repos avant qu’ils n’eussent trouvé mon Bien-Aimé.
        Ainsi donc, je m’offre de tout cœur à Jésus Christ et je désire combattre ses combats dans la Compagnie. J’espère que vous ne serez pas à ce point ingrats pour vous opposer à Jésus Christ
        Je me recommande à vos saintes prières et supplie Dieu, notre Maître, qu’il veuille me donner persévérance jusqu’à la fin de ma vie et qu’il nous accorde, à vous et à moi, la vie éternelle. Le fils obéissant de Jésus Christ et le vôtre. Jean Berchmans.

      responsory: |-
        R/ Connaître le Christ,
        la puissance de sa résurrection,
        et la communion à ses souffrances.
        
        Pour lui, j’ai tout perdu,
        et je cours vers le seul but :
        
        De tout mon élan, je veux le saisir,
        car lui, le premier, m’a saisi.