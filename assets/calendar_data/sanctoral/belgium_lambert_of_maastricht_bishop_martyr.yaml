celebration:
  title: Saint Lambert
  subtitle: évêque et martyr
  description: Lambert, évêque de Maestricht (vers 671), vécut dans un temps de violences. Écarté de son siège par Hébroïn, il partagea pendant sept ans la vie des moines de Stavelot, vie de pénitence et d’austérité qu’il devait conserver par la suite, en y joignant le zèle apostolique. Il fut assassiné près de Liège (avant 705).
  commons:
  - martyr
  - pastors_bishop
  color: red

oration:
  - |-
    Seigneur, tu nous as fait connaître ton Fils grâce à la prédication de saint Lambert, évêque et martyr ; rends-nous maintenant, à sa prière, fermes et constants dans la foi.