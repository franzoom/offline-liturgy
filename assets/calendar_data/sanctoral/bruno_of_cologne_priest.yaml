celebration:
  title: Saint Bruno
  subtitle: prêtre
  description: Après avoir enseigné à Reims pendant longtemps, Bruno (1035 1101) gagna le massif de la Chartreuse avec quelques disciples pour s’y livrer à la pénitence et à la contemplation. Avec ses frères il adopta un genre de vie qui alliait la solitude des ermites à un minimum de vie commune. Appelé à Rome par Urbain 11, Bruno devait mourir dans un ermitage de Calabre.
  commons:
  - pastors
  - saints-male_religious
  color: white

oration:
- Dieu qui as appelé saint Bruno à te servir dans la solitude, accorde-nous, par son intercession, qu’au milieu de l’agitation de ce monde nous sachions rester libres pour te suivre.


readings:
  patristicReading:
    - title: LETTRE DE SAINT BRUNO À SES FILS CHARTREUX
      content: |-
        J’ai appris, par les récits détaillés et si consolants de notre bienheureux frère Landuin, avec quelle inflexible rigueur vous suivez une observance sage et vraiment digne d’éloges : il m’a parlé de votre saint amour, de votre zèle infatigable pour tout ce qui touche la pureté du cœur et la vertu : mon esprit en exulte dans le Seigneur. Oui, vraiment j’exulte et je me sens porté à la louange et aux actions de grâce envers le Seigneur, et cependant je soupire amèrement. J’exulte certes → cela est juste — à voir croître les fruits de vos vertus, mais je déplore et je rougis de rester inerte et négligent dans la misère de mes péchés.
        Réjouissez-vous donc, mes frères très chers, pour votre bienheureux sort et pour les largesses de grâce que Dieu répand sur vous. Réjouissez-vous d’avoir échappé aux flots agités de ce monde, où se multiplient les périls et les naufrages. Réjouissez-vous d’avoir gagné le repos tranquille et la sécurité d’un port caché : beaucoup désirent s’y rendre, beaucoup font même un effort pour l’atteindre et n’y parviennent point. Beaucoup même, après en avoir joui, en ont été rejetés, parce qu’aucun d’eux n’en avait reçu la grâce d’en haut.
        Aussi, mes frères, tenez le pour certain et prouvé : personne, après avoir joui d’un bien si désirable, ne vient de quelque manière à le perdre sans en éprouver un regret continuel, s’il prend à cœur le salut de son âme.
        De vous, mes bien-aimés frères convers, je dis : %mon âme glorifie le Seigneur%, car je considère la magnificence de sa miséricorde sur vous, d’après l’exposé de votre prieur et père très aimant, qui est rempli de joie et de fierté à votre sujet. Je me réjouis moi aussi, car bien que vous n’ayez pas la science des lettres, le Dieu tout-puissant grave de son doigt dans vos cœurs non seulement l’amour, mais la connaissance de sa loi sainte : vous montrez en effet par vos œuvres ce que vous aimez et ce que vous connaissez. Car vous pratiquez avec tout le soin et le zèle possibles la véritable obéissance. ~ Il est par là évident que vous recueillez avec sagesse le fruit excellent et vivifiant des divines Écritures.

      responsory: |-
        [rubric]Stance[/rubric]
        Dans un lieu perdu,
        ils ont cherché la source
        où renaît la soif ;
        dans un lieu caché,
        ils suivaient en pauvres
        le Christ pauvre.
        Avec une humble patience,
        ils attendaient l’heure
        où d’autres viendraient
        se joindre à leur quête.
        
        R/ Tes amis te cherchaient, Seigneur :
        ils nous guident vers toi.
        
        À nous maintenant de les suivre
        vers cette obscurité
        où nous guettons le reflet de ta gloire.
        
        Ils ont maintenant rejoint ton visage :
        leur chemin demeure
        celui que tu nous traces.