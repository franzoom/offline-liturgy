celebration:
  title: Saint Gaétan de Thiene
  subtitle: prêtre
  description: Gaétan de Thienne (1480-1547) était un prélat de la Curie romaine soucieux d’ajouter à ses tâches administratives le service des malades et de mener une vie de prière. Avec son ami Jean-Pierre Caraffa, il fonda une société de clercs qui se consacraient à la prédication et au service liturgique. On les appela les Théatins, du nom du diocèse dont Caraffa devint évêque.
  commons:
    - pastors_bishop
  color: white

oration:
  - |-
    Dieu qui inspiras au prêtre saint Gaétan de vivre à la manière des Apôtres, fais qu’à son exemple et par sa prière, nous mettions toujours en toi notre confiance et cherchions sans relâche ton Royaume.

readings:
  patristicReading:
    - title: LETTRE DE SAINT GAÉTAN À ÉLISABETH PORTO
      content: |-
        Je suis un pécheur et je m’estime peu de chose, mais je recours aux plus excellents serviteurs du Seigneur, afin qu’ils prient pour toi le Christ béni et sa Mère. Mais n’oublie pas que tous les saints ne peuvent pas te rendre chère au Christ autant que tu le peux toi-même : c’est là ton affaire. Et si tu veux que le Christ te chérisse et vienne à ton aide, chéris-le toi-même, dirige vers lui ta volonté afin de lui plaire en tout ; et ne doute pas que, même si tous les saints et toutes les créatures t’abandonnaient, lui du moins sera toujours auprès de toi dans tes nécessités.
        Sache-le comme une chose certaine : nous sommes ici sur terre comme des étrangers et des voyageurs. Notre patrie est le ciel. Celui qui se gonfle d’orgueil s’égare loin du chemin et court à la mort. En vivant ici-bas, nous devons acquérir la vie éternelle, que nous ne méritons pas, car nous l’avons perdue à cause de nos péchés, mais que Jésus Christ a reconquise pour nous. C’est pourquoi nous devons toujours lui rendre grâce, l’aimer, lui obéir et, autant que c’est possible, être toujours avec lui.
        Il s’est donné pour nous en nourriture : malheureux, celui qui méconnaît un si grand don ! Il nous est donné de posséder le Christ, fils de la Vierge Marie, et nous le refusons. Malheur à celui qui ne se soucie pas de le recevoir ! Ma fille, voici le bien que je souhaite pour moi et que j’implore pour toi, mais il n’y a pas d’autre voie pour l’obtenir que de prier souvent la Vierge Marie : qu’elle te visite avec son glorieux Fils. Mieux encore : ose lui demander de te donner son Fils, qui est la véritable nourriture de l’âme dans le Saint Sacrement de l’autel. Elle te le donnera volontiers, et lui-même viendra plus volontiers encore pour te fortifier, pour que tu puisses avancer sans crainte dans cette sombre forêt où tant d’ennemis nous guettent, mais qui demeurent loin de nous s’ils voient que nous sommes gardés par un tel protecteur.
        Ma fille, ne communie pas à Jésus Christ afin d’user de lui à ton gré ; je veux que tu t’abandonnes à lui, et que lui te reçoive, afin que lui-même, ton Dieu sauveur, fasse pour toi et en toi ce qu’il veut. Voilà ce que je désire, à quoi je texhorte et, autant que j’en ai le pouvoir, ce que jexige de toi.

      responsory: |-
        R/ Tout homme qui croit en Jésus Christ
        aura la vie éternelle.
        
        Je n’ai rien voulu savoir parmi vous,
        sinon Jésus Christ, et Jésus Christ crucifié.
        
        Nous avons cru, nous aussi, au Christ Jésus,
        afin d’être justifiés par la foi au Christ.
