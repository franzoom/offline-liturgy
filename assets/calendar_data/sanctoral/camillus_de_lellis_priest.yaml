celebration:
  title: Saint Camille de Lellis
  subtitle: prêtre
  description: Camille de Lellis (1550-1614) mena d’abord une vie dissolue, qui le conduisit à l’hôpital des Incurables de Rome. Il y fut bouleversé à la vue des malades à l’abandon et il se fit infirmier. Des compagnons se groupèrent sous sa direction (1582). Ce furent les « Serviteurs des malades ». Ordonné prêtre, Camille devait passer sa vie parmi les membres souffrants du Christ.
  commons:
    - saints-male_caritative
  color: white

oration:
  - Tu as donné, Seigneur, à saint Camille la grâce d’une étonnante charité envers les malades ; répands encore en nous ton esprit d’amour, et quand nous t’aurons servi dans nos frères, nous pourrons, à l’heure de quitter ce monde, nous en aller vers toi en toute paix.

readings:
  patristicReading:
    - title: LA VIE DU P. CAMILLE DE LELLIS, PAR SON COMPAGNON S. CICATELLI
      content: |-
        Je dois commencer par la charité comme étant la racine de toutes les vertus et un charisme plus familier à Camille que tous les autres. Je dirai donc qu’il a été embrasé par l’ardeur de cette vertu non seulement envers Dieu, mais aussi envers son prochain et spécialement envers les malades. C’est au point qu’il lui suffisait de les apercevoir pour sentir son cœur se fondre de tendresse et oublier entièrement tous les plaisirs, les agréments et les attachements terrestres. Il paraissait, lorsqu’il servait n’importe quel malade, comme s’absorber et se consumer dans son extrême ferveur. Il aurait volontiers pris sur lui leur accablement ou n’importe lequel de leurs maux pour soulager leurs douleurs ou guérir leurs maladies.
        Il voyait en eux la personne du Christ avec une telle vivacité d’imagination que souvent, en servant leur nourriture, il les considérait comme étant ses christs, au point qu’il implorait d’eux la grâce et le pardon de ses péchés. II se tenait devant eux avec autant de respect que s’il avait été réellement et personnellement en présence du Seigneur. Dans ses entretiens, il introduisait le thème de la charité plus fréquemment et avec plus de ferveur qu’aucun autre, et il aurait voulu pouvoir la faire entrer dans le cœur de tous les hommes.
        Pour enflammer chez ses religieux l’amour de cette vertu primordiale, il avait l’habitude de leur répéter ces paroles très douces du Christ : %J’étais malade, et vous m’avez visité%. Il semblait vraiment avoir ces paroles gravées dans son cœur, tant il les prononçait et les répétait.
        La charité de Camille était si vive et si largement ouverte qu’il étreignait dans sa bonté et sa bienveillance non seulement les malades et les moribonds, mais d’une façon générale tous les pauvres et les malheureux. Enfin il y avait dans son cœur une si grande tendresse pour les indigents qu’il avait coutume de dire : « Puisque les pauvres passent inaperçus dans le monde, il faut que des hommes se dépensent à les découvrir et à les faire sortir de terre, pour leur faire du bien et leur montrer de la miséricorde. »


      responsory: |-
        R/ Partager son pain avec l’affamé,
        voilà le jeûne qui plaît à Dieu.
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et si tu cries le Seigneur répondra ;
        tes appels, il dira : Me voici !
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et quand le Fils de l’homme viendra, il te dira :
        J’avais faim et tu m’as donné à manger.