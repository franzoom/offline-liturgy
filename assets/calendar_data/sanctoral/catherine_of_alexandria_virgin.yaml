celebration:
  title: Sainte Catherine d'Alexandrie
  subtitle: vierge et martyr
  description: Catherine, martyre d’Alexandrie au début du IV^ème siècle, était, selon une pieuse tradition, une jeune fille noble et instruite, capable de répondre de sa foi devant une assemblée de philosophes païens avant de subir son supplice. Depuis le mont Sinai, où un monastère très ancien porte son nom, son culte s’est répandu dans toute l’Église. Le Moyen Âge en a fait une de ses saintes les plus populaires, à laquelle sont rattachées de nombreuses coutumes.
  color: red
  commons:
  - martyrs_female_virgin
  - virgins

oration:
- Dieu éternel et tout puissant, tu as donné en exemple à ton peuple la bienheureuse Catherine d’Alexandrie, vierge et victorieuse dans le martyre ; par son intercession, fortifie notre foi et notre courage, et accorde-nous de travailler avec empressement pour l’unité de l’Église.
