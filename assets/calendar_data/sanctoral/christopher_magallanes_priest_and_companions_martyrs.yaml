celebration:
  title: Saint Christophe Magallanès, prêtre, et ses compagnons
  subtitle: martyrs
  description: Né en 1869 au Mexique, Christophe Magallanès n’abandonne pas le courageux exercice de son ministère lorsque la persécution frappe son pays entre 1915 et 1937. Il offre d’abriter un séminaire dans sa paroisse afin de maintenir la formation des futurs prêtres. Christophe et ses compagnons acceptent librement le martyre en 1927, pardonnant de façon explicite à leurs persécuteurs
  color: red
  commons:
    - martyrs

oration:
  - Dieu éternel et tout puisant, tu as rendu fidèles au Christ Roi, jusqu’au martyre, le prêtre saint Christophe et ses compagnons ; accorde-nous, par leur intercession, de persévérer dans la confession de la vraie foi et de rester toujours attachés aux commandements de ton amour.
