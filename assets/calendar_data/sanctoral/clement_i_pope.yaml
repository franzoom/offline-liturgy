celebration:
  title: Saint Clément I^er
  description: Après les épiscopats effacés de Lin et de Clet, Clément fait figure de premier successeur de Pierre. Selon saint Irénée, « il avait vu les Apôtres, leur prédication résonnait à ses oreilles ». Dans la lettre que, vers l’an 95, il écrivit aux Corinthiens pour les exhorter à l’unité, Clément évoque avec émotion le souvenir de Pierre et de Paul.
