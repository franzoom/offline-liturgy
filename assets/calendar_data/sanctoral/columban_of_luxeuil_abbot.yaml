celebration:
  title: Saint Colomban
  subtitle: abbé
  description: Moine irlandais, Colomban passa la Manche vers 590 et il évangélisa le Nord-Est de la Gaule, ainsi que la région rhénane. Il se fixa ensuite à Luxeuil, où il fonda un monastère qu’il dota d’une Règle austère. Puis, abandonnant une communauté florissante, il gagna l’Italie et il fonda un nouveau monastère à Bobbio, où il devait mourir (615).
  commons:
    - pastors
    - saints-male_religious
  color: white

oration:
  - Seigneur, tu as merveilleusement réuni en saint Colomban le souci de l’évangélisation et l’attachement à la vie monastique ; permets qu’à sa prière et comme lui, nous mettions toutes nos forces à rechercher ton seul amour et à faire grandir le peuple des croyants.

readings:
  patristicReading:
    - title: INSTRUCTION SPIRITUELLE DE SAINT COLOMBAN
      content: |-
        Moïse a écrit dans la Loi : %Dieu fit l’homme à son image et a sa ressemblance%. Considérez, je vous prie, l’importance de cette parole. Dieu, le tout-puissant, l’invisible, l’incompréhensible, l’indicible, l’inestimable, en façonnant l’homme avec de la glaise, l’a ennobli de l’image de sa propre grandeur. Quoi de commun entre l’homme et Dieu, entre la glaise et l’esprit ? Car %Dieu est esprit%. C’est donc une grande marque d’estime pour l’homme, que Dieu l’ait gratifié de l’image de son éternité et de la ressemblance de sa propre vie. La grandeur de l’homme, c’est sa ressemblance avec Dieu, pourvu qu’il la garde. ~
        Tant que l’âme fera bon usage des vertus semées en elle, elle sera semblable à Dieu. Toutes les vertus que Dieu a mises en nous lors de notre création, il nous a enseigné que nous devions les lui rendre. Il nous demande d’abord d’%aimer Dieu de tout notre cœur%, car lui nous a aimés le premier, dès le commencement, avant même que nous soyons. Aimer Dieu, c’est donc rénover en nous son image. Or, il aime Dieu, celui qui garde ses commandements. Il a dit en effet : %Si vous m’aimez, gardez mes commandements%. Son commandement, c’est l’amour mutuel, selon cette parole : %Mon commandement, c’est que vous vous aimiez les uns les autres comme moi je vous ai aimés%. Et l’amour véritable ne consiste %pas% seulement %en paroles et discours, mais en actes et en vérité%. À nous donc, par notre sainteté, de refléter pour notre Dieu, pour notre Père, son image inviolée, car il est saint et il a dit : %Soyez saints comme je suis saint%. À nous de la refléter avec amour, car il est amour, et Jean a dit: %Dieu est amour%. Avec tendresse et en vérité, car Dieu est bon et vrai.
        Ne soyez pas les peintres d’une image étrangère. De fait, il peint l’image d’un tyran, celui qui se montre violent, colérique, ou orgueilleux. Aussi pour au moins ne pas introduire en nous d’images de tyrans, laissons le Christ peindre en nous son image. Il l’a peinte lorsqu’il a dit : Je vous donne ma paix, je vous laisse ma paix. Mais à quoi nous sert-il de savoir que cette paix est bonne, si nous ne veillons pas bien sur elle ? Ce qui est très bon est habituellement très fragile ; et les biens précieux réclament de plus grands soins et une garde plus vigilante. Très fragile est la paix qui peut être perdue par une parole légère ou une infime blessure faite à un frère. Or, rien ne plaît davantage aux hommes que de parler hors de propos et de s’occuper de ce qui ne les regarde pas, de proférer de vains discours et de critiquer les absents. Dès lors, que ceux qui ne peuvent pas dire : Le Seigneur m’a donné la langue d’un disciple pour que je sache réconforter par la parole celui qui est abattu, que ceux-là se taisent ou, s’ils disent un mot, que ce soit un mot de paix.

      responsory: |-
        R/ Qui nous fera comprendre
        pourquoi l’homme peine à chercher
        sans jamais atteindre ?

        Ce que l’œil n’a pas vu, ni l’oreille entendu,
        ce qui n’est pas monté au cœur de l’homme,
        voilà ce que Dieu a préparé pour ceux qui l’aiment.

        À nous, Dieu l’a révélé par l’Esprit,
        car l’Esprit sonde tout,
        jusqu’aux profondeurs de Dieu.
