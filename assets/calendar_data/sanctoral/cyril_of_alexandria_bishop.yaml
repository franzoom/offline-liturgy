celebration:
  title: Saint Cyrille d’Alexandrie
  subtitle: évêque et docteur de l’Église
  description: Le nom de Cyrille, évêque d’Alexandrie (370‑444), est attaché avant tout au concile d’Éphèse, où il fit condamner Nestorius qui refusait à Marie le titre de Mère de Dieu (431). Cyrille n’était pas un homme facile, mais pour la postérité il demeure « L’invincible défenseur » et le chantre plein de Lyrisme de la maternité divine de Marie.
  commons:
    - pastors_bishop
    - pastors_doctors
  color: white

oration:
  - |-
    Tu as voulu, Seigneur, que la maternité divine de la Vierge trouve en l’évêque saint Cyrille d’Alexandrie un invincible défenseur ; puisque nous croyons qu’elle est vraiment Mère de Dieu, fais que nous soyons sauvés par l’incarnation de ton Fils, Jésus Christ. Lui qui règne.

readings:
  patristicReading:
    - title: LETTRE DE S. CYRILLE À TOUS LES MOINES D’ÉGYPTE AVANT LE CONCILE D’ÉPHÈSE (431)
      subtitle: 
      content: |-
        Je trouve très surprenant qu’il y ait des gens pour se demander vraiment si la Sainte Vierge doit être appelée Mère de Dieu. Car si notre Seigneur Jésus est Dieu, comment la Vierge qui l’a engendré ne serait-elle pas la Mère de Dieu ? Telle est la foi que nous ont transmise les saints Apôtres, même s’ils n’ont pas employé cette expression. C’est l’enseignement que nous avons reçu des saints Pères, en particulier notre Père de glorieuse mémoire, Athanase. ~ Au troisième livre de l’ouvrage qu’il a composé sur la Trinité sainte et consubstantielle, il donne constamment à la Sainte Vierge le titre de Mère de Dieu.
        Je dois citer ses propres paroles. Les voici : « La sainte Écriture, nous l’avons fait remarquer bien souvent, se caractérise principalement en ceci, qu’elle présente, au sujet du Sauveur, une double affirmation : d’une part qu’il est le Dieu éternel, le Fils, le Verbe, le Resplendissement et la Sagesse du Père ; d’autre part que dans les derniers temps, pour notre salut, il a pris chair de la Vierge Marie, Mère de Dieu, et s’est fait homme. »
        Et il ajoute un peu plus loin : « Il y a eu beaucoup de saints et des hommes purs de tout péché : Jérémie a été sanctifié dès le sein maternel ; Jean Baptiste, encore dans le sein de sa mère, a tressailli d’allégresse à la voix de Marie, la Mère de Dieu. » Voilà ce que dit cet homme considérable, si digne d’inspirer confiance, car jamais il n’aurait rien dit qui ne fût conforme à la parole de Dieu. ~
        D’ailleurs, l’Écriture divinement inspirée déclare que le Verbe de Dieu s’est fait chair, c’est-à-dire s’est uni à une chair douée d’une âme raisonnable. ~ Le Verbe de Dieu a donc assumé la descendance d’Abraham et, en tirant de la femme son propre corps, s’est uni à la chair et au sang de telle sorte qu’il n’est plus seulement Dieu, mais on comprend que par cette union il est devenu homme comme nous.
        On doit donc confesser que l’Emmanuel est constitué de deux éléments : la divinité et l’humanité. Cependant, il y a un seul Seigneur, Jésus Christ, un seul vrai Fils, qui est tout ensemble Dieu et homme ; non pas un homme divinisé, comme ceux qui le sont par la grâce, mais vrai Dieu qui s’est manifesté dans la forme humaine pour notre salut. C’est ce que nous affirme à ce sujet le bienheureux Paul : %Lorsque les temps furent accomplis, Dieu a envoyé son Fils ; il est né d’une femme, il a été sujet de la Loi juive pour racheter ceux qui étaient sujets de la Loi et pour faire de nous des fils adoptifs%.

      responsory: |-
        R/ Réjouis-toi, Marie,
        tu donneras le Sauveur au monde !
        
        Il sera grand,
        on l’appellera Fils du Très-Haut !
        
        Il vient chercher
        ce qui était perdu.
        
        Il rassemblera
        les enfants de Dieu dispersés.
