celebration:
  title: Dédicace de la Basilique Sainte-Marie-Majeure
  description: |-
    La basilique Sainte-Marie Majeure fut érigée à Rome sur l’Esquilin par le pape Sixte III (432-440) en l’honneur de la Mère de Jésus, à qui le concile d’Éphèse venait de reconnaître le titre de Mère de Dieu (431). C’est la première des églises d’Occident qui ait été placée sous le vocable de sainte Marie.
  color: white
  commons:
    - virgin-mary

oration:
  - |-
    Seigneur, nous t’en prions, pardonne les péchés de tes serviteurs : puisque nos actions sont indignes de toi, que l’intercession de la Mère de ton Fils nous obtienne le salut.

morning:
  evangelicAntiphon:
    common: |-
      Sainte Marie, Mère de Dieu, toujours vierge, tu es bénie entre toutes les femmes, et Jésus, ton enfant, est béni.

readings:
  hymn:
    - reviens-verbe-de-dieu
  patristicReading:
    - title: HOMÉLIE PRONONCÉE AU CONCILE D’ÉPHESE (431)
      subtitle: (Cette homélie est le sermon marial le plus célèbre de l'antiquité.)
      content: |-
        Je vois cette joyeuse assemblée de saints évêques qui, à l’invitation de la sainte Mère de Dieu, Marie toujours Vierge, se sont rassemblés ici dans l’enthousiasme. Aussi, bien que je sois dans la tristesse, la présence de ces saints Pères me porte à la joie. Cette douce parole du psalmiste David s’accomplit parmi nous : %Voyez comme il est bon, comme il est doux, pour des frères d’habiter ensemble !%
        Nous te saluons donc, sainte Trinité mystérieuse, qui nous as tous convoqués dans cette Église de sainte Marie Mère de Dieu.
        Nous te saluons, Marie, Mère de Dieu, trésor sacré de tout l’univers, astre sans déclin, couronne de la virginité, sceptre de la foi orthodoxe, temple indestructible, demeure de l’incommensurable, Mère et Vierge, à cause de qui est appelé béni, dans les saints évangiles, %celui qui vient au nom du Seigneur%.
        Nous te saluons, toi qui as contenu dans ton sein virginal celui que les cieux ne peuvent contenir ; toi par qui la Trinité est glorifiée et adorée sur toute la terre ; par qui le ciel exulte; par qui les anges et les archanges sont dans la joie; par qui les démons sont mis en déroute; par qui de tentateur est tombé du ciel ; par qui la créature déchue est élevée au ciel ; par qui le monde entier, captif de l’idolâtrie, est parvenu à la connaissance de la vérité ; par qui le saint baptême est accordé à ceux qui croient, avec %l’huile d’allégresse% ; par qui, sur toute la terre, les Églises ont été fondées; par qui les nations païennes sont amenées à la conversion.
        Et que dirai-je encore ? C’est par toi que la lumière du Fils unique de Dieu a brillé pour %ceux qui demeuraient dans les ténèbres et dans l’ombre de la mort% ; c’est par toi que les prophètes ont annoncé l’avenir, que les Apôtres proclament le salut aux nations, que les morts ressuscitent, et que règnent les rois, au nom de la sainte Trinité.
        Y a-t-il un seul homme qui puisse célébrer dignement les louanges de Marie ? Elle est mère et vierge à la fois.
        Quelle merveille ! Merveille qui m’accable ! Qui a jamais entendu dire que le constructeur serait empêché d’habiter le temple qu’il a lui-même édifié ? Osera-t-on critiquer celui qui donne à sa servante le titre de mère ?
        Voici donc que le monde entier est dans la joie. ~ Qu’il nous soit donné de vénérer et d’adorer l’unité ~, de vénérer et d’honorer l’indivisible Trinité en chantant les louanges de Marie toujours Vierge, c’est-à-dire de la sainte Église, et celles de son Fils et de son Époux immaculé : car c’est à lui qu’appartient la gloire pour les siècles des siècles. Amen.

      responsory: |-
        R/ Mon âme exalte le Seigneur :
        éternel est son amour !
        
        Chante et réjouis-toi, fille de Sion,
        voici que ton Dieu vient demeurer au milieu de toi.
        
        Dieu pour toi exulte de joie,
        il te renouvelle par son amour.
        
        Le Seigneur, comme au jour de tête,
        dansera pour toi avec des cris de joie.
        
vespers:
  evangelicAntiphon:
    common: Sainte Marie, Mère de Dieu, prie pour nous, pauvres pécheurs, maintenant et quand viendra notre heure !
