celebration:
  title: Dédicace des basiliques de Saint Pierre et de Saint Paul
  description: Le corps de l’apôtre Pierre fut inhumé au Vatican près du cirque de Néron et celui de Paul sur la route d’Ostie. Au IV^ème siècle, l’empereur Constantin entreprit l’érection d’une vaste basilique sur la tombe de Pierre et il construisit un édifice plus modeste sur celle de Paul. On célèbre aujourd’hui leur dédicace par une mémoire des deux Apôtres.
  commons:
  - 
  color: white

