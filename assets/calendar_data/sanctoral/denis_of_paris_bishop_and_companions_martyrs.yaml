celebration:
  title: Saint Denis, évêque, et ses compagnons
  subtitle: martyrs
  description: Denis, le premier évêque de Paris, subit le martyre vers le milieu du III^ème siècle. Son corps fut inhumé au nord de la cité. Vers 495, sainte Geneviève fit construire une basilique sur son tombeau. La Passion de saint Denis lui attribue deux compagnons, Éleuthère et Rustique.
  commons:
  - martyrs
  color: red

oration:
- Dieu qui as envoyé l’évêque saint Denis et ses compagnons annoncer aux païens ton Évangile, et qui les as gardés inébranlables dans leur martyre, nous t’en prions, accorde-nous la grâce de les imiter en sachant mépriser la faveur du monde, sans jamais craindre ses attaques.
 
readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT AMBROISE SUR LE PSAUME 118
      content: |-
        Lorsqu’il y a beaucoup de persécutions, il y a beaucoup de martyrs. Chaque jour tu es témoin du Christ*. Tu étais tenté par l’esprit d’impureté ; mais, par crainte du jugement futur, tu as jugé qu’il ne fallait pas souiller la chasteté de l’esprit et du corps : tu es martyr du Christ. Tu étais tenté par l’esprit de lucre pour saisir la propriété d’un pauvre ou violer les droits d’une veuve sans défense ; mais, par la contemplation des préceptes divins, tu as jugé qu’il valait mieux porter secours que commettre une injustice : tu es témoin du Christ. En effet, le Christ veut avoir de tels témoins, selon cette parole de l’Écriture : %Soyez justes pour l’orphelin, défendez la veuve, venez donc et discutons, dit le Seigneur%. Tu étais tenté par l’esprit d’orgueil ; mais en voyant le pauvre et l’indigent, tu as été saisi d’une tendre compassion, tu as préféré l’humilité à l’arrogance : tu es témoin du Christ. Mieux que cela : tu n’as pas donné ton témoignage en parole seulement mais aussi en action.
        Quel est le témoin le plus sûr ? %Celui qui confesse que le Seigneur Jésus est venu parmi nous dans la chair% et qui observe les préceptes de l’Évangile. Car celui qui écoute et n’agit pas nie le Christ ; il a beau le proclamer en parole, il le nie par ses actions. Combien de gens disent : %Seigneur, Seigneur, n’est-ce pas en ton nom que nous avons été prophètes, que nous avons chassé les démons et fait beaucoup de miracles ?% Au jour du jugement, le Christ leur répondra : %Écartez-vous de moi, vous qui faites le mal !% Celui-là est témoin qui, avec la garantie des faits, rend témoignage aux préceptes du Seigneur Jésus.
        Combien y en a-t-il chaque jour, de ces martyrs cachés du Christ, qui confessent le Seigneur Jésus ! L’Apôtre a connu ce martyre-là et le témoignage de foi rendu au Christ, lui qui a dit : %Notre sujet de fierté, c’est le témoignage de notre conscience%. Combien ont confessé la foi extérieurement, et l’ont niée intérieurement ! ~ %Ne croyez pas n’importe quel prophète : c’est à leurs fruits que vous saurez% lesquels vous devez croire. ~ Sois donc fidèle et courageux dans les persécutions intérieures pour triompher aussi dans les persécutions extérieures. Dans les persécutions du dedans également, il y a %des rois et des gouverneurs%, des juges au pouvoir redoutable. Tu en as un exemple dans la tentation subie par le Seigneur.
        On lit encore ailleurs : %Que le péché ne règne pas dans votre corps mortel%. Tu vois devant quels rois tu vas comparaitre, o homme, devant quels gouverneurs de péchés, si c’est le péché qui règne. Il y a autant de rois que de péchés et de vices ; et c’est devant eux que nous sommes amenés, devant eux que nous comparaissons. Ces rois-là ont encore leur tribunal dans l’esprit d’un grand nombre. Mais celui qui confesse le Christ paralyse aussitôt le pouvoir de ce roi, il le détrône de son esprit. Comment le tribunal du diable pourrait-il subsister chez celui en qui est érigé le tribunal du Christ ?

      responsory: |-
        [rubric]Stance[/rubric]
        De la détresse des prisons
        monte le cri des fils de Dieu persécutés ;
        mais le Royaume est proche :
        bientôt se lèvera
        le Fils de l’homme qu’ils acclament :
        
        R/ Dieu vivant, Seigneur ressuscité,
        nous croyons en toi.
        
        Un moment vous souffrirez,
        mais j’ai vaincu le monde,
        gardez courage.
        
        En vérité, je vous le dis,
        si quelqu’un garde ma parole,
        il ne verra jamais la mort.
        
        Je suis la résurrection ;
        celui qui me donne sa foi
        vivra même dans la mort.