celebration:
  title: Sainte Élisabeth du Portugal
  description: Elisabeth d’Aragon (1271-1336), épouse du roi Denis de Portugal, fut une épouse et une mère douloureuse. Bafouée par un mari jouisseur, elle perdit sa fille et son gendre, et elle vit son fils se révolter contre le roi. Au milieu de ses épreuves, elle priait, jeûnait, tentait de faire la paix. Devenue veuve, elle mourut sous l’habit du tiers-ordre franciscain.
  commons:
    - saints-female_caritative
  color: white

oration:
  - Seigneur, source de paix, ami de la charité, tu as donné à sainte Élisabeth de Portugal une grâce merveilleuse pour réconcilier les hommes désunis ; accorde-nous, par son intercession, de travailler au service de la paix et de pouvoir être appelés fils de Dieu.

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT PIERRE CHRYSOLOGUE SUR LA PAIX
      content: |-
        %Heureux les artisans de paix%, dit l’Évangile, mes très chers frères, %ils seront appelés fils de Dieu% ! C’est à juste titre que les vertus chrétiennes se développent chez celui qui maintient la paix chrétienne entre tous ; et l’on n’obtient le titre de fils de Dieu que si l’on mérite le nom d’artisan de paix.
        La paix, mes très chers, est ce qui débarrasse l’homme de l’esclavage, fait de lui un homme libre, transforme sa condition personnelle aux yeux de Dieu, fait d’un serviteur un fils, d’un esclave un homme libre. La paix entre frères est ce que Dieu veut, ce qui réjouit le Christ, ce qui accomplit la sainteté, ce qui règle la justice, ce qui enseigne la doctrine, ce qui protège les mœurs, bref, c’est en toutes choses une conduite digne d’éloges. La paix fait exaucer nos prières, elle ouvre une route facile et praticable à nos supplications, elle accomplit parfaitement tous nos désirs. La paix est la mère de la charité, le lien de la concorde, le signe évident d’une âme pure, qui peut réclamer à Dieu tout ce qu’elle veut ; car elle demande tout ce qu’elle veut et elle reçoit tout ce qu’elle demande. La paix doit se conserver par l’obéissance aux commandements du Roi. Le Christ lui-même a dit : %C’est la paix que je vous laisse, c’est ma paix que je vous donne%. Ce qui revient à dire : Je vous ai quittés dans la paix, je vous retrouverai dans la paix ; en partant, il a voulu donner ce qu’il désirait trouver chez tous lorsqu’il reviendrait.
        C’est un commandement divin de conserver ce qu’il a donné : je ne veux pas autre chose que retrouver ce que je vous ai laissé en partant. Planter les racines de la paix, c’est l’œuvre de Dieu ; arracher entièrement la paix, c’est le travail de l’ennemi. Car, de même que l’amour fraternel vient de Dieu, ainsi la haine vient du démon ; c’est pourquoi il faut condamner la haine, car il est écrit : %Tout homme qui a de la haine contre son frère est un meurtrier%.
        Vous voyez, frères bien-aimés, pourquoi il faut aimer la paix et chérir la concorde : ce sont elles qui engendrent et nourrissent la charité. Vous savez que, selon l’Apôtre, %la charité vient de Dieu%. Il est donc séparé de Dieu, celui qui n’a pas la charité. ~
        Gardons les commandements, mes frères, car ils sont notre vie ; que la fraternité se maintienne unie par les nœuds d’une profonde paix, qu’elle se resserre par le lien salutaire d’un amour mutuel de charité, qui %couvre la multitude des péchés%. Il faut donc que tous nos désirs s’attachent à l’amour, car il peut obtenir tous les bienfaits et toutes les récompenses. Il faut garder la paix plus que toutes les autres vertus, parce que Dieu est toujours dans la paix. ~
        Aimez la paix, et tout sera dans le calme : afin que vous obteniez pour nous la récompense et pour vous la joie, afin que l’Église de Dieu, fondée sur l’unité de la paix, mène une vie parfaite dans le Christ.

      responsory: |-
        R/ Partager son pain avec l’affamé,
        voilà le jeûne qui plaît à Dieu.
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et si tu cries, le Seigneur répondra ;
        à tes appels, il dira : Me voici !
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et quand le Fils de l’homme viendra, il te dira :
        J’avais faim et tu m’as donné à manger.
