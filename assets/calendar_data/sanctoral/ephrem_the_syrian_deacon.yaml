celebration:
  title: Saint Éphrem
  subtitle: diacre et docteur de l’Église
  description: Le diacre Éphrem était chargé de l’école théologique de Nisibe lorsque surgirent les Perses (363) et il dut se réfugier avec ses élèves à Édesse, où il mourut (373). Il menait une vie de contemplation, qu’il entretenait par une austérité extrême. C’est de sa flamme intérieure que jaillissait ce Lyrisme qui a fait de lui « la harpe du Saint-Esprit ».
  commons:
    - pastors_doctors
  color: white

oration:
  - Dieu que nulle parole ne peut dire, répands en nos cœurs le souffle d’en haut qui inspirait au diacre saint Éphrem de dire la beauté de tes mystères et de passer sa vie à te servir.

readings:
  patristicReading:
    - title: VIE DE SAINT NORBERT PAR UN CONTEMPORAIN
      content: |-
        Chasse les ténèbres nocturnes de notre esprit, Seigneur, par la lumière diurne de ta connaissance, pour que notre esprit ainsi éclairé te serve par son renouvellement dans la pureté.
        Lorsque le soleil entreprend sa course, les mortels commencent leur travail ; fais de nos esprits, Seigneur, une belle demeure pour ce jour qui ne connaît pas de déclin. Accorde-nous de voir en nous-mêmes la vie apportée par la résurrection, et que rien ne détourne nos esprits de tes beautés. Imprime en nous, Seigneur, la trace de ce jour, qui ne dépend pas du mouvement et de la course du soleil, en nous donnant de te rechercher assidûment.
        Par tes sacrements puissions-nous t’embrasser chaque jour en te recevant dans notre corps. Rends-nous capables d’expérimenter en nous-mêmes la résurrection que nous espérons. Nous avons caché ce trésor dans notre corps avec la grâce du baptême ; que ce trésor s’enrichisse encore à la table de tes sacrements. Donne-nous la joie de ta grâce. Nous recevons ton mémorial dans ton banquet spirituel ; puissions-nous le posséder effectivement lors du renouvellement futur.
        Puissions-nous comprendre à quelle beauté nous sommes appelés, en découvrant cette beauté spirituelle que ta volonté immortelle fait éclore au sein de la mortalité elle-même.
        Ton crucifiement, ô notre Sauveur, a mis fin à ta vie corporelle ; accorde-nous de crucifier notre esprit pour Préfigurer la vie de l’Esprit. Que ta résurrection, ô Jésus, confère sa grandeur à notre homme spirituel ; que la contemplation de tes sacrements soit le miroir dans lequel nous le connaitrons.
        Ton plan divin, ô notre Sauveur, préfigure le monde de l’Esprit ; accorde-nous de le parcourir comme il convient à l’homme spirituel.
        Ne prive pas notre âme, Seigneur, de ta manifestation spirituelle et n’éloigne pas de nos membres la chaleur de ton amour. La mortalité qui se cache dans notre corps répand en nous la corruption ; que l’épanchement de ton amour spirituel purifie notre cœur des effets de cette condition mortelle. Accorde-nous, Seigneur, de nous hâter vers notre cité et de la contempler pour en prendre possession, comme Moïse du sommet de la montagne.

      responsory: |-
        R/ Ô abîme de la sagesse
        et de la science de Dieu,
        insondables, ses décrets
        incompréhensibles, ses voies !
        
        Mystère de Dieu, mystère du Christ,
        où se trouvent cachés tous les trésors
        de la sagesse et de la connaissance.
        
        Dieu a voulu nous faire connaître
        la gloire de ce mystère au milieu des nations 
        le Christ parmi nous, l’espérance de la gloire.


