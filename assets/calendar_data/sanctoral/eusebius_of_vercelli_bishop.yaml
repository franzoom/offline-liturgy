celebration:
  title: Saint Eusèbe de Verceil
  subtitle: évêque
  description: Évêque de Verceil (Piémont) de 345 à 371, Eusèbe fut exilé en Orient pour sa fidélité à la foi en la divinité de Jésus Christ définie à Nicée. À son retour d’exil (361), il voulut mener la vie commune avec les clercs qui partageaient son activité pastorale, ce en quoi il fut un initiateur.
  commons:
    - pastors_bishop
  color: white

oration: 
  - |-
    Accorde-nous, Seigneur, de savoir imiter le courage de l’évêque saint Eusèbe pour affirmer la divinité du Christ ; nous garderons ainsi la foi qu’il a enseignée, et nous obtiendrons de participer à la vie de ton Fils.

readings:
  patristicReading:
    title: LETTRE D’EXIL DE SAINT EUSÈBE AUX PRÊTRES ET AU PEUPLE DE VERCEIL
    subtitle: (après 355)
    content: |-
      Je sais maintenant, frères très chers, que vous êtes en bonne santé, comme je le désirais. J’ai cru que j’étais arrivé jusqu’à vous comme si j’avais été tout à coup enlevé et transporté à travers toute l’étendue de la terre, comme il est arrivé à Habacuc, transporté par un ange auprès de Daniel. Tandis que je recevais les lettres de chacun de vous et que je déchiffrais dans vos écrits vos saintes dispositions et votre amour, mes larmes se mêlaient à la joie, et mon esprit avide de vous lire en était empêché par l’obstacle de ces larmes. L’un et l’autre étaient inévitables, puisque chacun de nous essayait de remplir au plus vite ses devoirs d’affection, afin de compenser nos regrets. C’est à cela que j’ai été occupé plusieurs jours, croyant que je conversais avec vous, et j’en oubliais mes labeurs passés, car j’étais enveloppé de joies qui me rappelaient votre foi solide, votre charité, vos progrès, avec tant de grand bonheur que je ne me croyais plus en exil mais au milieu de vous.
      C’est pourquoi, mes frères, je me réjouis de votre foi, je me réjouis du salut qui est produit par la foi, je me réjouis des fruits que vous procurez non seulement à ceux qui sont établis chez vous, mais aussi à ceux qui sont loin de vous. De même en effet que le cultivateur greffe un bon arbre sur celui qui, à cause de ses fruits, ne subit pas la hache et n’est pas livré au feu, de même nous voulons et nous désirons non seulement vous servir selon la chair, mais encore donner notre vie pour votre salut. ~
      D’ailleurs nous vous avons écrit cette lettre comme nous avons pu, demandant sans cesse à Dieu de retarder nos gardiens pendant des heures et de permettre que le diacre vous envoie plutôt des nouvelles de notre labeur qu’une lettre quelconque de salutation. C’est pourquoi je vous demande instamment de garder la foi avec toute la vigilance possible, de pratiquer la concorde, de vaquer à la prière, de vous souvenir de nous sans relâche, pour que le Seigneur daigne libérer son Église qui souffre dans le monde entier, et nous permette, alors que nous sommes accablés, de nous réjouir avec vous de notre libération. ~ De même, je demande et je vous prie par la miséricorde de Dieu que chacun trouve une salutation pour lui dans cette lettre ; parce que, contraint par la nécessité, je n’ai pas pu écrire à chacun de vous comme j’en avais l’habitude. Ainsi vous tous, mes frères, mais aussi vous, mes saintes sœurs, mes fils et mes filles, je vous demande par cette lettre, quel que soit votre sexe ou votre âge, qu’ayant reçu ma salutation, vous daigniez saluer de mon respect également ceux qui sont hors de l’Église et qui ont la bonté de vous aimer.

    responsory: |-
      R/ Pour moi, vivre, c’est le Christ !
      Je suis en captivité pour le Christ,
      captif pour défendre l’Évangile.
      
      J’ai le désir de m’en aller
      et d’être avec lui.
      
      Je demeurerai près de vous tous
      pour la joie de votre foi.
