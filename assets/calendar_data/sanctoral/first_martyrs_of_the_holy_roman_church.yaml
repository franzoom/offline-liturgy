celebration:
  title: Les premiers martyrs de l’Église de Rome
  description: |-
    Au lendemain de la solennité des Apôtres Pierre et Paul, on fait mémoire des chrétiens de Rome que l’empereur Néron fit périr d’une manière atroce dans le cirque du Vatican, après les avoir rendus responsables de l’incendie de la Ville en juillet 64. Au dire de Tacite, ils étaient « une multitude immense ». On pense que Pierre fut du nombre des victimes.
  commons:
    - martyrs
  color: red

oration: 
 - Dieu qui as consacré par le sang des martyrs les magnifiques débuts de l’Église de Rome, fais que leur courage dans le combat nous obtienne une force inébranlable et la joie de la victoire.

readings:
  patristicReading:
    title: LETTRE DU PAPE S. CLÉMENT AUX CORINTHIENS
    content: |-
      %Ce passage est le témoignage le plus ancien que nous ayons du martyre de Pierre (après Jn 21), dans la communauté romaine.%
      
      Laissons les exemples de l’antiquité pour en venir aux athlètes les plus proches de nous. Prenons de nobles exemples dans notre génération. C’est par jalousie et par envie que les colonnes de l’Église les plus hautes et les plus justes ont été persécutées et ont lutté jusqu’à la mort. Regardons les saints Apôtres. Pierre, à cause d’une jalousie injuste a subi de nombreuses souffrances, et non pas une ou deux ; après avoir ainsi rendu son témoignage, il s’en est allé au séjour de gloire qu’il avait mérité. Par suite de la jalousie et de la discorde, Paul a montré quel prix est réservé à la constance. Chargé sept fois de chaînes, expulsé, lapidé, devenu prédicateur de l’Évangile en Orient et en Occident, il a reçu la renommée qui correspondait à sa foi. Après avoir enseigné la justice au monde entier jusqu’aux limites de l’Occident, il a rendu son témoignage devant les autorités ; c’est ainsi qu’il a quitté ce monde pour s’en aller au séjour de la sainteté, et devenir un illustre modèle de constance.
      A ces hommes qui ont mené une vie sainte est venue se joindre une grande foule d’élus qui, par suite de la jalousie, ont subi toutes sortes de mauvais traitements et de supplices, et qui ont donné parmi nous un magnifique exemple. Par suite de la jalousie, des femmes ont été persécutées : déguisées en victimes mythologiques, elles ont subi des outrages atroces et sacrilèges ; puis elles ont remporté victorieusement la course de la foi, et elles ont reçu une glorieuse récompense, elles dont le corps était si faible. C’est la jalousie qui a rendu des épouses étrangères à leurs maris et qui a fait mentir la parole de notre père Adam : %Voici l’os de mes os et la chair de ma chair%. Jalousie et discorde ont abattu de grandes cités et déraciné de puissantes nations.
      Nous vous écrivons ainsi, mes bien-aimés, non pas seulement pour votre avertissement, mais pour notre propre mise en garde. Car nous sommes dans la même arène, et le même combat nous attend. Laissons donc les préoccupations vaines et inutiles pour nous conformer à la règle glorieuse et vénérable de notre tradition. Voyons ce qui est beau, ce qui est agréable, ce qui est digne d’approbation aux yeux de celui qui nous a faits.
      Fixons nos regards sur le sang du Christ et comprenons combien il a de valeur pour son Père, puisque, répandu Pour notre salut, il a offert au monde entier la grâce de la conversion.


    responsory: |-
      R/ Qui perd sa vie, la trouvera !
      Il n’est pas de plus grand amour
      que de mourir pour celui qu’on aime.
      
      Entourés que nous sommes de témoins,
      marchons les yeux fixés sur le Christ.

morning:
  evangelicAntiphon:
    common: |-
      Une foule immense de martyrs persévérait dans l’amour fraternel : ils étaient unis par la foi.

vespers:  
  evangelicAntiphon:
    common: |-
      Tous ceux qui ont aimé le Christ pendant leur vie et l’ont imité dans sa mort régneront pour toujours avec lui.
