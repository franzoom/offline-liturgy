celebration:
  title: Saint Césaire d'Arles
  subtitle: évêque
  description: Moine de Lérins, puis évêque d’Arles pendant quarante ans (503-543), Césaire s’affirma comme un chef, dont l’influence s’exerça sur la Gaule méridionale et l’Espagne. Il sut à la fois protéger son peuple contre les exactions des Barbares et l’enseigner par des homélies simples et vivantes. Mais il parla aussi en docteur dans les conciles qu’il présida.
  commons:
  - pastors_bishop
  color: white

oration:
- Tu as donné, Seigneur, à saint Césaire d’Arles une grande aptitude pour enseigner au peuple ta Parole ; daigne ouvrir nos esprits et nos cœurs au message qu’il nous a transmis avec fidélité et conviction.

readings:
  patristicReading:
  - title: MONITION DE SAINT CÉSAIRE SUR LA MEDITATION DE LA PAROLE DE DIEU
    content: |-
      Que le Christ vous aide, frères très chers, à toujours accueillir la lecture de la parole de Dieu avec un cœur avide et assoiffé : ainsi votre obéissance très fidèle vous remplira de joie spirituelle. Mais si vous voulez que les saintes Écritures aient pour vous de la douceur et que les préceptes divins vous profitent autant qu’il le faut, sous-trayez-vous pendant quelques heures à vos préoccupations profanes. Relisez dans vos maisons les paroles de Dieu, consacrez-vous entièrement à sa miséricorde. Ainsi vous réussirez à réaliser en vous ce qui est écrit de l’homme bienheureux : %Il méditera jour et nuit la loi du Seigneur%. Et aussi : %Heureux ceux qui scrutent ses commandements, ils le recherchent de tout leur cœur%. Et enfin : %J’ai mis tes paroles au fond de mon cœur, pour ne pas pécher contre toi%. En effet, comme vous venez de l’entendre, celui qui met les paroles de Dieu au fond de son cœur ne pèche pas ; de même, celui qui n’agit pas ainsi ne cesse pas de pécher.
      En effet, les commerçants ne se contentent pas de chercher à faire des bénéfices sur une seule marchandise ; ils s’en procurent un grand nombre pour augmenter leur fortune. Les cultivateurs s’efforcent de semer différentes sortes de semences afin de pouvoir se préparer une nourriture suffisante pour eux-mêmes et les leurs. Combien plus, lorsqu’il s’agit de bénéfices spirituels, ne devez-vous pas vous contenter d’entendre lire la parole de Dieu à l’église ; vous devez prolonger la lecture sacrée dans vos maisons, au cours de vos repas ; et quand les jours sont courts, y consacrer encore quelques heures de la nuit. C’est ainsi que vous pourrez amasser un froment spirituel dans le grenier de votre cœur et ranger dans le trésor de vos âmes les perles précieuses des Écritures ; ainsi, au jour du jugement, lorsque nous comparaîtrons devant le tribunal du Juge éternel, selon la parole de l’Apôtre, nous serons trouvés vêtus et non pas nus.

    responsory: |-
      R/ J’ouvre mon cœur, Seigneur,
      à ta parole de lumière.
      
      Cantique pour moi que tes volontés
      en ma demeure d’étranger.
      
      Heureux les humbles, heureux les pauvres :
      tu leur découvres le secret du Royaume !