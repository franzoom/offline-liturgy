celebration:
  title: Saint Yves
  subtitle: prêtre
  description: |-
    Yves Hélory (1253‑1303), l’avocat des humbles et des opprimés, était prêtre du diocèse de Tréguier (Bretagne). Il exerça le ministère de juge ecclésiastique à Rennes, puis de curé de Tredrez et de Louannec. Vivant pauvre parmi les pauvres, il joignait à la droiture et à la patience une inépuisable charité. Sa porte était ouverte à tous.
  commons:
    - saints-male_caritative
    - pastors
  color: white

oration: 
  - Dieu de qui vient tout ce qui est juste et bon, tu as établi saint Yves comme juge parmi ses frères, et tu as fait de lui un grand ami des pauvres ; accorde-nous, par son intercession, de rechercher passionnément la justice et de communier à ton amour pour les hommes.

readings:
  patristicReading:
    title: HOMÉLIE DE S. JEAN CHRYSOSTOME SUR LES ACTES DES APÔTRES
    content: |-
      %Celui qui reçoit l’un de ces petits, c’est moi qu’il reçoit%, dit le Seigneur. Plus ce frère est petit, plus le Christ est présent. Car lorsqu’on reçoit un grand personnage, on le fait souvent par vaine gloire ; mais celui qui reçoit un petit le fait avec une intention pure, et pour le Christ. ~
      %J’étais un étranger%, dit-il, %et vous m’avez accueilli%. Et encore : %Chaque fois que vous l’avez fait à l’un de ces petits, c’est à moi que vous l’avez fait%. — Puisqu’il s’agit d’un croyant et d’un frère, serait-ce le plus petit, c’est le Christ qui entre avec lui. Ouvre ta maison, reçois-le. %Qui reçoit un prophète en sa qualité de prophète recevra une récompense de prophète%. Donc celui qui reçoit le Christ recevra la récompense de l’hospitalité du Christ. Ne mets pas en doute ses paroles, fais-leur confiance. Lui-même nous l’a dit : « En eux, c’est moi qui me présente. » Et pour que tu n’en doutes pas, il décrète le supplice pour ceux qui ne le reçoivent pas, les honneurs pour ceux qui le reçoivent. Il ne le ferait pas s’il n’était pas personnellement touché par l’honneur ou le mépris. « Tu m’as reçu, dit-il, dans ta demeure ; je te recevrai dans le Royaume de mon Père. Tu m’as délivré de la faim ; je te délivrerai de tes péchés. Tu m’as vu enchaîné ; je te ferai voir ta libération. Tu m’as vu étranger ; je ferai de toi un citoyen des cieux. Tu m’as donné du pain : je te donnerai le Royaume comme ton héritage et ta pleine propriété. — Tu m’as aidé en secret ; je le proclamerai publiquement et je dirai que tu es mon bienfaiteur, et moi ton débiteur. » ~
      Voici les sentiments qu’on doit avoir en recevant les étrangers : l’empressement, la joie, la générosité. L’étranger est toujours timide et honteux. Si son hôte ne le reçoit pas avec joie, il se retire en se sentant méprisé, car il est pire d’être reçu de la sorte que de ne pas être reçu du tout. ~
      Aie une maison où le Christ trouve sa demeure. Dis : «  Voici la chambre du Christ. Voici la demeure qui lui est réservée. » Même si elle est très simple, il ne la dédaignera pas. Le Christ est nu, étranger, il ne lui faut qu’un toit. Donne-lui au moins cela. Ne sois pas cruel et inhumain. Toi qui montres tant d’ardeur pour les biens temporels, ne montre pas de froideur pour les richesses de l’esprit. ~ Tu as un local pour ta voiture, un autre pour tes litières, et tu n’en as aucun pour le Christ vagabond. Abraham, là ou il demeurait, recevait les étrangers. Sa femme les traitait comme si elle était la servante, et eux, les maîtres. Il ne savait pas qu’il recevait le Christ, qu’il recevait des anges. S’il l’avait su, il se serait dépouillé de tout. Nous savons, nous, que nous recevons le Christ, et nous ne montrons pas autant d’empressement que lui, qui croyait ne recevoir que des hommes.
    responsory: |-
      R/ Heureux les miséricordieux,
      car ils obtiendront miséricorde.
      
      Sans miséricorde est le jugement,
      pour qui n’a pas eu pitié.
      
      La miséricorde se rit du jugement,
      elle rend fils du Père qui est dans les cieux.
