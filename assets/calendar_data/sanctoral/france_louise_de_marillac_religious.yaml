celebration:
  title: Sainte Louise de Marillac
  subtitle: religieuse
  description: Louise de Marillac, née à Paris en 1591, mariée puis devenue veuve en 1625, se dévoua sans réserve aux œuvres charitables. Elle fonda, avec saint Vincent de Paul, l’institut des Filles de la Charité, connues aussi sous le nom de Sœurs de Saint-Vincent-de-Paul. Elle mourut le 15 mars 1660 et a été canonisée en 1934.
  color: white
  commons:
    - saints-female
  locative: en France

oration:
  - Seigneur Dieu, toi qui es source de la charité et qui la récompenses, tu as suscité dans ton Église sainte Louise de Marillac pour fonder une nouvelle famille religieuse, vouée au service des pauvres et de toute personne en détresse ; nous t’en prions, accorde-nous de pratiquer une charité active, et d’obtenir au ciel la récompense que tu promets.
