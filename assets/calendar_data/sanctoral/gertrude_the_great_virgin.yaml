celebration:
  title: Sainte Gertrude
  description: Gertrude (1256-1302), moniale de l’abbaye d’Helfta (Saxe), avait vingt-cinq ans lorsque, dit-elle, le Seigneur « la prit, la souleva et la plaça près de lui ». Elle vécut dès lors dans une profonde union à Dieu, se livrant à la méditation de l’Écriture et des Pères de l’Église, notant par écrit le fruit de sa contemplation du Christ en croix.
  commons:
    - virgins
    - saints-female_religious
  color: white

oration:
  - Seigneur, tu t’es choisi et préparé une demeure dans le cœur de sainte Gertrude ; à sa prière, dissipe l’obscurité de nos cœurs pour nous faire goûter la joie de ta présence et de ton action en nous.

readings:
  patristicReading:
    - title: LE HÉRAUT DE L’AMOUR DIVIN, PAR SAINTE GERTRUDE
      content: |-
        Que mon âme te bénisse, Seigneur Dieu, mon créateur ; que mon âme te bénisse et que, du plus profond de moi-même tes miséricordes te célèbrent, puisque ta tendresse débordante m’en a si généreusement enveloppée, ô mon très doux Amant. Je rends grâce, autant que je le puis, à ton immense miséricorde ; avec elle, ma louange glorifie cette inlassable patience par laquelle tu as si longtemps fermé les yeux sur moi. Les années de mon bas âge, de mon enfance, de mon adolescence et de ma jeunesse, presque jusqu’à vingt-cinq ans, s’écoulaient dans un fol aveuglement. Dans mes pensées, mes paroles, mes actions, j’aurais fait sans remords de conscience, je m’en rends compte aujourd’hui, tout ce qui me plaisait, tout ce qui était permis. Mais tu me préservais, soit parce que j’éprouvais naturellement l’horreur du mal et le goût du bien, soit par les remontrances venues du dehors. J’aurais ainsi vécu comme une païenne parmi les païens, et je n’aurais jamais compris que toi, mon Dieu, tu récompenses le bien comme tu punis le mal. Et pourtant, dès l’en-tance, dès ma cinquième année, tu avais choisi de me préparer pour toi, parmi les plus fidèles de tes amis, dans le cénacle d’un saint monastère. ~
        Pour mon amendement, je t’offre, Père très aimant, toute la Passion de ton Fils bien-aimé, depuis l’heure où, couché dans la paille de la crèche, il fit entendre ses premiers vagissements. Et tout ce qu’il supporta ensuite : dépendance du bébé, limites de l’enfant, difficultés de l’adolescent, souffrances du jeune homme, jusqu’à cette heure où, inclinant la tête sur la croix, il rendit l’esprit avec un grand cri.
        De même, pour suppléer à toutes mes négligences, je t’offre, Père très aimant, toute la vie très sainte, absolument parfaite en toutes ses pensées, paroles et actions, de ton Fils unique ; et cela, depuis l’heure où, envoyé du trône céleste, il entra dans notre zone terrestre par l’annonce faite à la Vierge, jusqu’à cette heure où il offrit à ton regard paternel la gloire d’une humanité victorieuse. ~
        Pour rendre grâce, en me plongeant dans le profond abîme de ma bassesse, je loue et adore en même temps la suprême excellence de ta miséricorde et l’extrême douceur de ta bienveillance. Par elles, Père des miséricordes, au milieu de ma vie de perdition, tu m’as témoigné %des pensées de paix, et non de malheur%, en me relevant par la multitude et la grandeur de tes bienfaits. ~
        À cela tu as encore ajouté cette intimité incroyable de ton amitié, en me donnant, de diverses manières, pour mettre le comble à ma joie, ce sanctuaire très noble de la divinité : ton Cœur déifié. ~
        De plus, tes fidèles promesses ont séduit mon âme en me montrant les bienfaits que tu veux m’accorder à l’heure de ma mort et après ma mort. Même si je n’avais reçu de toi aucun autre don, celui-là suffirait à faire haleter mon cœur d’une vive espérance.

      responsory: |-
        R/ Heureux les invités aux noces de l’Agneau !

        Soyez dans la joie et l’allégresse:
        voici les noces de l’Agneau
        et son épouse s’est faite belle.

        Je te fiancerai à moi pour toujours,
        dans l’amour et dans la fidélité.
        Tu sauras que je suis le Seigneur.
