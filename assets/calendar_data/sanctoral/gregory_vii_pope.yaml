celebration:
  title: Saint Grégoire VII
  subtitle: pape
  description: Le moine Hildebrand, devenu le pape Grégoire VII (1073-1085), domine toute l’histoire du moyen âge. Alliant une claire vision des besoins de son temps à un courage intrépide, il n’eut qu’un objectif : arracher l’Église au pouvoir féodal et restaurer la discipline dans le clergé. On vit alors un pape excommunier et déposer l’empereur romain germanique (1077).
  commons:
    - pastors_pope
  color: white

oration: 
  - |-
    Accorde à ton Église, Seigneur, l’esprit de force et la soif de justice que tu as donnés au pape Grégoire VII : qu’elle sache rejeter le mal pour vivre sans entrave en toute droiture et charité.

readings:
  patristicReading:
    title: LETTRE DE SAINT GRÉGOIRE VII À TOUS SES FIDÈLES (1084)
    content: |-
      Nous vous en prions et supplions dans le Seigneur Jesus, qui nous a rachetés par sa mort : comprenez par une recherche attentive pourquoi et comment nous subissons les épreuves et les angoisses que nous font souffrir les ennemis de la religion chrétienne.
      C’est par une disposition divine que l’Église, notre mère, m’a placé sur le trône apostolique, moi qui en suis très indigne et qui, Dieu en est témoin, ne le voulais pas. C’est pourquoi j’ai travaillé de toutes mes forces à ramener la Sainte Église, l’épouse de Dieu, notre souveraine et notre mère, à la beauté qui est la sienne, pour qu’elle demeure libre, chaste et catholique. Mais parce que cela déplaît totalement à l’antique ennemi, celui-ci a mobilisé ses membres contre nous, afin de contrarier toutes nos entreprises.
      C’est pourquoi il a fait contre nous, ou plutôt contre le Siège Apostolique, tout ce qu’il n’avait pu faire depuis le temps de l’empereur Constantin le Grand. Il n’est pas surprenant que, plus le temps avance, plus il s’évertue à détruire la religion chrétienne.
      Maintenant, mes frères très chers, écoutez attentivement ce que je vous dis. Tous ceux qui, dans le monde entier, portent le nom de chrétiens, et connaissent vraiment la foi chrétienne, savent et croient que saint Pierre, le prince des Apôtres, est le père de tous les chrétiens, leur premier pasteur après le Christ, et que l’Église Romaine est la mère et la maîtresse de toutes les Églises.
      Si donc vous croyez cela et en êtes convaincus sans aucune hésitation, je vous le demande et vous l’ordonne, moi qui suis votre humble frère et votre maître indigne : par le Dieu tout-puissant, aidez et secourez ceux que j’ai nommés votre père et votre mère, si vous désirez recevoir par eux l’absolution de tous vos péchés, ainsi que la bénédiction et la grâce en ce monde et dans le monde futur.
      Que le Dieu tout-puissant, de qui viennent toutes choses, éclaire toujours votre âme, et la féconde par la charité envers lui et envers le prochain, pour que vous puissiez, en vertu de votre dévouement inébranlable, faire que ce père et cette mère soient vos débiteurs, et parvenir sans crainte à vivre en leur compagnie. Amen.


    responsory: |-
      R/ Nul ne peut servir deux maîtres.
      
      C’est le Seigneur notre Dieu
      que nous voulons servir,
      c’est à sa voix que nous voulons obéir !

      Il n’y a pour nous qu’un seul Dieu : le Père,
      et un seul Seigneur : Jésus Christ !

