celebration:
  title: Tous les saints de l’Église de Grenoble-Vienne
  subtitle: 
  description: De nombreux saints, évêques ou abbés, sont originaires du diocèse de Grenoble. Certains sont fêtés au lieu de leur naissance lorsque ce lieu est connu. D’autres sont originaires du diocèse, mais le lieu de leur naissance ne peut être précisé, tel saint Aignan, saint Aimé. D’autres ont été moines à l’abbaye de Bonnevaux (commune de Châtonnay), de Léoncel… Cette fête les rassemble les et les autres et nous offre l’occasion de les invoquer auprès de Dieu.
  commons:
    - saints
  color: white

oration:
- |-
  Dieu notre Père, source de toute sainteté, nous proclamons tes merveilles en fêtant aujourd’hui tous les saints de notre Église de Grenoble-Vienne : tu leur as donné sur terre les grâces les plus diverses et tu les rassembles au ciel dans une même gloire. Par leur intercession, accorde à chacun d’entre nous de répondre fidèlement à sa vocation. Par Jésus Christ.


readings:
  patristicReading:
    - title: DES ACTES DU II^ème CONCILE DU VATICAN
      subtitle: Constitution %Lumen gentium% sur l’Église, n^os 49-50
      content: |-
        Les habitants du ciel contribuent à affermir plus solidement toute l’Église en sainteté, ils ajoutent à la grandeur du culte que l’Église rend à Dieu sur la terre et l’aident de multiples façons à se construire plus largement. Car, admis dans la patrie et présents au Seigneur, par lui, avec lui et en lui, ils ne cessent d’intercéder pour nous auprès du Père, offrant les mérites qu’ils ont acquis sur terre par l’unique Médiateur de Dieu et des hommes, le Christ Jésus, servant le Seigneur en toutes choses et complétant en leur chair ce qui manque aux souffrances du Christ en faveur de son Corps qui est l’Église. Ainsi leur sollicitude fraternelle est du plus grand secours pour notre faiblesse.
        Contempler la vie des hommes qui ont suivi fidèlement le Christ est un nouveau stimulant à rechercher la Cité à venir, et en même temps nous apprenons par là à connaître le chemin très sûr par lequel, à travers les vicissitudes du monde et selon l’état et la condition propres à chacun, il nous sera possible de parvenir à l’union parfaite avec le Christ, c’est-à-dire la sainteté. Dans la vie de nos compagnons d’humanité plus parfaitement transformés à l’image du Christ, Dieu manifeste aux hommes dans une vive lumière sa présence et son visage. En eux, Dieu lui-même nous parle, il nous donne un signe de son royaume et nous y attire puissamment, tant est grande la nuée de témoins qui nous enveloppe et tant la vérité de l’Évangile se trouve attestée.
        Mais nous ne vénérons pas seulement au titre de leur exemple la mémoire des habitants du ciel ; nous cherchons bien davantage par là à renforcer l’union de toute l’Église dans l’Esprit grâce à l’exercice de la charité fraternelle. Car tout comme la communion entre les chrétiens de la terre nous approche de plus près du Christ, ainsi la communauté avec les saints nous unit au Christ, de qui découlent, comme de leur source et de leur tête, toute grâce et la vie du peuple de Dieu lui-même. Il est donc au plus haut point convenable que nous aimions ces amis et cohéritiers de Jésus Christ, nos frères aussi et nos insignes bienfaiteurs, que nous rendions à Dieu pour eux l’action de grâce qui lui est due, « que nous les invoquions avec ardeur, recourant à leurs prières, à leur secours et à leur aide pour obtenir de Dieu par son Fils Jésus Christ, notre seul Rédempteur et Sauveur, les bienfaits dont nous avons besoin ».Car, par sa nature même, tout témoignage authentique d’amour que nous présentons aux habitants du ciel, tend, comme vers son terme, au Christ « couronne de tous les saints » et par lui à Dieu qui est admirable en ses saints et glorifié en eux.
        C’est surtout dans la sainte liturgie que se réalise de la façon la plus haute notre union avec l’Église du ciel : là en effet, la vertu de l’Esprit Saint s’exerce sur nous par les signes sacramentels ; là nous proclamons, dans une joie commune, la louange de la divine Majesté ; tous, rachetés dans le sang du Christ, de toute tribu, langue, peuple ou nation et rassemblés en l’unique Église, nous glorifions le Dieu un en trois Personnes dans un chant unanime de louange.

      responsory: |-
        R/ Enveloppés d’une si grande nuée
        de témoins, fixons nos regards sur le Christ.

        Ils aspiraient à une patrie meilleure ;
        c’est pourquoi Dieu n’a pas honte de s’appeler leur Dieu,
        car il leur a préparé une ville.

        En mourant ils ont salué de loin la promesse,
        car Dieu prévoyait pour nous un sort meilleur ;
        aussi ne devaient-ils pas atteindre sans nous la perfection.
        


