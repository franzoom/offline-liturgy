celebration:
  title: Bienheureux André-Abel Alricy
  subtitle: prêtre et martyr
  description: Né à Crémieu en 1712, André-Abel Alricy est ordonné prêtre en 1738. Il exerce son ministère dans le diocèse de Grenoble, puis à la paroisse Saint-Médard de Paris. Arrêté le 15 août 1792, il est tué, comme 3 évêques et 187 autres prêtres, au cours des massacres des 2 et 3 septembre, payant de sa vie sa fidélité au Pape et à l’Eglise. Pie XI les béatifie en 1926.
  commons:
    - martyr
  color: red

oration:
- |-
  Dieu éternel et tout-puissant, tu as donné au bienheureux André-Abel Alricy le courage de mourir pour la liberté de la foi ; que sa prière nous obtienne la grâce de supporter toute adversité par amour pour toi, et de tendre de toutes nos forces jusqu’à toi qui es notre vie. Par Jésus Christ.

readings:
  patristicReading:
    - title: RELATION DE L’ABBÉ DE LA PANNONIE SUR LE MASSACRE DU COUVENT DES CARMES
      content: |-
        Le 2 septembre... vers les quatre heures, nous entendons de grandes clameurs au voisinage. Peu de temps après, nous apercevons un groupe de forcenés qui nous montrent leurs piques au travers des barreaux d’une fenêtre. Nous ne doutâmes plus alors qu’ils ne vinssent pour nous égorger et nous nous empressâmes de nous demander et donner les uns aux autres l’absolution. Je ne quittai point Mgr l’archevêque [d’Arles] ; la force et la tranquillité qu’il conservait à la vue du danger que nous courions, me soutenaient au milieu de mes alarmes. Notre garde ne tarda pas à disparaître. Les assassins entrent dans le jardin armés de fusils à baïonnettes, de piques et de pistolets. Ils massacrent le premier qu’ils rencontrent. Un d’eux devance les autres et vint au-devant de M. l’archevêque et de moi. « Es-tu l’archevêque d’Arles ? » me dit-il en frémissant de rage. Je ne lui fis d’autre réponse que de hausser les épaules. « C’est donc toi », reprit le furieux en s’adressant cette fois à M. l’archevêque. « Oui, je le suis », répondit-il aussitôt avec une contenance ferme et modeste. « C’est donc toi, reprit ce monstre, qui as fait répandre tant de sang à Arles. — Moi, répond encore M. l’archevêque, je ne sache pas avoir fait du mal à personne — Tu n’as fait de mal à personne, scélérat, répartit encore ce misérable. Eh bien, je vais t’en faire à toi », et aussitôt il fond sur lui comme un tigre furieux et lui décharge un grand coup de sabre sur la tête. A ce premier coup, M. l’archevêque joint ses mains et s’en couvre le visage et, sans faire la moindre plainte, reçoit de ce forcené la mort à laquelle il s’était si bien préparé pendant sa captivité...
        Ce qui étonnera sans doute, c’est que je n’ai entendu se plaindre aucun de ceux que je vis massacrer. Plusieurs de ceux qui avaient été se réfugier dans la chapelle [du jardin] reçurent la mort en offrant à Dieu le sacrifice de leur vie. Après avoir un peu assouvi leur rage, les assassins nous ordonnent de rentrer dans l’église, sans cesser de nous tirer des coups de fusil... Nous restâmes là quelque temps à prier et à gémir de tous les blasphèmes et de toutes les horreurs que vomissaient ces forcenés... On nous ordonne de cesser nos prières et de nous lever, ce que nous fîmes aussitôt. Un d’eux nous demande alors d’un ton terrible et menaçant : « Avez-vous prêté le serment ? » Comme je me trouvais le plus près d’eux, je leur répondis que pas un de nous n’avait prêté ni ne prêterait ce serment ; que je devais seulement leur faire observer que la plupart d’entre nous n’y étaient pas obligés et que la loi laissait la liberté aux autres de le prêter ou non. « C’est égal, reprirent-ils alors ; passez, passez votre compte est fait... »

      responsory: |-
        R/ Il n’est pas de plus grand amour 
        que de donner sa vie pour ceux qu’on aime.
 
        Vous serez mes amis
        si vous faites ma volonté.

        Moi, le Maître et Seigneur, 
        je vous ai donné l’exemple.

        Heureux serez-vous, sachant cela,
        si vous donnez votre vie.


