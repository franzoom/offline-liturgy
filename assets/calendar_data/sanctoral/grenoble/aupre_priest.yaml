celebration:
  title: Saint Aupre
  subtitle: prêtre
  description: Dans le courant du VII^ème siècle, Aupre, prêtre du diocèse de Sens, séjourne dans le diocèse de Grenoble. Là, d’après la tradition, il est curé de La Terrasse, dans la vallée du Grésivaudan. Le culte immémorial de saint Aupre est confirmé par Pie X en 1904.
  commons:
    - pastors_missionary
  color: white

oration:
- |-
  Tu as voulu, Seigneur, que les travaux apostoliques de saint Aupre et sa générosité à te servir fassent grandir ton Église ; accorde-nous, par son intercession, une foi et une sainteté toujours en progrès. Par Jésus Christ.

readings:
  patristicReading:
    - title: DES ACTES DU II^ème CONCILE DU VATICAN
      subtitle: Décret du le ministère et la vie des prêtres
      content: |-
        Le sacrement de l’ordre les configure les prêtres au Christ, prêtre suprême pour en faire les ministres de celui qui est la Tête, chargés de d’élever et de construire son Corps tout entier, qui est l’Église ; et ils deviennent ainsi les coopérateurs de l’ordre épiscopal.
        Déjà ils ont reçu dans la consécration baptismale, comme tous les chrétiens, le signe et le don d’une vocation et d’une grâce telle qu’en dépit de la faiblesse ils ont le pouvoir de tendre à la perfection selon la parole du Seigneur : %Vous donc, vous soyez parfaits comme votre Père céleste est parfait%.
        Mais les prêtres sont tenus d’acquérir cette perfection pour un motif particulier : par le sacrement de l’Ordre, ils ont été consacrés à Dieu d’une manière nouvelle pour devenir les instruments vivants du Christ Prêtre éternel ; ils sont habilités à poursuivre au long du temps l’action admirable par laquelle, dans sa puissance souveraine, il a rassemblé la communauté humaine tout entière.
        Puisque tout prêtre, à sa manière, tient la place du Christ en personne, il est doté aussi d’une grâce particulière ; cette grâce le rend plus capable de tendre, par le service des hommes qui lui ont été confiés et du Peuple de Dieu tout entier, vers la perfection de celui qu’il représente ; c’est encore au moyen de cette grâce que sa faiblesse d’homme charnel se trouve guérie par la sainteté de celui qui s’est fait pour nous le Grand Prêtre %saint, sans tache, sans aucune faute, séparé des pécheurs%.
        Le Christ que le Père %a sanctifié% (c’est-à-dire consacré) %et envoyé dans le monde s’est donné pour nous afin de racheter de toutes nos fautes, et de nous purifier pour faire de nous son peuple, un peuple ardent à faire le bien…% C’est ainsi que, %par la souffrance, il est entré dans sa gloire…% Semblablement, les prêtres, consacrés par l’onction du Saint-Esprit et envoyés par le Christ, font mourir leur comportement charnel et se doivent tout entiers au service des hommes : telle est la sainteté dont ils sont dotés dans le Christ et qui leur permet de s’approcher de %l’Homme parfait...%
        Ainsi donc, en exerçant %le ministère de l’Esprit et de la justice%, pourvu qu’ils soient dociles à l’Esprit du Christ, qui leur donne la vie et les conduit, ils s’enracinent dans la vie spirituelle. Ce qui ordonne leur vie à la perfection, ce sont leurs actes liturgiques de chaque jour. C’est aussi leur ministère tout entier, exercé en communion avec les évêques et les autres prêtres.
        La sainteté des prêtres est d’un apport essentiel pour rendre fructueux le ministère qu’ils accomplissent ; sans doute, la grâce de Dieu peut réaliser l’œuvre du salut même par des ministres indignes ; cependant, en règle ordinaire, Dieu préfère manifester ses merveilles par des hommes vraiment dociles à l’impulsion et à la conduite du Saint-Esprit, par des hommes à qui leur union intime avec le Christ et la sainteté de leur vie permet de dire avec l’Apôtre : %Je vis, mais ce n’est plus moi, c’est le Christ qui vit en moi%. 

      responsory: |-
        Ne vient pas seul au festin du Royaume ;
        sur tes chemins, crie la nouvelle :
        « La promesse est un pain
        donné pour le partage :
        Dieu vous presse d’entrer dans l’unique demeure
        et vous rassemble dans l’amour. »
        
        R/ Jésus, espérance des hommes,
        Fais de nous les témoins de ton salut.

        Je suis venu apporter le feu sur la terre,
        je veux qu’il se répande et qu’il brûle.

        Je suis venu pour que tous aient la vie
        et la reçoivent en plénitude.

        Je suis venu cherché ce qui était perdu,
        Non pas en Juge mais en Sauveur.
        