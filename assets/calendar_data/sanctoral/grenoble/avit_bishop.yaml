celebration:
  title: Saint Avit
  subtitle: évêque de Vienne
  description: Avit, comme son frère Apollinaire, est né à Vienne après 450. A la mort de son père, Hesychius, il lui succède sur le siège de Vienne vers 494, jusqu’à sa mort (5 février 518). Il est l’âme de la vie catholique dans le royaume des Burgondes, encore en partie arien. A son initiative, en 517, vingt-cinq évêques se réunissent en concile à Epaone. Il est connu par ses homélies, ses lettres et ses poèmes.
  commons:
    - pastors_bishop
  color: white

oration:
- |-
  Dieu, qui inspiras à l’évêque saint Avit de travailler sans défaillance à défendre la vérité et à favoriser l’union des cœurs, donne-nous de confesser toujours la foi catholique et de pratiquer une charité sincère. Par Jésus Christ.

morning:
  evangelicAntiphon:
    common: |-
      Défenseur intrépide de la divinité de Jésus, saint Avit a été le bon pasteur qui conduit son troupeau aux sources de la Vie.

readings:
  patristicReading:
    - title: LETTRE DE SAINT AVIT AU ROI CLOVIS, BAPTISÉ À NOËL 496
      subtitle: 
      content: |-
        Voici qu’au milieu des soucis présents un rayon de lumière est apparu et que la vérité s’est mise à briller... Oui, par le choix que vous faites pour vous-même, vous en indiquez le chemin à tous les hommes ; ainsi votre foi est notre victoire...
        L’ancienneté de votre généalogie, la noblesse de votre origine avaient de quoi vous satisfaire. Mais vous avez voulu (si l’on peut dire) orner de toute la gloire possible le sommet de votre race et faire grandir encore, en ce qui vous concerne, le faîte de votre lignée. Vous avez des aïeux qui vous ont donné de glorieux exemples ; vous voulez être un exemple de choses plus grandes encore. Vous répondez bien à l’attente de vos ancêtres, puisque vous régnez comme eux en ce monde ; et vous posez en principe à ceux qui vous succéderont que vous entendez de plus régner dans le ciel... Grâce à vous cette partie du monde où nous sommes brille d’un éclat propre et dans nos pays d’Occident la lumière d’un astre nouveau brille en vous, ô Roi qui n’êtes pas nouveau sur le trône.
        Cette splendeur qui vous revêt, justement l’heureuse naissance de notre Sauveur l’a commencée en vous puisque l’eau régénératrice vous a enfanté pour le salut le jour même où le monde a reçu du ciel son Sauveur nouveau-né et son Seigneur. Ainsi l’illustre jour de naissance du Seigneur est aussi le vôtre : vous êtes né à Jésus Christ le jour où Jésus Christ est né à ce monde ; et en ce même jour vous avez consacré votre âme à Dieu, votre vie à vos contemporains, la renommée de votre exemple à vos descendants.
        Que dirais-je à présent de la solennité même de votre baptême ? Si je n’ai pu assister de corps à la cérémonie, j’y étais du moins présent par le cœur... Nous nous représentions en nous-mêmes ce qui se passait là-bas : comment le groupe des pontifes unanimes, qui n’a d’autre ambition que le service de Dieu, réchauffait vos membres royaux de la vie surnaturelle par l’eau sainte ; comment s’inclinait devant les serviteurs de Dieu cette tête fière qui fait trembler les nations ; comment vous laissiez poser sur vos cheveux, habitués au casque de la guerre, le casque du salut et de l’onction sacrée ; comment, déchargés des pièces de la cuirasse qui les recouvraient, vos membres purifiés brillaient de la même blancheur que la robe baptismale. Il sera fait selon votre foi, ô le plus florissant des monarques, il sera fait ainsi, dis-je : la douceur moelleuse de la robe sacrée rendra plus infrangibles vos armes ; et à tous les avantages que la félicité vous a accordés jusqu’ici, la sainteté de votre nouvel état en ajoutera d’autres.
        Mais je voudrais à ces louanges ajouter un mot d’exhortation... Vais-je vous prêcher la foi, à vous qui désormais la possédez parfaitement et qui, avant même votre baptême, l’aviez trouvée sans prédicateur ? Ou bien l’humilité, que vous dépensez depuis longtemps, avec tant de dévouement, au service de l’Église et que vous devez pratiquer comme une vertu fondamentale à présent que vous êtes chrétien ? Ou encore la miséricorde, cette miséricorde que le peuple encore récemment captif et délivré maintenant par votre baptême proclame avec bonheur sur toute la terre en versant des larmes de reconnaissance devant Dieu ? Non, nous ne voulons ajouter que ceci : puisque Dieu, par vous, a fait toute sienne votre nation, pensez aussi aux peuples éloignés qui vivent toujours dans l’ignorance naturelle et que les germes d’aucun faux dogme n’ont pas corrompus encore ; puisez pour eux, dans le trésor de bonté de votre cœur, les semences de la vrai foi ; n’éprouvez ni fausse honte ni répugnance à leur envoyer des ambassades spécialement déléguées à cet effet, pour les appeler au royaume de Dieu qui a élevé si haut le vôtre.

      responsory: |-
        R/ C’est au prix de son sang
        que le Christ s’est acquis l’Église.

        Soyez attentifs au troupeau
        dont l’Esprit vous a confié la charge.

        Vous serez les intendants fidèles
        des mystères de sa grâce.

        Livrés en spectacle au monde,
        vous serez les modèles du troupeau.

vespers:
  evangelicAntiphon:
    common: |-
      Dans la vérité de l’Esprit, saint Avit a proclamé sans crainte que Jésus est Seigneur et notre seul Sauveur.

