celebration:
  title: Saint Barnard
  subtitle: archevêque de Vienne
  description: Né vers 780, dans une noble famille lyonnaise, Barnard sert dans les armées de Charlemagne et se marie pour répondre au désir de son père. Après la mort de ses parents, il fonde l’abbaye d’Ambronay-en-Bugey, où il se fait admettre quelques années plus tard et en devient l’abbé. En 810, il devient archevêque de Vienne. Il fonde le monastère qui est à l’origine de la ville de Romans où il meurt le 22 janvier 841.
  commons:
    - pastors_bishop
  color: white

oration:
- |-
  En ce jour où nous célébrons la mémoire de l’évêque saint Barnard, accorde-nous, Seigneur, par son intercession, le goût de la prière et la fidélité aux enseignements de nos pasteurs. Par Jésus Christ.

readings:
  patristicReading:
    - title: DU BIENHEUREUX HUMBERT DE ROMANS
      subtitle: Vœux et vertus dans l’état de perfection
      content: |-
        Armez-vous du bouclier des vertus, de la patience qui opère tant de merveilles dans les saints...
        La patience est un diamant : par elle l’âme résiste à toute adversité ; un remède : elle guérit toute blessure ; un bouclier : elle protège contre toute attaque...
        Dans la construction d’un édifice on frappe, on taille et on sculpte la pierre destinée à une place d’honneur. Ainsi en est-il de nous-mêmes : nous sommes pressurés en ce monde afin d’entrer dans le temple céleste, où l’on n’entend plus résonner aucun coup de marteau. La joie ne doit venir qu’après la tristesse rendue nécessaire pour le paiement de nos fautes passées, pour notre perfection spirituelle et l’accroissement de notre gloire éternelle. O labeur fécond, ô précieuse douleur, ô bienheureuses larmes que le Tout-Puissant lui-même essuiera des yeux de ses élus éprouvés.
        Jésus a dit que le royaume des cieux est particulièrement l’apanage de ceux qui souffrent persécution pour la justice. Mieux vaut être victime que persécuteur, car le persécuteur ne garde que son crime, tandis que le martyr glorifie Dieu et reçoit après son tourment une gloire éternelle... Beaucoup trop viendraient à lui moins pour lui-même que pour ses bienfaits s’il donnait à ceux qu’il aime des récompenses temporelles...
        N’avez de joie que dans le service du Christ ni d’autres peines que d’être éloignés de Dieu. Seule l’impatience contre le péché est permise. C’est la victoire des soldats du Christ de pardonner à leurs persécuteurs.
        Devenez semblables aux plantes aromatiques qui répandent un parfum plus puissant quand on les broie ; à l’or que la fournaise purifie sans pouvoir le consumer ; au grain de froment que le fléau délivre de sa gaine ; au navire que la tempête pousse plus vite au port ; à la perle que le ciseau de l’artiste fait briller d’un plus vif éclat...
        Il y en a qui deviennent patients, non par un effort personnel, mais grâce à la vertu des personnes avec lesquelles ils vivent ; ils consentent à demeurer patients tant qu’on ne les contrarie pas. D’autres paraissent oublier les injures mais gardent rancune dans leur cœur ; leur vertu est comme une chaussure dont le cuir n’a pas été assoupli par l’huile : sa rudesse protège bien contre les objets extérieurs, mais elle meurtrit le pied. Ces hypocrites ressemblent aux loups qui, dit-on, supportent aisément les plaies et les blessures reçues à fleur de peau, mais sont très sensibles aux suites de lésions internes. D’autres sont patients pour supporter les injures qui offensent Dieu, mais ils prennent grand soin de venger les injures personnelles... D’autres enfin, au lieu de s’irriter contre les vices, s’irritent contre les personnes. Cependant l’ordre de la charité veut que nous aimions la nature, œuvre de Dieu, tout en détestant les crimes, œuvres de nos instincts pervers et de l’esprit diabolique.
        Pour supporter plus aisément et avec joie les tribulations, efforçons-nous d’avoir toujours présents à l’esprit la passion du Sauveur et le souvenir des consolations que fait goûter l’amitié de Dieu.


      responsory: |-
        R/ Heureux le serviteur fidèle,
        il entre dans la joie de son maître.
        
        Je rends grâce au Seigneur Jésus : 
        il m’a jugé assez fidèle pour m’appeler à son service.

        En moi la grâce du Christ a surabondé, 
        avec la foi et la charité qui est dans le Christ Jésus.
