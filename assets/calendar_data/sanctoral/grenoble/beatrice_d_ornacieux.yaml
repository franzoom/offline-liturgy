celebration:
  title: Bienheureuse Béatrice d’Ornacieux
  subtitle: vierge
  description: Née au château d’Ornacieux près de la Côte-Saint-André, vers 1260, Béatrice (ou Béatrix) entre à l’âge de 13 ans à la Chartreuse de Parménie. Probablement en 1300, elle fonde le monastère d’Eymeux, au diocèse de Valence. Elle y meurt un 25 novembre, sans doute en 1309. Sa biographie atteste son ardent amour pour Jésus crucifié.
  commons:
    - virgins
  color: white

oration: 
- |-
  Ravive en nous, Seigneur, en ce jour où nous vénérons la bienheureuse Béatrice, le désir de communier à la Passion de ton Fils ; que sa prière et son exemple nous aident à porter la croix de l’épreuve en disciples de Jésus crucifié. Lui qui.
      
readings:
  patristicReading:
    - title: LETTRE DE MARGUERITE D’OYNGT SUR LA BIENHEUREUSE BÉATRICE
      subtitle: 
      content: |-
        Cette sainte créature, dame Béatrix d’Ornacieux, s’était tant tourmentée pendant le carême pour l’amour de Notre-Seigneur et au souvenir de sa glorieuse passion, que quand on arriva au Vendredi Saint, elle était sur le point de défaillir entièrement. En voyant cela, la prieure du lieu la fit garder par une autre dame très prudente et très discrète en une chambre particulière, pour qu’elle eût facilité de faire oraison et de se mettre en contemplation, et qu’elle ne pût pas se tourmenter outre raison.
        Donc, quand vint le Vendredi Saint, peu d’instants avant matines, Béatrix s’endormit profondément. Ce que voyant, la religieuse qui la gardait s’en alla assister au chant des matines qui commençaient à l’église. Elle ferma la porte de la cellule et en emporta la clef. Béatrix, se réveillant peu après, entend chanter les religieuses à l’église et réfléchit qu’en si beau jour, elle devrait bien s’adonner au service de Notre-Seigneur, et elle appelle sa compagne. Assurée que celle-ci a disparu, elle se lève et invoque Notre-Dame en ces termes : « Très douce Dame... je vous prie et supplie, par la compassion que vous accordâtes à votre cher Fils et Seigneur, et si mon service vous a été agréable et doit l’être encore, faites que j’aille compatir aux souffrances de votre cher Fils, mon Seigneur, mon Dieu et mon Époux : daignez me conduire à l’église avec mes sœurs par les moyens qu’il plaira à votre bien-aimé Fils. »
        Elle prit alors une image de Notre-Dame, peinte dans un tableau, et la passa à travers la chatière de la porte en disant : « Je vais bien voir, très bénigne Dame, si vous voulez que je reste seule ici. » A ces mots, elle se trouve hors de la chambre, l’huis demeurant clos. Elle fait rentrer l’image de Notre-Dame par le pertuis dans la chambre, et apparaît à matines, dans sa stalle. Ce que voyant, la prieure et les autres moniales, elles furent stupéfaites. Quelques-unes se hâtèrent d’aller constater si l’huis de la cellule était brisé. Elles le trouvèrent fermé à clef, et l’image introduite dans la chambre par le pertuis. A cette vue leur surprise augmenta naturellement. Le vicaire et la prieure vinrent à leur tour et commandèrent en vertu de l’obéissance à Béatrix, d’expliquer comment elle était sortie, et elle déclara tout, ainsi qu’il vient d’être raconté.

      responsory: |-
        R/ Heureux les cœurs purs : ils verront Dieu.

        Les âmes des justes sont dans la main de Dieu, 
        nul tourment ne les atteindra.

        Dieu les a soumis à l’épreuve
        et les a trouvés dignes de lui.

        Au jour de sa visite ils resplendiront,
        le Seigneur régnera sur eux pour toujours.

