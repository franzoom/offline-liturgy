celebration:
  title: Anniversaire de la dédicace de la Cathédrale
  subtitle: |-
    fête (à la cathédrale : Solennité)
  description: En 1913, saint Pie X prescrit que toutes les cathédrales fêtent l’anniversaire de leur dédicace à une date distincte de la dédicace des autres églises. En 1915, Mgr Louis-Joseph Maurin, évêque de Grenoble, fixe au 22 juin la dédicace de son église cathédrale connue sous le vocable de Notre-Dame dès le VII^ème siècle. Le 22 juin 2008, Mgr Guy de Kerimel consacre le nouvel autel majeur. L’église cathédrale est l’église-mère de toutes les églises du diocèse et le siège de l’évêque représentant le Christ pour diriger le peuple de Dieu.
  commons:
    - dedicace
  color: white

oration:
- |-
  Au jour où notre église cathédrale te fut consacrée, sous le vocable de la sainte Vierge Marie, écoute, Seigneur, la prière de ton peuple : donne-lui de ne faire qu’un avec son évêque dans le service du Christ et de son Eglise, sous la protection de Notre-Dame.
