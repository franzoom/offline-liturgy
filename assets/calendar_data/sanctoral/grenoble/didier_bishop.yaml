celebration:
  title: Saint Didier
  subtitle: évêque de Vienne et martyr
  description: Originaire d’Autun, Didier est ordonné diacre à Vienne puis est élu évêque en 596. A ce zélé défenseur de la morale, la reine Brunehaut ne pardonne pas ses remontrances. Elle le fait d’abord déposer et exiler, puis quatre ans après, vers 607, assassiner dans le village qui s’appelle aujourd’hui Saint-Didier-sur-Chalaronne (Ain).
  commons:
    - pastors_bishop
    - martyr
  color: red

oration:
- |-
  Dieu, qui as donné à l’évêque saint Didier, ton martyr, d’être un vigoureux défenseur de la justice ; permets qu’avec son aide et à son exemple, après avoir combattu sur la terre, nous partagions sa victoire dans le ciel. Par Jésus Christ.

readings:
  patristicReading:
    - title: DE LA VIE ET DE LA PASSION DE SAINT DIDIER, PAR SISEBUT
      content: |-
        Il était évident que Thierry et Brunehaut, avec leurs vices éhontés, étaient plus portés à faire le mal que le bien, à avilir qu’à respecter la loi ; ils se parjuraient en se déshonorant publiquement ; ils violaient les serments par la perfidie du sacrilège. Restait à joindre à la débauche le crime. Devant ces maux, la voix du témoin de Dieu, pontife vigilant, éclata comme la trompette, à l’égal de celle des prophètes. Il se dévoua tout entier à l’extirpation de leurs erreurs, afin de rendre à Dieu ceux que le diable en avait éloignés. Il leur tint le langage énergique et fort de l’autorité divine : « Qui convertit l’impie sauve l’âme du pécheur et couvre la multitude de ses propres péchés ». Mais, bien vite rassasiés des breuvages plats que leur offrait le Serviteur de Dieu, ils commencèrent à proférer contre lui des discours rageurs, à vomir un mélange de paroles malpropres et de cris retentissants. Mais la menace des hommes ne brisa point le témoin de Dieu ; la colère des perfides ne l’adoucit pas ; la tempête des furieux ne le fléchit pas. Il s’offrit calmement aux coups des persécutions pour la justice, espérant par elles gagner le royaume du ciel promis en retour par le Seigneur. Aussitôt leur bouche sacrilège aboya la sentence impie avec des paroles funestes et de grands éclats de voix : Didier est ennemi de nos mœurs, ennemi de nos œuvres : il convient de le lapider et de l’accabler de toutes sortes de châtiments, vite.
        Les combats de sa passion n’avaient pas été cachés au martyr de Dieu. Le Seigneur l’avait prédestiné, voire averti d’avance, qu’il aurait à conquérir sa couronne. Soudain, au jour attendu, il est enlevé du giron de son Église par les mains des infidèles et, bien qu’innocent, il est conduit au supplice, tel un condamné qui doit mourir.
        Une foule sans nombre poussait des gémissements à fendre l’âme. C’en était fini pour elle du soutien qu’était ce grand pasteur. Elle ne cessait de crier : « Pourquoi, bon père, abandonnes-tu ta bergerie ? Pourquoi laisses-tu ton troupeau ? Il va périr. Par pitié, ne nous jette pas dans la gueule des loups ! Nous souffrons sans raison qu’on t’arrache à notre amour. S’il nous est refusé de jouir de la vie que nous désirons, qu’il nous soit du moins permis de subir avec toi une mort glorieuse. » A ces paroles, le bienheureux martyr répond paisiblement : « L’intention est vraiment admirable, mais le vœu n’est pas louable... Votre pasteur s’en va sans honte, auprès du Pasteur de tous les pasteurs, afin que le troupeau tout entier puisse plus facilement, précédé du Pontife, parvenir à l’endroit qui lui a été préparé. »
        Voici que soudain arrive en rangs serrés une troupe en délire d’hommes enragés... Leur exécrable perversité, aidée de leur fureur dangereuse, saisit des armes et leur cœur de pierre jeta sur le martyr du Christ une pluie de pierres. Les cailloux durs et plats de ces hommes en délire passaient devant la mâchoire du témoin du Christ et prenaient une autre direction. Pourtant le fracas de la lapidation lui-même dû à la nature du silex, montrait sa détresse au Serviteur de Dieu. Et alors que ces objets inanimés restaient fidèles aux lois de Dieu, le cœur humain resta endurci devant tant de souffrance. Comme il rendait l’âme, l’un des bourreaux saisit un pieu et lui brisa la tête. Ainsi, l’âme abandonna la matière charnelle et se dégagea des liens du corps : victorieuse, elle se joignit à son Ami dans les parvis étoilés.

      responsory: |-
        R/ Qui perd sa vie la trouvera !

        Il n’est pas de plus grand amour
        que de mourir pour celui qu’on aime.

        Entourés que nous sommes de témoins,
        marchons les yeux fixés sur le Christ.

morning:
  evangelicAntiphon:
    common: |-
      Saint Didier n’a pas craint les menaces des hommes, il n’a pas recherché les honneurs de ce monde, mais la fidélité à la loi du Seigneur.

vespers:
  evangelicAntiphon:
    common: |-
      À toi, Seigneur, nos louanges et nos chants, toi qui as donné à saint Didier le courage de supporter l’exil et la mort pour l’amour de ton nom.        

