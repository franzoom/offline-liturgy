celebration:
  title: Saint Florent
  subtitle: évêque de Vienne et martyr
  description: Évêque de Vienne et martyr au IVe siècle.
  commons:
    - pastors_bishop
    - martyr
  color: red

oration:
- |-
  Dieu éternel et tout-puissant, tu as donné à l’évêque et martyr saint Florent la charge de guider ton peuple. Puisqu’il intercède en notre faveur, accorde-nous les largesses de ton amour. Par Jésus Christ.

readings:
  patristicReading:
    - title: EXHORTATION D’ORIGÈNE AU MARTYRE
      subtitle: 
      content: |-
        Si nous sommes passés %de la mort à la vie% en passant de l’incroyance à la foi, ne soyons pas étonnés si le monde nous hait. Car tous ceux qui ne sont pas passés de la mort à la vie, mais qui demeurent dans la mort, ne peuvent pas aimer ceux qui sont passés de la demeure ténébreuse de la mort, si je puis la nommer ainsi, aux édifices faits de pierres vivantes, où règne la lumière de la vie.
        %Jésus a donné sa vie pour nous, et nous devons donner la nôtre%, je ne dirai pas pour lui, mais pour nous-mêmes, et j’entends par là tous ceux qui doivent être édifiés par notre martyre.
        Pour nous chrétiens voici venu le temps de nous glorifier, car il est dit : %Nous nous glorifions dans nos épreuves, car nous savons que l’épreuve produit la persévérance, la persévérance produit la valeur éprouvée, la valeur éprouvée produit l’espérance, et l’espérance ne trompe pas. Que seulement l’amour de Dieu soit répandu dans nos cœurs par l’Esprit Saint%.
        %De même que nous avons largement part aux souffrances du Christ, de même, par le Christ, nous sommes largement consolés%. Aussi, accueillons avec une grande ferveur les souffrances du Christ, et qu’elles nous soient largement accordées, si du moins nous voulons être largement consolés, puisque tous ceux qui pleurent seront consolés. Toutefois ils le seront de façon inégale car, si la consolation était égale pour tous, saint Paul ne dirait pas : %De même que nous avons largement part aux souffrances du Christ, de même nous sommes largement consolés%. Ceux qui participent aux souffrances participeront aussi à la consolation en proportion des souffrances qui les font participer au Christ. Apprenez-le celui qui a dit avec confiance : Nous le savons : %Puisque vous connaissez comme nous la souffrance, vous obtiendrez comme nous la consolation%.
        Dieu dit par la bouche d’un prophète : %je t’exauce au moment favorable, je viens à ton secours au jour du salut%. Y a t-il donc un moment plus favorable que celui, où à cause de notre piété chrétienne envers Dieu, nous sommes emmenés solennellement dans le monde par des gardiens, mais comme des vainqueurs conduits en triomphe, plutôt que comme des vaincus ? En effet, les martyrs du Christ lui sont associés pour dépouiller les principautés et les puissances et pour triompher avec lui, en participant à ses souffrances et par suite aux exploits guerriers que représentent de telles souffrances. Et quel autre jour du salut y a-t-il que celui où nous partons ainsi de ce monde ?
        Je vous en prie : %Ne soyez pour personne une occasion de chute afin que notre ministère soit sans reproche. Au contraire, en toutes choses montrez-vous comme des ministres de Dieu par une grande persévérance et dites : Que puis-je attendre maintenant, si ce n’est le Seigneur ?%

      responsory: |-
        R/ Qui perd sa vie la trouvera !
        
        Il n’est pas de plus grand amour
        que de mourir pour celui qu’on aime.

        Entourés que nous sommes de témoins,
        Marchons les yeux fixés sur le Christ.
