celebration:
  title: Saint François-Régis clet
  subtitle: prêtre et martyr
  description: François-Régis Clet, né à Grenoble en 1748, entre à 20 ans dans la Congrégation des Prêtres de la Mission (Lazaristes). Prêtre en 1773, il est nommé professeur de théologie au séminaire d’Annecy, puis, en 1788, maître des novices à Paris. Il part pour la Chine en 1791. En 1818, lors d’une persécution, trahi par un chrétien, il est emprisonné. En 1820, attaché à une croix, il meurt étranglé. Léon XIII le béatifie en 1900. Il est canonisé par Jean-Paul II le 1^er octobre 2000 avec Augustin Zhao Rong et ses compagnons.
  commons:
    - martyr
  color: red

oration:
- |-
  Tu as donné, Seigneur, à saint François Clet la gloire du martyre, après une longue vie de labeur pour le salut des âmes ; permets qu’à son exemple et à sa prière, nous puissions te servir fidèlement et obtenir les récompenses éternelles. Par Jésus Christ.

readings:
  patristicReading:
    - title: LETTRE DU BIENHEUREUX FRANÇOIS CLET AUX CONFRERES MISSIONNAIRES DONT IL AVAIT LA CHARGE
      subtitle: 
      content: |-
        %Un triple lien est difficilement rompu%. Ces paroles du Saint-Esprit nous montrent, en un langage figuré, que la concorde et l’union des esprits sont le moyen le plus sûr pour mener toutes les entreprises à bonne fin. A cette maxime répondent nos propres Règles : « Tous, et chacun en particulier, s’efforceront, autant qu’il sera possible, de s’accorder toujours dans la doctrine, dans les discours, dans les écrits, en sorte que, selon la recommandation de l’Apôtre, nous avons tous une même manière de penser, de sentir et de parler ». Si cet accord des esprits est nécessaire en toute espèce d’affaire, à plus forte raison l’est-il dans les œuvres surnaturelles, qui ont pour but le salut des âmes, dont la conduite est appelée par saint Grégoire « l’art des arts ». Pour obtenir cette concorde, sans laquelle nos brebis elles-mêmes seraient divisées, et, suivant chacune leur inclination naturelle, s’attacheraient à un prêtre plutôt qu’à un autre, et diraient comme dans la primitive Église : %Moi, je suis à Paul, moi je suis à Apollon; moi, je suis à Cephas%, il m’a paru bon pendant que je suis encore en vie, et avant que la mort, qui s’approche à grands pas, ne me retire de ce siècle pour me faire comparaître devant le redoutable juge, il m’a paru bon de donner à mes confrères, dont le soin m’a été confié malgré mon indignité et ma résistance, quelques avis, afin que nous soyons tous d’accord et unanimes en ce qui regarde le gouvernement de nos brebis, et qu’elles ne forment ainsi qu’un seul troupeau comme %il n’y a qu’un seul pasteur% qui est notre Seigneur Jésus Christ.
        Toutefois, toutes ces instructions, et celles qu’on pourrait y ajouter encore, seraient de peu d’utilité, ou même n’en auraient aucune, si nous n’avions soin de nous montrer à nos brebis %comme de vrais ministres de Dieu et de dignes intendants de ses mystères%, de sorte que chacun de nous leur puisse dire avec saint Paul : %Soyez mes imitateurs, comme je le suis moi-même du Christ%. Rappelons-nous ces paroles : %Celui qui est mauvais pour lui-même, pour qui sera-t-il bon ?% Gardons-nous, sous prétexte d’un zèle mal ordonné, de laisser absorber tout notre temps par les fonctions de notre ministère à l’égard des autres. Suivons les traces des apôtres qui disaient : %Nous ne cesserons, quant à nous, d’être assidus à la prière et au service de la Parole%. Appliquons-nous à la piété, laquelle, comme dit l’Apôtre, %est utile à tout et a les promesses de la vie présente et de la vie future%. Le moyen de l’entretenir, c’est la fidélité aux exercices spirituels qui sont en usage dans notre Congrégation, tels que l’oraison mentale, l’examen particulier, la lecture du Nouveau Testament, celle de quelque livre de spiritualité, et, chaque année, les exercices de la retraite. Ce sont là, en effet, comme autant de trésors où nous puiserons tout ce qui peut être utile au salut des âmes. Ne soyons pas (la comparaison est de saint Bernard) comme des canaux qui laissent écouler toute l’eau qu’ils reçoivent, mais comme des fontaines qui donnent de leur surabondance ; soyons enfin %l’exemple des fidèles par nos paroles, nos démarches, notre charité, notre foi, notre pureté%. Paissons %le troupeau que Dieu nous a confié, en lui montrant dans notre âme le modèle de la sienne et, lorsque apparaîtra le prince des pasteurs, nous recevrons la couronne incorruptible de gloire.%

      responsory: |-
        R/ Jusqu’au bout j’ai combattu le bon combat, 
        * j’ai achevé ma course, gardé la foi.
        V/ Désormais m’est réservée la couronne de justice. 
        * j’ai achevé…

