celebration:
  title: Saint Hugues
  subtitle: évêque de Grenoble
  description: Né en 1053, Hugues, fils du seigneur de Châteauneuf-d’Isère, après avoir été chanoine de l’Église de Valence, est ordonné évêque de Grenoble en 1080 par Grégoire VII à Salerne. Pendant son épiscopat, il réforme le clergé, défend les biens de son Église contre les seigneurs, favorise la vie monastique. Il installe saint Bruno et ses compagnons dans le désert de Chartreuse. Usé par le labeur, l’âge et la maladie, il meurt le 1^er avril 1132. Il sera canonisé trois ans plus tard.
  commons:
    - pastors_bishop
  color: white

oration:
- |-
  Dieu de force et de tendresse, tu as donné à l’évêque saint Hugues d’être totalement au service de l’Église ; accorde-nous, par ses mérites et à sa prière, de t’aimer par-dessus tout et d’avoir pour tous les hommes une vraie charité. Par Jésus Christ.

readings:
  patristicReading:
    - title: DE LA VIE DE SAINT HUGUES, ÉVÊQUE DE GRENOBLE, PAR GUIGUES LE CHARTREUX.
      subtitle: 
      content: |-
        Le bienheureux Hugues, né dans le Valentinois, dans une localité proche de l’Isère qu’on appelle Châteauneuf, eut des parents qui ne manquaient pas d’importance selon l’échelle des dignités du monde, mais remarquables, qui plus est, par le privilège de la sainteté. Il aima beaucoup les études. Parti pour ce motif à l’étranger, il y rencontra bien des difficultés, car il avait d’instinct — et cela jusqu’à son extrême vieillesse — une modération timide qui le poussait à supporter même le manque de nécessaire, et même parmi les siens. S’il avait quelque tourment particulier, dominé par la timidité, il ne pouvait l’avouer même à ses amis. Cette espèce de frein l’éloignait de bien des actions interdites. Revenu des écoles, il séjourna à Valence où il était chanoine de la cathédrale, vivant malgré sa jeunesse dans la réserve et la modération, parmi les gens du siècle, car il avait décidé, comme il le disait lui-même, de se garder, avec l’aide de Dieu, indemne de toute corruption. Il arriva que le Seigneur Hugues légat de toutes les Gaules par ordre de Grégoire VII de bienheureuse mémoire, vint dans cette ville. C’était un homme très actif dans les affaires de l’Église, et fort connu ; il était à ce moment-là à la tête de l’Église de Die et fut par la suite archevêque de Lyon. Il vit ce jeune homme, au visage distingué, de haute taille, modéré dans sa parole, réservé dans sa conduite. Instruit de sa science et de sa noblesse par ceux qui le connaissaient, cet évêque, qui avait une intelligence très vive tant dans des affaires humaines que divines, reconnut en lui pour l’avenir de grands signes d’intégrité et de sainteté. Il l’embrassa avec joie, aimablement, et lui demanda de venir chez lui pour devenir le compagnon qui partagerait ses combats. Au bout de quelque temps, le légat tint à Avignon, un important concile. A cette assemblée vinrent les chanoines de Grenoble, qui n’avaient plus d’évêque et en cherchaient un. Quand ils eurent découvert que le jeune homme, dont nous racontons l’histoire, participait à la réunion, avec l’appui de l’assemblée, ils supplièrent son respectable protecteur, dont il était le compagnon précieux, de le leur donner sans tarder pour évêque. Le légat, tout joyeux, accepta sur-le-champ. Mais le jeune homme, frappé jusqu’au tréfonds d’une crainte soudaine, résistait de toutes ses forces : son âge, ses connaissances, sa conduite enfin et sa vie — disait-il — n’étaient pas à la hauteur de si grands mystères ; il ne pouvait absolument pas supporter de souiller des charges si respectables par sa bassesse personnelle, au péril de son propre salut. Jusqu’à sa mort, il ne se déprit pas de ce jugement de lui-même, empreint d’une si profonde humilité. Toujours, malgré ses progrès dans les bonnes œuvres et la sainteté, il affirma, sans rougir, être un serviteur inutile, indigne d’exercer le pontificat, et il resta toujours prêt à abandonner cette fonction.
        Or voici ce qu’il advint : méprisant la chair, il poursuivait avec un zèle brûlant les réalités spirituelles ; à cause de l’abus des veilles, des jeûnes, des lectures, des prières et des méditations, il tomba très gravement malade de la tête et de l’estomac. Les malaises ne cessèrent pas pendant quarante ans au moins, tant qu’il vécut. Comme l’or chauffé se purifie dans le creuset, sous l’effet de ces deux tourments, la tentation et la maladie, il fit de grands progrès dans l’amour spirituel de Dieu par la grâce de Dieu ; il avait concentré en sa personne l’ornement d’innombrables vertus qui, réparties entre d’innombrables personnes, pourraient suffire à les rendre, chacune, illustres et connues. Mais lui ne pensait qu’à son imperfection. Quoiqu’appesanti par les maladies et l’âge, fortifié par l’espoir de se reposer un jour, Hugues se mit en devoir d’aller trouver le pontife romain ; il ne put obtenir la permission de ne s’occuper que de Dieu. On crut en effet que tout faible et malade qu’il fut, sa seule autorité, la sainteté de sa vie donnée en exemple, pouvaient être plus utiles au peuple qu’il gouvernait que la présence de n’importe quel autre, solide et en bonne santé. Il avait toujours été évident par ses paroles et ses actions que Dieu habitait sa sainte âme, mais c’est alors surtout, dans l’affliction suprême de la maladie, qu’on ne put ignorer l’homme qu’il était, la grandeur de son mérite, la sincérité avec laquelle il adorait Dieu, l’amour véritable dont il avait, durant sa longue vie, défendu la justice et la charité.

      responsory: |-
        R/ J’établirai sur eux de vrais pasteurs,
        j’accomplirai pour eux mes promesses,

        Prenez soin de tout le troupeau
        dont l’Esprit Saint vous a établis les gardiens.

        Veillez sur le troupeau que Dieu vous a confié, 
        non par cupidité, mais par dévouement.

        Je suis le bon Pasteur :
        le bon Pasteur donne sa vie pour ses brebis.

morning:
  evangelicAntiphon:
    common: |-
      Grâce à saint Hugues le désert a fleuri ; à son appel, la solitude a retenti de la louange de Dieu (Alléluia !).

vespers:
  evangelicAntiphon:
    common: |-
      A l’exemple du Christ, saint Hugues se retirait dans la montagne pour y prier Dieu (Alléluia !).

