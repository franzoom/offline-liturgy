celebration:
  title: Saint Hugues
  subtitle: abbé de Bonnevaux
  description: Neveu de saint Hugues, évêque de Grenoble, Hugues, moine cistercien, est abbé de Léoncel en 1162, puis de Bonnevaux (1166-1194) (paroisse de Chatonnay).
  commons:
    - saints-male_religious
  color: white

oration:
- |-
  Accorde-nous, Seigneur, au milieu des changements de ce monde, un amour passionné pour les choses du ciel, toi qui nous as donné, dans le bienheureux abbé Hugues, un exemple de perfection évangélique. Par Jésus Christ.

readings:
  patristicReading:
    - title: LETTRE DE SAINT BERNARD À SAINT HUGUES DE BONNEVAUX
      subtitle:
      content: |-
        À mon cher fils dans le Christ, Hugues nouvelle créature dans le Christ, frère Bernard que l’on appelle abbé de Clairvaux.
        Nous avons bondi de joie en apprenant ton changement de vie. Comment les hommes n’applaudiraient-ils pas à ce qui réjouit les anges ? Oui, un jour de fête se célèbre ; oui, l’action de grâce et la voix de la louange retentissent dans les cieux. Un jeune homme, noble et élevé dans le luxe, a triomphé du démon, a méprisé le monde. Il fait bon marché de son corps, renonce à l’affection de ses proches, saute par-dessus les pièges tendus de la richesse, car il a des ailes. D’où te vient cette sagesse, mon fils ? Nous n’en avons pas trouvé tant chez les vieillards de Babylone. Ceux-ci, selon l’apôtre ou plutôt contre lui, veulent être riches en ce monde, ce qui les fait tomber en tentation et dans les pièges du diable. Je te rends gloire, Père, parce que tu as caché ces choses à des savants et les as révélées à un petit. Et toi aussi, mon fils, rends grâces pour ce bienfait de ton Rédempteur. Mais dépose ton âme d’enfant : sois tout petit par l’innocence, plutôt que par l’inconscience. Que l’âpreté de l’Ordre n’épouvante pas ton âge tendre. N’oublie pas que plus la carde est dure, plus douce en sort l’étoffe, et que plus âpre est notre genre de vie, plus pure est notre conscience. La douceur du Christ sera là. Et la petite poudre du prophète assaisonnera le plat immangeable. Si tu sens les piqûres de la tentation, regarde le serpent d’airain élevé sur la croix, et bois, non tant aux blessures du Christ qu’à ses mamelles : il sera pour toi une mère, tu seras pour lui un fils. Les clous ne pourront pas blesser le Crucifié sans atteindre, à travers ses pieds et ses mains, tes pieds et tes mains à toi…
        Les mauvaises conversations corrompent la bonne conduite. Donc autant que possible, mon fils, évite les bavardages des hôtes, car ils remplissent l’oreille et vident l’esprit. Apprends à prier Dieu, apprends à élever ton cœur comme tu élèves tes mains. Apprends à diriger vers le ciel tes regards suppliants, et à présenter dans toutes tes nécessités au Père des miséricordes un visage qui attire la miséricorde. Il est impie de croire que Dieu puisse rester insensible à tes sanglots, détourner son oreille de ton cri. Pour le reste, rappelle-toi qu’il te faut obéir en toutes choses aux conseils des Pères spirituels, comme s’ils étaient les ordres de la Divine Majesté. Fais cela, et tu vivras. Fais cela et la bénédiction viendra sur toi, et pour tout ce que tu as abandonné, tu recevras le centuple, même en cette vie. Ne crois pas l’esprit qui te persuaderait que tu te presses trop, et qu’il vaudrait mieux attendre un âge plus mûr. Crois plutôt celui qui a dit : « Il est bon pour l’homme de porter le joug dès sa jeunesse ; que solitaire et silencieux il se courbe quand le Seigneur l’impose sur lui ». Porte-toi bien, et tâche de persévérer, car seule la persévérance reçoit la couronne.

      responsory: |-
        R/ Soyez les réalisateurs de la Parole, 
        et pas seulement des auditeurs 
        qui s’abuseraient eux-mêmes.
        * Menez une vie digne de l’Évangile du Christ
        Que votre foi ne soit pas fondée sur la sagesse des hommes.
        * Menez une vie digne de l’Évangile du Christ

morning:
  evangelicAntiphon:
    common: |-
      Tenant le rôle du Christ dans son monastère, Hugues a imprégné l’esprit de ses disciples du ferment de la sainteté.

vespers:
  evangelicAntiphon:
    common: |-
      Hugues a montré à ses frères le chemin de Dieu par ses actes plus que par ses paroles.

