celebration:
  title: Saints Julien et Ferréol
  subtitle: martyrs
  description: La présence de chrétiens dans l’armée romaine provoque, entre les années 287 et 290, une réaction qui se manifeste par des mesures ponctuelles, plutôt qu’une persécution généralisée. Tel est le cas pour le légionnaire Julien, viennois de naissance, soldat légionnaire et pour Ferréol, centurion de la même légion. La communauté de religion rapproche ces deux légionnaires qui se lient d’amitié. Lorsque Ferréol, qui sait se montrer discret dans les manifestations de sa foi, apprend les mesures qui se préparent contre les chrétiens, il s’empresse d’avertir son ami Julien qui, lui, affiche volontiers sa foi. Il l’invite à fuir en Auvergne, mais Julien est rejoint à Brioude où il est décapité. Les soldats ramènent sa tête à Vienne en témoignage de l’accomplissement de leur mission. Quant à Ferréol, dénoncé quelque temps après, il s’enfuit ; mais, rejoint, il est arrêté, jugé, condamné et exécuté. Le corps de Ferréol et la tête de Julien étaient vénérés dans la basilique Saint-Ferréol-en-Gal, construite par saint Mamert, mais aujourd’hui entièrement détruite.
  commons:
    - martyrs
  color: red

oration:
- |-
  Que la victoire de tes saints martyrs Julien et Ferréol, nos frères dans le Christ, nous remplisse de joie, Seigneur : qu’elle développe l’énergie de notre foi, et nous assure leur protection. Par Jésus Christ.

readings:
  patristicReading:
    - title: SERMON DE SAINT AUGUSTIN
      subtitle: Le Christ, premier des martyrs
      content: |-
        Les exploits glorieux des martyrs, qui font en tout lieu l'ornement de l'Église, nous permettent de comprendre par nous-mêmes la vérité de ce que nous avons chanté : %Aux yeux du Seigneur, la mort de ses saints a un grand prix%. En effet, elle a un grand prix à nos yeux, et aux yeux de celui pour le nom duquel ils sont morts.
        Mais le prix de toutes ces morts, c'est la mort d'un seul. Combien de morts a-t-il achetés, en mourant à lui seul, puisque, s'il n'était pas mort, le grain de blé ne se serait pas multiplié. Vous avez entendu ce qu'il disait lorsqu'il approchait de sa passion, c'est-à-dire alors qu'il approchait de notre rédemption : %Si le grain de blé tombé en terre ne meurt pas, il reste seul ; mais s'il meurt, il porte beaucoup de fruits%.
        Car sur la croix s’est réalisée une affaire grandiose. C'est là que s'est ouverte la bourse contenant le prix de notre rançon : quand son côté a été ouvert par la lance qui le frappait, ce qui en a jailli, c'est le prix de l'univers.
        Les fidèles et les martyrs ont été achetés ; mais la foi des martyrs a fait ses preuves, leur sang en est témoin. Ce qui a été dépensé pour eux, ils l'ont rendu, et ils ont accompli la parole de saint Jean : %Le Christ a donné sa vie pour nous ; nous aussi, nous devons donner notre vie pour nos frères%.
        Il est dit ailleurs : %Lorsque tu t'assieds à une table magnifique, regarde bien ce que l'on te sert, car il faut que tu en prépares autant%. C'est une table magnifique, celle où l'on mange le maître du banquet lui-même. Personne ne nourrit ses invités avec lui-même : c'est ce que fait le Christ Seigneur. Il est l'hôte qui invite. il est lui-même la nourriture et la boisson. Les martyrs ont donc fait attention à ce qu'ils mangeaient et buvaient, pour pouvoir en rendre autant.
        Mais comment auraient-ils pu en rendre autant, si celui qui a fait la première dépense ne leur avait donné de quoi lui rendre ? Aussi qu’est-ce que nous recommande le psaume où nous avons chanté cette parole : %Aux yeux du Seigneur, la mort de ses saints a un grand prix% ?
        L'homme a considéré combien il a reçu de Dieu ; il a passé en revue combien la grâce du Tout-Puissant l'a comblé : il l'a créé ; après sa chute, il l'a cherché ; l'ayant trouvé, il lui a pardonné ; il a aidé ses pauvres forces dans le combat ; il ne l'a pas quitté lorsqu'il défaillait ; lorsqu'il a été vainqueur, il l'a couronné et il s'est donné lui-même en récompense. Lorsqu'il a considéré tout cela, l'homme s'est écrié : %Comment rendrai-je au Seigneur tout le bien qu'il m'a fait ? J'élèverai la coupe du salut…%
        Quelle est cette coupe ? La coupe amère et salubre de la passion ; la coupe que le malade craindrait de toucher, Si le médecin n'y avait bu le premier. Voici quelle est cette coupe, nous reconnaissons qu'elle s'approche des lèvres du Christ, lorsqu'il dit : %Père, si c'est possible, que cette coupe passe loin de moi !%
        C'est de cette coupe que les martyrs ont dit : %J'élèverai la coupe du salut, et j'invoquerai le nom du Seigneur%. Tu ne crains donc pas de défaillir ? Non, répond-il. Pourquoi ? Parce que %j'invoquerai le nom du Seigneur%. Comment les martyrs seraient-ils victorieux, s'il n'était pas victorieux dans les martyrs, celui qui a dit : %Réjouissez-vous, parce que j'ai vaincu le monde%. Le Souverain des cieux dirigeait leur âme et leur langue, par eux il triomphait du diable sur terre, et au ciel il couronnait les martyrs. Heureux ceux qui ont bu ainsi à cette coupe ! Ils sont délivrés de leurs douleurs, ils sont comblés d'honneurs.
        Soyez donc attentifs mes très chers : ce qui échappe à vos yeux, pensez-y dans votre âme te votre cœur et constatez %qu’aux yeux du Seigneur, la mort de ses amis a un grand prix%.

      responsory: |-
        R/ Qui perd sa vie la trouvera !

        Il n’est pas de plus grand amour
        que de mourir pour celui qu’on aime.

        Entourés que nous sommes de témoins,
        Marchons les yeux fixés sur le Christ.

morning:
  evangelicAntiphon:
    common: |-
      Julien et Ferréol, soldats du Christ, vous avez préféré au courage militaire les armes de Dieu ; martyrs du Christ, il vous a couronnés dans le ciel.

vespers:
  evangelicAntiphon:
    common: |-
      Pour le Christ, Julien et Ferréol ont versé leur sang : ni la vie, ni la mort ne les ont séparés.
