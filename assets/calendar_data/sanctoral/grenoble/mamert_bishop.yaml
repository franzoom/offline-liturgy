celebration:
  title: Saint Mamert
  subtitle: évêque de Vienne
  description: Le nom de Mamert, évêque de Vienne, apparaît en 463. Son influence s’exerce particulièrement sur cette famille exceptionnelle dont le père, Hesychius, et le fils cadet, saint Avit, lui succèdent sur le siège de Vienne. On lui doit l’institution du triduum des Rogations
  commons:
    - pastors_bishop
  locative: à Vienne
  color: white

oration:
- |-
  Tu as inspiré, Seigneur, à l’évêque saint Mamert une admirable sollicitude pour son peuple : que son exemple et son intercession nous gardent fidèles à invoquer sans cesse ton nom et à tout attendre de ta puissance et de ta miséricorde. Par Jésus Christ.

readings:
  patristicReading:
    - title: LETTRE DE SAINT SIDOINE APOLLINAIRE À SAINT MAMERT
      subtitle: La puissance de la prière
      content: |-
        Le bruit court que les Goths ont porté leur camp sur le sol romain : c’est toujours nous, malheureux Arvernes, qui sommes sur le chemin de telles invasions. Ce qui fournit en effet à la haine de nos ennemis des motifs particuliers, c’est qu’ils rencontrent dans la barrière que nous leur opposons, avec l’aide du Christ, le seul obstacle à leur ambition qu’ils n’ont pas encore réalisée, de donner pour limites à leur territoire, entre l’Océan et le Rhône, le cours de la Loire. Or les vastes étendues des régions situées autour de nous ont été depuis longtemps englouties par le cruel assaut d’une royauté menaçante. 
        Mais nous n’espérons plus que notre résistance si téméraire et si périlleuse continuera à trouver une aide efficace dans nos murailles noircies par le feu ou dans le réseau pourri de nos palissades ou dans nos ouvrages de défense usés par les poitrines des sentinelles ; le seul espoir que nous caressions malgré tout est de trouver assistance dans les Rogations introduites ici à votre instigation, qui en sont encore à leurs débuts et à leur mise en œuvre, mais auxquelles la population arverne a commencé à s’initier, sinon avec de pareils effets, du moins avec le même zèle que vous, et c’est à cela qu’elle doit de ne pas encore tourner le dos devant les objets d’épouvante qui l’environnent. Il n’a pas en effet échappé à notre information qu’aux premiers temps de l’institution de ces prières publiques la cité que le ciel vous a confiée fut vidée par l’apparition épouvantable de prodiges de toutes sortes. Au milieu de ces désastres, alors que la ville était vidée de sa substance par le départ des grands et du peuple, vous avez eu, vous, promptement recours aux exemples renouvelés des anciens Ninivites, afin que votre désespoir ne fût pas un outrage de plus aux avertissements du Ciel. Et en vérité, vous pouviez moins que personne perdre, sans péché, votre confiance en Dieu, après l’expérience que vous avez faite de sa puissance. Un jour que la ville avait, à son tour, commencé à brûler, votre foi trouva en effet plus d’ardeur au milieu de cet embrasement, et quand, sous les yeux de la multitude éperdue, le feu se mit à reculer devant le seul rempart de votre corps et à se replier en ondulations rétrogrades, ce fut un miracle édifiant, singulier, extraordinaire, que la flamme, à laquelle manque par nature le sentiment, ne manqua pas de la force nécessaire pour s’effacer par déférence. En premier lieu, vous prescrivez donc aux hommes de notre ordre (mais ceux-ci sont en petit nombre) le jeûne, vous leur interdisez les souillures, vous les avertissez des supplices, vous leur promettez les remèdes ; à l’exemple des fidèles, vous exposez que si le châtiment n’est pas loin, le pardon n’est pas loin non plus ; vous leur enseignez qu’ils peuvent écarter, par la fréquence des prières, les menaces de la dévastation annoncée ; vous leur rappelez que la persistance de l’incendie déchaîné peut être éteinte par les larmes plutôt que par l’eau des fleuves ; vous leur rappelez que c’est la fermeté de la toi qui peut rendre sa solidité à la terre ébranlée par des tremblements menaçants. La foule des humbles, obéissant sur le champ à ces conseils, fut un stimulant pour les grands aussi, qui n’avaient pas été mécontents de fuir mais ne rougirent pas de revenir. Apaisé par ces marques de dévotion, Dieu, qui scrute les cœurs, a fait que vos prières suppliantes ont été pour vous un moyen de salut, pour les autres un sujet d’imitation, pour tout le monde une sauvegarde.
        Notre population, sachant que tous ces maux dont souffraient auparavant vos fidèles de Vienne ne s’étaient plus reproduits par la suite, s’engage résolument sur les traces de votre sainte institution, demandant de tout cœur que votre bienheureuse conscience accorde le soutien de ses prières à ceux qui ont déjà bénéficié de ses exemples.

      responsory: |-
        R/ Seigneur Jésus,
        enseigne-nous à prier.

        Pleine de force,
        la supplication fervente du juste.

        Tout ce que vous demanderez en mon nom, 
        mon Père vous l’accordera.

        Demandez et vous recevrez ;
        parfaite alors sera votre joie.

morning:
  evangelicAntiphon:
    common: |-
      Saint Mamert a servi le Seigneur dans la justice et la sainteté, en se faisant le témoin de sa tendresse.

vespers:
  evangelicAntiphon:
    common: |-
      Bienheureux celui qui a pitié du pauvre ; celui qui croit au Seigneur, l’invoque et témoigne de sa miséricorde.