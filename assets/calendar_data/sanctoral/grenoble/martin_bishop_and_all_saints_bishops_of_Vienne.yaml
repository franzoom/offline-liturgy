celebration:
  title: Saint Martin et tous les saints évêques de Vienne
  subtitle: 
  description: À la fin du III^ème siècle, Martin est le premier évêque de Vienne connu. Avec lui sont vénérés aujourd’hui un grand nombre d’évêques, parmi lesquels il est possible de nommer Paschase, Clarent, Nizier, Denis, Thibaud, Hesychius, Adon…
  commons:
    - saints-male_multiple
  color: white

oration:
- |-
  Pour que saint Martin et tous les saints Évêques de Vienne soient les pasteurs de ton peuple, Seigneur, tu leur as donné un esprit d’amour et de vérité ; puisque nous célébrons aujourd’hui leur mémoire, accorde-nous de progresser en les imitant et de trouver un soutien dans leur prière.

readings:
  patristicReading:
    - title: SERMON DE SAINT BERNARD SUR SAINT MALACHIE
      subtitle: Concitoyens des saints et ambassadeurs de leurs fils captifs
      content: |-
        Félicitons-nous, mes frères, félicitons-nous comme il convient, pour nos pontifes, car si c’est un pieux devoir de pleurer les défunts, c’en est un plus pieux encore de se réjouir avec les vivants. Or ne sont-ils pas vivants ? Si, et dans la béatitude. Bien sûr, %aux yeux des insensés, ils ont passé pour morts, pourtant ils sont dans la paix%. Et maintenant qu’ils sont devenus %concitoyens des saints et membres de la famille de Dieu%, ils chantent ensemble et rendent grâce en disant : Nous avons traversé le feu et l’eau, et tu nous as conduits au lieu du bonheur éternel. Ils les ont traversés fort courageusement, ils les ont heureusement traversés. Ils ont traversé le feu et l’eau, eux que les malheurs n’ont pu briser, ni les douceurs retenir.
        Réjouissons-nous que nos pontifes soient montés rejoindre leurs concitoyens, se présentant comme les ambassadeurs de leurs fils captifs, nous gagnant le cœur des bienheureux, leur faisant connaître les vœux des malheureux. Réjouissons-nous, dis-je, et exultons, car voici que la cour céleste comprend des gens de chez nous, capables de se soucier de nous, de nous donner la protection de leurs mérites, à nous qu’ils ont formés par leurs exemples et fortifiés par leurs miracles. Les saints pontifes, qui, en esprit d’humilité, avaient si souvent fait entrer dans les cieux les victimes pacifiques, se sont avancés eux-mêmes jusqu’à l’autel de Dieu, eux-mêmes à la fois prêtres et victimes.
        Béni soit le Seigneur Dieu, qui a visité son peuple par le ministère de si grands pontifes ! Et maintenant qu’ils ont été emportés dans la cité sainte, ils ne cessent de nous consoler, nous qui restons en captivité, par le souvenir de leur si grande bonté. Que leurs esprits exultent en Dieu : ils sont délivrés du poids de leur corps, ils ne sont plus alourdis par quelque matière trouble et terrestre qui les empêcherait de passer à travers toute la création corporelle et incorporelle, joyeusement et vigoureusement, pour parvenir tout entiers en Dieu et, en s’attachant à lui, ne faire plus qu’un esprit avec lui pour l’éternité. La sainteté convient à cette demeure où l’on célèbre la mémoire d’une si grande sainteté.

      responsory: |-
        R/ Je vous donnerai des pasteurs selon mon cœur, 
        ils vous conduiront avec sagesse.

        Le Christ nous a donné des pasteurs
        pour que nous ne soyons plus comme des enfants 
        menés à la dérive par tous les courants d’idées.

        L’Esprit Saint les a placés comme évêques
        pour être les pasteurs de l’Eglise de Dieu
        que le Christ s’est acquise par son sang.

        Faites confiance à ceux qui vous dirigent :
        ils sont là pour veiller sur vos âmes
        et ils auront à en rendre compte.

morning:
  evangelicAntiphon:
    common: |-
      Bénissons le Seigneur qui nous a envoyé des pasteurs selon son cœur, pour conduire nos pas au chemin de la paix.

vespers:
  evangelicAntiphon:
    common: |-
      Ils ont été les bergers du troupeau qui leur fut confié ; du haut du ciel, ils veillent toujours sur lui.

