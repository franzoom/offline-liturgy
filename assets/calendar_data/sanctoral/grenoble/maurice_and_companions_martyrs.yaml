celebration:
  title: Saint Maurice et ses compagnons
  subtitle: martyrs
  description: Lors de la persécution de Dioclétien (303-305), à Agaune dans le Valais, des soldats sont torturés et mis à mort pour leur foi. Un siècle et demi plus tard, saint Eucher, évêque de Lyon, rédige les récits de leur martyre d’après des traditions orales. Dès le début du VIème siècle, saint Maurice est en grande vénération à Vienne et dans le diocèse de Grenoble. À la fin du XIe siècle il devient le seul titulaire de la cathédrale de Vienne.
  commons:
    - martyrs
  locative: à Vienne
  color: red

oration:
- |-
  Seigneur, la gloire de tes élus est un reflet de ta splendeur, et tu as consacré ce jour par le martyre de saint Maurice et de ses compagnons : accorde à ton Eglise, qui fête avec joie leur entrée dans le ciel, de trouver, à leur exemple et par leur prière, le chemin de ta miséricorde. Par Jésus Christ.

readings:
  patristicReading:
    - title: LA PASSION DES MARTYRS D’AGAUNE PAR SAINT EUCHER
      content: |-
        Sous Maximien, qui fut empereur de Rome avec Dioclétien pour collègue, en de nombreuses provinces, des martyrs en foule furent torturés ou mis à mort. Il y avait dans l’armée, à cette époque, une légion de soldats appelés Thébéens. Ils étaient venus d’Orient d’où on les avait fait venir au secours de Maximien, car c’étaient d’excellents guerriers, nobles par leur courage, mais plus nobles par leur foi. Aussi comme on les avait chargés de persécuter une multitude de chrétiens, ils furent les seuls à oser condamner cette mission de cruauté et ils refusèrent d’obéir à des ordres pareils. Maximien, épuisé par le trajet, se trouvait auprès de Martigny (dans le Valais). Là, il fut informé par des messagers que cette légion s’était immobilisée dans le défilé d’Agaune, et son indignation le fit bouillir de fureur. Donc, lorsqu’il connut la réponse des Thébéens, emporté par sa fureur aveugle, il ordonna de tuer un homme sur dix, afin que les autres, terrifiés par les ordres du souverain, les acceptent par peur. Il réitère ses décisions et prescrit de forcer les survivants à persécuter les chrétiens.
        Lorsque les Thébéens reçoivent cette injonction renouvelée, une clameur s’élève dans le camp ; ils affirment qu’ils n’accepteront jamais une tâche aussi sacrilège, qu’ils ont toujours détesté l’impiété idolâtre, qu’ils ont reçu l’initiation des mystères chrétiens, qu’ils ont été formés dans la religion du vrai Dieu, et qu’ils préfèrent mourir plutôt que de combattre la foi chrétienne. En apprenant cette réponse, Maximien ordonne que, de nouveau, un homme sur dix soit mis à mort et que les autres n’en soient pas moins forcés d’accomplir la tâche qu’ils rejettent. Ces ordres à leur tour parviennent au camp; on tire au sort un homme sur dix et il est exécuté. Mais le reste de la troupe s’encourageait à persister dans une aussi belle attitude. Cependant, celui qui fut le plus actif à encourager la foi fut saint Maurice, le chef de la légion ; avec ses officiers, Exupère et Candide, il excitait la ferveur de chacun par ses exhortations et ses avertissements.
        Les soldats de la légion thébéenne ainsi poussés par leurs chefs et leurs supérieurs envoient à Maximien un message aussi courageux que religieux ainsi conçu : « Empereur, nous sommes tes soldats, mais aussi les serviteurs de Dieu, ce que nous professons hardiment. A toi nous devons le service militaire, à lui une conscience pure. Nous sommes prêts à porter les mains contre n’importe quel ennemi, mais nous estimons que c’est un crime de les ensanglanter en massacrant des innocents. Nous avons d’abord prêté serment envers Dieu, ensuite nous avons prêté serment envers le souverain. Sois persuadé que le second n’a plus aucune valeur pour nous si nous avons rompu le premier. Tu nous ordonnes de rechercher les chrétiens pour les conduire au supplice. Désormais tu n’as pas besoin d’en chercher d’autres ; nous professons que nous sommes chrétiens, nous ne pouvons pas persécuter les chrétiens. »
        Maximien, voyant que ces guerriers avaient le cœur fixé dans la foi au Christ et désespérant de pouvoir fléchir leur glorieuse constance, ordonna, par une seule sentence, de les tuer tous, et en chargea les troupes qui les entouraient.
        Ils se faisaient donc frapper en masse, sans même protester ni résister. au contraire, ils déposaient les armes, présentaient leur tête aux persécuteurs et leur gorge ou leur corps découvert aux bourreaux. Ils ne songeaient pas à autre chose qu’à confesser celui qui a été conduit à la mort sans protester, celui qui, comme l’agneau, n’a pas ouvert la bouche. Eux-mêmes, comme le troupeau des brebis du Seigneur, se laissèrent massacrer par les loups qui se ruaient sur eux.

      responsory: |-
        R/ Sois fidèle jusqu’à la mort,
        le Seigneur combat pour toi, alléluia !

        Ne craignez pas ceux qui tuent le corps
        et ne peuvent rien vers de plus.

        Le vainqueur, celui qui croit en moi,
        ne connaîtra pas la seconde mort.

        Espère en Dieu, prends cœur et prends courage,
        espère en Dieu !

morning:
  evangelicAntiphon:
    common: |-
      Glorieux martyrs du Christ, plutôt que de frapper des innocents vous avez déposé vos armes, vous étiez prêts à mourir plutôt qu’à tuer.

vespers:
  evangelicAntiphon:
    common: |-
      Sous la conduite de saint Maurice, leur chef, toute la légion déclara adorer le vrai Dieu ; c’est pourquoi mis à mort, ils ont reçu la couronne du Royaume.

