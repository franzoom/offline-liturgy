celebration:
  title: Saint Pierre-Julien Eymard
  subtitle: prêtre
  description: Né à La Mure en 1811, Pierre-Julien Eymard est ordonné prêtre le 20 juillet 1834. Nommé d’abord vicaire à Chatte, puis curé de Monteynard, il entre cinq ans plus tard dans la Société de Marie. Il fut un propagateur merveilleux du culte du mystère eucharistique, ce qui le conduisit à fonder deux nouvelles Congrégations, la société des Prêtres du Saint-Sacrement (1856) et celle des Servantes du Saint-Sacrement (1858). Il meurt à La Mure le 1er août 1868. Inhumé au cimetière de La Mure, son corps est transporté à Paris en 1877. Le pape Jean XXIII le proclame saint le 9 décembre 1962.
  commons:
    - pastors
  color: white

oration:
- |-
  Seigneur Jésus Christ, Fils du Dieu vivant, qui, pour promouvoir en tous lieux le culte du sacrement de l’Eucharistie, as suscité saint Pierre-Julien Eymard et par lui as donné à ton Eglise de nouveaux enfants : accorde-nous, par son intercession et à son exemple, de devenir en esprit et vérité les adorateurs et les témoins d’un si grand mystère. Toi qui.

readings: 
  patristicReading:
    - title: DIRECTOIRE DES AGRÉGÉS, PAR SAINT PIERRE JULIEN EYMARD
      subtitle: Le disciple de Jésus Christ peut arriver à la perfection par deux voies
      content: |-
        Le disciple de Jésus Christ peut arriver à la perfection par deux voies.
        La première, c’est la loi du devoir : on va progressivement du travail des vertus à l’amour qui est le lien de la perfection. Cette voie est longue et pénible ; peu arrivent par elle à la perfection : car après avoir gravi pendant quelque temps la montagne de Dieu ils s’arrêtent et se découragent à la vue de ce qui leur reste à gravir, et redescendent ou roulent au fond de l’abîme en disant : c’est trop difficile ; c’est impossible...
        La seconde voie est plus courte et plus noble : c’est celle de l’amour, mais de l’amour royal. Avant d’agir, le disciple de l’amour commence par estimer et aimer ; l’amour suit la connaissance ; et pour cela l’adorateur s’élance jusqu’à la cime de la montagne... où l’amour a sa demeure...
        Et là, comme l’aigle royal, il contemple ce soleil d’amour, pour en bien connaître la beauté et la puissance. Il ose même, comme disciple bien-aimé, se reposer sur la poitrine du Sauveur... pour s’y réchauffer, y fortifier ses forces, et partir de là, comme la foudre de la nue qui l’a formée, comme les rayons du soleil dont ils émanent. Le mouvement suit la puissance de son moteur, et le cœur l’amour qui l’anime.
        L’amour, voilà le premier point de départ de la vie chrétienne ; c’est le point de départ de Dieu vers sa créature, de Jésus Christ vers l’homme : rien de plus juste que ce soit celui de l’homme vers Dieu.
        Mais avant d’être au point de départ, il faut que l’amour de Jésus soit un point de ralliement et de recueillement de toutes les facultés de l’homme ; une école où l’on apprend à connaître Jésus Christ... C’est surtout dans l’oraison que l’âme connaît Jésus Christ, qu’il se révèle à elle.

      responsory: |-
        R/ Souvenons-nous quel amour 
        Jésus nous manifeste : 
        * Il donna sa vie pour nous.

        V/ Il donna son corps
        et répandit son sang en rémission des péchés.
        * Il donna sa vie pour nous.

