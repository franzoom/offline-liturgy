celebration:
  title: Sainte Philippine Duchesne
  subtitle: vierge
  description: Née à Grenoble le 29 août 1769, Rose Philippine Duchesne entre au couvent de la Visitation de Sainte-Marie-d’en-Haut. Son noviciat est interrompu par la Révolution. En 1804 elle se joint aux premières religieuses de la Société du Sacré-Cœur de Madeleine-Sophie Barat. En 1817 elle part en mission en Floride, puis en Louisiane et enfin chez les Indiens. Les Indiens l’appellent « la femme-qui-prie-toujours ». Sa santé donnant des inquiétudes, elle revient en Louisiane où elle meurt le 18 novembre 1852. Jean-Paul II la proclame sainte le 3 juillet 1988.
  commons:
    - saints-female
  color: white

oration:
- |-
  Seigneur, lumière et force des humbles, tu as donné à la bienheureuse Philippine Duchesne, dans toutes les circonstances de sa vie, la même volonté de te servir et de t’aimer ; que sa prière et l’exemple de sa générosité ravivent en nous la ferveur de l’amour afin que le monde connaisse les insondables richesses du cœur de Jésus, ton Fils, notre Seigneur. Lui qui.

readings:
  patristicReading:
    - title: LETTRES DE SAINTE PHILIPPINE À SA SUPERIEURE, SAINTE MADELEINE-SOPHIE BARAT
      subtitle: 
      content: |-
        Il m’est donc permis de me livrer à la plus douce des espérances. Mes vœux s’accompliront un jour. Dès maintenant, je puis tendre par mes désirs et mes prières vers des contrées où je pourrai enfin rendre quelques services à Notre-Seigneur, et n’être riche que de lui. Quel aiguillon puissant pour m’exciter à me réformer, que la crainte de me rendre indigne de ma haute destinée. Avec quel respect mêlé d’attendrissement entendrais-je ces paroles de la bouche de ma (tendre) mère : je vous envoie (parmi les loups. Oh ! Si vous pouviez ajouter comme un agneau !). Avec quel transport prendrais-je sa vénérable main et la porterais-je sur ma tête pour être bénie de cette sorte : %Ab illo benedicaris in cujus honore cremaberis% !
        (Je suis souvent en esprit au moment de la décision, et plus souvent encore dans les lieux où elle me permettrait d’aller... Qu’il me tarde de savoir ce que vous aurez à me dire ! Je me précipite à genoux pour l’entendre). ~
        Quel plaisir et quel bien m’a fait votre lettre, il la fallait pour amollir mon âme plus insensible qu’un rocher depuis trois semaines. Elle s’est fondue comme la cire auprès du feu en me nourrissant des aliments que vous lui présentiez ; mes yeux n’ont plus été arides et mon cœur s’est livré à une douce joie, il l’a savourée toute la nuit, car la lettre est arrivée avant la veillée du Jeudi-Saint. O bénite nuit ! où j’ai cru une seconde fois être exaucée. Je le crois, ma Mère, à la joie pure que je goûte et à la ferme espérance que je conçois ; Oh si c’était avant la fin de l’année ; je m’en suis presque flattée.
        Toute la nuit j’ai été dans le nouveau continent, mais j’ai voyagé en bonne compagnie. D’abord j’avais précieusement recueilli au jardin, au prétoire, au calvaire tout le sang de Jésus. Je m’étais emparée de lui au Saint-Sacrement, je le serrais étroitement et je portais partout mon trésor pour le répandre sans crainte de l’épuiser. Saint François-Xavier s’intéressait encore à faire fructifier cette précieuse semence et il se tenait au pied du trône de Dieu pour demander l’ouverture de nouvelles terres à éclairer. Saint François-Régis était le pilote des voyageurs, et bien d’autres saints encore, jaloux de la gloire de Dieu. Enfin tout allait au mieux ; je n’ai pu insinuer dans mon cœur aucune tristesse même sainte, parce qu’il me semblait qu’une nouvelle application allait se faire des mérites de Jésus.
        Les douze heures de la nuit sont bien vite passées sans fatigue quoiqu’à genoux et la veille je ne croyais pas pouvoir tenir une heure. J’avais bien à faire aussi avec tous mes sacrifices à offrir : une mère... et quelle mère ! des sœurs, des parents, une montagne, Sainte-Marie-d’en-Haut, et puis je me trouvais seule avec Jésus seul ou avec des enfants (tout noirs, tout grossiers et j’étais plus contente au milieu de ma petite cour que tous les potentats du monde). Bonne Mère, quand vous me direz : %ecce ego mitto te, je vous répondrai vite : vadam%…
        Je vais tâcher de me rendre triste le reste du Vendredi-Saint ; mais j’y ai peu de disposition ; je suis montée à l’espérance.

      responsory: |-
        R/ Demeurez en mon amour et gardez ma parole.

        Celui qui demeure en moi,
        comme je demeure en lui,
        portera beaucoup de fruit.

        Si vous demeurez en moi,
        demandez tout, et vous l’aurez, 
        et votre joie sera parfaite.
        


