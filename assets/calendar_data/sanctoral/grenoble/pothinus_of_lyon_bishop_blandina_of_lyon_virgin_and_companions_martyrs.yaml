celebration:
  title: Saint Pothin évêque, Sanctus diacre, Blandine vierge et leurs compagnons
  subtitle: martyrs
  description: Pothin, venu d’Orient à Lyon vers 122, est le premier évêque de cette ville. Plus que nonagénaire, il est martyrisé en 177, sous le règne de Marc-Aurèle, avec un groupe de chrétiens dont les plus célèbres sont le diacre de Vienne, Sanctus, et l’esclave Blandine. Une lettre des Églises de Lyon et de Vienne aux chrétiens d’Asie nous rapporte leurs supplices. Leurs corps furent brûlés et les cendres jetées dans le Rhône. Le sang de ces martyrs est la semence des chrétiens de notre Église.
  commons:
    - martyrs
  color: red

oration: 
- |-
  Tu as donné, Seigneur, à ceux qui furent les prémices de la foi dans notre pays, saints Pothin, Sanctus, Blandine et leurs compagnons, d’affirmer jusqu’à la mort leur joie d’être chrétiens ; rends-nous dignes de toujours mieux te connaître et de conformer notre vie à la foi que nous professons. Par Jésus Christ.

morning:
  reading:
    biblicalReference: 1Jn 5, 1.3-4
    content: |-
      Tout homme qui croit que Jésus est le Christ, celui-là est vraiment né de Dieu ; tout homme qui aime le Père aime aussi celui qui est né de lui. L’amour de Dieu, c’est cela : garder ses commandements. Ses commandements ne sont pas un fardeau, puisque tout être qui est né de Dieu est vainqueur du monde. Et ce qui nous fait vaincre le monde, c’est notre foi.
  responsory: |-
    R/ Dieu est admirable en ses saints.
    * Alléluia, alléluia.
    V/Il donne à son peuple force et courage.
    * Alléluia, alléluia.
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: |-
      Au milieu des tortures, les martyrs du Christ contemplaient les réalités d’en haut et disaient : Seigneur, viens à notre aide, pour que nous achevions ton œuvre sans faillir, alléluia.
      
readings:
  patristicReading:
    - title: LETTRE DES ÉGLISES DE LYON ET DE VIENNE AUX ÉGLISES D’ASIE ET DE PHRYGIE (177)

      subtitle: Nous avons trouvé le Messie
      content: |-
        La violence de la persécution qui a eu lieu ici, la grande colère des païens contre les saints, tout ce qu'ont enduré les bienheureux martyrs, nous ne sommes pas capables de le dire exactement et il n'est même pas possible de l'exprimer par écrit. Car c'est de toutes ses forces que l'Adversaire a foncé, préludant déjà à ce qui sera son véritable avènement. Il a passé partout, entraînant ses partisans et les exerçant d'avance contre les serviteurs de Dieu. De la sorte on ne nous a pas seulement chassés des maisons, des bains, de la place publique, mais encore on nous a interdit absolument de paraître en quelque lieu que ce soit.
        Toute la colère de la foule, du gouverneur et des soldats se déchaîna sans aucune mesure contre Sanctus, le diacre de Vienne, contre Maturus, nouvellement baptisé mais généreux athlète ; contre Attale, originaire de Pergame, qui avait toujours été le pilier et le soutien de ceux d'ici; et enfin contre Blandine; par celle-ci, le Christ montra que ce qui est simple, sans apparence, facilement méprisable pour les hommes, est jugé digne d'une grande gloire auprès de Dieu à cause de l'amour qu'on a pour lui, amour qui se manifeste dans la force et ne se glorifie pas des apparences.
        Nous tous en effet, nous redoutions, et sa maîtresse selon la chair, qui était elle aussi une combattante parmi les martyrs, redoutait, anxieuse avec nous, que Blandine ne pût avec assurance faire sa confession de foi à cause de la faiblesse de son corps. Mais Blandine fut remplie d'une telle force qu'elle lassa et découragea ceux qui, se relayant les uns les autres, l'avaient torturée de toute manière depuis le matin jusqu'au soir. La bienheureuse, comme un généreux athlète, se renouvelait dans sa confession ; c'était pour elle un réconfort, un repos, un arrêt dans la souffrance que de dire : « Je suis chrétienne ; chez nous, il ne se fait rien de mal. »
        Quelques jours après, Maturus, Sanctus, Blandine et Attale furent donc conduits aux bêtes dans un lieu public où se donnait ce spectacle de l'inhumanité des païens ; c'était précisément le jour où les combats de bêtes devaient être donnés aux dépens de nos frères.
        Blandine fut suspendue à un poteau et exposée pour être la pâture des bêtes lâchées contre elle. À la voir suspendue à une sorte de croix, à l'entendre prier continuellement, les lutteurs fortifiaient leur courage. Dans ce combat, ils voyaient de leurs yeux, sensiblement, à travers leur sœur, celui qui avait été crucifié pour eux ; ainsi, ceux qui croient en lui sont persuadés que tout homme qui souffre pour la gloire du Christ est pour toujours en communion avec le Dieu vivant. Ce jour-là, aucune des bêtes ne la toucha. Elle fut détachée du poteau, ramenée dans la prison et gardée pour un autre combat. Elle traverserait donc victorieusement des luttes plus nombreuses afin d'être un encouragement pour ses frères, elle la petite, la faible, la méprisée ; car elle s'était identifiée au grand et invincible athlète, le Christ ; elle avait triomphé de l'Adversaire en maintes rencontres et, par la lutte, avait remporté la couronne de l'incorruptibilité.
        Enfin, le dernier jour des combats singuliers, après les fouets, après les fauves, après le gril, elle fut finalement jetée dans un filet et livrée à un taureau. Longtemps, elle fut projetée par l'animal, mais elle ne sentait rien de ce qui lui arrivait, à cause de l'espérance et de l'attente de ce en quoi elle avait cru et de sa conversation avec le Christ ; elle fut sacrifiée elle aussi; et les païens eux-mêmes avouaient que jamais chez eux une femme n'avait souffert d'aussi grandes et d'aussi nombreuses tortures.

      responsory: |-
        R/ Sois fidèle jusqu’à la mort,
        le Seigneur combat pour toi, alléluia ! 

        Ne craignez pas ceux qui tuent le corps
        et ne peuvent rien vers de plus.

        Le vainqueur, celui qui croit en moi,
        ne connaîtra pas la seconde mort.

        Espère en Dieu, prends cœur et prends courage,
        espère en Dieu !

vespers:
  reading:
    biblicalReference: Ap 7,14-17
    content: Ils viennent de la grande épreuve ; ils ont lavé leurs vêtements, ils les ont purifiés dans le sang de l’Agneau. C’est pourquoi ils se tiennent devant le trône de Dieu et le servent jour et nuit dans son temple. Ils n’auront plus faim, ils n’auront plus soif, la brûlure du soleil ne les accablera plus, puisque l’Agneau qui se tient au milieu du trône sera leur Pasteur pour les conduire vers les eaux de la source de vie. Et Dieu essuiera toute larme de leurs yeux.
  responsory: |-
    R/ Ayez la joie dans le Seigneur, exultez, les justes.
    * Alléluia, alléluia.
    V/ Jubilez, tous les cœurs droits,
    * Alléluia, alléluia.
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Au milieu des plus vives souffrances, ils priaient le Seigneur, heureux de souffrir pour son nom ; ils chantent maintenant le cantique nouveau devant le trône de Dieu et de l’Agneau, alléluia.
