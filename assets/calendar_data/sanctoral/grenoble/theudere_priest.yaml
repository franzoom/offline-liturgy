celebration:
  title: Saint Theudère
  subtitle: prêtre
  description: Né à Arcisse, près de Saint-Chef, Theudère veut entrer au monastère de Lérins. Mais saint Césaire d’Arles le garde près de lui et l’ordonne prêtre. Il construit plusieurs églises dans les environs de Vienne et dans son pays natal. Il vit en reclus à Vienne et meurt le 29 octobre 575 probablement.
  commons:
    - priest
  color: white

oration:
- |-
  Tu as donné, Seigneur, à saint Theudère la grâce d’imiter le Christ humble et pauvre ; accorde-nous, par son intercession, de suivre fidèlement l’appel que nous avons reçu, et d’atteindre à la perfection dont tu nous as donné l’exemple dans la personne de Jésus ton Fils. Lui qui.

readings:
  patristicReading:
    - title: SERMON DE SAINT CÉSAIRE D’ARLES
      subtitle: Comment marcher à la suite du Christ
      content: |-
        Quand le Seigneur nous dit dans l’évangile : %Si quelqu’un veut marcher derrière moi, qu’il renonce à lui-même%, nous trouvons qu’il nous commande une chose difficile et nous considérons qu’il nous impose un lourd fardeau. Mais si celui qui commande nous aide à accomplir ce qu’il commande, cela n’est pas difficile... Où devons-nous suivre le Christ, sinon là où il est allé ? Or, nous savons qu’il est ressuscité et monté aux cieux : c’est là que nous avons à le suivre. Il ne faut certainement pas nous laisser envahir par le désespoir, car, si nous ne pouvons rien par nous-mêmes, nous avons la promesse du Christ. Le ciel était loin de nous avant que notre Tête y soit montée. Désormais nous sommes les membres de cette Tête, pourquoi désespérer de parvenir au ciel ? Pour quel motif ? S’il est vrai que sur cette terre tant d’inquiétudes et de souffrances nous accablent, suivons le Christ en qui se trouvent le bonheur parfait, la paix suprême et l’éternelle tranquillité.
        Mais l’homme désireux de suivre le Christ écoutera cette parole de l’Apôtre : %Celui qui déclare demeurer dans le Christ doit marcher lui-même dans la voie, où lui, Jésus, a marché%. Tu veux suivre le Christ ? Sois humble, comme il l’a été. Tu veux le rejoindre dans les hauteurs ? Ne méprise pas son abaissement.
        En péchant, l’homme avait couvert sa route d’obstacles, mais celle-ci fut aplanie lorsque le Christ l’eut foulée à sa résurrection et qu’il eut fait d’un étroit sentier, une avenue digne d’un roi. L’humilité et la charité sont les deux pieds qui permettent de la parcourir rapidement. Tous sont attirés par les hauteurs de la charité, mais l’humilité est le premier degré qu’il faut monter. Pourquoi lèves-tu le pied plus haut que toi ? Tu veux donc tomber et non monter ? Commence par la première marche, c’est-à-dire l’humilité, et déjà elle te fait monter.
        Voilà pourquoi notre Seigneur et Sauveur ne s’est pas borné à dire : %qu’il renonce à lui-même, mais il a ajouté : qu’il prenne sa croix et qu’il me suive%. Que signifie : qu’il prenne sa croix ? Qu’il supporte tout ce qui lui est pénible, c’est ainsi qu’il marchera à ma suite. Dès qu’il aura commencé à me suivre, en se conformant à ma vie et à mes commandements, il trouvera sur son chemin bien des gens qui le contrediront, qui chercheront à le détourner, qui non seulement se moqueront de lui mais le persécuteront. Ces gens-là ne se trouvent pas uniquement parmi les païens qui sont hors de l’Eglise ; il s’en trouve même parmi ceux qui semblent être dans l’Eglise, si on les juge de l’extérieur. Mais ils lui sont bel et bien étrangers, en raison de leurs actions mauvaises. Tout en se glorifiant du seul nom de chrétiens, ils persécutent sans cesse les bons chrétiens... Dès lors, si tu désires suivre le Christ, porte sa croix sans plus attendre et supporte les méchants sans te laisser abattre...
        Le Seigneur a dit : %Si quelqu’un veut marcher derrière moi, qu’il prenne sa croix et qu’il me suive%. Si donc nous voulons mettre ceci en pratique, efforçons-nous, avec l’aide de Dieu, de faire nôtre cette parole de l’Apôtre : %Lors donc que nous avons nourriture et vêtement, sachons être satisfaits. Il est à craindre que si nous recherchons plus de biens terrestres qu’il ne nous en faut, dans l’intention de nous enrichir, nous ne tombions dans la tentation, dans le piège du démon, dans une foule de convoitises insensées et funestes, qui plongent l’homme dans la ruine et la perdition%.
        Daigne le Seigneur nous prendre sous sa protection et nous délivrer de cette tentation, lui qui vit et règne avec le Père et l’Esprit Saint dans tous les siècles des siècles. Amen.

      responsory: |-
        R/ Heureux les pauvres de cœur.

        Heureux ceux qui sont persécutés pour la justice 
        le Royaume des cieux est à eux.

        Prenez sur vous mon joug 
        et mettez-vous à mon école
        car je suis doux et humble de cœur.
