celebration:
  title: Saint Vincent, diacre et martyr, patron secondaire du diocèse
  description: |-
    Vincent, diacre de Saragosse, est mis à mort à Valence (Espagne) avec son évêque Valère en 304-305, après avoir été torturé. Comme saint Laurent de Rome, Vincent offre l’exemple accompli du service dans l’Eglise : ministre de l’évêque pour l’offrande du sacrifice et le gouvernement de la communauté, le diacre doit l’accompagner aussi à l’heure suprême du témoignage. Dès le Xe siècle Vincent est vénéré à Grenoble.
  commons:
    - martyr
  locative: à Grenoble
  color: red

oration:
- |-
  Dieu éternel et tout-puissant, daigne répandre en nous ton Esprit : que nos cœurs soient fortifiés par cet amour qui aidait saint Vincent à tenir sous la torture. Par Jésus Christ.

morning:
  evangelicAntiphon:
    common: |-
      Proclamons les louanges du très-haut, qui a donné au diacre Vincent une fermeté invincible pour confesser la foi, et la couronne des vainqueurs.

readings:
  patristicReading:
    - title: Homélie de saint Augustin pour la fête de saint Vincent
      subtitle: 
      content: |-
        Dieu vous a fait la grâce à l’égard du Christ, dit saint Paul, non seulement de croire en lui, mais encore de souffrir pour lui.
        Le diacre Vincent avait reçu l’un et l’autre. Car s’il ne les avait pas reçus, qu’aurait-il gardé ? Il gardait confiance en parlant, il gardait patience en souffrant. 
        Que nul ne présume. Après avoir dit à ses disciples : En ce monde, vous serez opprimésdonc de son cœur, quand il prononce la parole ; que nul ne se confie à ses forces quand il subit l’épreuve. En effet, lorsque nous disons sagement de bonnes choses, notre sagesse vient de Dieu, et lorsque nous souffrons courageusement de mauvaises choses, notre patience vient de lui. 
        Rappelez-vous le Christ Seigneur avertissant ses disciples dans l’Évangile ; rappelez-vous le Roi des martyrs munissant ses cohortes d’armes spirituelles, leur annonçant la guerre, leur fournissant des secours, leurs promettant des récompenses, il ajoute aussitôt pour calmer leur terreur : Mais ayez confiance, j’ai vaincu le monde.
        Pourquoi donc nous étonner, mes très chers, si Vincent a été vainqueur en celui par qui le monde fut vaincu ? En ce monde, vous serez opprimés. Le monde opprime, mais ne supprime pas ; il peut combattre, mais non abattre. Le monde lance deux armées contre les soldats du Christ. Il flatte pour tromper, il terrorise pour briser. Que notre propre plaisir ne nous paralyse pas, que la cruauté d’autrui ne nous terrorise pas, et le monde est vaincu.
        Dans les deux cas le Christ se présente, et le chrétien n’est pas vaincu. Si l’on considère, dans ce martyre, la persévérance de l’homme, on le trouve d’abord incroyable ; Si l’on y reconnaît la puissance de Dieu, il n’est plus invraisemblable.
        Une telle cruauté s’acharnait sur le corps du martyr et une telle tranquillité s’exprimait dans sa voix, un tel raffinement de supplices s’attaquait à ses membres et un tel apaisement résonnait dans ses paroles que nous pensions ; chose étonnante, c’est Vincent qui est la victime, et on en torture un autre qui ne parle pas. 
        Et vraiment, mes frères, c’était cela, c’était tout à fait cela : c’est un autre qui parlait. Car Jésus en a fait la promesse à ses témoins qu’il préparait à de tels combats. Il leur dit, selon l’Évangile : Ne vous tourmentez pas pour savoir ce que vous direz ni comment vous le direz. Car ce n’est pas vous qui parlerez, c’est l’Esprit de votre Père qui parlera en vous.
        La chair souffrait, l’Esprit parlait, et la parole de l’Esprit non seulement condamnait l’incroyance, mais encore soutenait l’impuissance.

      responsory: |-
        R/ Connaître le Christ,
        La puissance de sa résurrection,
        Et la communion à ses souffrances.

        Pour lui j’ai tout perdu,
        et je cours vers le seul but.

        Lui, le premier, m’a saisi,
        de tout mon élan, je veux le saisir.

vespers:
  evangelicAntiphon:
    common: |-
      Saint Vincent, soumis à la torture mais rendu fort par la présence de Dieu, avait le visage joyeux et disait : Voilà ce que j’ai toujours désiré, ce que j’ai cherché de tous mes vœux.

