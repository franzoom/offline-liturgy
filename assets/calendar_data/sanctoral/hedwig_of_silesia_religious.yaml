celebration:
  title: Sainte Edwige
  subtitle: religieuse
  description: Edwige (1174-1243), duchesse de Silésie et de Pologne, mena à son foyer une vie de foi intense. Après la mort de son mari, elle se retira chez sa fille, abbesse cistercienne de Trzebnicz, près de Wroclaw. Elle eut la douleur de perdre six de ses sept enfants. Elle survécut de peu à son fils aîné, tombé au combat contre les Tartares.
  commons:
  - saints-female_religious
  color: white

