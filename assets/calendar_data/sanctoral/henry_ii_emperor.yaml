celebration:
  title: Saint Henri
  description: Né en 973, couronné empereur d’Occident à Rome en 1014, Henri Il mourut en 1024 et il fut inhumé dans la cathédrale de Bamberg qu’il avait fondée. Avec son épouse Cunégonde, Henri vécut d’une vie quasi monastique. Sans négliger ses charges temporelles, il travailla activement à la réforme de l’Église en Germanie et en Italie.
  commons:
    - saints-male_married
  color: white

oration:
  - Seigneur, tu as comblé saint Henri de ta grâce pour qu’il sache gouverner son empire et tu l’as élevé à la gloire du ciel ; accorde-nous par son intercession, au milieu des changements de ce monde, de tendre vers toi dans la simplicité du cœur.

readings:
  patristicReading:
    - title: VIE DE SAINT HENRI PAR UN AUTEUR ANCIEN
      content: |-
        Lorsque le bienheureux serviteur de Dieu eut reçu l’onction royale, il ne s’enferma pas dans les limites de sa royauté temporelle ; pour remporter la couronne de l’immortalité, il se disposa à militer sous le souverain Kol, car le servir, c’est régner. Il déploya la plus grande activité pour faire progresser la religion ; il se mit à pourvoir les églises de propriétés et à développer considérablement leur décoration. Il fonda l’évêché de Bamberg entièrement sur son domaine, lui donna pour titulaires les Apôtres Pierre et Paul et le glorieux martyr saint Georges, et il le rattacha par un contrat spécial à la sainte Église Romaine, afin de rendre au premier siège de la chrétienté l’honneur qui lui revient par institution divine, afin aussi d’affermir cette fondation par un tel patronage.
        Pour que tout le monde sache bien avec quelle vigilance le bienheureux a pourvu au bien de la tranquillité et de la paix de son Église nouvelle, même pour l’avenir, nous insérons ici la lettre de confirmation :
        « Henri, roi par la bonté de la Providence divine, à tous les enfants de l’Église, présents et futurs. La Sainte Écriture, dont les instructions sont très salutaires, nous donne cet enseignement et cet avertissement : nous devons abandonner les biens transitoires et mettre au second plan les avantages terrestres pour nous efforcer d’obtenir au ciel le séjour qui ne finira pas. En effet, la gloire présente est fugitive et creuse si, en la possédant, on néglige de penser à l’éternité céleste. Mais la divine miséricorde a préparé un remède pour le genre humain quand elle nous a donné la richesse terrestre pour nous permettre d’acquérir une place dans la patrie du ciel.
        Nous vous rappelons cette bonté divine, nous savons que nous avons été élevés à la dignité royale par une condescendance gratuite de la divine miséricorde. Aussi jugeons-nous convenable non seulement d’embellir les églises construites par nos prédécesseurs, mais encore d’en édifier de nouvelles pour la plus grande gloire de Dieu et de les honorer par des présents qui témoignent de notre dévotion et de notre reconnaissance. C’est pourquoi nous voulons prêter une oreille attentive aux préceptes du Seigneur et obéir aux appels de Dieu ; la générosité divine nous ayant comblé de ses trésors, nous désirons les placer %dans le ciel où les voleurs ne percent ni ne dérobent, où ni la rouille ni les mites ne font de ravages% ; et maintenant que nous nous rappelons ce que nous y avons amassé, notre cœur se tourne de plus en plus souvent vers lui avec désir et amour.
        Aussi voulons-nous faire connaître à tous les fidèles que nous avons fait d’un lieu de notre patrimoine, appelé Bamberg, le siège principal de l’épiscopat. Nous voulons qu’on y érige un monument en mémoire de nous-même et de notre famille, et qu’on y célèbre continuellement le sacrifice du salut pour tous les vrais croyants. »

      responsory: |-
        R/ Le Seigneur sait délivrer de l’épreuve
        les hommes au cœur fidèle.
        
        Puisque l’Esprit est votre vie,
        laissez-vous conduire par l’Esprit.
        
        Qui sème dans l’Esprit
        récoltera de l’Esprit la vie éternelle.

