celebration:
  title: Sainte Hildegarde de Bingen
  subtitle: vierge et docteur de l’Église
  description: Née en 1098 à Bermersheim (Allemagne), elle fit profession religieuse en 1115 à l’abbaye bénédictine de Disibodenberg. En 1150, elle fonda près de Bingen le monastère du Rupertsberg, dont elle fut l’abbesse. Elle étqit très douée pour les sciences naturelles et la musique. Par de nombreux écrits, elle fit connaître au clergé et au peuple ce qui lui était révélé dans la contemplation mystique. Elle prêcha les pratiques de pénitence et réfuta des erreurs doctrinales, en sorte que même les princes et les papes sollicitèrent ses conseils. Elle mourut en 1179 à la suite d’une maladie. 
  color: white
  commons:
    - virgins
    - saints-female_religious
oration:
  - |-
    Seigneur Dieu, source de la vie, tu as rempli sainte Hildegarde de l’esprit prophétique ; nous t’en prions : accorde-nous, à son exemple et par son intercession, de connaître tes chemins et de percevoir dans l’obscurité de ce monde la clarté de ta lumière.

