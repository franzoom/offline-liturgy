celebration:
  title: Saints Anges gardiens
  description: La vocation des Anges est avant tout de contempler la splendeur de la face de Dieu et de chanter sans cesse sa louange. Mais, selon l’Écriture, le Seigneur leur a confié aussi la mission d’assurer près des hommes une présence fraternelle. C’est ce que nous rappelle la mémoire des Anges gardiens.
  color: white

invitatory:
  antiphon:
  - En présence des anges, venez, adorons le Seigneur.

oration:
  - Seigneur, dans ta mystérieuse providence, tu envoies les anges pour nous garder ; daigne répondre à nos prières en nous assurant le bienfait de leur protection et la joie de vivre en leur compagnie pour toujours.

readings:
  hymn:
  - point-de-voyage
  patristicReading:
    - title: HOMÉLIE DE SAINT BERNARD SUR LE PSAUME 90
      content: |-
        %Il donne mission à ses anges de le garder sur tous tes chemins. Qu’ils rendent grâce au Seigneur de son amour, de ses merveilles pour les hommes%. Qu’ils confessent et disent parmi les nations%les merveilles que le Seigneur fit pour eux ! Seigneur, qu’est-ce que l’homme, que tu te sois fait connaître à lui, que tu lui ouvres ton cœur ?% Tu lui ouvres ton cœur, tu le traites avec sollicitude, tu prends soin de lui. Pour finir, tu lui destines ton Fils unique, tu envoies en lui ton Esprit, et même tu lui promets de voir ton visage. Mais, pour qu’aucun être du ciel ne reste hors de cette sollicitude pour nous, tu envoies ces esprits bienheureux pour qu’ils remplissent un service à notre égard, tu les charges de veiller sur nous, tu leur commandes de se faire nos pédagogues. ~
        %Il donne mission à ses anges de te garder sur tous tes chemins%. Quel n’est pas le respect que cette parole doit susciter en toi, la ferveur qu’elle doit faire naître, la confiance qu’elle doit inspirer ! Le respect à cause de leur présence, la ferveur à cause de leur bienveillance, la confiance à cause de leur vigilance. ~ Ils sont donc là, à tes côtés, non seulement avec toi mais pour toi. Ils sont présents pour te protéger, pour te secourir. ~ Et même si c’est Dieu qui leur en a donné l’ordre, on ne peut pour autant manquer de reconnaissance à leur égard, en raison de la si grande charité avec laquelle ils obéissent et du besoin si grand que nous avons de leur aide.
        Soyons donc pleins de respect et de reconnaissance pour une telle vigilance de leur part ; aimons-les en retour et honorons-les autant que nous le pouvons, autant que nous le devons. Mais c’est à Dieu qu’il nous faut rapporter la totalité de notre amour et de notre honneur, à Dieu de qui les anges, aussi bien que nous, reçoivent toute la capacité de l’honorer et de l’aimer, non moins que la possibilité de se rendre dignes de son amour et de son honneur. ~ Aussi est-ce en Dieu, mes frères, qu’avec affection il nous faut aimer ses anges, dans la conscience qu’ils seront un jour nos cohéritiers, et que d’ici là le Père dispose et ordonne qu’ils soient pour nous des intendants et des éducateurs. Car dès maintenant nous sommes fils de Dieu, bien que cela ne soit pas encore évident, puisque nous sommes encore des enfants soumis à des intendants et à des éducateurs, et qui semblent pour le moment ne différer en rien des esclaves.
        Pourtant, si petits que nous soyons, et si longue - et pas seulement longue mais dangereuse - que soit la route qui nous reste à parcourir, qu’aurions-nous à craindre sous une si bonne garde ? On ne peut ni les vaincre ni les égarer, et moins encore redouter qu’ils ne nous égarent, eux qui nous gardent sur tous nos chemins. Ils sont fidèles, ils sont sages, ils sont puissants : qu’aurions-nous à craindre ? Suivons-les seulement, attachons-nous à eux, et demeurons sous la sauvegarde du Dieu du ciel.
      responsory: |-
        R/ Dieu donne mission à ses anges
        de te garder sur tous tes chemins.

        Le malheur ne pourra te toucher,
        ni le danger, approcher de ta demeure.

        Ils te porteront sur leurs mains
        pour que ton pied ne heurte les pierres.

morning:
  hymn:
  - rayons-de-la-lumiere
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Le Seigneur enverra son ange ; il veillera sur ta route.
    - psalm: OT_41
      antiphon:
        - Béni soit Dieu qui envoie son ange pour libérer ceux qui croient en lui.
    - psalm: PSALM_149
      antiphon:
        - Louez le Seigneur, tous ses anges, louez-le, tous les univers.
  reading:
    biblicalReference: Ex 23, 20-21a
    content: Je vais envoyer un ange devant toi pour te garder en chemin et te faire parvenir au lieu que je t’ai préparé. Respecte sa présence, écoute sa voix.
  responsory: |-
    R/ Dieu a donné mission à ses anges
    de te garder sur tous tes chemins.
    V/ Ils te porteront sur leurs mains,
    pour que ton pied ne heurte les pierres. R/
    Gloire au Père. R/
  evangelicAntiphon:
    common: Le Seigneur donne mission à ses anges de garder les héritiers du Royaume.
  intercession:
    content: |-
      En cette fête des saints anges, louons et bénissions le Seigneur :
      
      R/ Louange à toi, Seigneur, éternellement !
      
      Nous te louons, Dieu créateur,
      pour les anges, fils de ta lumière :
      ils contemplent sans fin ta gloire.
      
      Nous te louons, Dieu vivant,
      pour les messagers de ta Parole :
      ils annoncent le vrai Soleil dans la nuit des hommes.
      
      Nous te louons, Dieu très-haut,
      pour les ouvriers de ton désir :
      ils t’offrent chaque jour nos prières.
      
      Nous te louons, Père très saint,
      pour les anges, nos compagnons :
      ils nous guident vers ton Royaume.
      
      Nous te louons, Père des esprits,
      pour le monde invisible :
      il nous fait préssentir ta grandeur.

middleOfDay:
  tierce:
    reading:
      biblicalReference: Ac 10, 3-5
      content: |-
        Un jour, vers trois heures de l’après-midi, le centurion Corneille vit distinctement en vision un ange de Dieu entrer chez lui et l’interpeller : « Corneille ! » Corneille le fixa du regard, et, saisi de crainte, il répondit : « Qu’y a-t-il, Seigneur ? - Tes prières et tes largesses se sont dressées en mémorial devant Dieu. Et maintenant, envoie des hommes à Joppé pour en faire venir un certain Simon qu’on surnomme Pierre ».
    responsory: |-
      V/ L’ange fit monter devant Dieu la fumée des parfums
      avec les prières des saints.
  sexte:
    reading:
      biblicalReference: Ac 12, 7
      content: |-
        Tout à coup surgit l’Ange du Seigneur, et une lumière brilla dans la cellule. L’Ange secoua Pierre, le réveilla et lui dit : Lève-toi vite. Les chaînes tombèrent de ses mains.
    responsory: |-
      V/ Le Seigneur a envoyé son ange,
      il m’a fait échapper aux mains d’Hérode.
  none:
    reading:
      biblicalReference: Ac 10, 3-5
      content: |-
        Un jour, vers trois heures de l’après-midi, le centurion Corneille vit distinctement en vision un ange de Dieu entrer chez lui et l’interpeller : « Corneille ! » Corneille le fixa du regard, et, saisi de crainte, il répondit : « Qu’y a-t-il, Seigneur ? - Tes prières et tes largesses se sont dressées en mémorial devant Dieu. Et maintenant, envoie des hommes à Joppé pour en faire venir un certain Simon qu’on surnomme Pierre ».
    responsory: |-
      V/ L’ange fit monter devant Dieu la fumée des parfums
      avec les prières des saints.

vespers:
  hymn:
  - gloire-a-toi-seigneur-des-anges
  psalmody:
    - psalm: PSALM_33_1
      antiphon:
        - L’ange du Seigneur campe à l’entour, pour libérer ceux qui le craignent.
    - psalm: PSALM_33_2
      antiphon:
        - |-
          Béni soit le Seigneur : son ange m’a gardé.
    - psalm: NT_10
      antiphon:
        - |-
          Bénissez le Dieu du ciel, louez-le devant tout ce qui vit : il vous a fait miséricorde.
  reading:
    biblicalReference: Ap 8,3-4
    content: Un ange vint se placer près de l’autel ; il portait un encensoir d’or ; il reçut des parfums en abondance pour les offrir, avec les prières de tous les saints, sur l’autel d’or qui est en face du Trône de Dieu. Et l’ange fit monter devant Dieu la fumée des parfums, avec les prières des saints.
  responsory: |-
    R/ Que monte notre prière
    comme l’encens devant ta face, alléluia !
    V/ L’ange tenait une coupe pleine de parfum :
    la prière des saints. R/
    V/ De la main de l’ange,
    la fumée des parfums montait devant Dieu,R/
    Gloire au Père. R/
  evangelicAntiphon:
    common: Les anges qui veillent sur chacun de ces petits se tiennent en présence de mon Père.
  intercession:
    content: |-
      Avec les anges qui contemplent Dieu jour et nuit, chantons notre louange :
      
      R/ Hosanna au plus haut des cieux !
      
      Tu as fait des anges tes messagers, ô Dieu ;
      — avec leur aide, nous annonçons tes merveilles.
      
      Tu as donné à tes anges la mission de nous garder ;
      — sous leur protection, nous irons dans la paix et la joie.
      
      Tu as chargé tes anges d’annocer la paix aux hommes ;
      — qu’ils inspirent aux nations et à leurs chefs des projets de paix.
      
      Un jour, tu enverras tes anges rassembler tes élus des quatre vents :
      — que nous soyons, avec tous les défunts, au nombre de ceux qu’ils mèneront près de ton Fils.