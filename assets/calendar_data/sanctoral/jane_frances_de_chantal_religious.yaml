celebration:
  title: Sainte Jeanne-Françoise de Chantal
  subtitle: religieuse
  description: null
  commons:
    - saints-female_religious
  color: white

oration:
- Seigneur Dieu, en sainte Jeanne-Françoise de Chantal tu as fait resplendir une remarquable sainteté par divers chemins de vie ; à sa prière, accorde-nous de progresser dans la fidélité à notre vocation et ainsi de rayonner sans cesse de ta lumière.
