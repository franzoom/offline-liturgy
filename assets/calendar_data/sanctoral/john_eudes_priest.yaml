celebration:
  title: Saint Jean Eudes
  subtitle: prêtre
  description: Jean Eudes (1601-1680) passa presque toute sa vie à Caen. Fondateur d’un Institut pour le relèvement des prostituées, puis d’une Congrégation destinée à la formation des prêtres dans les séminaires, Jean Eudes travailla à répandre le culte du Cœur de Jésus et de celui de Marie, en vue d’établir « la vie et le royaume de Jésus dans les âmes chrétiennes ».
  commons:
    - pastors_founder
    - saints-male_religious
  color: white

oration:
  - |-
    Dieu qui as choisi le prêtre saint Jean Eudes pour qu’il annonce l’incomparable richesse du Christ, accorde-nous de suivre son exemple et ses enseignements, afin de mieux te connaître et de vivre plus fidèles à la lumière de l’Évangile.

readings:
  patristicReading:
    - title: « LE CŒUR ADMIRABLE DE JÉSUS » PAR SAINT JEAN EUDES
      content: |-
        Je vous prie de considérer que Jésus Christ notre Seigneur est votre véritable Chef, et que vous êtes un de ses membres. ~
        Il est à vous comme le chef est à ses membres ; tout ce qui est à lui est à vous, son esprit, son cœur, son corps, son âme, et toutes ses facultés, et vous devez en faire usage comme de choses qui sont vôtres, pour servir, louer, aimer et glorifier Dieu.
        Vous êtes à lui, comme les membres sont à leur chef. Aussi désire-t-il ardemment faire usage de tout ce qui est en vous, pour le service et la gloire de son Père, comme de choses qui sont à lui.
        Non seulement il est à vous, mais il veut être en vous, y vivant et y régnant, comme le chef est vivant et régnant dans ses membres. Il veut que tout ce qui est en lui soit vivant et régnant en vous : son Esprit dans votre esprit, son cœur dans votre cœur, toutes les puissances de son âme dans les facultés de votre âme, afin que ces divines paroles s’accomplissent à votre égard : « %Glorifiez et portez Dieu dans votre corps% », et que la vie de Jésus paraisse visiblement en vous.
        Et non seulement vous êtes au Fils de Dieu, mais vous devez être en lui, comme les membres sont en leur chef.
        Tout ce qui est en vous doit être incorporé en lui et recevoir vie et conduite de lui. Il n’y a de véritable vie pour vous qu’en lui seul, qui est la très unique source de la vraie vie ; hors de lui, il n’y a que mort et perdition pour vous. Il doit être le seul principe de tous les mouvements, usages et fonctions de votre vie ; vous ne devez vivre que de lui et pour lui, suivant ces divines paroles : %Nul d’entre nous ne vit pour soi-même, comme nul ne meurt pour soi-même ; si nous vivons, nous vivons pour le Seigneur, et si nous mourons, nous mourons pour le Seigneur. Donc, dans la vie comme dans la mort, nous appartenons au Seigneur. Car Jésus Christ est mort et ressuscité, afin de régner sur les morts et les vivants%.
        Enfin vous n’êtes qu’un avec ce même Jésus, comme les membres ne sont qu’un avec leur chef. Et par conséquent vous ne devez avoir qu’un même esprit, une même âme, une même vie, une même volonté, un même sentiment, un même cœur avec lui. Et lui-même doit être votre esprit, votre cœur, votre amour, votre vie et votre tout.
        Or ces grandes choses commencent dans un chrétien par le Baptême ; elles s’accroissent et se fortifient par le sacrement de la Confirmation et par le bon usage qu’il fait des autres grâces que Dieu lui communique. Et elles reçoivent leur souveraine perfection par la sainte Eucharistie.

      responsory: |-
        R/ Que règne en nos cœurs la paix du Christ !
        
        Puisque vous êtes élus, sanctifiés, aimés par Dieu,
        revêtez donc des sentiments de compassion.
        
        Pardonnez-vous mutuellement,
        comme le Seigneur vous a pardonné.
        
        Aimez-vous les uns les autres,
        comme il vous a aimés.
        
        Vous n’êtes qu’un en Jésus Christ,
        revêtez l’amour : c’est le lien parfait.
