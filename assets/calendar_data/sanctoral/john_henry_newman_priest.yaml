celebration:
  title: Saint John Henry Newman
  subtitle: prêtre et docteur de l’Église
  description: Né à Londres en 1801, il exerça pendant plus de vingt ans les fonctions de clerc anglican et de fellow du collège d’Oriel à Oxford. Né à Londres en 1801, il exerça pendant plus de vingt ans les fonctions de clerc anglican et de fellow du collège d’Oriel à Oxford. S’étant appliqué à scruter l’histoire de l’Église primitive, il fut peu à peu attiré vers la foi catholique et fut finalement reçu en 1845 dans l’unique bercail du Rédempteur, selon ses propres mots. Ordonné prêtre catholique en 1847, il fonda en Angleterre l’Oratoire de Saint Philippe Néri. Il écrivit abondamment sur des sujets variés, avec un grand retentissement. Loué comme pasteur humble et ardent, qui avait grandement éclairé l’Église de sa lumière intellectuelle, il fut agrégé en 1879 par le pape Léon XIII au Collège des cardinaux. Il mourut à Birmingham le 11 août 1890. Il fut inscrit au nombre des saints en 2019 et déclaré docteur de l’Église par le Souverain Pontife Léon XIV en 2025. (traduction non officielle)
  commons:
    - pastors
    - pastors_doctors
  color: white

oration:
- Dieu, qui as accordé au saint prêtre Jean-Henri de trouver, en suivant ta douce lumière, la paix dans ton Église, accorde-nous dans ta bienveillance que, par s…Dieu, qui as accordé au saint prêtre Jean-Henri de trouver, en suivant ta douce lumière, la paix dans ton Église, accorde-nous dans ta bienveillance que, par son intercession et son exemple, nous soyons conduits des ombres et des figures vers la plénitude de ta vérité.

readings:
  patristicReading:
    - title: DES ÉCRITS DE SAINT JOHN HENRY NEWMAN
      subtitle: Il me semblait avoir enfin abordé dans un port après avoir été ballotté par les flots (traduction non officielle)
      content: |-
        Depuis le jour où je suis devenu catholique et jusqu’à ce jour, je n’ai plus rien à raconter sur les variations de mes opinions religieuses. Je n’ai pas pour autant laissé mon esprit inactif, ni renoncé aux raisonnements théologiques ; mais je n’ai ni variations de pensée ni inquiétudes de cœur à rapporter. Exempt de tout doute, je vis depuis lors dans une paix et une tranquillité parfaites. Je n’ai conscience d’aucun changement dans mon intelligence ni dans mes mœurs depuis le jour de ma conversion. En effet, je ne sentais pas ma foi plus ferme dans les vérités principales de la Révélation, ni plus maître de moi-même, ni moi-même plus fervent. Mais il me semblait avoir enfin abordé dans un port après avoir été ballotté par les flots ; aussi m’estimé-je continuellement heureux jusqu’à ce jour.
        Je n’ai pas non plus trouvé difficiles à recevoir les articles qui manquent au symbole anglican. J’en avais déjà accepté plusieurs depuis longtemps ; à tous j’ai souscrit sans difficulté. Ceux que j’ai professés sans aucune discussion au jour de ma réception, je les confesse encore aujourd’hui de même. Car il y a des difficultés de compréhension dans tous les articles du symbole chrétien, qu’il soit professé par des catholiques ou par des protestants, difficultés que je ne prétends ni nier ni résoudre simplement. Et bien que nombreux soient ceux qui ressentent des difficultés en matière de Religion — et j’en suis —, je n’ai pourtant jamais pu voir de lien entre l’appréhension de ces difficultés, si aiguës et si nombreuses soient-elles, et le doute sur les doctrines auxquelles elles se rattachent. Dix mille difficultés ne font pas un seul doute, me semble-t-il, car les difficultés ne se mesurent pas aux doutes. Des difficultés peuvent fort bien exister dans des arguments ; mais je parle ici des difficultés qui touchent aux doctrines elles-mêmes dans leur contenu intrinsèque, ou dans leurs relations mutuelles. C’est ainsi que quelqu’un est vexé de ne pouvoir résoudre un problème de mathématiques, même quand la solution lui a été donnée ou lui est refusée, sans pourtant douter qu’une solution soit admissible ou qu’il existe une vraie solution. De tous les dogmes de la foi, le plus difficile à mon sens est l’existence de Dieu, et pourtant c’est celui qui s’impose avec la plus grande force à notre esprit.
        Certains disent cependant que la doctrine de la Transsubstantiation est difficile à croire. Pour ma part, je n’y avais pas cru jusqu’à ce que je fusse catholique ; mais dès lors que j’avais reconnu que l’Église catholique romaine était l’oracle de Dieu et qu’elle avait enseigné que cette doctrine avait été révélée dès l’origine, je l’ai crue très aisément. Que concevoir cette doctrine par l’esprit soit ardu, voire impossible, je le concède volontiers ; mais en quoi est-il difficile d’y croire, je vous le demande. Au dogme tout entier — révélé, enseigné par les Apôtres, transmis à l’Église et déclaré par l’Église — je crois ; et tel qu’il est interprété à présent, et, implicitement, tel qu’il sera interprété à l’avenir par cette autorité à qui il a été confié, jusqu’à la consommation des siècles, je l’accepte de même. Je m’attache en outre aux traditions toujours et partout reçues dans l’Église, qui renferment le contenu des définitions dogmatiques parfois déclarées, et qui fournissent en tous les siècles le texte et le modèle au dogme catholique déjà défini. Je me soumets également aux autres sentences du Saint-Siège, qu’elles soient théologiques ou non, procédant par les instruments qu’il a établis, sans préjuger de la question de savoir si elles sont dotées de l’infaillibilité — sentences auxquelles je dois du moins obéir et me conformer. Il faut estimer en outre, à mon sens, que la recherche de la foi catholique a revêtu au fil des siècles des formes précises et variées, s’est constituée en science, s’est ornée d’une raison et d’un langage qui lui sont propres, développés par les plus grands docteurs tels qu’Athanase, Augustin et Thomas d’Aquin ; et je ne voudrais en aucune façon détruire un tel héritage intellectuel qui nous a été légué en ces temps postérieurs.

      responsory: |-
        R/ Je suis devenu le ministre de l’Évangile
        selon le don de la grâce de Dieu
        qui m’a été accordé selon l’efficacité de sa puissance.
        * Afin que soit manifestée par l’Église
        la sagesse de Dieu en sa multiple richesse.
        V/ Quand il viendra, lui, l’Esprit de vérité,
        il vous conduira dans toute la vérité.
        * Afin que soit manifestée.
