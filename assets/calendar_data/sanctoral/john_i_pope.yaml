celebration:
  title: Saint Jean 1^er
  subtitle: pape et martyr
  description: Le pape Jean 1er (523-526) fut victime de la persécution exercée contre l’Église catholique par le roi arien Théodoric qui, de Ravenne, régnait sur toute la Péninsule italienne. Après avoir envoyé le pape à Constantinople pour une mission vouée d’avance à l’échec, Théodoric le jeta à son retour dans une prison de Ravenne, où il le laissa mourir de faim (526).
  commons:
    - martyr
    - pastors_pope
  color: red

oration:
  - Dieu qui es la récompense des croyants, écoute la prière de ton peuple en ce jour que tu as sanctifié par le martyre du pape Jean Ier ; tandis que nous honorons ses mérites, fais que nous imitions la ténacité de sa foi.

readings:
  patristicReading:
    - title: LETTRE DE SAINT JEAN D’AVILA À SES AMIS
      content: |-
        %Béni soit Dieu, le Père de notre Seigneur Jésus Christ, le Père plein de tendresse, le Dieu de qui vient tout réconfort. Dans toutes nos détresses, il nous réconforte ; ainsi, nous pouvons réconforter tous ceux qui sont dans la détresse, grâce au réconfort que nous recevons nous-mêmes de Dieu. De même que nous avons largement part aux souffrances du Christ, de même, par le Christ, nous sommes largement réconfortés.%
        Ces paroles sont de l'Apôtre saint Paul. Trois fois il a été battu de verges, cinq fois flagellé, une fois lapidé et laissé pour mort, persécuté par toutes sortes d'hommes, torturé par toutes sortes de supplices et de peines, et cela non pas une fois ou deux, mais comme il le dit ailleurs : %Sans cesse nous portons dans notre corps l'agonie de Jésus, afin que la vie de Jésus, elle aussi, soit manifestée dans notre corps%.
        Et dans toutes ces peines, non seulement il ne récrimine pas, il ne se plaint pas de Dieu, comme les gens faibles ; il ne s'attriste pas, comme font ceux qui aiment leur gloire et leur plaisir ; il ne demande pas à Dieu d'en être délivré. comme ceux qui en ignorent la valeur et refusent d'y participer ; il ne les décrie pas, comme ceux qui les jugent de peu de prix. Mais, en repoussant toute ignorance et toute faiblesse, il bénit Dieu dans ces malheurs, il en rend grâce à celui qui les donne, comme d'une belle récompense.
        Il s’estime heureux de pouvoir souffrir quelque chose en son honneur. Car le Seigneur a souffert tant d'ignominies pour nous délivrer de celles auxquelles le péché nous avait condamnés ; il nous a gratifiés et honorés de son Esprit et de l'adoption des fils de Dieu, il nous a donné dans le Christ et par lui le gage et le signe de la joie céleste.
        Ô mes fils très aimés ! Que Dieu vous ouvre les yeux, pour que vous puissiez voir combien de récompenses il nous donne dans ces épreuves que le monde juge humiliantes
        Quel honneur nous est conféré dans le déshonneur, lorsque nous recherchons la gloire de Dieu ! Combien Dieu nous tend ses bras caressants, affectueux et doux, pour accueillir ceux qui ont été blessés dans ses combats ! Si vous pouviez voir comment il nous accorde une douceur sans aucune amertume, bien supérieure à toutes les peines que nous pouvons rencontrer ici-bas ! Si nous le comprenons, combien nous désirerons de tels embrassements ; qui donc, en effet, ne désire pas celui qui est parfaitement aimable et désirable, sinon celui qui ignore tout désir ?
        Si de telles fêtes font vos délices, si vous souhaitez les voir et en jouir, sachez qu'il n'y a pas de moyen plus assuré que de souffrir. Tel est le sentier que le Christ et tous ses amis ont suivi. Il l'appelle la route étroite, mais elle conduit directement à la vie. Et il l’enseigne de telle manière que, si nous souhaitons parvenir jusqu'à lui, nous devons suivre la voie par laquelle il a marché. Car il ne convient pas, lorsque le Fils de Dieu s'avance sur la route de l'humiliation, que les fils des hommes recherchent la route des honneurs, parce que %le disciple n'est pas au-dessus de son Seigneur%.
        Dieu fasse que notre âme ne se repose en rien et ne cherche aucune nourriture en ce monde, sinon dans les peines qui nous conduisent à la croix du Seigneur.

      responsory: |-
        R/ Christ au milieu de nous,
        l’espérance de la gloire, alléluia !
        
        Le Christ est à la gloire du Père :
        c'est là désormais que tend votre vie.
        
        Vous êtes morts
        et votre vie reste cachée avec le Christ en Dieu.
        
        Quand paraîtra le Christ, lui qui est votre vie,
        vous paraîtrez avec lui en pleine gloire.
