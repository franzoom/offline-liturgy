celebration:
  title: Saint Jean Léonardi
  subtitle: prêtre
  description: Jean Léonardi (1541-1609), prêtre de Lucques (Toscane), fonda d’abord dans sa ville une communauté de clercs pour catéchiser jeunes et adultes, les Clercs de la Mère de Dieu. Puis il dut se fixer à Rome, où il jeta avec Jean-Baptiste Vivès les bases du Séminaire de la Propagation de la foi. Victime de sa charité, il mourut de la peste.
  commons:
  - pastors
  - saints-male_caritative
  color: white

oration:
- Seigneur, source de tous biens, tu as suscité saint Jean Léonardi pour que ton Évangile soit annoncé à toutes les nations ; fais qu’à sa prière, la vraie foi se propage toujours et en tout lieu
 
readings:
  patristicReading:
    - title: LETTRE DE SAINT JEAN LEONARDI AU PAPE PAUL V
      content: |-
        Ceux qui veulent s’appliquer à la réforme des mœurs recherchent avant tout la gloire du Seigneur. C’est donc sur lui, auteur de tous les biens, qu’ils doivent compter en Premier, et c’est lui qu’ils doivent prier pour qu’il les aide dans une affaire aussi salutaire et aussi ardue. Ensuite, qu’ils se placent eux-mêmes sous les yeux de ceux qui ont besoin de réforme, comme des miroirs de toutes les vertus et comme des lampes mises sur le lampadaire ; qu’ils brillent devant tous ceux qui sont dans la maison du Seigneur par l’intégrité de leur vie et l’éclat de leur conduite. Ainsi, ils les attireront aimablement à la réforme plutôt qu’ils ne les contraindront. Il ne faut pas, selon le Concile de Trente, demander au corps ce qu’on ne trouve pas dans la tête, car on ébranlerait ainsi l’état et l’ordre de toute la famille du Seigneur. En outre, ils veilleront, comme de sages médecins, à connaître parfaitement toutes les maladies qui affligent l’Église et qui réclament un remède, afin de pouvoir apporter à chacune d’elles les remèdes appropriés.
        En ce qui concerne les remèdes communs à toute l’Église, parce que la réforme doit commencer en même temps par les plus hauts et les plus bas placés, c’est-à-dire par les chefs et les inférieurs, il faut d’abord jeter les yeux sur ceux qui sont au-dessus des autres, afin que la réforme commence par eux, pour, de ceux-ci, dériver sur les autres.
        Les cardinaux, les patriarches, les archevêques, les évêques et les curés ont immédiatement charge d’âmes. Il faut absolument travailler à ce qu’ils soient tels qu’on puisse leur confier en toute sécurité le gouvernement du troupeau du Seigneur. Mais descendons aussi des supérieurs aux intérieurs, des chefs aux plus petits ; en effet, on ne doit pas négliger ceux par qui doit commencer le rétablissement des mœurs ecclésiastiques. Il ne faut absolument rien omettre pour que les enfants, dès l’âge le plus tendre, soient élevés dans la pureté de la foi chrétienne et dans une sainte conduite. Pour obtenir ce résultat, rien n’est plus efficace que d’enseigner saintement la doctrine chrétienne, et de confier l’éducation des enfants uniquement à des hommes bons et craignant Dieu.
        Voilà, très saint Père, ce que Dieu a daigné me suggérer sur ce sujet très grave dans les circonstances présentes. Si, à première vue, cela paraît difficile, on doit le confronter à d’importance de l’entreprise, et cela paraîtra très facile. On ne fait pas de grandes choses sans de grands moyens, et les grandes choses conviennent aux grands hommes.

      responsory: |-
        R/ Le juste vivra par sa fidélité.

        Je vais me tenir à mon poste de garde
        et guetter pour voir ce que Dieu me dira.

        Encore un peu, bien peu de temps,
        celui qui vient arrivera sans tarder.

        Ne soyons pas des hommes
        qui se dérobent et se perdent,
        mais des hommes de foi pour notre salut.