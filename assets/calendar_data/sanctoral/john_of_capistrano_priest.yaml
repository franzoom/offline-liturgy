  description: Jean de Capistran (1386-1456), franciscain plein de talent et prédicateur à la parole ardente, était un meneur de foules. n travailla d’abord à la réforme de son Ordre en France et en Italie, puis il parcourut toute l’Europe centrale pour lutter contre l’hérésie de Jean Hus. Il dut enfin prêcher la Croisade contre les Turcs qui menaient la Hongrie.
