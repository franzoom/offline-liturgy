celebration:
  title: Saint Jean-Paul II
  subtitle: pape
  description: Lorsque Karol Wojtyla (1920-2005) est élu comme souverain pontife en 1978, il est le premier pape non italien depuis 1522. Polonais de naissance, il touche les coeurs des gens de toute nationalité. Pendant son pontificat, un des plus longs de l'histoire, il parcourt le monde, cherchant particulièrement à toucher les jeunes, l'ensemble des chrétiens et les croyants d'autres religions. Canonisé en 2014, sa mémoire liturgique a été fixée au 22 octobre, date de son intronisation pontificale.
  commons:
    - pastors_pope
  color: white

oration:
  - Dieu, riche en miséricorde, tu as appelé Saint Jean-Paul II à guider ton Église répandue dans le monde entier ; forts de son enseignement, accorde-nous d'ouvrir nos cœurs avec confiance à la grâce salvifique du Christ, unique Rédempteur de l'homme.
