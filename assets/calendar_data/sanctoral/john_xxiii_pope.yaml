celebration:
  title: Saint Jean XXIII
  subtitle: pape
  description: |-
    Le bon pape Jean, né Angelo Roncalli en 1881, appartenait à une famille d'humbles paysans du nord de l'Italie, dans la province de Bergame. Entré au séminaire, il devint prêtre, puis évêque, nonce apostolique, en particulier à Paris à la fin de la Seconde Guerre mondiale, où il eut à gérer une situation très délicate. Il fut ensuite nommé patriarche de Venise et créé cardinal, enfin élu pape pour succéder à Pie XII en 1958. Il eut l'audace de convoquer un concile œcuménique pour réaliser l'aggiornamento dont l'Église avait besoin : ce fut Vatican II. À sa mort, survenue le 3 juin 1963 en plein concile, il fut universellement regretté. Il gagnait les cœurs par sa bonté, son humilité et sa simplicité évangéliques. Il fut canonisé le 27 avril 2014 par le pape François.
  commons:
  - pastors_pope
  color: white

oration:
- Dieu tout-puissant et éternel, en la personne du saint pape Jean XXIII, tu as fait resplendir dans le monde entier l'exemple vivant du Christ Bon Pasteur.Dieu tout-puissant et éternel, en la personne du saint pape Jean XXIII, tu as fait resplendir dans le monde entier l'exemple vivant du Christ Bon Pasteur. Nous t'en prions, accorde-nous, par son intercession, de répandre dans la joie la plénitude de la charité chrétienne.

readings:
  patristicReading:
    - title: DU « JOURNAL DE L'ÂME » DE SAINT JEAN XXIII
      subtitle: Le bon pasteur donne sa vie pour ses brebis
      content: |-
        Il est remarquable que la Providence m’ait ramené au point où ma vocation sacerdotale a pris son premier départ, c’est-à-dire un service pastoral. Maintenant je me trouve en plein ministère direct des âmes. À la vérité, j’ai toujours estimé que, pour un ecclésiastique, ce qu’on appelle la diplomatie doit toujours être imprégnée d’esprit pastoral ; autrement, elle ne vaut rien et elle rend dérisoire une mission sainte.
        Maintenant, je suis placé en face des vrais intérêts de l’Église par rapport à sa finalité qui est de sauver les âmes, de les conduire au ciel. Cela me suffit, et j’en remercie le Seigneur. Je l’ai dit à Venise à Saint-Marc le 15 mars, jour de mon entrée. Je n’ai d’autre désir, d’autre pensée que vivre et mourir pour les âmes qui me sont confiées. « Le bon Pasteur donne sa vie pour ses brebis… Je suis venu pour qu’ils aient la vie et qu’ils l’aient toujours davantage » (Jn 10, 11 et 10). Je commence mon ministère direct à un âge – soixante-douze ans – où d’autres le terminent. Je me trouve donc au seuil de l’éternité. Mon Jésus, premier pasteur et évêque de nos âmes, le mystère de ma vie et de ma mort est entre vos mains, et près de votre cœur. D’une part, je tremble à l’approche de l’heure dernière ; de l’autre, j’ai confiance et je regarde droit devant moi, jour après jour. Je me sens dans l’état d’esprit de saint Louis de Gonzague : continuer mes occupations, en m’efforçant toujours à la perfection, mais plus encore en comptant sur la miséricorde divine.
        Pour les quelques années qui me restent à vivre, je veux être un saint pasteur, dans la plénitude du terme, comme le Bienheureux Pie X mon prédécesseur, comme le vénéré cardinal Ferrari, comme mon cher Mgr Radini-Tedeschi tout le temps qu’il a vécu et qu’il aurait pu vivre encore. « Que Dieu m’y aide. » Ces jours-ci, j’ai lu saint Grégoire et saint Bernard, tous deux préoccupés de la vie intérieure du pasteur qui ne doit pas s’inquiéter et se soucier des choses matérielles et extérieures. Ma journée doit être toujours baignée de prière ; la prière est ma respiration. Je me propose de réciter chaque jour le rosaire entier de quinze dizaines, entendant par là recommander au Seigneur et à la Sainte Vierge – si possible à la chapelle, devant le Saint-Sacrement – les besoins les plus importants de mes fils de Venise et du diocèse : clergé, jeunes séminaristes, religieuses, autorités publiques et pauvres pécheurs. J’ai déjà ici deux épines douloureuses, au milieu de toute cette splendeur de dignité ecclésiastique et de considération, comme cardinal et patriarche : la médiocrité des revenus de la « mense », et la foule des pauvres et des sollicitations pour obtenir emplois et subsides. Pour la mense, rien ne m’empêche d’en améliorer les conditions, pour moi et aussi au profit de mes successeurs. Je me plais pourtant à bénir le Seigneur pour cette pauvreté un peu humiliante et souvent embarrassante. Elle me fait mieux ressembler à Jésus pauvre et à saint François, tout sûr que je suis de ne pas mourir de faim. Ô bienheureuse pauvreté, qui m’assure une plus grande bénédiction pour le reste et pour ce qui est le plus important de mon ministère pastoral !

      responsory: |-
        R/ Celui qui entre par la porte,
        c’est lui le pasteur, le berger des brebis.
        Le portier lui ouvre et les brebis écoutent sa voix

        * il les appelle chacune par son nom
        et il les fait sortir.

        V/ Et quand il a conduit dehors toutes ses brebis,
        il marche à leur tête, et elles le suivent,
        car elles connaissent sa voix.
        
        * il les appelle chacune par son nom
        et il les fait sortir.