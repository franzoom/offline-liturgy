celebration:
  title: Saint Josaphat
  subtitle: évêque et martyr
  description: Né dans l’Orthodoxie (1580), Josaphat Kuncewycz adhéra de bonne heure à l’Église ukrainienne unie à Rome. En 1617, il devint archevêque de Polotz et se consacra sans compter au service de son peuple. Le succès de son action apostolique suscita l’hostilité des adversaires de l’Église catholique. Il fut massacré à Vitebsk au cours d’une visite pastorale (1623).
  commons: 
  - pastors_bishop
  - martyr
  color: red

oration:
  - |-
    Réveille en ton Église, Seigneur, l’esprit d’amour dont fut rempli l’évêque saint Josaphat qui donna sa vie pour son peuple : permets qu’avec l’appui de sa prière, et fortifiés par le même esprit, nous n’hésitions pas à livrer notre vie pour nos frères.

readings:
  patristicReading:
    - title: LETTRE ENCYCLIQUE DU PAPE PIE XI POUR LE III^ème CENTENAIRE DE LA MORT DE SAINT JOSAPHAT
      content: |-
        L’Église, par un admirable dessein de Dieu, a été constituée pour être à la plénitude des temps, comme une immense famille embrassant l’universalité du genre humain et nous savons aussi que, parmi d’autres notes caractéristiques, elle est reconnaissable à son unité oecuménique.
        En effet, le Christ Seigneur a dit : %Tout pouvoir m’a été donné au ciel et sur la terre. Allez donc ! De toutes les nations faites des disciples.% Par ces paroles, il a confié aux seuls Apôtres la charge que lui-même avait reçue de son Père ; et en outre, il a voulu que le collège des Apôtres fût parfaitement un, rendu solidaire par un double lien très étroit : intérieurement, par une même foi et par cet amour %qui a été répandu dans nos cœurs par l’Esprit Saint% ; extérieurement, par l’autorité exercée sur tous par un seul, puisqu’il avait conféré la primauté sur les autres Apôtres à Pierre comme au principe constant et au fondement visible de l’unité. ~
        Pour assurer le maintien perpétuel de cette unité et de cette harmonie, la Providence de Dieu les a consacrées comme par le sceau de la sainteté et du martyre. Cette grande gloire fut accordée à Josaphat, archevêque de Polotz, du rite slave oriental, en qui nous reconnaissons à juste titre le plus illustre et le plus noble soutien de l’Orient slave. Certes, on trouvera difficilement quelqu’un qui ait fait plus d’honneur à cette dénomination et qui ait contribué davantage au salut de ces peuples que celui qui en fut le pasteur et l’apôtre, du fait surtout qu’il a versé son sang pour l’unité de la sainte Église. ~
        Il se sentit poussé par un mouvement venu du ciel à restaurer l’unité chrétienne dans le monde entier; et il comprit qu’il pourrait y contribuer dans la plus large mesure s’il maintenait dans l’unité de l’Église universelle le rite slave oriental et l’ordre des moines basiliens. ~
        Préoccupé avant tout de l’union de ses compatriotes avec la chaire de saint Pierre, il rassemblait de toutes parts les arguments capables de promouvoir ou de consolider cette union ; en particulier, il étudiait assidûment les livres liturgiques dont usaient les Orientaux, y compris les dissidents, selon les prescriptions des Pères.
        Après s’être préparé avec un si grand soin, il entreprit la restauration de l’unité ; et il y travailla avec tant de force et de douceur tout ensemble, et avec tant de succès, que ses adversaires eux-mêmes le surnommèrent « le voleur des âmes ».
      responsory: |-
        R/ Un seul troupeau, un seul berger !

        Le Seigneur va rassembler ses enfants dispersés,
        il en fera une seule nation,
        et un seul roi régnera sur eux.

        Le Christ, notre paix, a détruit les séparations :
        en un seul corps,
        il nous rassemble par la croix.
