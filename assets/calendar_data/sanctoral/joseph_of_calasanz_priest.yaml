celebration:
  title: Saint Joseph de Calazanz
  subtitle: prêtre
  description: Né en Espagne, le prêtre Joseph de Calasanz (1557 1648) arriva à Rome en 1592. Il n’en devait jamais repartir. Il y ouvrit la première école gratuite pour les enfants du milieu populaire. Puis il fonda dans le même but un Institut qui se développa en Italie en Allemagne et en Pologne. Les épreuves ne manquèrent pas au fondateur. Il les porta avec courage.
  color: white
  commons:
    - saints-male_educators
    - pastors

oration:
  - |-
    Seigneur, tu as donné à saint Joseph de Calasanz un cœur si bon et si généreux qu’il consacra toute sa vie à l’enseignement et à l’éducation des enfants ; puisque nous vénérons en lui un maître de sagesse chrétienne, fais-nous suivre son exemple au service de la vérité.

readings:
  patristicReading:
    - title: MÉMOIRE DE SAINT JOSEPH AU CARDINAL TONTI (1621)
      content: |-
        Personne n’ignore quel est le mérite et la dignité du ministère qui consiste à instruire les enfants, surtout les enfants pauvres, pour qu’ils puissent obtenir la vie éternelle. En effet, lorsque, par l’enseignement et surtout par la formation à la piété et à la doctrine chrétienne, on pourvoit au salut tout ensemble des âmes et des corps, on accomplit envers ces enfants la même fonction que leurs anges gardiens.
        En outre, on leur rend le service le plus éminent lorsqu’on ne se contente pas de tenir les adolescents à l’écart du mal, mais qu’on les attire et qu’on les stimule avant tout à faire le bien, avec facilité et plaisir, quelle que soit leur origine ou leur condition. Lorsqu’on leur rend un tel service, on constate que ces adolescents font de si grands progrès dans le bien qu’on ne les reconnaît plus, tant ils sont éloignés de leur premier état d’ignorance. En effet, ils sont comme des arbrisseaux : on oriente facilement les esprits des adolescents, tandis que, si on les laisse durcir, nous savons bien que la possibilité de les incliner au bien diminue beaucoup et même parfois disparaît entièrement.
        Que l’on donne aux enfants, surtout aux enfants pauvres, une bonne éducation, non seulement cela contribue à élever leur dignité humaine, mais encore tous les membres de la société des hommes et des chrétiens l’approuvent: leurs parents, qui sont heureux de voir leurs enfants suivre la voie droite; les gouvernants, qui acquièrent des sujets loyaux et de bons citoyens; l’Église surtout, dans laquelle ils peuvent, avec plus de maturité et d’efficacité, s’insérer en vivant et en agissant en bien des domaines comme les amis du Christ et les défenseurs de l’Évangile.
        Ceux qui assument cette tâche d’enseignement comme leur activité constante doivent être doués de beaucoup de charité, d’une grande patience, et surtout d’une humilité profonde ; iIs obtiendront ainsi que le Seigneur, imploré humblement, fasse d’eux des collaborateurs compétents de la vérité, les soutienne dans l’accomplissement d’une fonction si noble et enfin leur donne la joie du ciel, selon cette parole: %Ceux qui enseignent la justice à la multitude resplendiront comme des étoiles dans les éternités sans fin%.
        Ils y parviendront facilement si, engagés dans une vie de perpétuel service, ils s’efforcent d’être unis au Christ et de plaire à lui seul, qui a dit : %Ce que vous avez fait à l’un des plus petits, qui sont mes frères, c’est à moi que vous l’avez fait%.

      responsory: |-
        [rubric] Stance[/rubric]
        Apprenons du Maître
        à devenir disciples.
        Il n’est pas venu juger ses frères,
        mais les sauver.
        Du trésor de son cœur a débordé la Parole de vie.
        
        R/ Le Seigneur est venu jusqu’à nous
        pour nous élever jusqu’à lui.
        
        Parfaite est la loi de l’amour,
        qui a fait du Fils de Dieu notre serviteur.
        
        Limpide est le regard de l’amour,
        qui, dans le frère, sert le Fils de Dieu.
        
        Véridique est le fruit de l’amour,
        qui nous rend fils de Dieu.