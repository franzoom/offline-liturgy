celebration:
  title: S. Laurent
  subtitle: diacre et martyr
  description: |-
    Le diacre Laurent fut mis à mort à Rome le 10 août 258, quatre jours après le pape Sixte II. Sa passion rapporte qu’il subit le supplice du feu sur un gril après avoir distribué aux pauvres les biens de la communauté chrétienne. Ces circonstances ont contribué à faire de saint Laurent le plus célèbre des martyrs romains.
  commons:
    - martyr
  color: red

oration:
  - C’est l’ardeur de ton amour, Seigneur, qui a donné au diacre saint Laurent de se montrer fidèle dans son service, et d’accéder à la gloire du martyre ; accorde-nous d’aimer ce qu’il aimait, et d’accomplir ce qu’il a enseigné.

readings:
  biblicalReading:
    - title: LECTURE DU LIVRE DES ACTES DES APÔTRES
      subtitle: Choix de sept ministres par les Apôtres
      ref: Ac 6, 1-6; 8, 1b.4-8
      content: |-
        En ces jours-là, comme le nombre des disciples augmentait, les frères de langue grecque récriminèrent contre ceux de langue hébraïque, parce que les veuves de leur groupe étaient désavantagées dans le service quotidien.
        Les Douze convoquèrent alors l’ensemble des disciples et leur dirent : « Il n’est pas bon que nous délaissions la parole de Dieu pour servir aux tables. Cherchez plutôt, frères, sept d’entre vous, des hommes qui soient estimés de tous, remplis d’Esprit Saint et de sagesse, et nous les établirons dans cette charge. En ce qui nous concerne, nous resterons assidus à la prière et au service de la Parole. » Ces propos plurent à tout le monde, et l’on choisit : Étienne, homme rempli de foi et d’Esprit Saint, Philippe, Procore, Nicanor, Timon, Parménas et Nicolas, un converti au judaïsme, originaire d’Antioche. On les présenta aux Apôtres, et après avoir prié, ils leur imposèrent les mains.
        Ce jour-là, éclata une violente persécution contre l’Église de Jérusalem. Tous se dispersèrent dans les campagnes de Judée et de Samarie, à l’exception des Apôtres.
        Ceux qui s’étaient dispersés annonçaient la Bonne Nouvelle de la Parole là où ils passaient. C’est ainsi que Philippe, l’un des Sept, arriva dans une ville de Samarie, et là il proclamait le Christ. Les foules, d’un même cœur, s’attachaient à ce que disait Philippe, car elles entendaient parler des signes qu’il accomplissait, ou même les voyaient. Beaucoup de possédés étaient délivrés des esprits impurs, qui sortaient en poussant de grands cris. Beaucoup de paralysés et de boiteux furent guéris. Et il y eut dans cette ville une grande joie.
      responsory: |-
        [rubric]Stance[/rubric]
        Pour demeurer fidèle au Christ,
        tu n’as pas craint la haine des hommes !
        Ardente est la braise de ton supplice !
        Plus ardente, la flamme de la charité
        qui te consume en holocauste !

        R/ Serviteur de Jésus Christ,
        l’amour est ta victoire.

        Le peuple de Dieu t’a choisi,
        et toi, tu choisis de le servir.

        Tu as reconnu dans les pauvres
        le trésor de l’Église.

        Dans le Seigneur est ta joie,
        la souffrance ne peut te vaincre.
  patristicReading:
    - title: HOMÉLIE DE SAINT AUGUSTIN
      subtitle: Ministre du sang du Christ
      content: |-
        Aujourd’hui, l’Église de Rome nous invite à fêter le jour où le bienheureux Laurent a triomphé, jour où il a terrassé le monde furieux, où il a dédaigné le monde flatteur et ainsi a doublement vaincu le démon persécuteur. ~ Dans l’Église de Rome, vous le savez bien, il exerçait les fonctions de diacre. C’est là qu’il présentait le sang sacré du Christ, et c’est là qu’il répandit son propre sang pour le nom du Christ. ~ L’Apôtre saint Jean a mis en pleine clarté le mystère de la Cène du Seigneur lorsqu’il a dit :%Jésus a donné sa vie pour nous ; nous aussi, nous devons donner notre vie pour nos frères%. Saint Laurent a compris cela, mes frères, il l’a compris et il l’a fait ; et ce qu’il avait consommé à cette table, c’est cela qu’il a voulu apprêter. Il a aimé le Christ par sa vie, il l’a aimé par sa mort.
        Et nous, mes frères, si nous aimons vraiment, nous devons imiter. Car nous ne pourrons pas produire un meilleur fruit de notre amour qu’en nous montrant nous aussi des imitateurs.%Le Christ a souffert pour nous et nous a laissé son exemple pour que nous suivions ses traces%. Par cette phrase, il semble que, pour l’Apôtre Pierre, le Christ a souffert seulement pour ceux qui suivent ses traces, que la passion du Christ ne sert à rien, sinon à ceux qui suivent ses traces. En effet, les saints martyrs l’ont suivi jusqu’à répandre leur sang, jusqu’à imiter sa passion ; les martyrs l’ont suivi, mais ils ne sont pas les seuls. Après leur passage, le pont n’a pas été coupé ; après qu’ils ont bu, la source n’a pas tari. ~
        Le jardin du Seigneur, mes frères, ce jardin a toutes sortes de fleurs : non seulement les roses des martyrs, mais aussi les lis des vierges, le lierre des gens mariés, les violettes des veuves. Absolument aucune catégorie de gens, mes bien-aimés, ne doit désespérer de sa vocation : c’est pour nous que le Seigneur a souffert. C’est très véritablement qu’il est écrit de lui :%Il veut que tous les hommes soient sauvés et arrivent à connaître pleinement la vérité.%
        Il faut donc comprendre comment, en dehors de l’effusion du sang et du risque de subir la passion, le chrétien doit suivre le Christ. L’Apôtre dit, au sujet du Christ Seigneur :%Lui qui était dans la condition de Dieu, il n’a pas jugé bon de revendiquer son droit d’être traité à l’égal de Dieu. Quelle majesté ! Mais au contraire, il se dépouilla lui-même en prenant la condition de serviteur, devenu semblable aux hommes et reconnu comme un homme à son comportement. Quel abaissement !%
        Le Christ s’est abaissé : voilà, chrétien, ce qui est à ta disposition.%Le Christ s’est fait obéissant%. Alors pourquoi es-tu orgueilleux ? ~ Ensuite, après être allé jusqu’au bout de cet abaissement et avoir terrassé la mort, le Christ est monté au ciel : suivons-le. Écoutons l’Apôtre qui nous dit :%Si vous êtes ressuscités avec le Christ, recherchez les réalités d’en haut : c’est là qu’est le Christ, assis à la droite de Dieu.%
      responsory: |-
        Pour demeurer fidèle au Christ,
        tu n’as pas craint la haine des hommes !
        Ardente est la braise de ton supplice !
        Plus ardente, la flamme de la charité
        qui te consume en holocauste !

        R/ Serviteur de Jésus Christ,
        l’amour est ta victoire.

morning:
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Mon âme s’attache à toi, ton amour vaut mieux que la vie !
    - psalm: OT_41
      antiphon:
        - Le Seigneur a envoyé son ange, il m’a retiré du feu, il m’a sauvé.
    - psalm: PSALM_149
      antiphon:
        - |-
          Je te rends grâce, Seigneur : tu m’as ouvert les portes de ta maison.
  reading:
    biblicalReference: 2Co 1,3-5
    content: Béni soit Dieu, le Père de notre Seigneur Jésus Christ, le Père plein de tendresse, le Dieu de qui vient tout réconfort. Dans nos détresses, il nous réconforte ; ainsi, nous pouvons réconforter tous ceux qui sont dans la détresse, grâce au réconfort que nous recevons nous-mêmes de Dieu. De même que nous avons largement part aux souffrances du Christ, de même, par le Christ, nous sommes largement réconfortés.
  responsory: |-
    R/ Le Seigneur est ma force et mon rempart :
    * Mon cœur lui fait confiance.
    V/  Ma chair a refleuri,
    mes chants lui rendent grâce. *
    Gloire au Père.
    R/ Le Seigneur.
  evangelicAntiphon:
    common: Mon enfant, ne crains pas, je suis avec toi. Si tu passes par le feu, tu n’en sentiras aucun mal.

vespers:
  psalmody:
    - psalm: PSALM_114
      antiphon:
        - Laurent a bien combattu, il a confessé le nom du Christ.
    - psalm: PSALM_115
      antiphon:
        - Saint Laurent criait sa joie d’être immolé avec le Christ.
    - psalm: NT_9
      antiphon:
        - |-
          Je te rends grâce, Seigneur : tu m’as ouvert les portes de ta maison.
  reading:
    biblicalReference: 1P 4, 13-14
    content: Puisque vous communiez aux souffrances du Christ, réjouissez-vous, afin d’être dans la joie et l’allégresse quand sa gloire se révélera. Si l’on vous insulte à cause du nom du Christ, heureux êtes-vous, puisque l’Esprit de gloire, l’Esprit de Dieu, repose sur vous.
  responsory: |-
    R/ Tu nous as éprouvés, ô Dieu,
    * comme un métal qu’on affine.
    V/ Nous sommes passés par l’eau et le feu, *
    Gloire au Père.
    R/ Tu nous as éprouvés.
  evangelicAntiphon:
    common: Ma nuit n’a point de ténèbres. Tout resplendit de lumière.
