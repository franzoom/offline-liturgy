celebration:
  title: Saints Laurent Zuiz et ses compagnons
  subtitle: martyrs
  description: C’est au cours du XVII^ème siècle (1633-1637) que Laurent Ruiz et ses compagnons versèrent leur sang pour l’amour du Christ à Nagasaki, au Japon. Ce groupe de seize martyrs, membres ou associés de l’Ordre de saint Dominique, comptait neuf prêtres (dont le Français Guillaume Courtet), deux religieux, deux vierges et trois laïcs, dont l’un, Laurent Ruiz, père de famille, était originaire des Philippines. Tous, à des dates différentes et en des circonstances diverses, annoncèrent l’Évangile aux Philippines, à Formose et au Japon, manifestant ainsi l’universalité de la foi chrétienne.
  commons:
    - martyrs
  color: red

oration:
  - En la fête des saints martyrs Laurent et ses compagnons, accorde-nous, Seigneur notre Dieu, la même endurance à ton service et au service du prochain, car ils sont bienheureux en ton Royaume ceux qui souffrent persécution pour la justice. Par Jésus Christ.

readings:
  patristicReading:
    - title: HOMÉLIE DU PAPE JEAN-PAUL II À LA BÉATIFICATION DE SAINTS LAURENT RUIZ ET DE SES COMPAGNONS
      subtitle: Manille, 1981
      content: |-
        Comme il l’a promis dans l’Évangile, le Christ reconnaît vraiment, en présence de son Père, les fidèles martyrs qui se sont déclarés pour lui devant les hommes.
        L’hymne de gloire à Dieu, qui vient d’être chantée par des voix innombrables, résonne en écho au « Te Deum » entonné dans l’église Santo Domingo le soir du 27 décembre 1637, lorsque parvint la nouvelle du martyre, à Nagasaki, d’un groupe de six chrétiens. Parmi eux se trouvaient le chef de la mission, le Père Antonio Gonzales, dominicain espagnol de Leon, et Laurent Ruiz, homme marié et père de famille, né à Manille, dans la banlieue de Binondo.
        Ces témoins chantèrent, eux aussi, des psaumes au Seigneur de miséricorde et de puissance, pendant qu’ils étaient en prison, puis au cours de leur exécution par la potence et la fosse, supplice qui dura trois jours.
        %La victoire qui a vaincu le monde, c’est notre foi%. La prédication de cette foi éclaire comme un soleil tous ceux qui veulent parvenir à la connaissance de la vérité. En réalité, bien que des langues diverses soient parlées dans le monde, la puissance du message chrétien est la même.
        Le Seigneur Jésus, par son sang, a vraiment racheté ses serviteurs, rassemblés %de toute race, langue, peuple et nation, afin% d’en faire %un Royaume de prêtres pour notre Dieu%. Les seize saints martyrs, dans l’exercice de leur sacerdoce – celui du Baptême ou celui de l’Ordre – ont accompli l’acte suprême d’adoration et d’amour par le sacrifice de leur sang uni à celui du Christ sur la croix. Ils ont ainsi imité le Christ prêtre et victime, de la manière la plus parfaite possible pour des créatures humaines. En même temps, c’était l’acte d’amour le plus grand qui soit à l’égard de leurs frères. A notre tour, nous sommes tous appelés à donner notre vie pour nos frères, à l’exemple du Fils de Dieu qui a livré sa vie pour nous.
        C’est ce que fit Laurent Ruiz. Conduit par l’Esprit Saint vers un but imprévu, et au terme d’un dangereux itinéraire, il déclara au tribunal qu’il était chrétien, qu’il devait mourir pour Dieu et donnerait sa vie mille fois pour lui. « Même si j’avais mille vies, je les offrirais toutes. Je ne serai jamais renégat. Si vous le voulez, vous pouvez me mettre à mort. Ce que je veux, c’est mourir pour Dieu. »
        Ces paroles contiennent tout : sa confession de foi et la raison de sa mort. C’est à ce moment que ce jeune père de famille confessa sa foi et porta à son parfait accomplissement l’enseignement qu’il avait reçu à l’école des Pères dominicains de Binondo ; enseignement dont le Christ est l’unique centre, pour la double raison qu’il porte sur son mystère et que le Christ lui-même le transmet par la voix de son messager.
        L’exemple de Laurent Ruiz, de père chinois et de mère tagala, nous rappelle que la vie de chacun, dans sa totalité, doit être livrée au Christ. Être chrétien, c’est s’offrir chaque jour en réponse au don de Jésus, %venu dans le monde afin que les hommes aient la vie, et l’aient en abondance%.

      responsory: |-
        R/ Aux vainqueurs, la couronne de gloire !
        
        Les yeux fixés sur le Christ,
        ils ont versé leur sang pour Dieu.
        
        D’un seul cœur, d’une même foi,
        ils l’ont imité dans sa mort.