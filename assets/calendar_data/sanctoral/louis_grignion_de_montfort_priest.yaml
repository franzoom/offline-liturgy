celebration:
  title: Saint Louis-Marie Grignon de Montfort
  subtitle: prêtre
  description: Combattu pour ses idées neuves, le prêtre Louis-Marie Grignion (1673-1716) en appelle à Rome pour partir en mission lointaine. Le pape le nommera prédicateur de missions paroissiales. Dans l’ouest de la France, il conduit avec zèle les foules à Jésus par Marie. II fonde les Filles de la Sagesse et une société de prêtres. Il est également remarquable par ses écrits spirituels.
  color: white
  commons:
    - pastors

oration:
  - Dieu éternel et tout-puissant, tu as fait du prêtre saint Louis-Marie un témoin et un maître admirable de la parfaite consécration à ton Fils Jésus Christ par les mains de sa Mère bienheureuse ; accorde-nous de suivre le même chemin spirituel pour travailler sans relâche à étendre ton royaume.
