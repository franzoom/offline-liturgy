celebration:
  title: Saint Luc
  subtitle: évangéliste
  commons:
    - apostles
  description: Luc, le « médecin bien–aimé » qui fut le compagnon de route de Paul, est aussi l’évangéliste qui a le mieux exprimé la mansuétude du Christ et, dans les Actes des Apôtres, le chroniqueur de l’essor de l’Église au lendemain de la Pentecôte. Sous sa plume de lettré la bonne nouvelle chante un véritable cantique d’action de grâce dans la joie et l’optimisme.
  color: red

invitatory:
  antiphon:
  - |-
    Venez, adorons Jésus Christ : il est l'Évangile de Dieu !

oration:
  - Dieu qui as choisi saint Luc pour révéler, par sa parole et ses écrits, le mystère de ton amour envers les pauvres ; accorde à ceux qui se réclament de ton nom d’être un seul cœur et une seule âme, et à tous les peuples du monde la grâce de voir ton salut.

readings:
  biblicalReading:
    - title: LECTURE DU LIVRE DES ACTES DES APÔTRES
      subtitle: Une Église animée par l’Esprit
      ref: Ac 9, 27-31; 11, 19-26
      content: |-
        Alors Barnabé le prit avec lui et le présenta aux Apôtres ; il leur raconta comment, sur le chemin, Saul avait vu le Seigneur, qui lui avait parlé, et comment, à Damas, il s’était exprimé avec assurance au nom de Jésus. Dès lors, Saul allait et venait dans Jérusalem avec eux, s’exprimant avec assurance au nom du Seigneur. Il parlait aux Juifs de langue grecque, et discutait avec eux. Mais ceux-ci cherchaient à le supprimer. Mis au courant, les frères l’accompagnèrent jusqu’à Césarée et le firent partir pour Tarse.
        L’Église était en paix dans toute la Judée, la Galilée et la Samarie ; elle se construisait et elle marchait dans la crainte du Seigneur ; réconfortée par l’Esprit Saint, elle se multipliait.
        Les frères dispersés par la tourmente qui se produisit lors de l’affaire d’Étienne allèrent jusqu’en Phénicie, puis à Chypre et Antioche, sans annoncer la Parole à personne d’autre qu’aux Juifs. Parmi eux, il y en avait qui étaient originaires de Chypre et de Cyrène, et qui, en arrivant à Antioche, s’adressaient aussi aux gens de langue grecque pour leur annoncer la Bonne Nouvelle : Jésus est le Seigneur. La main du Seigneur était avec eux : un grand nombre de gens devinrent croyants et se tournèrent vers le Seigneur.
        La nouvelle parvint aux oreilles de l’Église de Jérusalem, et l’on envoya Barnabé jusqu’à Antioche. À son arrivée, voyant la grâce de Dieu à l’œuvre, il fut dans la joie. Il les exhortait tous à rester d’un cœur ferme attachés au Seigneur. C’était en effet un homme de bien, rempli d’Esprit Saint et de foi. Une foule considérable s’attacha au Seigneur.
        Barnabé partit alors à Tarse chercher Saul. L’ayant trouvé, il l’amena à Antioche. Pendant toute une année, ils participèrent aux assemblées de l’Église, ils instruisirent une foule considérable. Et c’est à Antioche que, pour la première fois, les disciples reçurent le nom de « chrétiens ».
      responsory: |-
        R/ Heureux qui tient son nom
        Du seul Nom de Jésus,

        Heureux qui est heureux
        Du bonheur de son Dieu.

        Heureux qui met son pas
        Dans les pas de Jésus :

        Des chemins s’ouvrent dans son cœur,
        Il détiendra Pouvoir sur les nations.
        
        Au Paradis de Dieu, Vainqueur,
        il recevra l’Étoile du matin.
  patristicReading:
    - title: HOMÉLIE DE S. GRÉGOIRE LE GRAND SUR L’ÉVANGILE
      subtitle: Le Seigneur envoie ses disciples
      content: |-
        Notre Seigneur et Sauveur, frères très chers, nous instruit tantôt par ses paroles, tantôt par ses actions. Ses actions elles-mêmes sont des commandements, parce que, lorsqu’il fait quelque chose sans rien dire, il nous montre comment nous devons agir. Voici donc qu’il envoie ses disciples en prédication deux par deux, parce que les commandements de la charité sont deux : l’amour de Dieu et du prochain.
        Le Seigneur envoie prêcher ses disciples deux par deux pour nous suggérer, sans le dire, que celui qui n’a pas la charité envers autrui ne doit absolument pas entreprendre le ministère de la prédication.
        Il est fort bien dit qu’%il les envoya devant lui dans toutes les villes et les localités où lui-même devait aller%. En effet, le Seigneur vient après ses prédicateurs, parce que la prédication est un préalable : le Seigneur vient habiter notre âme lorsque les paroles d’exhortation sont venues en avant-coureur et font accueillir la vérité dans l’âme. C’est pourquoi Isaïe dit aux prédicateurs : %Préparez le chemin du Seigneur, aplanissez les sentiers de notre Dieu%. Et le Psalmiste leur dit aussi : %Frayez la route à celui qui monte au couchant%. Le Seigneur monte au couchant parce que, s’étant couché par sa passion, il s’est manifesté avec une plus grande gloire dans sa résurrection. Il est monté au couchant, parce que, en ressuscitant, il a foulé aux pieds la mort qu’il avait subie. Nous frayons donc la route à celui qui monte au couchant lorsque nous prêchons sa gloire à vos âmes, afin que, venant ensuite, il les éclaire par la présence de son amour.
        Écoutons maintenant ce qu’il dit aux prédicateurs qu’il envoie : %La moisson est abondante, mais les ouvriers sont peu nombreux. Priez donc le maître de la moisson d’envoyer des ouvriers pour sa moisson%. Les ouvriers sont peu nombreux pour une moisson abondante ; nous ne pouvons pas le répéter sans une grande tristesse. Il y a des gens pour entendre de bonnes choses, il n’y en a pas pour les dire. Le monde est rempli de prêtres, mais on rencontre rarement un ouvrier dans la moisson de Dieu ; nous acceptons bien la fonction sacerdotale, mais nous ne faisons pas le travail de cette fonction.
        Considérez, frères très chers, considérez le poids de cette parole : %Priez le maître de la moisson d’envoyer des ouvriers pour sa moisson%. Vous-mêmes, priez pour nous, afin que nous puissions faire le travail auquel vous avez droit : que notre langue ne soit pas engourdie, quand il faut exhorter ; une fois que nous avons accepté la charge de la prédication, que notre silence ne nous assigne pas devant le juste Juge !
      responsory: |-
        R/ Le fruit de l’Esprit est amour, joie et paix.

        Si nous vivons par l’Esprit,
        marchons aussi dans l’Esprit.

        Si vous êtes conduits par l’Esprit,
        vous n’êtes plus soumis à la Loi.

morning:
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Il a scruté la sagesse des anciens et compris le message des prophètes.
    - psalm: OT_41
      antiphon:
        - Dieu nous appelle par l’Évangile à connaître la gloire du Christ.
    - psalm: PSALM_149
      antiphon:
        - |-
          Le peuple de Dieu fera son éloge : il se souviendra de son message.
  reading:
    biblicalReference: 1 Co 15, 1-2a.3-4
    content: |-
      Frères, je vous rappelle la Bonne Nouvelle que je vous ai annoncée ; cet Évangile, vous l’avez reçu, et vous y restez attachés ; vous serez sauvés par lui si vous le gardez tel que je vous l’ai annoncé. Avant tout, je vous ai transmis ceci, que j’ai moi-même reçu : le Christ est mort pour nos péchés, conformément aux Écritures, et il a été mis au tombeau ; il est ressuscité le troisième jour, conformément aux Écritures.
  responsory: |-
    R/ Vivante est la Parole de Dieu,
    * plus pénétrante qu’un glaive.
    V/ Fils d’homme, porte-leur ma Parole,
    * plus pénétrante qu’un glaive.
    Gloire au Père. R/ Vivante.
  evangelicAntiphon:
    common: L’Évangile de Dieu est venu jusqu’à nous. L’astre d’en haut nous a visités.

middleOfDay:
  tierce:
    antiphon: |-
      Allez et proclamez l’Évangile du Royaume : vous avez reçu gratuitement, donnez gratuitement.
    reading:
      biblicalReference: 2 Tm 1, 8b-9
      content: Avec la force de Dieu, prends ta part de souffrance pour l’annonce de l’Évangile. Car Dieu nous a sauvés, et il nous a donné une vocation sainte, non pas à cause de nos propres actes, mais à cause de son projet à lui et de sa grâce. Cette grâce nous avait été donnée dans le Christ Jésus.
    responsory: |-
      V/ Réjouissez-vous, exultez, dit le Seigneur,
      vos noms sont inscrits dans les cieux.
  sexte:
    antiphon: Je suis avec vous tous les jours jusqu’à la fin des temps.
    reading:
      biblicalReference: 1 Th 2, 2b-4
      content: Nous avons trouvé en notre Dieu l’assurance qu’il fallait pour vous annoncer, au prix de grandes luttes, l’Évangile de Dieu. Et quand nous vous exhortions, nous n’étions pas au service de doctrines fausses, nous n’avions pas de motifs impurs, nous n’agissions pas par ruse. En effet, pour nous confier l’Évangile, Dieu nous a mis à l’épreuve ; de même, aujourd’hui, il continue de mettre notre cœur à l’épreuve, si bien que nous parlons pour plaire non pas aux hommes, mais à Dieu.
    responsory: |-
      V/ Ils ont gardé les volontés du Seigneur,
      les lois qu’il leur donna.
  none:
    antiphon: Si vous tenez jusqu’au bout, vous obtiendrez la vie.
    reading:
      biblicalReference: 2 Tm 1, 8b-9
      content: Avec la force de Dieu, prends ta part de souffrance pour l’annonce de l’Évangile. Car Dieu nous a sauvés, et il nous a donné une vocation sainte, non pas à cause de nos propres actes, mais à cause de son projet à lui et de sa grâce. Cette grâce nous avait été donnée dans le Christ Jésus.
    responsory: |-
      V/ Réjouissez-vous, exultez, dit le Seigneur,
      vos noms sont inscrits dans les cieux.

vespers:
  psalmody:
    - psalm: PSALM_115
      antiphon:
        - Grâce au don que Dieu m’a fait, je suis le serviteur de l’Évangile.
    - psalm: PSALM_125
      antiphon:
        - Je suis le serviteur de l’Évangile pour avoir part avec le Christ.
    - psalm: NT_4
      antiphon:
        - J’ai reçu la grâce d’annoncer au monde l’insondable richesse du Christ.
  reading:
    biblicalReference: Col 1, 3-6a
    content: Nous rendons grâce à Dieu, le Père de notre Seigneur Jésus Christ, en priant pour vous à tout instant. Nous avons entendu parler de votre foi dans le Christ Jésus et de l’amour que vous avez pour tous les fidèles dans l’espérance de ce qui vous attend au ciel ; vous en avez déjà reçu l’annonce par la parole de vérité, la Bonne Nouvelle qui est parvenue jusqu’à vous, elle qui porte du fruit et progresse dans le monde entier.
  responsory: |-
    R/ Racontez à tous les peuples
    * la gloire du Seigneur.
    V/ À toutes les nations ses merveilles,
    * la gloire du Seigneur.
    V/ De jour en jour, proclamez son salut,
    * la gloire du Seigneur.
    Gloire au Père. R/ Racontez.
  evangelicAntiphon:
    common: Heureux saint Luc ! Ton Évangile nous révèle la miséricorde du Christ ; l’Église entière te glorifie.
