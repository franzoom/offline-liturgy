celebration:
  title: La Vierge Marie Consolatrice des affligés
  subtitle: Patronne principale du Luxembourg
  description: Marie Consolatrice des affligés, dont la statue est vénérée dans la cathédrale de Luxembourg, est honorée comme patronne du Duché depuis 1678. La célébration de sa fête au Temps pascal nous rappelle que la consolation des affligés tient avant tout dans la victoire du Christ sur la mort. La Vierge douloureuse du vendredi saint est la Mère du Ressuscité.
  color: white
  commons:
    - virgin-mary

oration:
  - Père de miséricorde et Dieu de toute consolation, tu as voulu que Marie, la mère de ton Fils unique, soit aussi notre mère ; dans ta bonté, accorde-nous, puisqu’elle nous garde et nous protège, le réconfort de sa consolation.

readings:
  patristicReading:
    - title: Homélie de S. Bernard pour l'Assomption
      content: |-
        Qu’on ne parle plus de ta miséricorde, Vierge bienheureuse, s’il est un seul homme qui se rappelle t’avoir invoquée en vain dans ses besoins. Nous, tes petits serviteurs, nous te félicitons de tes autres vertus, mais nous nous félicitons nous-mêmes de ta miséricorde.
        Nous louons ta virginité, nous admirons ton humilité, mais, pour les malheureux que nous sommes, ta miséricorde a plus douce saveur, plus précieuse valeur, elle revient plus souvent à notre mémoire, plus fréquemment dans nos invocations.
        C’est elle qui obtint la régénération du monde, le salut de tous. Il est, en effet, évident que la sollicitude de Marie s’étendait au genre humain tout entier, lorsque l’ange lui dit : %Ne crains pas, Marie, tu as trouvé grâce, la grâce que tu attendais%.
        Qui donc, ô Vierge bénie, pourra mesurer la longueur et la largeur, la hauteur et la profondeur de ta miséricorde ?
        Car, par sa longueur, ta miséricorde atteint jusqu’au dernier jour tous ceux qui l’invoquent ; par sa largeur, elle recouvre toute la surface du globe et remplit la terre ; par sa hauteur, elle contribue à la restauration de la cité céleste ; par sa profondeur, elle obtient la rédemption de %ceux qui demeurent dans les ténèbres et l’ombre de la mort%. Par toi, en effet, le ciel est peuplé, l’enfer vidé, la Jérusalem céleste relevée de ses ruines, la vie rendue aux malheureux qui l’avaient perdue.
        C’est ainsi que ta toute-puissante et très miséricordieuse charité se montre aussi magnifique dans sa compassion que dans son pouvoir secourable.
        Que notre âme altérée coure donc à cette source, que notre misère puise avec ardeur à ce trésor de miséricorde.
        Voici, Vierge bénie, que nous t’avons accompagnée de nos vœux et suivie, au moins de loin, tandis que tu montais vers ton Fils. Que désormais ta miséricorde fasse connaître au monde la grâce que tu as trouvée auprès de Dieu, en obtenant, par tes saintes prières, le pardon aux pécheurs, la santé aux malades, le courage aux faibles, la consolation aux affligés, secours et délivrance à ceux qui sont en danger. Et pour nous, tes petits serviteurs, qui en ce jour de fête et de liesse, invoquons et louons le nom très doux de Marie, obtiens, Reine de clémence, les grâces de ton Fils, notre Seigneur, %qui est au-dessus de tout, Dieu béni éternellement. Amen%.

      responsory: |-
        R/ Mon âme exalte le Seigneur :
        éternel est son amour !
        
        Chante et réjouis-toi, fille de Sion,
        voici que ton Dieu vient demeurer au milieu de toi.
        
        Dieu pour toi exulte de joie,
        il te renouvelle par son amour.
        
        Le Seigneur, comme au jour de fête,
        dansera pour toi avec des cris de joie.
