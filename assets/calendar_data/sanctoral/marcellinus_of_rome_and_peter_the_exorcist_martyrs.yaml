celebration:
  title: Saint Marcellin et Saint Pierre
  subtitle: martyrs
  description: Marcellin et Pierre périrent à Rome sous la persécution de Dioclétien (304 ou 305). Le bourreau qui les décapita rapporta au futur pape Damase qu’on leur fit creuser leur tombe de leurs propres mains et qu’ils accomplirent cette tâche tout joyeux.
  commons:
    - martyrs
  color: red

oration:
  - Du glorieux témoignage que t’ont rendu, Seigneur, tes saints martyrs Marcellin et Pierre, tu fais notre rempart et notre protection ; que leur exemple nous entraîne et que leur prière nous réconforte.

readings:
  patristicReading:
    - title: EXHORTATION D’ORIGÈNE AU MARTYRE
      content: |-
        Si nous sommes %passés de la mort à la vie% en passant de l’incroyance à la foi, ne soyons pas étonnés si le monde nous hait. Car tous ceux qui ne sont pas passés de la mort à la vie, mais qui demeurent dans la mort, ne peuvent aimer ceux qui sont passés de la demeure ténébreuse de la mort, si je puis la nommer ainsi, aux édifices faits de pierres vivantes où règne la lumière de la vie.
        %Jésus a donné sa vie pour nous, et nous devons donner la nôtre%. Je ne dirai pas pour lui, mais pour nous-mêmes, et j’entends par là tous ceux qui doivent être édifiés par notre martyre.
        Pour nous, chrétiens, voici venu le temps de nous glorifier car il est dit : %Nous nous glorifions dans nos épreuves, car nous savons que l’épreuve produit la persévérance, la persévérance produit la valeur éprouvée, la valeur éprouvée produit l’Esperance, et l’espérance ne trompe pas. Que seulement l’amour de Dieu soit répandu dans nos cœurs par l’Esprit Saint%. ~
        %De même que nous avons largement part aux souffrances du Christ, de même, par le Christ, nous sommes largement consolés%. Aussi, accueillons avec une grande ferveur les souffrances du Christ, et qu’elles nous soient largement accordées, si du moins nous désirons être largement consolés, puisque tous %ceux qui pleurent seront consolés%. Toutefois ils le seront de façon inégale car, si la consolation était égale pour tous, saint Paul ne dirait pas : %De même que nous avons largement part aux souffrances du Christ, de même nous sommes largement consolés%. Ceux qui participent aux souffrances participeront aussi à la consolation en proportion des souffrances qui les font participer au Christ. Apprenez-le de celui qui a dit avec confiance : %Nous le savons : puisque vous connaissez comme nous la souffrance, vous obtiendrez comme nous la consolation%.
        Dieu dit par la bouche d’un prophète : %Je t’exauce au moment favorable, je viens à ton secours au jour du salut%. Y a-t-il donc un moment plus favorable que celui ou, à cause de notre piété chrétienne envers Dieu, nous sommes emmenés solennellement dans le monde par des gardiens, mais comme des vainqueurs conduits en triomphe, plutôt que comme des vaincus ? En effet, les martyrs du Christ lui sont associés pour %dépouiller les principautés et les puissances% et pour triompher avec lui, en participant à ses souffrances et par suite aux exploits guerriers que représentent de telles souffrances. ~ Et quel autre %jour du salut% y a-t-il que celui où nous partons ainsi de ce monde ?
        Je vous en prie : %Ne soyez pour personne une occasion de chute afin que notre ministère soit sans reproche. Au contraire, en toutes choses montrez-vous comme des ministres de Dieu par une grande persévérance% et dites : %Que puis-je attendre maintenant, si ce n’est le Seigneur ?%

      responsory: |-
        R/ Puisez votre énergie dans le Seigneur,
        dans la vigueur de sa force, alléluia.
        
        Vous ne luttez pas contre des hommes,
        mais contre les puissances des ténèbres.
        
        Quand viendra le jour du malheur,
        vous pourrez résister et tenir debout.

