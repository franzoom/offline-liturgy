celebration:
  title: Sainte Marguerite-Marie Alacocque
  subtitle: religieuse
  description: (Dans les années 1673 1675, le Christ révéla la profondeur de son amour pour les hommes à une jeune religieuse visitandine de Paray le Monial, Marguerite Marie Alacoque (1647 1690). Il lui montra son cœur et la chargea d’obtenir l’institution d’une fête en son honneur. À travers mille difficultés Marguerite Marie consacra sa vie à la réalisation de ce dessein.
  commons:
  - saints-female_religious
  color: white

