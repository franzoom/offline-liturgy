celebration:
  title: Sainte Marguerite d'Écosse
  description: Princesse anglaise, Marguerite naquit en Hongrie (vers 1046). En 1070, elle épousa le roi d’Écosse Malcom III, à qui elle donna huit enfants. Par sa culture, son sens politique et surtout sa charité rayonnante, elle exerça une influence profonde sur son mari et contribua au renouveau religieux de son peuple. Les deux époux moururent à quelques jours de distance (1093).
  commons:
    - saints-female_caritative
  color: white

oration:
  - Dieu qui rendis admirable sainte Marguerite d’Ecosse par son exquise charité envers les pauvres, accorde-nous, à son exemple et par son intercession, d’être au milieu des hommes un reflet de ta bonté.

readings:
  patristicReading:
    - title: ACTES DU 2^ème CONCILE DU VATICAN
      subtitle: L’Église dans le monde de ce temps
      content: |-
        L’homme et la femme qui, par l’alliance conjugale, %ne sont plus deux mais ne font qu’un%, se procurent aide et service mutuels par l’union intime de leurs personnes et de leurs activités ; ils prennent ainsi conscience de leur unité et la réalisent chaque jour plus complètement. Cette union intime, donation réciproque de deux personnes, de même que le bien des enfants, exige l’entière fidélité des conjoints et requiert leur indissoluble unité. ~
        L’authentique amour conjugal est élevé au rang d’amour divin ; la puissance rédemptrice du Christ et l’action salvatrice de l’Église dirigent et enrichissent cet amour pour conduire efficacement les époux jusqu’à Dieu, pour les aider et les fortifier dans leur mission sublime de père et de mère.
        C’est pour cela que les époux chrétiens sont fortifiés et comme consacrés par un sacrement spécial approprié aux devoirs et à la dignité de leur état. Par sa vertu, en accomplissant leur mission conjugale et familiale, en étant pénétrés par l’esprit du Christ qui imprègne toute leur vie de foi, d’espérance et de charité, ils s’approchent de plus en plus de leur propre perfection et de leur sanctification mutuelle ; par là, ils réussissent de plus en plus à rendre gloire à Dieu.
        Du fait que leurs parents leur montrent la route par l’exemple et la prière familiale, les enfants, et même tous ceux qui vivent dans le cercle de la famille, trouveront plus aisément le chemin de l’affection, du salut et de la sainteté. Quant aux époux, ennoblis par la dignité de leur rôle de père et de mère, ils accompliront consciencieusement le devoir d’éducation, surtout d’éducation religieuse, qui leur revient au premier chef.
        Les enfants, comme les membres vivants de la famille, contribuent, de la manière qui leur appartient, à la sanctification des parents. Ils répondront à leurs bienfaits par leur gratitude, leur piété filiale et leur confiance ; ils les assisteront filialement dans leurs difficultés et dans la solitude de leur vieillesse. Le veuvage, accepté courageusement dans le prolongement de la vocation au mariage, sera honoré par tous. Chaque famille communiquera généreusement aux autres familles aussi ses richesses spirituelles. La famille chrétienne, parce qu’elle découle du mariage, qui est image et participation de l’alliance d’amour qui unit le Christ et l’Église, manifestera donc à tous les hommes la présence vivante du Sauveur dans le monde et la véritable nature de l’Église. Elle le fera par l’amour des époux, leur fécondité généreuse, leur unité et leur fidélité, l’accord harmonieux de tous ses membres.

      responsory: |-
        R/ Ses fils se lèvent
        pour la proclamer bienheureuse,
        et son mari pour faire son éloge.

        Elle fait le bonheur des siens
        tous les jours de sa vie.

        Elle étend ses mains sur le pauvre
        et tend les bras à l’indigent.

        Force et dignité la revêtent,
        elle rit au jour qui vient.
