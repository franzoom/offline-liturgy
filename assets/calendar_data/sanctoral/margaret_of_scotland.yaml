celebration:
  title: Sainte Marguerite d'Écosse
  description: Princesse anglaise, Marguerite naquit en Hongrie (vers 1046). En 1070, elle épousa le roi d’Écosse Malcom III, à qui elle donna huit enfants. Par sa culture, son sens politique et surtout sa charité rayonnante, elle exerça une influence profonde sur son mari et contribua au renouveau religieux de son peuple. Les deux époux moururent à quelques jours de distance (1093).
  commons:
  - saints-female
  color: white

