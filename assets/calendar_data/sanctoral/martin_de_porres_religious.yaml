celebration:
  title: Saint Martin de Porrès
  description: Martin de Porrès (1579-1639) était un « homme de couleur », fils naturel d’un chevalier espagnol. Religieux laïc au couvent des Dominicains de Lima, il y exerçait les fonctions d’infirmier, mais il puisait dans la prière, spécialement la prière nocturne, des lumières qui firent aussi de lui un merveilleux catéchiste.
  commons:
  - 
  color: white

oration:
- 
