celebration:
  title: Sainte Marie-Madeleine de Pazzi
  subtitle: vierge
  description: Marie-Madeleine De Pazzi (1566-1607), carmélite florentine, fut appelée par le Seigneur aux plus hautes expériences mystiques à travers des purifications douloureuses. Mais c’est en cheminant humblement dans la pauvreté, la chasteté et l’obéissance qu’elle assurait sa montée vers Dieu et qu’elle y conduisait les autres.
  commons:
    - virgins
    - saints-female_religious
  color: white

oration: 
  - |-
    Seigneur, toi qui aimes la virginité, tu as comblé de dons surnaturels sainte Marie-Madeleine de Pazzi dont le cœur brûlait de charité ; puisque nous la célébrons aujourd’hui, accorde-nous de trouver en elle un exemple d’innocence et d’amour.

readings:
  patristicReading:
    title: PRIÈRE DE STE MARIE-MADELEINE À L’ESPRIT SAINT
    content: |-
      Ô Verbe, tu es vraiment admirable dans l’Esprit Saint, car c’est lui qui te fait entrer dans l’âme si bien que celle-ci s’unit à Dieu, savoure Dieu, ne trouve aucun goût à rien en dehors de Dieu. Et le Saint-Esprit qui vient dans l’âme est marqué du sceau précieux du sang du Verbe ou de l’Agneau immolé ; bien plus, ce sang l’incite à venir, bien que l’Esprit se meuve de lui-même et désire venir dans l’âme.
      Cet Esprit pénétrant est aussi en soi la substance du Père et du Verbe, il procède de l’essence du Père et du bon plaisir du Verbe, et il vient dans l’âme comme une source qui la submerge. De même que deux fleuves jaillissants se mêlent de telle façon que le plus petit perde son nom et prenne celui du plus grand, c’est ainsi que cet Esprit divin agit quand il vient dans l’âme pour s’unir à elle. Il faut que l’âme, qui est la plus petite, perde son nom et s’abandonne à l’Esprit. C’est ce qui se produira si elle se tourne vers l’Esprit pour ne faire plus qu’un avec lui.
      Cet Esprit, dispensateur des trésors qui sont dans le sein du Père, et gardien des conseils qui se tiennent entre le Père et le Fils, se répand dans l’âme avec tant de douceur qu’on ne le perçoit pas et que peu d’hommes l’estiment à sa véritable grandeur.Par son poids comme par sa légèreté, il se rend dans tous les lieux qui sont aptes et disposés à le recevoir. Par ses fréquentes paroles et dans un profond silence, il se fait entendre de nous. Par l’élan de l’amour, lui qui est à la fois immobile et très mobile, il s’introduit en tous.
      Tu ne résides pas, Esprit Saint, dans le Père immobile, ni dans le Verbe, et pourtant tu es toujours dans le Père et dans le Verbe, et en toi-même, en tous les esprits bienheureux et en toutes les créatures. Tu es nécessaire à la créature à cause du sang répandu par le Verbe Fils unique, qui s’est rendu nécessaire à sa créature par l’emportement de son amour. Tu te reposes dans les créatures qui se disposent à recevoir en elles, par la communication de tes dons, une ressemblance exacte et pure avec toi. Tu te reposes en ceux qui accueillent en eux l’effet du sang du Verbe et se rendent dignes d’être ta demeure.
      Viens, Esprit Saint. Qu’elle vienne, l’union du Père, et le bon plaisir du Fils. Esprit de vérité, tu es la récompense des saints, le soulagement des âmes, la lumière des ténèbres, la richesse des pauvres, le trésor des amants, le rassasiement des affamés, le réconfort des voyageurs ; enfin tu es celui en qui sont contenus tous les trésors.
      Viens, toi qui, par ta descente en la Vierge Marie, as réalisé l’incarnation du Verbe ; opère en nous par la grâce ce que tu as opéré en elle par grâce et par nature.
      Viens, toi qui es la nourriture de toute chaste pensée, la source de toute bonté, le comble de toute pureté.
      Viens, et absorbe en nous tout ce qui nous empêche d’être absorbés par toi.

    responsory: |-
      R/ Viens, Esprit Saint,
      viens au secours de notre faiblesse.

      Nous avons reçu un Esprit de fils adoptifs,
      par qui nous crions : Abba, Père.
      
      L’Esprit lui-même intercède pour nous
      en des gémissements ineffables.
      
      Dieu qui sonde les cœurs
      connaît les désirs de l’Esprit.


