celebration:
  title: Le Saint Nom de Marie
  description: |-
    Depuis des siècles, le peuple chrétien ne cesse de murmurer ces mots : « Je vous salue, Marie », la salutation de l’ange à la vierge dont « le nom était Marie ». Marie s’est ouverte à la présence de Dieu et nous apprend à accepter son action dans nos vies. Dire son nom éveille en nous une disposition à la nouveauté pour que le Seigneur agisse en nous comme il a agi en elle.
  color: white
  commons:
    - virgin-mary
oration:
  - |-
    Nous t’en prions, Dieu tout-puissant : que la bienheureuse Vierge Marie obtienne les bienfaits de ta miséricorde en faveur de tous ceux qui célèbrent son nom glorieux.


