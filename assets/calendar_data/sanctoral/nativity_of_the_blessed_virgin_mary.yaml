celebration:
  title: Nativité de la Vierge Marie
  description: Avant même la naissance de Jean le Précurseur, celle de Marie est une annonce de la Nativité de Jésus, le prélude de la Bonne Nouvelle. La venue d’une fille au foyer d’Anne et de Joachim a fait « lever sur le monde l’espérance et l’aurore du salut ». C’est pourquoi l’Église nous invite à la célébrer dans la joie.
  commons:
    - virgin-mary
  color: white

invitatory:
  antiphon:
  - Célébrons la Vierge Marie, adorons Jésus, son enfant.

oration:
  - Ouvre à tes serviteurs, Dieu très bon, tes richesses de grâce ; puisque la maternité de la Vierge Marie fut pour nous le commencement du salut, que la fête de sa nativité nous apporte un surcroît de paix.

readings:
  hymn: 
  - voici-l-aurore-avant-le-jour
  psalmody:
    - psalm: PSALM_23
    - psalm: PSALM_45
    - psalm: PSALM_86
  biblicalReading:
    - title: LECTURE DU LIVRE DE LA GENÈSE
      subtitle: Le péché de l’homme et la promesse du salut
      ref: Gn 3, 9-20
      content: |-
        Le SEIGNEUR Dieu appela l’homme et lui dit : « Où es-tu donc ? » Il répondit : « J’ai entendu ta voix dans le jardin, j’ai pris peur parce que je suis nu, et je me suis caché. » Le SEIGNEUR reprit : « Qui donc t’a dit que tu étais nu ? Aurais-tu mangé de l’arbre dont je t’avais interdit de manger ? » L’homme répondit : « La femme que tu m’as donnée, c’est elle qui m’a donné du fruit de l’arbre, et j’en ai mangé. »</P>Le SEIGNEUR Dieu dit à la femme : « Qu’as-tu fait là ? » La femme répondit : « Le serpent m’a trompée, et j’ai mangé. » Alors le SEIGNEUR Dieu dit au serpent : « Parce que tu as fait cela, tu seras maudit parmi tous les animaux et toutes les bêtes des champs. Tu ramperas sur le ventre et tu mangeras de la poussière tous les jours de ta vie. Je mettrai une hostilité entre toi et la femme, entre ta descendance et sa descendance : celle-ci te meurtrira la tête, et toi, tu lui meurtriras le talon. »
        Le SEIGNEUR Dieu dit ensuite à la femme : « Je multiplierai la peine de tes grossesses ; c’est dans la peine que tu enfanteras des fils. Ton désir te portera vers ton mari, et celui-ci dominera sur toi. »
        Il dit enfin à l’homme : « Parce que tu as écouté la voix de ta femme, et que tu as mangé le fruit de l’arbre que je t’avais interdit de manger : maudit soit le sol à cause de toi ! C’est dans la peine que tu en tireras ta nourriture, tous les jours de ta vie. De lui-même, il te donnera épines et chardons, mais tu auras ta nourriture en cultivant les champs. C’est à la sueur de ton visage que tu gagneras ton pain, jusqu’à ce que tu retournes à la terre dont tu proviens ; car tu es poussière, et à la poussière tu retourneras. »
        L’homme appela sa femme Ève (c’est-à-dire : la vivante), parce qu’elle fut la mère de tous les vivants.
      responsory: |-
        R/ Voici l’aurore avant le jour,
        Voici la mère virginale,
        La femme promise au début des âges,
        Elle a bâti sa demeure
        Dans les vouloirs du Père.
  patristicReading:
    - title: HOMÉLIE DE SAINT ANDRÉ DE CRÈTE POUR LA NATIVITÉ DE LA SAINTE MÈRE DE DIEU
      subtitle: La joie entre dans le monde
      content: |-
        Le Christ est l’achèvement de la Loi ; car il nous éloigne de la terre, du fait même qu’il nous élève vers l’Esprit. Cet accomplissement consiste en ce que le législateur, après avoir tout déterminé, a rapporté la lettre à l’esprit, en récapitulant toutes choses en lui, en vivant d’une loi qui est la grâce. Après avoir réduit la loi en servitude, il y a joint harmonieusement la grâce. Il n’a pas mélangé ni confondu les propriétés de l’une avec celles de l’autre ; mais, d’une façon divine, il a changé ce qu’il pouvait y avoir dans la loi de pénible, de servile et de tyrannique, en ce qui est léger et libre dans la grâce. Ainsi nous ne vivons plus sous l’esclavage des éléments du monde, comme dit l’Apôtre, nous ne sommes plus asservis au joug de la lettre de la loi.
        En effet, c’est en cela que consiste l’essentiel des bienfaits du Christ ; c’est là que le mystère se manifeste, que la nature est renouvelée : Dieu s’est fait homme et l’homme assumé est divinisé. Il a donc fallu que la splendide et très manifeste habitation de Dieu parmi les hommes fût précédée par une introduction à la joie, d’où découlerait pour nous le don magnifique du salut. Tel est l’objet de la fête que nous célébrons : la naissance de la Mère de Dieu inaugure le mystère qui a pour conclusion et pour terme l’union du Verbe avec la chair. ~ C’est maintenant que la Vierge vient de naître, qu’elle est allaitée, qu’elle se forme, qu’elle se prépare à être la mère du Roi universel de tous les siècles. ~
        C’est alors que nous recevons du Verbe un double bienfait : il nous conduit à la Vérité, et il nous détache de la vie d’esclavage sous la lettre de la loi. De quelle manière, par quelle voie ? Sans aucun doute, parce que l’ombre s’éloigne à l’avènement de la lumière, parce que la grâce substitue la liberté à la lettre. La fête que nous célébrons se trouve à cette frontière, car elle fait se rejoindre la vérité avec les images qui la préfiguraient, puisqu’elle substitue le nouveau à l’ancien. ~
        Que toute la création chante et danse, qu’elle contribue de son mieux à la joie de ce jour. Que le ciel et la terre forment aujourd’hui une seule assemblée. Que tout ce qui est dans le monde et au-dessus du monde s’unisse dans le même concert de fête. Aujourd’hui, en effet, s’élève le sanctuaire créé où résidera le Créateur de l’univers ; et une créature, par cette disposition toute nouvelle, est préparée pour offrir au Créateur une demeure sacrée.
      responsory: |-
        R/ Aucune peur, aucun refus,
        Ne vient troubler l’œuvre de grâce,
        Son cœur est rempli d’ineffable attente,
        Elle offre à Dieu le silence
        Où la Parole habite.

morning:
  hymn: 
  - benie-sois-tu-vierge-marie
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - |-
          Célébrons la naissance de la Vierge Marie : elle est de la race d’Abraham, de la tribu de Juda, de la maison de David.
    - psalm: AT_41
      antiphon:
        - Par ta naissance, Vierge très pure, tu as illuminé le monde.
    - psalm: PSALM_149
      antiphon:
        - |-
          Célébrons dans la joie la naissance de Marie : qu’elle intercède pour nous auprès de son fils !
  reading:
    biblicalReference: Is 11, 1-2
    content: |-
      Un rameau sortira de la souche de Jessé, père de David, un rejeton jaillira de ses racines. Sur lui reposera l’esprit du Seigneur : esprit de sagesse et de discernement, esprit de conseil et de force, esprit de connaissance et de crainte du Seigneur, qui lui inspirera la crainte du Seigneur.
  responsory: |-
    R/ Mon âme exalte le Seigneur :
    éternel est son amour !
    V/ Chante et réjouis-toi, fille de Sion,
    ton Dieu est au milieu de toi. R/
    V/Dieu pour toi exulte de joie,
    il te renouvelle par son amour. R/
  evangelicAntiphon:
    common: Ta naissance, ô Marie, annonce la joie au monde. De toi s’est levé le Soleil de justice. Le Christ a changé le péché en grâce, et la mort en vie éternelle.

middleOfDay:
  tierce:
    antiphon: C’est aujourd’hui la naissance de la Vierge Marie, toute l’Église est illuminée.
    reading:
      biblicalReference: Ap 21, 3b
      content: Voici la demeure de Dieu avec les hommes ; il demeurera avec eux et ils seront son peuple, Dieu lui-même sera avec eux.
    responsory: |-
      V/ Tu es bénie entre toutes les femmes,
      et le fruit de tes entrailles est béni.
  sexte:
    antiphon: |-
      Ta naissance, ô Marie, nous est une lumière : que ta prière nous soutienne et nous aide.
    reading:
      biblicalReference: Jdt 13, 18b.19
      content: Béni soit le Seigneur Dieu, lui qui a créé les cieux et la terre. En effet, ton espérance ne quittera pas le cœur des hommes qui se souviendront de la vigueur de Dieu pour toujours.
    responsory: |-
      V/ Heureuse la Vierge Marie :
      elle a mis au monde le Fils du Père éternel.
  none:
    antiphon: Chantons de tout cœur la gloire du Christ en célébrant la très sainte Mère de Dieu.
    reading:
      biblicalReference: Ap 21, 3b
      content: Voici la demeure de Dieu avec les hommes ; il demeurera avec eux et ils seront son peuple, Dieu lui-même sera avec eux.
    responsory: |-
      V/ Tu es bénie entre toutes les femmes,
      et le fruit de tes entrailles est béni.

vespers:
  hymn: 
  - la-terre-dessechee
  psalmody:
    - psalm: PSALM_121
      antiphon:
        - Elle est de la race de Jessé, l’Esprit Saint la couvrira de son ombre.
    - psalm: PSALM_126
      antiphon:
        - C’est aujourd’hui la naissance de la Vierge Marie, Dieu voit la beauté de son humble servante.
    - psalm: NT_4
      antiphon:
        - Vierge Marie, Mère de Dieu, bénie sois-tu ! Intercède pour ceux qui célèbrent ta naissance.
  reading:
    biblicalReference: Rm 9, 4-5
    content: Les fils d’Israël ont pour eux l’adoption, la gloire, les alliances, la Loi, le culte, les promesses de Dieu ; ils ont les patriarches, et c’est de leur race que le Christ est né, lui qui est au-dessus de tout, Dieu béni éternellement. Amen.
  responsory: |-
    R/ Réjouis-toi, comblée de grâce :
    * Le Seigneur est avec toi.
    V/ Tu es bénie entre toutes les femmes.
    * Le Seigneur.
    Gloire au Père. R/ Réjouis-toi.
  evangelicAntiphon:
    common: |-
      Célébrons la Vierge Marie au jour de sa naissance : en elle nous fêtons la mère du Sauveur.
