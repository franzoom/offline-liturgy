celebration:
  title: Saint Norbert
  subtitle: évêque
  description: Norbert (1080-1134) fut d’abord chanoine de Xanten (Rhénanie), puis il voulut adopter une vie plus évangélique avec quelques compagnons. Ils se fixèrent en France près de Laon à Prémontré, où Norbert fonda une communauté de Chanoines réguliers (1120). Peu après il devait être nommé archevêque de Magdebourg et il travailla à la réforme de l’Église en Allemagne.
  commons:
    - pastors_bishop
  color: white

oration:
  - Pour le service de ton Église, Seigneur, tu as voulu que l’évêque saint Norbert soit un homme de prière et un vrai pasteur ; par son intercession, daigne assurer à ton peuple les hommes qui le guideront selon ta volonté et le conduiront jusqu’au salut.

readings:
  patristicReading:
    - title: VIE DE SAINT NORBERT PAR UN CONTEMPORAIN
      content: |-
        Norbert est compté à juste titre parmi ceux qui se sont dévoués avec le plus d’efficacité à la réforme grégorienne. En effet, il est le premier qui a voulu instituer un clergé qui serait consacré à la vie authentiquement évangélique et apostolique, qui serait chaste et pauvre, qui recevrait, « tout à la fois le vêtement et la parure de l’homme nouveau : le vêtement avec l’habit religieux, la parure avec la dignité sacerdotale » ; un clergé qui voudrait « suivre les saintes Écritures et avoir le Christ pour guide ». Norbert recommandait trois choses à ce clergé : « la pureté à l’égard de l’autel et du service divin ; la correction, au chapitre, des excès et des négligences ; le soin des pauvres et l’hospitalité ».
        Mais aux prêtres, qui tenaient dans le monastère la place des Apôtres, il adjoignit, comme dans l’Église primitive, une foule de fidèles, laïques et femmes ; c’est au point que, disait-on généralement, depuis l’époque des Apôtres, aucun fondateur n’a conquis au Christ en si peu de temps un si grand nombre d’imitateurs de la vie parfaite.
        Devenu archevêque de Magdebourg, Il appela ses confrères pour qu’ils amènent à la foi la région des Wendes. Il s’efforça d’amener à la réforme le clergé de son diocèse, en dépit de l’agitation et des troubles populaires.
        Enfin il consacra ses principaux efforts à préserver et à développer la bonne harmonie entre le Siège Apostolique et l’Empire, tout en sauvegardant la liberté des élections ecclésiastiques. Si bien que le pape Innocent II lui écrivit : « Le Siège Apostolique te remercie de tout cœur, comme son fils si dévoué », et que l’empereur le fit archichancelier de l’Empire.
        En tout cela, il montra une foi intrépide : « Norbert se distingue par la foi, disait-on, comme Bernard de Clairvaux par la charité. » Son commerce était plein de charme : « il se montrait grand avec les grands, modeste avec les petits, aimable pour tous. » Enfin, il avait une éloquence supérieure : « sa parole était enflammée, brûlant les vices, stimulant les vertus, enrichissant de sa sagesse les âmes bien disposées. » Contemplateur des mystères divins, il les méditait assidûment et les répandit hardiment.

      responsory: |-
        R/ C’est au prix de son sang
        que le Christ s’est acquis l’Église.
        
        Soyez donc attentifs au troupeau
        dont l’Esprit vous a confié la charge.
        
        Vous serez les intendants fidèles
        des mystères de sa grâce.
        
        Livrés en spectacle au monde,
        vous serez les modèles du troupeau.

