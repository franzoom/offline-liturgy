celebration:
  title: Bienheureuse Viegre Marie de Fatima
  description: Le 13 mai 1917, la Vierge Marie apparaissait pour la première fois à trois enfants, Lucie, Jacinthe et François, à Fatima, un petit village du Portugal. Marie les visita, chaque mois, jusqu’au 13 octobre 1917. Elle montrait l’amour de prédilection du Père pour les tout-petits, et en même temps elle rappelait au monde la nécessité de la prière et de la pénitence comme chemin de paix.
  color: red
  commons:
    - virgin-mary

oration:
  - Seigneur Dieu, tu as voulu que la Mère de ton Fils soit aussi notre Mère ; accorde-nous de persévérer dans la pénitence et la prière pour le salut du monde ; puissions-nous devenir ainsi, de jour en jour, des artisans efficaces du royaume du Christ.
