celebration:
  title: Bienheureuse Vierge Marie de Guadaloupe
  description: En 1531, la Vierge Marie se manifeste à un simple indien du Mexique, Juan Diego, comme la mère du vrai Dieu. Elle donne, comme signe, des roses qu’il apporte à l’évêque. Celui-ci découvre alors, imprimée sur le manteau, l’image de Notre-Dame. Dans le sanctuaire construit à sa demande, elle continue d’appeler tous les peuples à aimer son Fils et est invoquée, depuis Saint Jean-Paul II, sous le titre d’Étoile de l’évangélisation.
  color: white
  commons:
    - virgin-mary

oration:
  - |-
    Dieu, Père des miséricordes, tu as placé ton peuple sous le patronage particulier de la Mère très sainte de ton Fils : accorde à tous ceux qui invoquent Notre-Dame de Guadaloupe de travailler avec une foi plus vive au développement des peuples, en prenant les chemins de la justice et de la paix.


