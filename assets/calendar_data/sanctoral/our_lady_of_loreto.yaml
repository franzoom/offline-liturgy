celebration:
  title: Bienheureuse Vierge Marie de Lorette
  description: Une chronique rédigée en 1465 rapporte que, la nuit du 9 au 10 décembre 1294, fut découverte la vénérable maison sur la colline où elle se trouve encore. Elle est à l’origine de la dévotion mariale qui s’exprime dans le sanctuaire de Lorette par la commémoration du mystère de l’Incarnation et des exemples évangéliques que donna la sainte Famille de Nazareth. De nombreux souverains pontifes ont témoigné un souci apostolique envers le sanctuaire de la Vierge de Lorette, que Benoît XV a proclamé patronne de ceux qui prennent l’avion. Les litanies de Lorette connaissent une diffusion universelle.
  color: white
  commons:
    - virgin-mary

oration:
  - Seigneur Dieu, afin d’accomplir les promesses faites à nos pères, tu as choisi la bienheureuse Vierge Marie, pour qu’elle devienne la Mère du Sauveur ; accorde-nous de suivre l’exemple de celle qui te fut agréable par son humilité et nous fut secourable en son obéissance. 

