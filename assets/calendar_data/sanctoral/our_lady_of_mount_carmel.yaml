celebration:
  title: Notre-Dame du Mont Carmel
  description: |-
    Aux temps anciens, le Mont Carmel fut lié à la geste d’Élie. Au 13^ème siècle, des hommes, brûlant comme le prophète « de zèle pour le Dieu vivant », y menèrent la vie érémitique, puis ils se groupèrent sous une règle commune (1209). Ce fut l’origine de l’Ordre du Carmel, qui se mit sous la protection de Marie, la Vierge de Nazareth et la Mère des contemplatifs.
  color: white
  commons:
  - virgin-mary

oration:
- |-
  Que la prière maternelle de la Vierge Marie vienne à notre aide, Seigneur : accorde-nous, par sa protection, de parvenir à la montagne véritable qui est le Christ, notre Seigneur.

morning:
  evangelicAntiphon:
    common:
    - |-
      J’ai cherché la Sagesse dans la prière, elle a fleuri pour moi comme une vigne au printemps.
readings:
  hymn:
  - reviens-verbe-de-dieu
  patristicReading:
  - title: SERMON DE S. LÉON LE GRAND POUR NOËL
    content: |-
      Une Vierge est choisie, de la maison royale de David. Pour porter en elle un enfant aussi saint, ce fils à la fois divin et humain, elle devait le concevoir spirituellement, avant de le concevoir corporellement. Dans l’ignorance du plan de Dieu, elle aurait pu s’effrayer de phénomènes extraordinaires ; c’est pourquoi elle apprend, dans son entretien avec l’ange, ce que serait en elle l’œuvre du Saint-Esprit. Elle ne craint pas pour sa pureté, elle qui va bientôt enfanter Dieu. Pourquoi serait-elle désespérée par cette conception inouïe, puisqu’on lui promet que ce sera réalisé par la vertu divine ? La confiance de sa foi est confirmée par l’attestation d’un miracle antérieur, celui de la fécondité accordée à Elisabeth contre toute attente : puisque Dieu avait accordé à une femme stérile de concevoir, on ne pouvait douter qu’il l’accorde à une vierge.
      Donc, le Verbe de Dieu, Dieu lui-même, le Fils de Dieu qui %au commencement était auprès de Dieu, par qui tout a été fait et sans qui rien ne s’est fait%, s’est fait homme pour délivrer l’homme de la mort éternelle; il s’est abaissé jusqu’à prendre l’humilité de notre condition sans dommage pour sa majesté ; en demeurant ce qu’il était et en assumant ce qu’il n’était pas, il a uni une véritable nature d’esclave à la nature selon laquelle il est égal au Père: il a joint si étroitement ces deux natures que sa gloire ne peut anéantir la nature inférieure, ni l’union avec celle-ci avilir la nature supérieure.
      Donc, ce qui est propre à chaque nature demeure intégralement, et se rejoint en une seule personne : l’humilité est accueillie par la majesté, la faiblesse par la force, la mortalité par l’éternité. Pour payer la dette de notre condition, la nature au-dessus de toute atteinte est unie à la nature capable de souffrir, le vrai Dieu et le vrai homme s’associent dans l’unité du Seigneur Jésus. Ainsi, comme il le fallait pour nous guérir, le seul et %unique médiateur% entre Dieu et les hommes pouvait mourir par l’action des hommes et ressusciter par l’action de Dieu. Il était donc tout à fait justifié que l’enfantement du salut ne causât aucun dommage à l’intégrité de la vierge : la venue au monde de la Vérité a été la gardienne de sa pureté.
      Telle est, mes bien-aimés, la naissance qui convenait au Christ, %vertu de Dieu et sagesse de Dieu% : par elle, il s’accordait à notre humanité tout en gardant la prééminence de sa divinité. S’il n’était pas vrai Dieu, il ne nous apportait pas le remède. S’il n’était pas vrai homme, il ne nous montrait pas l’exemple.
      À la naissance du Seigneur, les anges bondissent de joie et chantent : %Gloire à Dieu au plus haut des cieux% ; ils annoncent : %Paix sur la terre aux hommes que Dieu aime%. Ils voient en effet la Jérusalem céleste qui se construit avec toutes les nations du monde. Combien la pauvre humanité doit-elle se réjouir devant cette œuvre inouïe de la bonté divine, puisque celle-ci inspire une telle joie à la nature sublime des anges eux-mêmes !

    responsory: |-
      [rubric]Stance[/rubric]
      La Parole et l’Esprit
      ont fécondé la Terre
      où germe la semence du Royaume ;
      dans le silence et dans la paix
      mûrit le fruit de la promesse.

      R/ Bénie sois-tu, Vierge Marie !
      En toi vit le Seigneur, alléluia !

      L’Esprit te couvre de son ombre,
      tu accueilles en toi la rosée du ciel.

      Le Verbe se fait chair ;
      l’homme devient fils de Dieu.

      Déjà les temps sont accomplis :
      au loin, blanchissent les moissons.

vespers:
  evangelicAntiphon:
    common:
    - Heureuse es-tu, Marie, toi qui écoutes la Parole de Dieu et la médites dans ton cœur !
