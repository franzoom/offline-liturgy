celebration:
  title: Saint Paul VI
  subtitle: pape
  description: Jean-Baptiste Montini est né le 26 septembre 1897 à Concesio, près de Brescia. Ordonné prêtre le 29 mai 1920, il exerça son ministère auprès du Siège apostolique, jusqu’à sa nomination comme archevêque de Milan. Élevé au siège de Pierre le 21 juin 1963, il mena heureusement à son terme le concile Vatican II, il promut la réforme de la vie de l’Église, surtout celle de la liturgie, ainsi que le dialogue œcuménique et l’annonce de l’Évangile au monde contemporain. Le 6 août 1978, il rendit son âme à Dieu.
  color: white
  commons:
    - pastors_pope

oration:
  - Seigneur Dieu, tu as confié la charge de conduire ton Église au pape saint Paul VI, qui fut un ardent apôtre de l’Évangile de ton Fils ; à nous qui accueillons la lumière de ses enseignements, donne, nous t’en prions, la force de travailler avec toi pour développer dans le monde la civilisation de l’amour. 
