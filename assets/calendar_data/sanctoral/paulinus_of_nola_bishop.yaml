celebration:
  title: Saint Paulin de Nole
  subtitle: évêque
  description: Le consul Paulin (355-431) et sa femme Thérèse possédaient de vastes territoires en Aquitaine, en Espagne et en Italie méridionale. Devenus chrétiens (393), ils renoncè­rent à leurs biens et se retirèrent à Nole (Campanie), où Paulin fut élu évêque (409). Il devait gouverner cette Église durant vingt-deux ans. « De tous mes biens terrestres, dit Paulin, je payai l’espérance du ciel ».
