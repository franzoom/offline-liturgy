celebration:
  title: Saint Pierre Canisius
  subtitle: prêtre
  description: Pierre Canisius (1521-1597) naquit à Nimègue (Hollande), mais c’est en Allemagne qu’il se fit Jésuite et qu’il passa la majeure partie de sa vie. Professeur, prédicateur, catéchiste, écrivain, missionnaire, il lutta sur tous les terrains pour empêcher l’Allemagne de passer au Luthéranisme. Il vécut à Fribourg (Suisse) ses dernières années.
  commons:
    - pastors
    - pastors_doctors
  color: red

oration:
  - Seigneur, pour la défense de la foi catholique, tu armas de courage et de savoir saint Pierre Canisius ; par son intercession, accorde à ceux qui cherchent la vérité de te trouver dans la joie ; accorde au peuple des croyants de savoir toujours témoigner de toi.

readings:
  patristicReading:
    - title: ÉLOGE DE SAINT PIERRE CHANEL
      content: |-
        %Avant de partir pour l’Allemagne, dont il a mérité d’être appelé le second apôtre, saint Pierre Canisius, après avoir reçu la bénédiction apostolique, fit les plus hautes expériences spirituelles, qu’il a décrites dans ce texte :%
        Ton infinie bonté a voulu, Pontife éternel, que je confie avec empressement l’effet et la confirmation de cette bénédiction apostolique à tes Apôtres que l’on va visiter au Vatican et qui, sous ta conduite, accomplissent des merveilles. Là, j’ai ressenti une grande consolation, et la présence de ta grâce, qui m’était obtenue par de tels intercesseurs. Eux-mêmes, en effet, bénissaient et confirmaient la mission envoyée en Allemagne ; ils paraissaient promettre de m’accorder leur bienveillance comme à l’apôtre de l’Allemagne. Seigneur, tu sais à quel degré et combien de fois, en ce même jour, tu m’as confié l’Allemagne, dont j’ai continué ensuite à me préoccuper, pour laquelle je désire vivre et mourir.
        C’est toi, enfin, qui m’as ordonné de boire à la source de ton cœur ouvert, dans ton Corps sacré qu’il me semblait voir de mes yeux ; oui, tu m’invitais à puiser les eaux de mon salut à tes sources, ô mon Sauveur. Pour moi, je désirais intensément en voir jaillir vers moi des flots de foi, d’espérance, de charité. J’avais soif de pauvreté, de chasteté, d’obéissance ; je demandais à être tout entier lavé, vêtu, embelli par toi. Aussi, après que j’eus osé toucher ton Cœur très doux et y plonger ma soif, tu me promettais un vêtement tissé en trois parties qui pourraient recouvrir la nudité de mon âme, et qui se rattachaient tout à fait à mon engagement : c’était la paix, l’amour et la persévérance. Muni de ce vêtement pour mon salut, j’avais confiance que rien ne me manquerait, mais que tout me réussirait pour ta gloire.

      responsory: |-
        [rubric]Stance[/rubric]
        Apprenons du Maître
        à devenir disciples.
        Il n’est pas venu juger ses frères
        mais les sauver.
        Du trésor de son cœur
        a débordé la Parole de vie.
        
        R/ Le Seigneur est venu jusqu’à nous
        pour nous élever jusqu’à lui.
        
        Parfaite est la loi de l’amour,
        qui a fait du Fils de Dieu notre serviteur.
        
        Limpide est le regard de l’amour,
        qui, dans le frère, sert le Fils de Dieu.
        
        Véridique est le fruit de l’amour,
        qui nous rend fils de Dieu.

morning:
  evangelicAntiphon:
    common:
    - Qui enseigne aux hommes la justice resplendira aux siècles des siècles comme les étoiles dans le ciel.

vespers:
  evangelicAntiphon:
    common:
    - Ô bienheureux Pierre, maître de sagesse et lumière de l’Église, toi qui as cherché les volontés de Dieu, intercède pour nous auprès de lui.