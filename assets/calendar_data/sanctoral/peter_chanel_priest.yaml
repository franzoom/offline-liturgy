celebration:
  title: Saint pierre Dmaien
  subtitle: prêtre et martyr
  description: Pierre Chanel (1803‑1841), religieux mariste originaire du diocèse de Belley, fut envoyé en Océanie pour y porter l’Évangile. Il rencontra beaucoup de difficultés de la part des autochtones païens, ainsi que des missionnaires méthodistes. Il arriva à convertir le fils du roi de Futuna, mais le souverain furieux le fit mettre à mort.
  commons:
    - martyrs
  color: red

oration:
  - Seigneur, pour la croissance et le progrès de ton Église, tu as donné à saint Pierre Chanel la gloire du martyre ; permets qu'en ce temps de joie pascale nos célébrations du Christ mort et ressuscité fassent de nous les témoins d'une vie nouvelle.

readings:
  patristicReading:
    - title: Éloge de saint Pierre Chanel
      content: |-
        Pierre Chanel, dès qu’il eut prononcé ses vœux de religion dans la Société de Marie, fut envoyé sur sa demande aux missions d’Océanie et débarqua à l’île Futuna, dans l’Océan Pacifique, où le nom du Christ n’avait pas encore été annoncé. Le frère qui l’a toujours accompagné raconte ainsi sa vie de missionnaire :
        « Brûlé, dans ses travaux, par l’ardeur du soleil, souffrant souvent de la faim, il rentrait à la maison trempé de sueur, anéanti par la fatigue ; il était pourtant toujours vaillant, alerte et joyeux comme s’il revenait d’un endroit délicieux ; et cela non pas une fois, mais presque chaque jour.
        « Il ne refusait jamais rien aux habitants de Futuna, pas même à ceux qui le persécutaient, les excusant toujours et ne les repoussant jamais, si grossiers et désagréables qu’ils fussent. Il déployait une douceur incomparable envers tous et de toutes manières, sans aucune exception. »
        Il n’est donc pas surprenant que les indigènes l’aient appelé « l’homme au cœur parfait », lui qui avait dit un jour à un confrère : « Dans une mission aussi difficile, faut que nous soyons des saints. »
        Chaque jour, il annonçait le Christ et l’Évangile, mais il recueillait peu de fruits. Sans se décourager, il poursuivait sa tâche de missionnaire, à la fois humanitaire et religieuse, en s’appuyant sur l’exemple et les paroles du Christ : %L’un sème, l’autre moissonne%. Il implorait assidûment le secours de la Mère de Dieu, pour qui il avait une grande dévotion.
        Sa prédication de la religion chrétienne supprima le culte des mauvais esprits que les chefs de Futuna favorisaient pour garder le peuple sous leur domination. C’est pourquoi ils l’assassinèrent très cruellement, en espérant que la mort de Pierre détruirait les semences de christianisme qu’il avait jetées.
        Mais lui-même avait dit, la veille de son martyre : « Peu importe que je meure, la religion du Christ est assez enracinée dans cette île pour que ma mort ne la fasse pas disparaître. »
        Le sang du martyr bénéficia en premier lieu aux habitants de Futuna qui, peu d’années après, avaient tous accepté la foi du Christ ; mais aussi aux autres îles d’Océanie, où existent maintenant de florissantes églises chrétiennes qui invoquent saint Pierre Chanel comme leur premier martyr.

      responsory: |-
         [rubric](Stance)[/rubric]
          Ouvriers de la paix
          la moisson vous attend :
          pour réconcilier le monde,
          n’emportez que l’amour.
          À ceux qui vous accueillent,
          comme à ceux qui vous chassent,
          annoncez la nouvelle :

         R/ Le Royaume de Dieu est là,
          tout près de vous.

          Vous allez recevoir une force :
          l’Esprit Saint viendra sur vous.

          Alors vous serez mes témoins
          jusqu’aux extrémités de la terre.
