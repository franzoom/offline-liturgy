celebration:
  title: Saint Pierre Claver
  subtitle: prêtre
  description: Pierre Claver (1580-1654), entré à Barcelone dans la Compagnie de Jésus à 20 ans, s’embarqua pour la Colombie où il devint prêtre en 1616. C'est là que, jusqu’à sa mort, il se consacre à l'annonce de l’Évangile parmi les esclaves noirs. « Esclave des esclaves », il meurt d’épuisement à Carthagène, après des années de dévouement marquées par de nombreuses conversions.
  commons:
    - pastors
    - saints-male_caritative
  color: white

oration:
  - Seigneur Dieu, tu as fait de saint Pierre Claver l’esclave des esclaves, et tu lui as donné la force de leur venir en aide avec une patience et une charité admirables ; accorde-nous, par son intercession, de rechercher ce qui plaît à Jésus Christ et d’aimer notre prochain en actes et en vérité.

