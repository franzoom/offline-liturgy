  color: white

oration:
- Seigneur Dieu, tu as fait rayonner saint Pierre-Julien d’un amour admirable pour le saint sacrement du Corps et du Sang de ton Fils ; accorde-nous de savoir, nous aussi, goûter la richesse du festin auquel tu nous convies.
