celebration :
  title : Saint Pie V
  subtitle : pape
  description : Durant les six années de son pontificat (1566-1572), le pape Pie V s’appliqua à faire passer dans la pratique les décrets réformateurs du Concile de Trente. Il promulgua le Catéchisme du Concile, ainsi que le Bréviaire et le Missel romain. Enfin il formula les règles de la récitation du Rosaire et s’en fit le propagateur.
  commons :
    - pastors_pope
  color : white

oration :
  - Seigneur qui as suscité dans ton Église le pape saint Pie V pour défendre la foi et veiller à la dignité de la liturgie, accorde-nous, à sa prière, d’entrer dans l’intelligence de ton mystère avec un cœur plein de foi et d’amour.

readings :
  patristicReading :
    - title : Commentaire de S. Augustin sur l'Évangile de Jean
      content : |-
        Outre bien d’autres remèdes que Dieu ne cesse d’offrir au genre humain pour ses misères, lorsque les temps furent accomplis et que lui-même savait que cela devait se faire, il envoya son Fils unique, par qui il avait créé l’univers, afin qu’en demeurant Dieu il devienne homme et soit le %médiateur entre Dieu et les hommes, l’homme Jésus Christ%.
        Ceux qui croiraient en lui, affranchis de tous leurs péchés par le bain de la nouvelle naissance, seraient délivrés de la damnation éternelle. Ils vivraient dans la foi, l’espérance et la charité, ils chemineraient en ce monde, à travers des tentations pénibles et dangereuses ; mais ils marcheraient, soutenus par les réconforts corporels et spirituels de Dieu, jusqu’à ce qu’ils le voient, en suivant le chemin que le Christ est pour eux.
        Et parce que ceux qui y marchent ne sont pas eux-mêmes indemnes de ces péchés qui s’infiltrent par suite de la faiblesse de cette vie, il leur a donné un remède efficace : l’aumône, qui viendrait en aide à leur prière, où il leur a enseigné à dire : %Remets-nous nos dettes, comme nous-mêmes avons remis à nos débiteurs%.
        L’Église agit ainsi, par une espérance bienheureuse, en cette vie difficile ; cette Église que l’Apôtre Pierre, à cause de sa primauté dans l’apostolat, représentait tout entière en sa personne. En ce qui le concerne personnellement, il était un seul homme par nature, un seul chrétien par grâce et, par une grâce plus riche, un seul et même premier Apôtre. Mais Jésus lui a dit : %Je te donnerai les clefs du Royaume des cieux : tout ce que tu auras lié sur la terre sera lié dans les cieux, et tout ce que tu auras délié sur la terre sera délié dans les cieux%. Alors Pierre signifiait l’Église entière qui, en ce monde, est secouée par toutes sortes d’épreuves, comme par des pluies, des inondations, des ouragans, mais qui ne tombe pas parce qu’elle a été fondée sur la pierre, d’où l’Apôtre a reçu son nom.
        Et si le Seigneur dit : %Sur cette pierre je bâtirai mon Église%, c’est parce que Pierre avait dit : %Tu es le Christ, le Fils du Dieu vivant%. Sur cette pierre que tu viens de confesser, dit Jésus, je bâtirai mon Église. %En effet, la pierre, c’était le Christ%. Et sur ce fondement, Pierre à son tour a été bâti. %Les fondations, personne ne peut en poser d’autres que celles qui existent déjà : ces fondations, c’est Jésus Christ%.
        Donc l’Église qui est fondée sur le Christ, a reçu de lui, en la personne de Pierre, les clés du Royaume des cieux, c’est-à-dire le pouvoir de lier et de délier les péchés. Cette Église, en aimant et en suivant le Christ, est donc libérée de tout mal. Mais elle le suit davantage chez ceux qui luttent jusqu’à la mort pour la vérité.

      responsory : |-
        R/ Approchons-nous de la pierre vivante,
        rejetée par les hommes, mais choisie par Dieu.

        Montez à la montagne et rebâtissez ma maison,
        dit le Seigneur,
        J’y trouverai ma joie et ma gloire.

        La gloire future de ce temple dépassera l’ancienne,
        et dans ce lieu je donnerai la paix.

        Vous-mêmes, comme pierres vivantes,
        entrez dans la construction de l’édifice spirituel.


