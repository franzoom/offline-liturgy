celebration:
  title: La Vierge Marie, reine
  description: |-
    Transfigurée jusqu’en son corps, Marie nous apparaît dans la gloire de son assomption comme la réussite suprême de la Rédemption. Mais la toute belle est aussi la toute puissante, puisqu’elle est la Mère de Celui dont « le règne n’aura pas de fin ». C’est pourquoi, depuis des siècles, le peuple chrétien salue en elle sa Reine, souveraine médiatrice de grâce.
  color: white
  commons:
  - virgin-mary

oration:
- |-
  Dieu qui as voulu que la Mère de ton Fils soit notre Mère et notre Reine, fais que, soutenus par son intercession, nous obtenions dans le ciel la gloire promise à tes enfants.

readings:
  hymn:
  - femme-voulue-par-dieu
  patristicReading:
  - title: HOMÉLIE DE SAINT AMÉDÉE DE LAUSANNE POUR L’ASSOMPTION
    content: |-
      Considère combien il était normal que, dès avant son assomption, le nom de Marie ait brillé, admirable, sur toute la terre, et sa renommée très illustre se soit répandue en tous lieux, avant que sa magnificence ne se soit élevée au-dessus des cieux. Il convenait en effet que la Vierge Mère, pour l’honneur même de son Fils, régnât d’abord sur la terre, et pût enfin recevoir ainsi les cieux avec la gloire ; qu’elle fût comblée ici-bas pour pénétrer là-haut dans une sainte plénitude ; et comme elle avait été transportée de vertu en vertu, qu’elle le fût aussi %de clarté en clarté% par l’Esprit du Seigneur.
      Présente dans la chair, elle goûtait donc par avance les prémices du royaume à venir, tantôt s’élevant vers Dieu dans un élan impossible à dire, tantôt rejoignant le prochain en une indicible charité. D’une part, elle était entourée par les hommages des anges ; d’autre part, elle était vénérée par le service des hommes. ~ Gabriel l’assistait parmi les anges ; et Jean, heureux de s’être vu confier auprès de la croix, à lui vierge, la Vierge Mère, la servait ainsi que les autres Apôtres. Eux tous se réjouissaient de voir, les uns leur reine, les autres leur suzeraine, et ils s’empressaient dans un affectueux dévouement.
      Pour elle, établie dans la forteresse la plus élevée des vertus et débordant de l’océan des dons divins, elle épanchait sur le peuple croyant et altéré, dans un ruissellement surabondant, l’abîme des grâces par lequel elle surpassait toutes les créatures. Elle procurait en effet la santé aux corps, et aux âmes la guérison, dans le pouvoir qu’elle avait de réveiller de la mort du corps et de l’âme. Qui jamais est parti de chez elle malade ou triste, ou sans avoir été instruit des mystères célestes ? Qui donc est retourné chez lui sans être pleinement heureux d’avoir obtenu ce qu’il voulait de Marie, la mère du Seigneur ? ~
      Débordante de ces biens si grands, l’épouse, mère de l’unique Époux, douce et très aimée en ses délices, est comme %la source des jardins% spirituels et %le puits des eaux% vives et vivifiantes %qui jaillissent en torrent du Liban% divin. Aussi fait-elle couler, depuis le mont Sion jusqu’à toutes les nations qui l’entourent ou sont répandues au loin, des fleuves de paix et des ruisseaux de grâces débordant du ciel. ~
      Lors donc que la Vierge des vierges était conduite par son Dieu et Fils, le Roi des rois, dans l’allégresse des anges, la joie des archanges, parmi les acclamations du ciel, alors s’accomplit la prophétie de David disant au Seigneur : %La reine se tient à ta droite, dans un vêtement d’or et des ornements variés%.

    responsory: |-
      R/ Mon âme exalte le Seigneur :
      éternel est son amour !

      Chante et réjouis-toi, fille de Sion,
      voici que ton Dieu vient demeurer au milieu de toi.

      Dieu pour toi exulte de joie,
      il te renouvelle par son amour.

      Le Seigneur, comme au jour de fête,
      dansera pour toi avec des cris de joie.

invitatory:
  antiphon:
  - Le Christ, Roi des rois, a couronné sa mère. Venez, adorons-le.

morning:
  evangelicAntiphon:
    common:
    - |-
      Bénie sois-tu, Vierge Marie, Reine du monde, Mère du Christ, Mère du Sauveur.
vespers:
  evangelicAntiphon:
    common:
    - |-
      Heureuse es-tu, Vierge Marie, toi qui as cru ! En toi s’est accomplie la parole de Dieu : tu règnes avec le Christ pour l’éternité.
