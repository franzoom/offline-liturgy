celebration:
  title: Sainte Rita de Cascia
  subtitle: religieuse
  description: NRita (1381-1457) est connue comme la « sainte des causes désespérées ». Mariée à un homme violent dont elle supporte les sévices, elle réussit à le réconcilier avec Dieu. Après la mort de son mari et de ses deux fils, elle entre chez les Augustines de Cascia (Italie). Ayant une vie mystique intense, elle manifeste une constance dans la souffrance et une charité exemplaires.
  color: white
  commons:
    - saints-female_religious

oration:
  - "Donne-nous, Seigneur, en abondance la sagesse de la croix et la force d’âme dont tu as voulu combler sainte Rita : nous pourrons alors supporter avec le Christ les épreuves de la vie, et participer plus profondément au mystère de sa Pâque."
