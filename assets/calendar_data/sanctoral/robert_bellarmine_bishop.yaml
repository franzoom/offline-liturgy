celebration:
  title: Saint Robert Bellarmin
  subtitle: évêque et docteur de l’Église
  description: Le jésuite Robert Bellarmin (1542-1621), Toscan d’origine, enseigna à Louvain, puis à Rome, où il écrivit ses Controverses et forma le jeune Louis de Gonzague. Nommé cardinal archevêque de Bénévent, le professeur se révéla parfaitement doué pour l’action pastorale. Mais il dut revenir à Rome comme conseiller du pape.
  commons:
  - pastors_bishop
  - pastors_doctors
  color: white

oration:
  - Seigneur, tu as donné à saint Robert Bellarmin une science et une force étonnantes pour défendre la foi de l'Église ; par son intercession, accorde à ton peuple le bonheur de garder cette foi dans toute sa pureté.

readings:
  patristicReading:
    - title: LA MONTÉE DE L’ÂME VERS DIEU PAR SAINT ROBERT BELLARMIN
      content: |-
        %Seigneur, tu es doux et indulgent, plein de miséricorde% : qui donc refuserait de te servir de tout son cœur, s’il a commencé à goûter, si peu que ce soit, la douceur de ton autorité paternelle ? Qu’est-ce que tu ordonnes, Seigneur, à tes serviteurs ? %Prenez sur vous mon joug%, dis-tu. Et comment est-il, ton joug ? %Mon joug est facile à porter, dis-tu, et mon fardeau, léger%. Qui donc ne porterait bien volontiers un joug qui n’accable pas, mais qui encourage ; un fardeau qui n’écrase pas, mais qui réconforte ? Tu as donc ajouté à juste titre : %Et vous trouverez le repos%. Et quel est ton joug qui ne fatigue pas mais donne le repos ? Eh bien, c’est le premier et le plus grand des commandements : %Tu aimeras le Seigneur ton Dieu de tout ton cœur%. Qu’y a-t-il de plus facile, de plus agréable, de plus doux que d’aimer la bonté, la beauté, l’amour que tu es parfaitement, Seigneur mon Dieu ?
        En outre, est-ce que tu ne promets pas une récompense à ceux qui observent tes commandements %plus désirables que l’or et plus doux que le miel du rayon% ? Oui, parfaitement, tu promets une récompense et une récompense infinie, comme dit ton Apôtre saint Jacques : %Le Seigneur a préparé la couronne de vie pour ceux qu’il aime%. Et qu’est-ce que la couronne de vie ? Un bien plus grand que ce que nous pouvons concevoir ou désirer. C’est ainsi que parle saint Paul, s’inspirant d’Isaïe : %L’œil n’a pas vu, l’oreille n’a pas entendu, le cœur de l’homme n’a pas imaginé ce que Dieu a préparé pour ceux qui l’aiment%.
        Vraiment, %il y a grand profit à garder tes commandements%. Non seulement le premier et le plus grand des commandements est profitable à celui qui y obéit, non pas à Dieu qui le prescrit : les autres commandements perfectionnent l’homme obéissant, le fortifient, l’éduquent, le mettent en valeur, enfin le rendent bon et bienheureux. Si tu es sage, comprends que tu as été créé pour la gloire de Dieu et ton salut éternel, que là est ta fin, le centre de ton âme, le trésor de ton cœur. Si tu parviens à cette fin, tu seras heureux ; si tu y manques, tu seras malheureux.
        Estime donc que ton vrai bien, c’est ce qui te fait parvenir jusqu’à ta fin ; le vrai mal, ce qui te la fait manquer. Succès et échec, richesse et indigence, santé et maladie, honneurs et ignominie, vie et mort : le sage ne doit ni rechercher les choses pour elles-mêmes, ni les fuir pour elles-mêmes. Si elles contribuent à la gloire de Dieu et à ton éternelle télicité, elles sont bonnes et il faut les rechercher ; si elles y font obstacle, elles sont mauvaises et il faut les fuir.

      responsory: |-
        R/ J’ouvre mon cœur, Seigneur,
        à ta parole de lumière.
        
        Cantique pour moi que tes volontés
        en ma demeure d’étranger.
        
        Heureux les humbles, heureux les pauvres :
        tu leur découvres le secret du Royaume !
