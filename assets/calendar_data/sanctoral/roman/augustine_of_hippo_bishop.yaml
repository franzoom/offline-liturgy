celebration:
  title: Saint Augustin
  description: |-
    Les étapes de la vie d’Augustin sont bien connues : sa naissance à Thagaste (354), sa conversion à Milan (387), son épiscopat à Hippone (395-430). Mais ce qui compte surtout, c’est le rayonnement de sa pensée et le témoignage d’une vie toute consacrée à la recherche de Dieu et au service de l’Église, qui est à la fois pour lui la communauté des chrétiens d’Hippone et le Corps du Christ répandu à travers le monde.
  commons:
  - pastors_bishop
  - pastors_doctors
  color: white

oration:
- Renouvelle, Seigneur, dans ton Église, l’esprit dont tu as comblé l’évêque saint Augustin, pour que, remplis de ce même esprit, nous n’ayons soif que de toi, source de la vraie sagesse, et ne cherchions que toi, auteur de l’éternel amour.

readings:
  patristicReading:
  - title: DES CONFESSIONS DE SAINT AUGUSTIN
    content: |-
      Averti de revenir à moi-même, je suis entré au fond de mon cœur, sous ta conduite, Seigneur, et j’ai pu le taire, %parce que tu es venu à mon secours%. Je suis entré, et avec le regard de mon âme, quel que fût son état, au-dessus de ce même regard, au-dessus de mon intelligence, j’ai vu la lumière immuable. Ce n’était pas cette lumière ordinaire que tout le monde peut voir ; ce n’était pas non plus une lumière de même nature, mais plus puissante, qui aurait brillé de plus en plus et aurait tout rempli par son éclat. Non, cette lumière n’était pas cela, elle était autre chose, tout autre chose. Elle n’était pas au-dessus de mon esprit comme l’huile flotte à la surface de l’eau, ni comme le ciel s’étend au-dessus de la terre. Elle était au-dessus de moi parce qu’elle m’a créé ; j’étais au-dessous d’elle parce que créé par elle. Celui qui connaît la vérité la connaît, et celui qui la connaît, connaît l’éternité. C’est l’amour qui la connaît !
      Ô éternelle vérité, ô véritable charité, ô chère éternité ! Tu es mon Dieu, je soupire après toi jour et nuit. Quand je t’ai connu pour la première fois, tu m’as soulevé vers toi pour me faire voir l’existence de quelque chose que je devrais voir, mais que je ne pourrais pas encore voir moi-même. Tu as ébloui la faiblesse de mon regard par la puissance de ton rayonnement, et je frissonnais d’amour et d’effroi. J’ai découvert que j’étais loin de toi, dans le pays de l’exil et de la dissemblance, et il me semblait que j’entendais ta voix, venant du haut du ciel : « Je suis la nourriture des forts : grandis et tu me mangeras. Tu ne me changeras pas en toi, comme la nourriture de ton corps, c’est toi qui seras changé en moi. » ~
      Je cherchais le moyen d’acquérir la force qui me rendrait capable de vivre uni à toi, et je ne la trouvais pas. ~ Enfin, j’ai embrassé %le Médiateur entre Dieu et les hommes, l’homme Jésus Christ, lui qui est au-dessus de tout, Dieu béni éternellement*. C’est lui qui nous appelle et nous dit : %Moi, je suis le chemin, la vérité et la vie%. Il unit à la chair — puisque le Verbe s’est fait chair — la nourriture que j’étais incapable de prendre, afin que ta sagesse, par laquelle tu as tout créé, se transforme en lait pour s’adapter à notre condition d’enfants. ~
      Je t’ai aimée bien tard, Beauté si ancienne et si nouvelle, je t’ai aimée bien tard ! Mais voilà : tu étais au-dedans de moi quand j’étais au-dehors, et c’est dehors que je te cherchais ; dans ma laideur, je me précipitais sur la grâce de tes créatures. Tu étais avec moi, et je n’étais pas avec toi. Elles me retenaient loin de toi, ces choses qui n’existeraient pas si elles n’existaient en toi. Tu m’as appelé, tu as crié, tu as vaincu ma surdité ; tu as brillé, tu as resplendi, et tu as dissipé mon aveuglement ; tu as répandu ton Parfum, je l’ai respiré et je soupire maintenant pour toi ; je t’ai goûtée, et j’ai faim et soif de toi ; tu m’as touché et je me suis enflammé pour obtenir la paix qui est en toi.

    responsory: |-
      R/ Ô abîme de la sagesse
      et de la science de Dieu,
      insondables ses décrets,
      incompréhensibles ses voies !
      
      Mystère de Dieu, mystère du Christ,
      où se trouvent cachés tous les trésors
      de la sagesse et de la connaissance.
      
      Dieu a voulu nous faire connaître 
      la gloire de ce mystère au milieu des nations :
      le Christ parmi nous, l’espérance de la gloire.

morning:
  hymn:
    - immensite-d-amour
  evangelicAntiphon:
    common:
    - |-
      Tu nous as faits pour toi, Seigneur, et notre cœur est sans repos tant qu’il ne repose en toi !

vespers:
  hymn:
    - immensite-d-amour
  evangelicAntiphon:
    common:
    - |-
      Tard je t’ai aimée, beauté toujours ancienne, beauté toujours nouvelle, tard je t’ai aimée ! À grands cris, tu m’appelais : tu m’as guéri de ma surdité.




