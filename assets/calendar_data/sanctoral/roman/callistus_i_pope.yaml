celebration:
  title: Saint Callixte I^er
  subtitle: pape et martyr
  description: Le pape Calliste avait établi sur la via Appia le cimetière qui porte son nom, au temps où il était diacre de l’Église romaine. Devenu pape (217), il se montra ferme dans la défense de la foi face aux spéculations de certains théologiens. Il devait périr dans une émeute au Transtévère (222), où son souvenir s’est conservé.
  commons:
  - martyr
  - pastors_pope
  color: red

oration:
- |-
  Daigne, Seigneur, en ta bonté, écouter les prières de ton peuple : fais que nous trouvions un secours dans les mérites du pape saint Calliste, dont nous célébrons aujourd’hui le martyre.

readings:
  patristicReading:
    - title: SAINT CYPRIEN EXHORTE L’ÉVÊQUE FORTUNAT AU MARTYRE
      content: |-
        %Il n’y a pas de commune mesure entre les souffrances du temps présent et la gloire que Dieu va bientôt révéler en nous%. Qui donc ne travaillerait pas de toutes manières à obtenir une telle gloire pour devenir l’ami de Dieu, se réjouir aussitôt en compagnie de Jésus Christ, et recevoir les récompenses divines après les tourments et les supplices de cette terre ? Pour les soldats de ce monde, il est glorieux de rentrer triomphalement dans leur patrie après avoir vaincu l’ennemi. N’est-ce pas une gloire bien supérieure de revenir triomphalement, après avoir vaincu le démon, au paradis d’où Adam avait été chassé à cause de son péché ? D’y rapporter le trophée de la victoire après avoir abattu celui qui l’avait trompé ? D’offrir à Dieu comme un butin magnifique une foi intacte, un courage spirituel sans défaillance, un dévouement digne d’éloges ? De l’accompagner quand il viendra tirer vengeance de ses ennemis, d’être à son côté quand il viendra trôner pour le jugement ; de devenir cohéritier du Christ, d’être égalé aux anges, de jouir avec bonheur du royaume céleste avec les patriarches, les Apôtres, les prophètes ? Quelle persécution peut vaincre de telles pensées qui peuvent nous faire dominer les supplices ?
        L’âme se maintient courageuse et inébranlable en s’appuyant sur cette méditation. Elle demeure invincible devant toutes les terreurs inspirées par le démon, devant toutes les menaces du monde, car elle est fortifiée par une foi sûre et solide. La terre nous emprisonne par ses persécutions, mais le ciel reste ouvert. L’antichrist nous menace, mais le Christ nous protège. La mort nous est infligée, mais l’immortalité lui succède. ~ Quel honneur et quelle sécurité de sortir de ce monde avec joie, d’en sortir glorieux en traversant les épreuves et les tortures ! De fermer un instant les yeux qui voyaient les hommes et le monde, pour les rouvrir aussitôt afin de voir Dieu et le Christ ! Quelle chance, de faire si rapidement ce voyage ! Tu es subitement arraché à la terre pour te retrouver dans les royaumes célestes.
        Il faut que notre esprit et notre réflexion se pénètrent de tout cela, le méditent jour et nuit. Si la persécution assaille un soldat ainsi préparé, elle ne pourra vaincre son courage prêt au combat. Ou bien, si nous sommes appelés au ciel avant la lutte, la foi qui s’était préparée au martyre ne sera pas sans récompense. Le juge divin nous versera notre salaire sans perdre de temps. Dans la persécution il couronne ses soldats, dans la paix il couronne la bonne conscience.

      responsory: |-
        R/ Prenons en main le bouclier de la foi
        et le glaive de la Parole de Dieu.
        
        Pour la cause de Dieu, les armes de notre combat
        ont le pouvoir de renverser les forteresses.
        
        Pour détruire toute puissance
        qui se dresse contre Dieu,
        
        Pour rendre toute pensée captive
        dans l’obéissance au Christ,
