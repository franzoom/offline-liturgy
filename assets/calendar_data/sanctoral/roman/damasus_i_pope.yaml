celebration:
  title: Saint Damase I^er
  subtitle: pape
  description: Le pape Damase (366-384) est surtout connu pour son zèle à promouvoir le culte des martyrs de Rome. En aménageant les anciens cimetières, en recueillant dans ses inscriptions les souvenirs de la grande persécution, il donna à ce culte une impulsion décisive. C’est, de plus, à la demande de Damase que Jérôme traduisit la Bible en latin.
  commons:
  - pastors_pope
  color: white

oration:
- Accorde-nous, Seigneur, d’être fidèles à l’exemple du pape Saint Damase qui restaura le culte des martyrs et sut le promouvoir avec amour.

readings:
  patristicReading:
  - title: TRAITÉ DE SAINT AUGUSTIN CONTRE FAUSTE SUR LE VRAI CULTE DES MARTYRS
    content: |-
      Le peuple chrétien rassemblé célèbre avec une religieuse solennité les mémoires des martyrs afin d’exciter à les imiter, et aussi pour être associé à leurs mérites et secouru par leurs prières. Cependant, si nous honorons les martyrs, nous n’élevons des autels à aucun d’eux. ~
      En effet, quel évêque montant à l’autel, dans les lieux où les corps des saints sont ensevelis, a-t-il jamais dit : Nous offrons à toi, Pierre, ou Paul, ou Cyprien ? Ce que l’on offre, on l’offre à Dieu qui a couronné les martyrs, auprès des tombeaux de ceux qu’il a couronnés, afin que les lieux eux-mêmes encouragent à une plus grande ferveur pour aiguiser la charité envers eux, que nous pouvons imiter, et envers lui, dont l’assistance nous permettra de le faire.
      Nous rendons aux martyrs le même culte d’affection et de solidarité que l’on rend en cette vie aux saints hommes de Dieu dont nous constatons que le cœur est prêt à subir les mêmes souffrances pour la vérité de l’Évangile. Toutefois, nous honorons les martyrs avec une plus grande ferveur parce que celle-ci est plus assurée, maintenant qu’ils ont triomphé de tous les combats ; nous célébrons par une louange plus confiante ceux qui sont déjà victorieux dans une vie plus heureuse, de préférence à ceux qui sont encore dans les luttes d’ici-bas.
      Mais le culte d’adoration (pour les Grecs, « latrie »…) est une obligation due proprement à la divinité. Nous le rendons et nous enseignons à le rendre à Dieu seul. Or, c’est de ce culte que relève l’oblation du sacrifice et c’est pourquoi on taxe d’idolâtrie ceux qui vont jusqu’à rendre un tel culte aux idoles. En aucune manière nous ne rendons un tel culte, ni nous ne prescrivons de le rendre, a aucun martyr, a aucune âme sainte, à aucun ange. Et quiconque tomberait dans une telle erreur, on le reprend, selon la saine doctrine, afin qu’il se corrige ou qu’il se tienne sur ses gardes.
      Ces saints eux-mêmes, n’étant que des hommes, ~ refusent qu’on leur rende un tel culte, car ils savent qu’il est dû à Dieu seul. On l’a vu chez Paul et Barnabé : les Lycaoniens, bouleversés par les miracles qu’ils venaient d’accomplir, voulaient leur offrir des sacrifices comme à des dieux. Les deux apôtres, déchirant leurs vêtements, affirmèrent et persuadèrent qu’ils n’étaient pas des dieux et interdirent qu’on les traite ainsi. ~
      Mais autre chose est ce que nous enseignons, autre chose ce que nous supportons ; autre chose, ce qu’il est ordonné de corriger et, en attendant que nous l’ayons corrigé, ce que nous sommes contraints de tolérer.

    responsory: |-
      R/ Heureux les cœurs purs :
      ils verront Dieu.
      
      Les âmes des justes sont dans la main de Dieu,
      nul tourment ne les atteindra.
      
      Dieu les a soumis à l’épreuve
      et les a trouvés dignes de lui
      
      Au jour de sa visite, ils resplendiront :
      Le Seigneur règnera sur eux pour toujours.
