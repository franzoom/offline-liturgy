celebration:
  title: Dédicace des basiliques de Saint Pierre et de Saint Paul
  description: Le corps de l’apôtre Pierre fut inhumé au Vatican près du cirque de Néron et celui de Paul sur la route d’Ostie. Au IV^ème siècle, l’empereur Constantin entreprit l’érection d’une vaste basilique sur la tombe de Pierre et il construisit un édifice plus modeste sur celle de Paul. On célèbre aujourd’hui leur dédicace par une mémoire des deux Apôtres.
  commons:
    - apostles
  color: white

oration:
  - Garde ton Église, Seigneur, sous la protection des Apôtres Pierre et Paul ; puisqu’elle reçut par eux la première annonce de l’Évangile, qu’elle en reçoive, jusqu’à la fin des temps, la grâce dont elle a besoin pour grandir.

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT LÉON LE GRAND POUR LA FÊTE DES APÔTRES PIERRE ET PAUL
      content: |-
        %Aux yeux de Dieu, la mort de ses saints a beaucoup de prix%, et aucun genre de cruauté ne peut détruire la religion fondée par le mystère de la croix du Christ. L’Église n’est pas diminuée, mais agrandie par les persécutions. Et le champ du Seigneur se revêt sans cesse d’une moisson plus riche, lorsque les grains, qui tombent isolés, renaissent multipliés.
        Aussi, ces deux germes magnifiques de la semence divine (saint Pierre et saint Paul), quelle descendance ont-ils fait fructifier : des milliers de saints martyrs ! Rivalisant avec les triomphes des Apôtres, ils sont, dans notre ville, une foule empourprée qui rayonne au loin ; ils la couronnent d’un diadème unique, scintillant de pierreries sans nombre.
        Certes, mes bien-aimés, une telle protection, que Dieu a prévue pour nous donner un modèle de patience et pour fortifier notre foi, doit nous réjouir d’une façon générale lorsque l’on commémore tous les saints. Mais nous avons raison de nous glorifier avec plus d’allégresse d’avoir des pères aussi éminents : la grâce de Dieu leur a donné une place si élevée parmi tous les membres de l’Église qu’elle les a placés comme les deux yeux dans le corps dont le Christ est la tête.
        Lorsqu’il s’agit de leurs mérites et de leurs vertus, qui surpassent tout éloge, nous ne devons mettre entre eux aucune différence, aucune séparation ; car leur vocation les a rendus pareils, leur labeur les a rendus semblables, leur fin les a rendus égaux.
        Comme nous l’avons éprouvé nous-mêmes, et comme nos anciens l’ont montré, nous croyons avec confiance que nous serons toujours aidés par les prières de nos patrons particuliers pour obtenir la miséricorde de Dieu. Autant nos péchés personnels nous accablent, autant les mérites de ces Apôtres nous réconfortent.

      responsory: |-
        [rubric]Stance[/rubric]
        Tu révèles ta présence :
        devant son pur éclat
        notre vide nous saisit ;
        nous confessons notre péché.
        Mais toi, Dieu fort,
        tu apaises la crainte
        et nous envoies porter aux hommes
        la confiance des sauvés.

        R/ Sur ton ordre, Seigneur,
        nous dirons ta parole.

        Avance au large et ne crains pas ;
        je suis avec vous tous les jours
        jusqu’à la fin du monde.

        Je vous donne ma paix :
        comme mon Père m’a envoyé,
        moi aussi je vous envoie.

        Je vous baptiserai dans l’Esprit et le feu ;
        vous serez mes témoins
        jusqu’aux limites du monde.

        Dans le monde vous aurez à souffrir,
        mais gardez courage,
        j’ai vaincu le monde.

morning:
  evangelicAntiphon:
    common:
      - |-
        Bénis soient les Apôtres Pierre et Paul : ils nous ont transmis la Loi du Seigneur.

vespers:
  evangelicAntiphon:
    common:
      - Les corps des Apôtres reposent dans la paix ; leurs noms sont vivants pour les siècles.
