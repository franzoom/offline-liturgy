celebration:
  title: Saint Grégoire de Narek
  subtitle: abbé et docteur de l’Église
  description: Né en 950 environ dans l’Arménie historique à Antzévatisk, Grégoire grandit dans une famille où l’on cultivait des lettres. Encore jeune, il entra au monastère de Narek, dirigée par l’abbé Ananie, qui était son grand-oncle maternel. Il se forma dans l’illustre école du monastère ou, comme prêtre puis abbé, il devait passer toute sa vie, marquée par une dévotion ardente envers la Vierge Marie. Il parvint à un degré éminent de sainteté et d’expérience mystique. Il exposa sa doctrine dans son temps des ouvrages de théologie et de mystique. En 1003, il composa son œuvre la plus connue, le livre de prière. Il mourut environ deux ans plus tard.  
  commons:
    - saints_doctors
    - saints-male_religious
  color: white

oration:
  - Dieu éternel et tout-puissant, tu as donné à saint Grégoire, maître de doctrine et honneur du peuple arménien, la grâce d’enseigner la vie mystique ; accorde-nous d’apprendre à son école l’art de parler avec toi et d’éclairer sans cesse notre vie par les sacrements de l’Église.
