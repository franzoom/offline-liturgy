celebration:
  title: Sainte Edwige
  subtitle: religieuse
  description: Edwige (1174-1243), duchesse de Silésie et de Pologne, mena à son foyer une vie de foi intense. Après la mort de son mari, elle se retira chez sa fille, abbesse cistercienne de Trzebnicz, près de Wroclaw. Elle eut la douleur de perdre six de ses sept enfants. Elle survécut de peu à son fils aîné, tombé au combat contre les Tartares.
  commons:
  - saints-female_religious
  color: white

oration:
- |-
  Nous t’en prions, Dieu tout-puissant : que l’intercession de sainte Edwige nous obtienne la grâce d’imiter ce que nous admirons en elle, puisque l’humilité de toute sa vie peut servir d’exemple à chacun de nous.

readings:
  patristicReading:
    - title: VIE DE SAINTE EDWIGE PAR UN CONTEMPORAIN
      subtitle: 
      content: |-
        La servante de Dieu savait que les pierres vivantes qui sont destinées à édifier la Jérusalem céleste doivent être polies en ce monde en étant trappées et meurtries, et qu’il faut passer par de nombreuses épreuves pour parvenir à la gloire d’en haut et à la patrie glorieuse. Elle s’offrit donc tout entière au torrent des souffrances ; sans pitié, elle brisa continuellement son corps par de nombreuses flagellations. Elle se macéra chaque jour par des jeûnes et des abstinences si sévères que beaucoup se demandaient comment une femme aussi faible et délicate pouvait endurer de tels tourments.
        Si elle mortifiait assidûment sa chair, elle était cependant guidée par la discrétion ; plus elle y veillait attentivement, plus elle progressait en force d’esprit et en grâce, plus l’incendie de la ferveur et de l’amour divin prenait de vigueur en elle. Elle était souvent emportée vers Dieu par un désir si ardent qu’elle devenait comme insensible et ne remarquait plus rien de ce qui l’entourait.
        De même que la ferveur de son âme la faisait toujours tendre vers Dieu, sa bienfaisance la faisait se pencher vers le prochain. Elle donnait de larges aumônes aux indigents. Elle accordait des secours aux communautés et aux personnes religieuses vivant au-dedans ou au-dehors des monastères, aux veuves et aux orphelins, aux malades et aux infirmes, aux lépreux, aux prisonniers, aux voyageurs, aux femmes indigentes nourrissant de petits enfants. Elle ne laissa jamais repartir sans l’avoir réconforté aucun de ceux qui venaient chercher du secours auprès d’elle.
        Cette servante de Dieu n’a jamais négligé d’exercer aucune bonne œuvre. Aussi Dieu lui accorda-t-il cette grâce : lorsqu’elle manquait humainement de ressources pour agir, lorsque ses propres forces étaient insuffisantes, elle pouvait accomplir par la vertu de la passion du Christ tout ce que son prochain dans le besoin venait lui demander. Lorsque l’on recourait à elle pour être délivré d’un malheur, aussi bien corporel que spirituel, elle a toujours pu accorder les secours voulus, selon le bon plaisir de la volonté divine.

      responsory: |-
        R/ Qui fait la volonté de Dieu, alléluia,
        demeure éternellement, alléluia, alléluia !
        
        L’herbe sèche et la fleur se fane,
        le monde passe avec ses convoitises.
        
        Si quelqu’un aime le monde,
        l’amour du Père n’est pas en lui.
        
        Si quelqu’un aime son frère,
        il marche dans la lumière.