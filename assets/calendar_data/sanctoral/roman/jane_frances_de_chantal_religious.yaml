celebration:
  title: Sainte Jeanne-Françoise de Chantal
  subtitle: religieuse
  description: Veuve du baron de Chantal à vingt-huit ans, et mère de quatre enfants, Jeanne-Françoise (1572-1641) eut la grâce de trouver sur sa route François de Sales, qui allait guider sa montée vers Dieu. En 1610, quittant les siens, elle fonda l’ordre de la Visitation à Annecy. Le reste de sa vie devait être consacré à la diffusion de sa famille religieuse.
  commons:
    - saints-female_religious
  color: white

oration:
- Seigneur Dieu, en sainte Jeanne-Françoise de Chantal tu as fait resplendir une remarquable sainteté par divers chemins de vie ; à sa prière, accorde-nous de progresser dans la fidélité à notre vocation et ainsi de rayonner sans cesse de ta lumière.

readings:
  patristicReading:
    - title: MÉMOIRES DE FRANÇOISE-MADELEINE DE CHAUGY
      content: |-
        Un jour la bienheureuse Jeanne dit ces paroles de feu, qui furent fidèlement recueillies sur-le-champ :
        « Mes chères filles, saint Basile, ni la plupart de nos saints Pères et piliers de l’Église, n’ont été martyrisés ; pourquoi vous semble-t-il que cela soit arrivé ? » Après que chacune eut répondu : « Et moi, dit cette bienheureuse Mère, je crois que c’est parce qu’il y a un martyre qui s’appelle le martyre d’amour, dans lequel Dieu soutenant la vie à ses serviteurs et servantes, pour les faire travailler à sa gloire, il les rend martyrs et confesseurs tout ensemble ; je sais, ajouta-t-elle, que c’est le martyre auquel les Filles de la Visitation sont destinées et que Dieu le fera souffrir à celles qui seront si heureuses que de le vouloir. » Une Sœur lui demanda comment ce martyre se pouvait faire ? « Donnez, lui dit-elle, votre consentement absolu à Dieu, et vous le sentirez. C’est, poursuivit-elle, que le divin amour fait passer son glaive dans les plus secrètes et intimes parties de nos âmes et nous sépare nous-mêmes de nous-mêmes. Je sais une âme, ajouta-t-elle, laquelle l’amour a séparé des choses qui lui ont été plus sensibles que si les tyrans eussent séparé son corps de son âme par le tranchant de leurs épées. »
        Nous connûmes bien qu’elle parlait d’elle-même. Une Sœur lui demanda combien ce martyre durait. « Depuis le moment, répondit-elle, que nous nous sommes livrées sans réserves à Dieu jusqu’au moment de notre mort, mais cela s’entend pour les cœurs généreux, et qui, sans se reprendre, sont fidèles à l’amour ; car, les cœurs faibles et de peu d’amour et de constance, Notre Seigneur ne s’applique pas à les martyriser ; il se contente de les laisser rouler leur petit train, de crainte qu’ils ne lui échappent, parce qu’il ne violente jamais le libre arbitre. »
        On lui répliqua si ce martyre d’amour pouvait jamais égaler le martyre corporel. « Ne cherchons point, dit-elle, l’égalité, quoique je pense que l’un ne cède rien à l’autre, %car l’amour est fort comme la mort%, et les martyrs d’amour souffrent plus mille fois en gardant leur vie, pour faire la volonté de Dieu, que s’il en fallait donner mille pour témoignage de leur foi, de leur amour et de leur fidélité. »

      responsory: |-
        R/ Fais grandir en nous, Seigneur,
        l’accord et l’harmonie d’un même amour.

        Menez une vie digne de l’Évangile,
        fermes dans un même esprit,
        luttant d’un cœur unanime.

        Sans vous soucier de vos propres affaires,
        ayez à cœur celles de vos frères,
        à l’exemple du Christ Jésus.
