celebration:
  title: Saints Jean de Brébeuf et Isaac Jogues, prêtres, et leurs compagnons
  subtitle: martyrs
  description: Jean de Brébeuf et Isaac Jogues sont les chefs de file des huit jésuites français qui furent massacrés pour le Christ en Amérique du Nord entre 1642 et 1649. Isaac Jogues, le premier, subit le martyre au pays des Iroquois près d’Auriesville, dans l’actuel État de New York ; Jean de Brébeuf périt au pays des Hurons en territoire canadien.
  commons:
  - martyrs
  color: red

oration:
- Tu as voulu, Seigneur, que la parole et le sang de tes martyrs, Jean de Brébeuf, Isaac Jogues et leurs compagnons, sanctifient les débuts de l’Église en Amérique du Nord ; fais que se lève partout, à leur prière, une moisson de chrétiens chaque jour plus abondante.

readings:
  patristicReading:
    - title: CARNET SPIRITUEL DE SAINT JEAN DE BRÉBEUF
      content: |-
        Continuellement, pendant deux jours, j’ai ressenti un grand amour du martyre, et j’ai désiré supporter tous les supplices que les martyrs ont soufferts.
        Mon Seigneur, mon Sauveur Jésus, %que puis-je te rendre pour tous les bienfaits% dont tu m’as prévenu ? %Je prendrai% de ta main %la coupe% de tes douleurs, et %j’invoquerai ton nom%. J’en fais vœu devant ton Père éternel et l’Esprit Saint, devant ta très sainte Mère et son époux très chaste, devant les anges, les Apôtres et les martyrs, devant mon père saint Ignace, et devant saint François Xavier. Oui, je t’en fais le vœu, mon Sauveur Jésus : jamais, autant qu’il dépendra de moi, je ne me déroberai à la grâce du martyre, si un jour, dans ton infinie miséricorde, tu dois me la Proposer, à moi ton indigne serviteur.
        Je m’oblige donc, pour tout le temps qui me reste à vivre, à ne jamais vouloir, comme si c’était libre ou permis, éviter de mourir ou de verser mon sang, sauf si j’estimais qu’il est plus conforme à ta gloire, à ce moment-là, d’agir autrement. Bien plus, je m’engage, lorsque je recevrai le coup de la mort, à le recevoir de tes mains avec beaucoup de consentement spirituel et d’alégresse. Par conséquent, mon Jésus que je veux aimer, par la vive joie dont je suis animé, dès maintenant je t’offre mon sang, mon corps et ma vie. Je ne veux mourir que pour toi, si tu m’en donnes la grâce, puisque tu as daigné mourir pour moi. Fais-moi vivre de telle sorte que tu m’accordes le don de mourir d’une façon si avantageuse. Oui, mon Dieu et mon Sauveur, %je prendrai% de ta main %la coupe% de tes souffrances, et %j’invoquerai ton nom% : Jésus, Jésus, Jésus !
        Mon Dieu, comme je souffre de ce que tu ne sois pas connu, de ce que cette région barbare ne soit pas encore tout entière convertie à toi, de ce que le péché n’en soit pas encore expulsé ! Assurément, mon Dieu, si tous les châtiments, aggravés par de cruels supplices, qui sont infligés aux prisonniers dans cette région, devaient tomber sur moi, je m’offre à eux de grand cœur pour être seul à les souffrir.

      responsory: |-
        R/ À toi seul, Fils du vrai Dieu,
        la gloire et la louange.
        
        Qui se déclarera pour moi devant les hommes,
        je me déclarerai pour lui devant mon Père.
        
        Qui aura tenu bon jusqu’à la fin,
        je lui donnerai la vie éternelle.