celebration:
  title: Saint Jean de Capistran
  subtitle: prêtre
  description: Jean de Capistran (1386-1456), franciscain plein de talent et prédicateur à la parole ardente, était un meneur de foules. n travailla d’abord à la réforme de son Ordre en France et en Italie, puis il parcourut toute l’Europe centrale pour lutter contre l’hérésie de Jean Hus. Il dut enfin prêcher la Croisade contre les Turcs qui menaient la Hongrie.
  commons:
  - pastors
  color: white

oration:
- |-
  Dieu qui as suscité saint Jean de Capistran pour fortifier ton peuple dans les épreuves, nous te le demandons avec confiance : mets-nous en sûreté sous ta protection, et garde ton Église dans une paix durable.

readings:
  patristicReading:
    - title: LE « MIROIR DES CLERCS » PAR SAINT JEAN DE CAPISTRAN
      content: |-
        Ceux qui sont appelés à la table du Seigneur doivent rayonner par toute une vie exemplaire et digne d’éloges, exempte de toute l’impureté des vices. Ils doivent vivre en étant comme le sel de la terre pour eux-mêmes et pour les autres, en éclairant les autres par une lumineuse sagesse, comme étant la lumière du monde. Ils doivent comprendre ce que le maître très-haut, Jésus Christ, a indiqué non seulement aux Apôtres et aux disciples, mais à tous les prêtres et les clercs, leurs successeurs, lorsqu’il a dit : %Vous êtes le sel de la terre. Si le sel se dénature, comment redeviendra-t-il du sel ? Il n’est plus bon à rien : on le jette dehors et les gens le piétinent%.
        Ce qui est vraiment piétiné par les gens, comme du fumier méprisable, c’est un clergé impur et sordide, imprégné par la saleté des vices et paralysé par les chaînes des péchés, si bien qu’il ne peut plus rien faire pour soi ni pour les autres car, comme dit saint Grégoire : « Celui dont la vie est décriée, aboutit à ce que sa prédication soit méprisée. »
        %Les prêtres qui exercent bien la présidence méritent double honneur, surtout ceux qui peinent au ministère de la parole et à l’enseignement%. Oui, les bons prêtres méritent double honneur : concernant les choses et leur personne, autrement dit temporel autant que spirituel, ou encore transitoire et éternel. Car, s’ils habitent sur terre avec des créatures mortelles en vertu des liens de la nature, ils se préoccupent ardemment de vivre au ciel avec les anges pour être bien vus du Roi, comme de sages ministres. C’est pourquoi, de même que le soleil se lève pour le monde dans les hauteurs de Dieu, que %la lumière% du clergé %brille devant les hommes afin qu’en voyant ce que font de bien% ces serviteurs de Dieu, les hommes %rendent gloire au Père qui est aux cieux%.
        %Vous êtes la lumière du monde%. Non seulement la lumière se manifeste elle-même, mais en répandant ses rayons tout autour d’elle, elle illumine les objets qu’elle touche ; de même la vie lumineuse des clercs irréprochables, par le rayonnement de leur sainteté, éclaire et apaise ceux qui les regardent. Chargé de s’occuper des autres, le clerc doit montrer en lui-même comment les autres doivent vivre dans la maison du Seigneur.

      responsory: |-
        R/ Lumière sur nos pas, Jésus Christ,
        dans les chemins de vérité !
        
        Celui qui fait la vérité
        vient à la lumière.
        
        Celui qui aime est né de Dieu
        et connaît Dieu.
