celebration:
  title: Saint Jean de Kenty
  subtitle: prêtre
  description: Jean de Kenty (1390-1473), prêtre polonais, enseigna la philosophie et la théologie à l’université de Cracovie. Le professeur rayonnait par son savoir, mais plus encore par sa charité pour les pauvres et son esprit de pénitence. Persuadé de la valeur spirituelle du pèlerinage, il alla vénérer le tombeau du Christ à Jérusalem et se rendit quatre fois à Rome.
  commons:
  - pastors
  color: white

oration:
  - Accorde-nous, Dieu tout-puissant, de progresser dans l’intelligence de ton mystère, à l’exemple de saint Jean de Kenty, et de trouver auprès de toi le pardon, pour avoir pratiqué la charité envers tous.

readings:
  patristicReading:
    - title: BULLE DU PAPE CLÉMENT XIII, POUR LA CANONISATION DE SAINT JEAN DE KENTY
      subtitle: 2 février 1767
      content: |-
        Parmi les hommes éminents par la doctrine et la sainteté, capables d’agir et d’enseigner et de défendre la foi orthodoxe attaquée par ses adversaires, personne n’hésite à compter le bienheureux Jean de Kenty. Il suffit de l’avoir entendu, à l’université de Cracovie, enseigner une science puisée à la source la plus pure. Or, à cette époque, dans des régions guère éloignées, sévissaient les schismes et les hérésies. Il travaillait à expliquer au peuple, dans sa prédication, la morale la plus sainte ; et il confirmait cet enseignement par son humilité, sa chasteté, sa miséricorde, ses pénitences corporelles, toutes les vertus d’un prêtre irréprochable et d’un vaillant ouvrier.
        C’est pourquoi il ne se contenta pas d’apporter aux professeurs de cette université un surcroît de prestige, mais il laissa aussi un merveilleux exemple à tous ceux qui exercent cette charge. Qu’ils s’efforcent énergiquement d’être de parfaits enseignants et qu’ils travaillent de toutes leurs forces à unir la science des saints à leurs autres compétences, pour la louange et la gloire de Dieu seul.
        Il ajoutait l’humilité au respect avec lequel il traitait des choses divines. Ayant une modeste opinion de lui-même, malgré sa supériorité scientifique incontestable, il ne se mettait jamais au-dessus des autres ; il souhaitait même être dédaigné et méprisé par tous ; rien ne lui était plus étranger que de montrer de l’impatience envers ceux qui le contredisaient ou le méprisaient.
        Son humilité s’accompagnait d’une rare simplicité, digne d’un enfant ; aussi, dans ses actions et ses paroles, il n’y avait aucun artifice, aucun faux semblant ; ce qu’il avait au fond du cœur venait facilement sur ses lèvres. S’il soupçonnait, en ayant dit la vérité, avoir blessé quelqu’un par ses paroles, avant de monter à l’autel il demandait humblement pardon, non pas tant pour son erreur que pour celle de l’autre. Dans la journée, après avoir accompli sa tâche, il se rendait directement de l’école à l’église. Et là, devant le Christ caché dans l’Eucharistie, il prolongeait sa contemplation et sa prière. Dieu seul occupait tout son cœur, Dieu seul était sur ses lèvres.

      responsory: |-
        R/ Partager son pain avec l’affamé,
        voilà le jeûne qui plaît à Dieu.
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et si tu cries, le Seigneur répondra ;
        à tes appels, il dira : Me voici !
        
        Ouvre ton cœur au pauvre : c’est ton frère.
        Et quand le Fils de l’homme viendra, il te dira :
        J’avais faim et tu m’as donné à manger.

morning:
  evangelicAntiphon:
    common: À l’amour que vous aurez les uns pour les autres, on reconnaîtra que vous êtes mes disciples.

vespers:
  evangelicAntiphon:
    common: |-
      Venez les bénis de mon Père : ce que vous avez fait à l’un de ces petits, c’est à moi que vous l’avez fait.
