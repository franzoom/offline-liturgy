celebration:
  title: Sainte Joséphine Bakita
  subtitle: vierge
  description: Née au Soudan en 1869, Joséphine Bakhita ne tarde pas à connaître les angoisses de l’enlèvement et de l’esclavage. Vendue cinq fois, elle demande à son nouveau maître, consul italien, de l’amener en Italie. Elle découvre Dieu au contact des religieuses canossiennes et chosit la vie consacrée en 1896. Le 1^er octobre 2000, elle devient la première sainte soudanaise.
  commons:
    - virgins
  color: white

  oration:
  - Dieu notre Père, tu as conduit sainte Joséphine de l’abaissement de l’esclavage à l’honneur d’être ta fille et de devenir l’épouse du Christ ; accorde-nous, à son exemple, de suivre d’un amour fidèle le Seigneur Jésus crucifié et de répandre la miséricorde avec une inlassable charité.

