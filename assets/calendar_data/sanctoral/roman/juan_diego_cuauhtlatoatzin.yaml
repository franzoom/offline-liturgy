celebration:
  title: Saint Juan Diego Cuauhtlatoatzin
  description: Juan Diego, simple et humble indien d’Amérique, fut baptisé avec son épouse à l’âge adulte. Il vécut dans la bonté et la ferveur qu’une foi très pure lui commandait. En 1531, la Mère de Dieu se manifesta à lui, près de la ville de Mexico. Il fit construire une église à sa demande et en son honneur. Demeurant dans la pauvreté, il ne cessa d’y accueillir les pèlerins jusqu’à sa mort en 1548.
  color: white
  commons:
    - saints-male

oration:
  - |-
    Seigneur Dieu, par saint Juan Diego tu as montré la tendresse de la très sainte Vierge Marie à l’égard de ton peuple ; accorde-nous, par son intercession, d’accomplir toujours ta volonté en suivant les exhortations de notre Mère du ciel.

