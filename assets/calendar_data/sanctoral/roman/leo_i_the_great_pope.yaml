celebration:
  title: Saint Léon le Grand
  subtitle: pape et docteur de l’Église
  description: Le pape Léon le Grand (440‑461) tint tête avec là même hauteur de vues et la même énergie au danger des invasions barbares et à l’hérésie d’Eutychès qui menaçait la foi dans le mystère de l’Incarnation. Mais, en pasteur pleinement conscient de sa charge, il ne manquait pas non plus de rappeler au peuple que cette foi doit s’exprimer dans la vie.
  commons:
  - pastors_pope
  - pastors_doctors
  color: white

oration:
  - Dieu qui ne laisses pas les puissances du mal prévaloir contre ton Église fondée sur le roc inébranlable des Apôtres, fais qu’à la prière du pape saint Léon, elle reste ferme dans la vérité, et, sous ta garde, soit pour toujours en paix.

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT LÉON POUR L’ANNIVERSAIRE DE SON ÉPISCOPAT
      content: |-
        L’Église universelle est organisée selon des degrés différents, afin que la diversité des membres assure l’intégrité de ce corps sacré. Cependant, comme dit l’Apôtre, %tous nous ne faisons qu’un dans le Christ%. Aucun de nous n’est séparé d’un autre par sa fonction au point que la plus modeste partie du corps ne serait pas reliée à la tête. Donc, dans l’unité de la foi et du baptême, nous constituons une société sans classes, mes bien-aimés, et nous avons une même dignité selon le saint Apôtre Pierre, qui nous dit ces paroles sacrées : %Vous aussi, comme les pierres vivantes qui servent à construire le Temple spirituel, et vous serez le sacerdoce saint, présentant des offrandes spirituelles que Dieu pourra accepter à cause du Christ Jésus%. Et plus loin : %Vous êtes la race choisie, le sacerdoce royal, la nation sainte, le peuple qui appartient à Dieu%.
        Tous ceux, en effet, qui ont été régénérés dans le Christ, le signe de la croix en fait des rois, et l’onction de l’Esprit Saint les consacre prêtres. Ainsi, en dehors du service particulier de notre ministère, tous les chrétiens qui vivent en l’Esprit et selon la logique de leur vocation doivent reconnaître comme participant à la race royale et à l’office sacerdotal. Qu’y a-t-il en effet d’aussi royal que d’être un esprit soumis à Dieu qui sache gouverner son corps ? Et qu’y a-t-il d’aussi sacerdotal que de consacrer à Dieu une conscience pure et d’offrir sur l’autel de son cœur les sacrifices sans tache de la piété ? Cela vous a été donné par la grâce de Dieu en commun avec tous ; et pourtant c’est de votre part une chose religieuse et digne d’éloge que de vous réjouir, comme d’un honneur qui vous est propre, de l’anniversaire de mon élévation. C’est ainsi qu’on célèbre dans le corps entier de l’Église le mystère unique du sacerdoce lorsque l’huile de la bénédiction s’est répandue. elle a ruisselé plus abondamment, il est vrai, sur les membres supérieurs, mais ce n’est pas avec parcimonie qu’elle atteint aussi les membres les plus bas placés.
        Par conséquent, mes bien-aimés, s’il y a pour nous, dans ce partage d’un même don, un grand motif de nous réjouir ensemble, notre joie aura un objet plus vrai et plus noble, si vous ne vous attardez pas à considérer ma médiocrité. Car il est beaucoup plus utile et plus juste d’élever le regard de votre esprit pour contempler la gloire du bienheureux Apôtre Pierre, et de célébrer ce jour en vénérant principalement celui que la source même de tous les charismes a inondé avec tant d’abondance : c’est au point qu’ayant été le seul à recevoir de si nombreux biens, aucun d’eux ne peut se communiquer à qui que ce soit sans que lui-même y participe.
      responsory: |-
        R/ Gloire au Seigneur, c’est lui notre Dieu !

        Jadis vous n’étiez pas un peuple,
        vous êtes maintenant le peuple de Dieu.

        Vous êtes la race élue, la nation sainte,
        le peuple que Dieu s’est acquis.

morning:
  evangelicAntiphon:
    common: |-
      Heureuse Église, fondée sur le roc de la foi : nul ne te détruira !

vespers:
  evangelicAntiphon:
    common: |-
      Chaque jour, dans l’Église, Pierre proclame : Tu es le Christ, le Fils du Dieu vivant.
