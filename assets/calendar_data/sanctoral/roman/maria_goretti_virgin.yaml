celebration:
  title: Sainte Maria Goretti
  subtitle: vierge et martyre
  description: Maria Goretti appartenait à une famille très pauvre des Marais Pontins, au sud de Rome. Elle avait douze ans quand elle dut résister aux sollicitations d’un jeune voisin. Devant son refus, celui-ci, fou de passion, la frappa à coups de poinçon. Maria mourut le lendemain, après avoir pardonné à son meurtrier « pour l’amour de Jésus » (1902).
  color: red
  commons:
    - martyr
    - virgins

oration:
  - |-
    Seigneur, tu es la source de l’innocence, tu aimes la pureté, et tu as accordé la grâce du martyre à la jeune Maria Goretti ; donne-nous, par son intercession, le courage de garder tes commandements comme tu lui donnas la récompense pour avoir défendu sa virginité jusqu’à la mort.

readings:
  patristicReading:
    - title: HOMÉLIE DE PIE XII POUR LA CANONISATION DE SAINTE MARIA GORETTI
      subtitle: 25 juin 1950
      content: |-
        Tout le monde connaît la lutte très dure que cette vierge désarmée dut affronter ; un assaut violent et aveugle se déchaîna brusquement pour souiller et violer sa pureté angélique. Mais, dans cette terrible épreuve, l’enfant pouvait redire au divin Rédempteur ces paroles d’un livre précieux, l’Imitation de Jésus Christ : « Si je suis éprouvée et meurtrie par les afflictions, je ne craindrai aucun mal pourvu que ta grâce soit avec moi. C’est elle qui est ma force, c’est elle qui me donne conseil et secours. Elle est plus forte que tous les ennemis ». C’est pourquoi, soutenue par la grâce céleste, à laquelle répondait sa volonté noble et courageuse, elle sacrifia sa vie mais elle ne perdit pas la gloire de la virginité.
        Dans l’existence de cette humble enfant, que nous avons esquissée à grands traits, on peut voir ce qui est non seulement digne du ciel, mais digne aussi d’être regardé avec admiration et respect par notre époque. Que les pères et mères de famille apprennent combien ils doivent élever les enfants que Dieu leur a donnés, dans la droiture, la sainteté et le courage, et les former à suivre les préceptes de vie du catholicisme. Ainsi, lorsque leur vertu sera mise en péril, ils pourront, aidés par la grâce divine, sortir du combat, victorieux, sans blessures et sans souillures.
        Que l’enfance joyeuse et la jeunesse ardente apprennent à ne pas s’abandonner misérablement aux joies éphémères et vides du plaisir, à l’attirance fascinante du vice. ~ Qu’elles apprennent plutôt à rechercher avec enthousiasme, même avec effort et à travers les obstacles, la perfection morale du chrétien. Nous pouvons tous l’atteindre un jour par l’énergie de la volonté soutenue par les grâces de Dieu, en pratiquant l’effort, le travail et la prière. ~
        Assurément, nous ne sommes pas tous appelés à subir le martyre ; mais nous sommes tous appelés à posséder la vertu chrétienne. Mais la vertu exige de l’énergie. Sans atteindre le même sommet de courage que cette jeune fille angélique, elle réclame néanmoins de notre part une activité persévérante, attentive, qui ne devra jamais se relâcher jusqu’à la fin de notre vie. C’est pourquoi on peut parler d’un martyre lent et prolongé, auquel nous incite cette affirmation divine de Jesus Christ : %Le Royaume des cieux souffre violence, et ce sont les violents qui s’en emparent%.
        Tendons tous vers ce but, soutenus par la grâce ; que sainte Maria Goretti, vierge et martyre, nous en persuade. Du ciel où elle jouit de l’éternelle béatitude, qu’elle nous l’obtienne du divin Rédempteur par son intercession. Tous alors, chacun selon ses conditions de vie, nous suivrons le même chemin glorieux, avec détermination et réalisme.

      responsory: |-
        R/ Sois fidèle jusqu’à la mort,
        le Seigneur combat pour toi, alléluia !
        
        Ne craignez pas ceux qui tuent le corps
        et ne peuvent rien faire de plus.
        
        Le vainqueur, celui qui croit en moi,
        ne connaîtra pas la seconde mort.
        
        Espère en Dieu, prends cœur et prends courage,
        espère en Dieu !
