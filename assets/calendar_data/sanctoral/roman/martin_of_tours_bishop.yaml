celebration:
  title: Saint Martin
  subtitle: évêque
  description: Martin, un soldat hongrois converti, se fit d’abord disciple d’Hilaire de Poitiers et il fonda à Ligugé le premier monastère d’Occident. Ordonné évêque de Tours (372), il constitua une équipe de moines missionnaires. Avec eux il évangélisa les campagnes gallo‑romaines de la Touraine et des régions voisines, de la Saintonge à l’Auvergne. Il mourut en 397.
  commons:
    - pastors
  color: white

invitatory:
  antiphon:
  - Avec les saints du ciel, chantons la louange de Dieu.

oration:
  - Dieu qui as été glorifié par la vie et la mort de l’évêque saint Martin, renouvelle en nos cœurs les merveilles de ta grâce, si bien que ni la mort, ni la vie ne puissent nous séparer de ton amour.

readings:
  patristicReading:
    - title: LETTRE DE SULPICE SÉVÈRE
      content: |-
        Martin sut longtemps à l’avance qu’il allait mourir, et dit à ses frères que la disparition de son corps était imminente. Auparavant, il dut aller visiter la paroisse de Candes, car les clercs de cette Église étaient divisés et il désirait y rétablir la paix. Il n’ignorait pas qu’il était à la fin de sa vie, mais ce motif ne l’empêcha pas de partir, car il estimait que ses vertus atteindraient leur accomplissement s’il pouvait rendre la paix à cette Église. ~
        Il demeura quelque temps dans ce bourg, ou plutôt dans l’’église où il était allé. Après avoir rétabli la paix entre les clercs, alors qu’il projetait de rentrer au monastère, il sentit brusquement que ses forces l’abandonnaient. Il convoqua les frères et leur annonça qu’il allait les quitter. Alors tous furent accablés par la tristesse et la peine et se lamentèrent d’une seule voix « Père, pourquoi nous abandonnes-tu ? À qui nous laisses-tu en faisant de nous des orphelins ? Des loups voraces vont assaillir ton troupeau. Maintenant que le pasteur est frappé, qui va nous défendre de leurs morsures ? Nous savons que tu désires rejoindre le Christ, mais tu es sûr de ta récompense et un peu de délai ne la diminuera pas. Aie plutôt pitié de nous que tu abandonnes. »
        Il fut ému par ces larmes, car il avait toujours été uni au Seigneur par une très tendre miséricorde, et l’on rapporte qu’il pleura ; mais, tourné vers le Seigneur, il ne répondit à ceux qui pleuraient que cette seule parole « Seigneur si je suis encore nécessaire à ton peuple, je ne refuse pas le travail. Que ta volonté soit faite. » ~
        Quel homme au-dessus de tout éloge ! Il n’était pas vaincu par le travail, mais il ne serait pas vaincu par la mort, car il ne penchait davantage ni d’un côté ni de l’autre : il ne craignait pas de mourir, et il ne refusait pas de vivre ! ~ Il gardait les yeux et les mains levés vers le ciel, et ne permettait pas à son esprit héroïque d’abandonner la prière. Et comme les prêtres réunis autour de lui le priaient de soulager son corps en le changeant de côté : « Laissez-moi, mes frères, disait-il, laissez-moi regarder le ciel plutôt que la terre, afin que mon esprit s’oriente vers le chemin qu’il va prendre pour rejoindre le Seigneur. » Après avoir parlé ainsi, il vit que le démon se tenait près de lui : « Pourquoi restes-tu là, bête cruelle ? Tu ne peux rien attendre de moi, maudit ; le sein d’Abraham va me recevoir. »
        En disant cette parole, il rendit au ciel son esprit. ~ Plein de joie, Martin est accueilli dans le sein d’Abraham, l’humble et pauvre Martin entre au ciel comblé de richesses.
      responsory: |-
        R/ Heureux l’homme
        qui met sa foi dans le Seigneur.

        Sois fort et tiens bon,
        que le livre de la Loi
        soit toujours sur tes lèvres !

        Sois sans crainte ni frayeur :
        le Seigneur ton Dieu
        est avec toi partout où tu iras !

        Vous tous, disciples du Seigneur, 
        fortifiez-vous
        dans la grâce du Seigneur Jésus !

morning:
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Martin, prêtre de Dieu, elles s’ouvrent pour toi, les portes du Royaume !
    - psalm: OT_41
      antiphon:
        - Les mains et les yeux levés vers le ciel, il gardait son cœur en prière.
    - psalm: PSALM_149
      antiphon:
        - Humble et pauvre sur la terre, Martin, riche de Dieu, est accueilli dans le sein d’Abraham.
  reading:
    biblicalReference: He 13, 7-9a
    content: |-
      Souvenez-vous de ceux qui vous ont dirigés : ils vous ont annoncé la parole de Dieu. Méditez sur l’aboutissement de la vie qu’ils ont menée, et imitez leur foi. Jésus-Christ, hier et aujourd’hui, est le même, il l’est pour l’éternité. Ne vous laissez pas égarer par toutes sortes de doctrines étrangères.
  responsory: |-
    R/ Sur tes remparts, Jérusalem,
    j’ai placé des veilleurs.
    V/ Ni de jour ni de nuit,
    ils ne doivent se taire. R/
    V/ Tenez en éveil la mémoire du Seigneur. R/
  evangelicAntiphon:
    common: |-
      Jour d’allégresse pour toi qui entres au Paradis ! Joie pour les anges et les archanges ! Joie pour les saints du ciel qui t’invitent : Demeure avec nous pour l’éternité !

vespers:
  psalmody:
    - psalm: PSALM_14
      antiphon:
        - Les travaux ne t’ont pas abattu, la mort ne t’a pas vaincu. Tu n’as pas craint de mourir, tu n’as pas refusé de vivre.
    - psalm: PSALM_111
      antiphon:
        - Si je suis encore utile à ton peuple, Seigneur, je ne refuse pas le travail. Que ta volonté soit faite.
    - psalm: NT_11
      antiphon:
        - |-
          Martin a quitté ce monde ; avec le Christ, il est vivant : il resplendit parmi les prêtres du Seigneur.
  reading:
    biblicalReference: 1 P 5, 1-4
    content: Je m’adresse à ceux qui exercent parmi vous la fonction d’Anciens, car moi aussi je fais partie des Anciens, je suis témoin de la passion du Christ, et je communierai à la gloire qui va se révéler. Soyez les bergers du troupeau de Dieu qui vous est confié ; veillez sur lui, non par contrainte mais de bon cœur, comme Dieu le veut ; non par une misérable cupidité mais par dévouement, sans commander en maîtres à ceux dont vous avez reçu la charge, mais en devenant les modèles du troupeau. Et, quand se manifestera le berger suprême, vous remporterez la couronne de gloire qui ne se flétrit pas.
  responsory: |-
    R/ Heureux le serviteur vigilant :
    il entrera dans la joie de son Maître.
    V/ Prenez garde à vous-mêmes
    et à tout le troupeau. R/ 
    V/ Conduisez l’Église de Dieu
    acquise par le sang de son Fils. R/
  evangelicAntiphon:
    common: Heureux Martin ! Tu as aimé le Roi du ciel sans craindre les puissants de ce monde ! Tu as reçu les palmes du vainqueur.
