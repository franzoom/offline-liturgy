celebration:
  title: Saint Matthieu
  subtitle: apôtre et évangéliste
  description: Matthieu est une figure familière parmi les Apôtres. La vocation du collecteur d’impôts de Capharnaüm constitue l’un des épisodes les plus populaires du ministère galiléen de Jésus. De plus, l’évangile selon Matthieu est celui qui met le mieux en lumière la continuité entre l’ancienne et la nouvelle Alliances.
  commons:
    - apostles
  color: red

oration:
  - Dans ta miséricorde inépuisable, Seigneur, tu as choisi le publicain Matthieu pour en faire un Apôtre ; donne-nous, par sa prière et à son exemple, de suivre le Christ et de nous attacher à lui fermement. Lui qui règne.

readings:
  biblicalReading:
    - title: LECTURE DE LA LETTRE AUX ÉPHÉSIENS
      subtitle: Bâtir le corps du Christ dans l’unité
      ref: Ep 4, 1-16
      content: |-
        Moi qui suis en prison à cause du Seigneur, je vous exhorte donc à vous conduire d’une manière digne de votre vocation : ayez beaucoup d’humilité, de douceur et de patience, supportez-vous les uns les autres avec amour ; ayez soin de garder l’unité dans l’Esprit par le lien de la paix. Comme votre vocation vous a tous appelés à une seule espérance, de même il y a un seul Corps et un seul Esprit. Il y a un seul Seigneur, une seule foi, un seul baptême, un seul Dieu et Père de tous, au-dessus de tous, par tous, et en tous.
        À chacun d’entre nous, la grâce a été donnée selon la mesure du don fait par le Christ. C’est pourquoi l’Écriture dit : %Il est monté sur la hauteur, il a capturé des captifs, il a fait des dons aux hommes%. Que veut dire : %Il est monté% ? — Cela veut dire qu’il était d’abord descendu dans les régions inférieures de la terre. Et celui qui était descendu est le même qui est monté au-dessus de tous les cieux pour remplir l’univers. Et les %dons qu’il a faits%, ce sont les Apôtres, et aussi les prophètes, les évangélisateurs, les pasteurs et ceux qui enseignent. De cette manière, les fidèles sont organisés pour que les tâches du ministère soient accomplies et que se construise le corps du Christ, jusqu’à ce que nous parvenions tous ensemble à l’unité dans la foi et la pleine connaissance du Fils de Dieu, à l’état de l’Homme parfait, à la stature du Christ dans sa plénitude. Alors, nous ne serons plus comme des petits enfants, nous laissant secouer et mener à la dérive par tous les courants d’idées, au gré des hommes qui emploient la ruse pour nous entraîner dans l’erreur. Au contraire, en vivant dans la vérité de l’amour, nous grandirons pour nous élever en tout jusqu’à celui qui est la Tête, le Christ. Et par lui, dans l’harmonie et la cohésion, tout le corps poursuit sa croissance, grâce aux articulations qui le maintiennent, selon l’énergie qui est à la mesure de chaque membre. Ainsi le corps se construit dans l’amour.
      responsory: |-
        R/ La sagesse de ce monde est folie devant Dieu.

        Ce qui est folie de Dieu
        est plus sage que les hommes,
        et ce qui est faiblesse de Dieu
        est plus fort que les hommes.

        Ouvrez vos cœurs au langage de la croix ;
        il vous enseigne la sagesse de Dieu,
        folie pour ceux qui se perdent.
  patristicReading:
    - title: HOMÉLIE DE SAINT BÈDE LE VÉNÉRABLE
      subtitle: Matthieu se leva et suivit Jésus
      content: |-
        %Jésus vit un homme assis au bureau de la douane ; son nom était Matthieu. « Suis-moi », lui dit-il%. Il le vit non pas tant avec les yeux du corps qu’avec le regard intérieur de sa miséricorde. ~ Il vit le publicain, et parce qu’il le vit d’un regard qui prend pitié et qui choisit, %il lui dit : « Suis-moi »%, c’est-à-dire imite-moi. En lui demandant de le suivre, il l’invitait moins à marcher derrière lui qu’à vivre comme lui ; car %celui qui déclare demeurer dans le Christ doit marcher dans la voie où lui, Jésus, a marché%. ~ Matthieu %se leva et le suivit%. Rien d’étonnant que le publicain, au premier appel impérieux du Seigneur, ait abandonné sa recherche de profits terrestres et que, négligeant les biens temporels, il ait adhéré à celui qu’il voyait dépourvu de toute richesse. C’est que le Seigneur qui l’appelait de l’extérieur par sa parole le touchait au plus intime de son âme en y répandant la lumière de la grâce spirituelle. Cette lumière devait faire comprendre à Matthieu que celui qui l’appelait à quitter les biens temporels sur la terre était en mesure de lui donner dans le ciel un trésor incorruptible. ~
        %Comme Jésus était à table à la maison, voilà que beaucoup de publicains et de pécheurs vinrent s’attabler avec lui et ses disciples%. La conversion d’un seul publicain ouvrit la voie de la pénitence et du pardon à beaucoup de publicains et de pécheurs. ~ Beau présage en vérité : celui qui devait être plus tard Apôtre et docteur parmi les païens entraîne à sa suite, lors de sa conversion, tout un groupe de pécheurs sur le chemin du salut ; et ce ministère de l’Évangile qu’il allait accomplir après avoir progressé dans la vertu, il l’entreprend dès les premiers débuts de sa foi. ~
        Essayons de comprendre plus profondément l’événement relaté ici. Matthieu n’a pas seulement offert au Seigneur un repas corporel dans sa demeure terrestre, mais il lui a bien davantage préparé un festin dans la maison de son cœur par sa foi et son amour ; comme en témoigne celui qui a dit : %Voici que je me tiens à la porte, et je frappe : si quelqu’un entend ma voix et ouvre la porte, j’entrerai chez lui et je prendrai mon repas avec lui, et lui avec moi%. ~ Nous ouvrons notre porte pour le recevoir à l’appel de sa voix lorsque nous donnons notre libre assentiment à ses avertissements intérieurs ou extérieurs et quand nous mettons à exécution ce que nous avons compris que nous devions faire. Et il entre pour manger, lui avec nous et nous avec lui, parce qu’il habite dans le cœur de ses élus, par la grâce de son amour ; ainsi il les nourrit sans cesse par la lumière de sa présence afin qu’ils élèvent progressivement leurs désirs, et lui-même se nourrit de leur zèle pour le ciel comme de la plus délicieuse nourriture.
      responsory: |-
        R/ Voyez quel grand amour nous est donné !

        Enfants de Dieu, nous le sommes,
        discerné par avance dans le Fils unique.

        Au prix du sang qu’il a versé,
        Jésus nous conduit vers le Père.

        Nos yeux sont fixés sur la cité de fête
        où nous verrons le visage de Dieu.

        Au-delà de toute souffrance,
        une joie éternelle nous attend.

morning:
  evangelicAntiphon:
    common: |-
      Jésus lui dit : Suis-moi ! Matthieu se leva et le suivit.

vespers:
  evangelicAntiphon:
    common: Je veux la miséricorde et non les sacrifices. Je suis venu appeler les pécheurs.
