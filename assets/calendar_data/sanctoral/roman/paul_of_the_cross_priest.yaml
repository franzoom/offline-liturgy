celebration:
  title: Saint Paul de la Croix
  subtitle: prêtre
  description: Paul Danei (1694-1775), qui prit le nom de Paul de la Croix lorsqu’il eut fondé la congrégation des Passionnistes, se sentit très tôt attiré par la contemplation de la passion de Jésus et l’évangélisation des campagnes. Il y consacra sa vie, en compagnie de son frère Jean. En 1765, il se fixa à Rome près de l’antique basilique des saints Jean et Paul.
  commons:
  - pastors
  - saints-male_religious
  color: white

oration:
- Que saint Paul de la Croix, entièrement voué au mystère de la Passion, nous obtienne ta grâce, Seigneur, afin que, stimulés par son exemple, nous ayons plus de courage pour prendre notre croix.

readings:
  patristicReading:
    - title: LETTRE DE SAINT PAUL DE LA CROIX
      content: |-
        Il est excellent et très saint d’avoir la passion du Seigneur présente à l’esprit et de la méditer, car c’est par là que l’on parvient à l’union avec Dieu. C’est dans cette école sainte qu’on apprend la vraie sagesse ; c’est là en effet que tous les saints l’ont apprise. Lorsque la croix de notre doux Jésus aura enfoncé plus profondément ses racines dans votre cœur, vous chanterez : « Souffrir et ne pas mourir », ou bien : « Ou souffrir ou mourir », ou mieux : « Ni souffrir ni mourir, mais seulement se convertir parfaitement à la volonté de Dieu. »
        Car l’amour est une forme d’union, et il s’approprie les tourments du Bien-Aimé. Ce feu pénètre jusqu’aux moëlles, il transforme l’amant en aimé ; l’amour se mêlant plus profondément à la douleur, et la douleur à l’amour, il se fait un mélange des deux tellement intime qu’on ne peut plus distinguer l’amour de la douleur, ni la douleur de l’amour. C’est pourquoi l’âme qui aime se réjouit dans sa douleur et exulte dans son amour douloureux.
        Soyez donc fermes pour vous exercer à toutes les vertus, surtout à l’imitation du doux Jésus dans sa passion, car c’est là le sommet du pur amour. Faites en sorte d’être connus de tous comme portant non seulement intérieurement mais aussi extérieurement l’image du Christ crucifié, modèle de toute douceur et indulgence. Car celui qui est uni intérieurement au Fils du Dieu vivant porte aussi extérieurement son image par l’exercice continuel d’une vertu héroïque, principalement par une patience assez forte pour ne jamais se plaindre, ni en secret, ni en public. Cachez-vous donc dans le Christ crucifié, ne souhaitant rien d’autre que d’amener tous les hommes à faire sa volonté.
        Devenus de vrais amants du crucifié, vous célébrerez sans cesse, dans le temple intérieur, la fête de la croix, en gardant silencieusement la patience, en ne vous confiant à aucune créature ; et puisent les fêtes doivent se célébrer dans la joie, ceux qui aiment le Crucifié célèbreront la fête de la croix en gardant silencieusement la patience, avec un visage souriant et paisible, si bien que cela reste caché aux hommes et connu seulement du Souverain Bien. Puisque toute fête comporte toujours un banquet solennel, ayez pour nourriture la volonté divine, selon l’exemple de notre amour crucifié.

      responsory: |-
        R/ Tout homme qui croit en Jésus Christ
        aura la vie éternelle.
        
        Je n’ai rien voulu savoir parmi vous,
        sinon Jésus Christ, et Jésus Christ crucifié.
        
        Nous avons cru, nous aussi, au Christ Jésus,
        afin d’être justifiés par la foi au Christ.
