celebration:
  title: Saint Pierre Chrysologue
  subtitle: évêque et docteur de l’Église
  description: |-
    Pierre de Ravenne, qui devint évêque de la cité impériale entre 424 et 431, fut avant tout un pasteur. Il a beaucoup prêché, ce qui lui valut le nom de Chrysologue (« Parole d’or »). Dans sa prédication il tint toujours à demeurer très simple : « Il faut parler au peuple, disait-il, dans la langue du peuple. » Il mourut avant 451.
  commons:
    - pastors_bishop
    - pastors_doctors
  color: white

oration:
  - |-
    Dieu qui as fait de saint Pierre Chrysologue un grand prédicateur de ton Verbe incarné, par son intercession, accorde-nous ta grâce : ouvre nos cœurs à l’intelligence des mystères du salut et donne-nous d’en témoigner par toute notre vie.

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT PIERRE CHRYSOLOGUE SUR LE MYSTÈRE DE L’INCARNATION
      content: |-
        Quand la Vierge conçoit, quand elle enfante en demeurant vierge, ce n’est pas normal, c’est miraculeux ; ce n’est pas conforme à la raison mais à la puissance divine ; cela vient du Créateur, non de la nature ; ce n’est pas commun, c’est unique ; c’est divin, non pas humain. ~ La naissance du Christ ne s’est pas faite par nécessité, mais par puissance. ~ Elle fut mystère de foi, renouvellement et salut pour l’homme. Celui qui, sans être né, a fait l’homme avec du limon intact, en naissant a fait un homme à partir d’un corps intact ; la main qui a daigné saisir de l’argile pour nous créer a daigné saisir aussi notre chair pour nous recréer. Que le Créateur se trouve dans sa créature, que Dieu se trouve dans la chair, cela honore la créature, sans outrager le Créateur. -
        Homme, pourquoi te méprises-tu tellement, alors que tu es si précieux pour Dieu ? Pourquoi, lorsque Dieu t’honore ainsi, te déshonores-tu à ce point ? Pourquoi cherches-tu comment tu as été fait et ne recherches-tu pas en vue de quoi tu es fait ? Est-ce que toute cette demeure du monde que tu vois n’a pas été faite pour toi ? C’est pour toi que la lumière se répand et dissipe les ténèbres, c’est Pour toi que la nuit est réglée, pour toi que le jour est mesuré ; pour toi que le ciel rayonne des splendeurs diverses du soleil, de la lune et des étoiles ; pour toi que la terre est émaillée de fleurs, d’arbres et de fruits ; pour toi que cette foule étonnante d’animaux a été créée, dans l’air, dans les champs, dans l’eau si belle, pour qu’une lugubre solitude ne gâte pas la joie du monde nouveau. ~
        En outre, le Créateur cherche ce qu’il peut bien ajouter à ta dignité : il dépose en toi son image, afin que cette image visible rende présent sur terre le Créateur invisible, et il te confie la gérance des biens terrestres, afin qu’un aussi vaste domaine n’échappe pas au représentant du Seigneur. ~ Dieu a réalisé en lui ce que lui-même avait fait en toi, et il a voulu se voir vraiment dans l’homme chez qui il avait voulu qu’on le voie auparavant comme dans une image ; il a voulu être lui-même directement ce qu’il avait accepté auparavant d’être par une simple ressemblance. ~
        Le Christ naît donc pour rendre par là toute son intégrité à la nature corrompue ; il endosse la condition d’enfant, il accepte d’être nourri, il traverse des âges successifs afin de restaurer l’âge unique, parfait et durable qu’il avait lui-même créé. Il porte l’homme, pour que l’homme ne puisse plus tomber ; celui qu’il avait créé terrestre, il le rend céleste ; celui qui était animé par un esprit humain, il lui donne la vie d’un esprit divin. Et c’est ainsi qu’il l’élève tout entier jusqu’à Dieu, afin de ne rien laisser en lui de ce qui appartient au péché, à la mort, au labeur, à la douleur, à la terre. Voilà ce que nous apporte notre Seigneur Jesus Christ, qui, étant Dieu, vit et règne avec le Père, dans l’unité du Saint-Esprit, maintenant et toujours, et pour les éternels siècles des siècles. Amen.

      responsory: |-
        R/ Dieu nous a donné la vie avec le Christ !
        Poursuivez votre route dans le Christ,
        Jésus, le Seigneur, tel que vous l’avez reçu.
        
        Soyez enracinés et fondés en lui,
        affermis dans la foi, débordants d’action de grâce.
        
        En lui habite toute la plénitude de la divinité,
        en lui vous vous trouverez pleinement comblés.


