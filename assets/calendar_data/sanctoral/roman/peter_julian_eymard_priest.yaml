celebration:
  title: Saint Pierre-Julien Aymard
  subtitle: prêtre
  description: Né en France le 4 février 1811 dans le village de La Mure d’Isère, il fut ordonné prêtre en 1834 et exerça son apostolat pendant quelques années. Ensuite il entra chez les Maristes. Son amour pour le mystère Eucharistique le mena à fonder deux communautés religieuses, une pour les hommes et l’autre pour les femmes, dédiées au culte eucharistique. Il établit plusieurs œuvres pour stimuler l’amour de l’Eucharistie parmi les fidèles. Il mourut 1^er août 1868 dans son village natal.
  commons:
    - saints-male_religious
    - pastors
  color: white

oration:
- Seigneur Dieu, tu as fait rayonner saint Pierre-Julien d’un amour admirable pour le saint sacrement du Corps et du Sang de ton Fils ; accorde-nous de savoir, nous aussi, goûter la richesse du festin auquel tu nous convies.

readings:
  patristicReading:
    - title: DES ÉCRITS DE SAINT PIERRE-JULIEN EYMARD
      subtitle: |-
        Eucharistie: sacrement de vie
      content: |-
        L’Eucharistie est la vie des peuples. L’Eucharistie leur donne un centre de vie. Tous peuvent se rencontrer sans barrière de race, ni de langue, pour la célébration des fêtes de l’Église. Elle leur donne une loi de vie, celle de la charité dont elle est la source ; elle forme ainsi entre eux un lien commun, une parenté chrétienne. Tous mangent le même pain, tous sont convives de Jésus-Christ, qui crée entre eux surnaturellement une sympathie de mœurs fraternelles. Lisez les Actes des Apôtres. Ils affirment que la multitude des premiers chrétiens : juifs convertis et païens baptisés, appartenant à différentes régions, « n’avaient qu’un cœur et qu’une âme » (Ac 4, 32). Pourquoi ? Parce qu’ils étaient assidus à écouter la doctrine des Apôtres et persévérants à participer à la fraction du pain (Ac 2,42).
        Oui, l’Eucharistie est la vie des âmes et des sociétés, comme le soleil est la vie des corps et de la terre. Sans le soleil, la terre serait stérile, c’est lui qui la féconde, la rend belle et riche ; c’est lui qui donne aux corps l’agilité, la force et la beauté. Devant ces effets prodigieux, il n’est pas étonnant que les païens l’aient adoré comme le dieu du monde. En fait, l’astre du jour obéit à un Soleil suprême, au Verbe divin, à Jésus-Christ, qui illumine tout homme venant en ce monde et qui, par l’Eucharistie, Sacrement de vie, agit en personne, au plus intime des âmes, pour former ainsi des familles et des peuples chrétiens. Ô heureuse et mille fois heureuse l’âme fidèle qui a trouvé ce trésor caché, qui va boire à cette fontaine d’eau vive, qui mange souvent ce Pain de vie éternelle ! La société chrétienne est de plus une famille. Le lien entre ses membres, c’est Jésus Eucharistie. Il est le père qui a dressé la table de famille. La fraternité chrétienne a été promulguée à la Cène avec la paternité de Jésus-Christ ; il appelle ses Apôtres %filioli%, mes petits-enfants, et il leur commande de s’aimer les uns les autres comme lui les a aimés. À la sainte table, tous sont des enfants qui reçoivent la même nourriture, et saint Paul en tire la conséquence qu’ils ne forment qu’une famille, un même corps, car ils participent tous au même pain, qui est Jésus-Christ (1Co 10, 16-17).
        L’Eucharistie donne enfin à la société chrétienne la force de pratiquer la loi de l’honneur et de la charité à l’égard du prochain. Jésus-Christ veut qu’on honore et qu’on aime ses frères. Pour cela, il se personnifie en eux : « Ce que vous faites au moindre des miens, c’est à moi que vous le faites » (Mt 25, 40) ; et il se donne à chacun d’eux en Communion.

      responsory: |-
        R/ Puisqu’il y a un seul pain,
        nous sommes tous un seul corps :
        car tous nous participons à cet unique pain.

        * Tel est le pain qui est descendu du ciel.

        V/ Le Seigneur nous donne la vraie nourriture.
        
        * Tel est le pain qui est descendu du ciel.
