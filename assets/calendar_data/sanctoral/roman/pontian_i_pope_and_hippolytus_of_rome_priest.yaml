celebration:
  title: Saints Pontien, pape et Hippolyte, prêtre
  subtitle: martyrs
  description: |-
    Le prêtre romain Hippolyte, théologien de renom, s’était érigé en chef d’une communauté dissidente (217). Lors de la persécution de Maximin, il fut déporté en Sardaigne avec le pape Pontien (235). Soumis aux travaux forcés, ils moururent l’un et l’autre en martyrs du Christ. On célèbre en ce jour le transfert de leurs restes à Rome.
  commons:
    - martyrs
    - pastors_multiple
  color: red

oration:
  - Que le courage étonnant de tes martyrs, Seigneur, augmente en nous le désir de t’aimer, et stimule en nos cœurs une foi toujours plus solide.

readings:
  patristicReading:
    - title: LETTRE DE SAINT CYPRIEN AUX MARTYRS ET AUX CONFESSEURS (250)
      content: |-
        Comment proclamer vos louanges, frères pleins de courage ? La vaillance de votre cœur, la constance de votre foi, quel éloge vais-je leur décerner ? Vous avez enduré la plus rude des tortures, jusqu’à ce qu’elle s’achève dans la gloire ; vous n’avez pas reculé devant les supplices : ce sont plutôt les supplices qui ont reculé devant vous. Les tourments ne pouvaient mettre fin à vos souffrances : c’est la couronne qui les a terminées. L’acharnement du bourreau s’est longtemps prolongé, non pas pour abattre une foi qui était inébranlable, mais pour envoyer plus rapidement au Seigneur les hommes de Dieu.
        La foule des assistants a vu avec étonnement ce combat divin et spirituel, cette bataille du Christ ; elle a vu les serviteurs de celui-ci tenir bon avec une parole indomptable, une âme intacte, un courage divin ; ils sont démunis des armes du monde, mais ces croyants ont l’armure de la foi. Torturés, ils ont triomphé de ceux qui les torturaient ; leurs membres frappés et déchirés ont vaincu les ongles de fer qui les frappaient et les déchiraient.
        Cette foi inexpugnable, les coups redoublés n’ont pu la dominer, et pourtant ce que l’on torturait chez les serviteurs de Dieu, tant leurs corps étaient disloqués, ce n’étaient plus des membres, mais des blessures. Le sang coulait, ce sang qui devait éteindre l’incendie de la persécution, qui devait apaiser par son ruissellement glorieux les flammes et les feux de l’enfer. Quel beau spectacle donné par notre Seigneur, combien sublime, combien grand, combien agréable aux yeux de Dieu, par la fidélité au serment et la générosité de son soldat ! Comme il est écrit dans le psaume où le Saint-Esprit nous instruit et nous exhorte tout ensemble : %Elle est précieuse aux yeux du Seigneur, la mort de ses amis%. Oui, elle est précieuse, cette mort qui achète l’immortalité au prix de son sang, qui reçoit la couronne pour la perfection de son courage.
        Combien le Christ, alors, fut heureux, combien il prit plaisir à combattre et à vaincre en la personne de tels serviteurs, lui qui protège leur foi et qui accorde à ceux qui croient dans la mesure même où chacun croit qu’il peut recevoir ! Ce combat qui est le sien, il y était présent : ces lutteurs, ces défenseurs de son nom, il les a soutenus, fortifiés, encouragés. Lui qui, pour nous, a vaincu la mort une fois pour toutes, il continue en nous à la vaincre sans cesse.
        Heureuse notre Église, illuminée ainsi par le prestige de la divine bonté, illustrée à notre époque par le sang glorieux des martyrs ! Auparavant elle était toute blanche par la vie sainte des frères ; maintenant elle est empourprée par le sang des martyrs. Parmi ses fleurs, il ne manque ni les lis, ni les roses. Chacun doit lutter pour atteindre le suprême degré dans ces deux genres de gloire, pour recevoir la couronne : blanche pour sa vie, ou bien pourpre pour son martyre.

      responsory: |-
        R/ Heureux les cœurs purs :
        ils verront Dieu.
        
        Les âmes des justes sont dans la main de Dieu,
        nul tourment ne les atteindra.
        
        Dieu les a soumis à l’épreuve
        et les a trouvés dignes de lui.
        
        Au jour de sa visite, ils resplendiront.
        Le Seigneur régnera sur eux pour toujours.

