celebration:
  title: Saint Sylvestre I^er
  subtitle: pape
  description: Sylvestre, élu pape au lendemain de la Paix constantinienne, gouverna l’Église romaine durant vingt et un ans (314-335). Il vit la foi chrétienne pénétrer toutes les classes de la société, mais il assista aussi, impuissant, à la crise que déclencha le prêtre alexandrin Arius en niant la divinité du Christ. Il fut présent par ses légats au concile de Nicée, le premier concile œcuménique (325).
  commons:
  - pastors_pope
  color: white

oration:
  - |-
    Viens secourir ton peuple, Seigneur ; à la prière du pape saint Sylvestre, soutiens-le : conduis-le au long de cette vie qui passe pour qu’il arrive un jour à la vie qui ne finit pas.

readings:
  patristicReading:
    - title: DE L’HISTOIRE ECCLÉSIASTIQUE D’EUSÈBE DE CÉSARÉE
      content: |-
        En toute chose, rendons grâce à Dieu tout-puissant, roi de l’univers ; rendons grâce abondamment aussi au Sauveur et Rédempteur de nos âmes, Jésus Christ ; par lui, nous prions pour avoir une paix ferme et inébranlable, loin des troubles qui viennent soit de l’extérieur, soit de nos pensées. ~
        Désormais, un jour brillant et limpide, que n’assombrissait aucun nuage, éclairait par les rayons d’une lumière céleste les Églises du Christ sur toute la terre. Ceux qui étaient en dehors de notre communauté ne pouvaient pas jouir de l’égalité avec nous ; mais ils recevaient indirectement une participation aux biens qui nous étaient accordés par Dieu. ~
        Pour nous surtout, qui avions placé nos espérances dans le Christ, une joie inexprimable, un bonheur divin s’épanouissaient chez tous : tous ces lieux que l’impiété des tyrans avait ravagés peu auparavant, nous pouvions les voir revivre après une longue et mortelle dévastation. Ils se relevaient de leurs ruines jusqu’à une hauteur infinie et recevaient une splendeur bien plus grande qu’avant la persécution. ~
        Nous avons pu assister à un spectacle attendu et désiré par tous : des fêtes de dédicace dans chaque ville, des consécrations d’églises récemment construites.
        Pour cela, des évêques se réunissaient, des fidèles accouraient de loin, les peuples manifestaient leur amitié réciproque, car les membres du corps du Christ s’unissaient dans l’harmonie d’une seule assemblée.
        Selon l’oracle prophétique qui préfigurait mystiquement l’avenir, c’est ainsi que les ossements %se rapprochaient les uns des autres et de même les jointures%, et que l’oracle mystérieux du prophète s’accomplissait véritablement.
        Une même force de l’Esprit divin circulait à travers tous les membres ; c’était une seule âme pour tous, la même et unique ardeur dans la foi, un seul hymne pour glorifier Dieu.
        Oui, c’étaient vraiment un culte parfait de la part des magistrats, des sacrifices de la part des prêtres, et, dans l’église, des liturgies dignes de Dieu, comportant soit le chant des psaumes et l’audition de la parole de Dieu, soit l’accomplissement de rites mystiques et divins, symboles inexprimables de la passion du Sauveur.
        Une foule où se mêlaient hommes et femmes de tout âge se livrait de tout son cœur et de toute sa force à la prière et à l’action de grâce, et avec la plus grande allégresse, honorait Dieu, auteur de tout bien.

      responsory: |-
        R/ Que règne en nos cœurs la paix du Christ !
        
        Puisque vous êtes élus, sanctifiés, aimés par Dieu,
        revêtez donc des sentiments de compassion.
        
        Pardonnez-vous mutuellement,
        comme le Seigneur vous a pardonné.
        
        Aimez-vous les uns les autres,
        comme il vous a aimés.
        
        Vous n’êtes qu’un en Jésus Christ,
        revêtez l’amour ; c’est le lien parfait.

morning:
  evangelicAntiphon:
    common: |- 
      Ce n’est pas vous qui parlerez : mais l’Esprit de votre Père parlera en vous.
