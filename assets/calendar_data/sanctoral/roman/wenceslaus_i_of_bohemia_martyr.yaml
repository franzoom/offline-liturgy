celebration:
  title: Saint Venceslas
  subtitle: martyr
  description: Venceslas, duc de Bohême, n’avait pas trente ans quand il fut assassiné par son frère (935). Il était d’une grande austérité de vie au milieu d’une cour aux mœurs brutales et d’une grande charité envers les pauvres. Aussi son tombeau, à Prague, devint-il très tôt un centre de pèlerinage.
  commons:
    - martyrs
  color: red

oration:
  - Dieu qui inspirais à saint Venceslas ton martyr de préférer le royaume du ciel à celui de la terre, accorde-nous, par son intercession, de savoir renoncer à nous-mêmes pour nous attacher à toi de tout notre cœur.

readings:
  patristicReading:
    - title: PREMIER RÉCIT PALÉOSLAVE
      content: |-
        À la mort de son père Vratislas, les Tchèques nommèrent Venceslas duc de Bohême. Et, par la grâce de Dieu, sa foi chrétienne était parfaite. Il faisait du bien à tous les pauvres, vêtait ceux qui étaient nus, nourrissait les affamés, recueillait les voyageurs, selon la parole de l’Évangile. Il ne souffrait pas qu’on fasse du tort aux veuves, il aimait tous les hommes, riches et pauvres, il servait les ministres de Dieu, il embellissait beaucoup d’églises.
        Mais les seigneurs de Bohême se révoltèrent et insinuèrent à son frère cadet, Boleslas : « Ton frère Venceslas va te faire assassiner, il conspire avec sa mère et ses soldats. »
        Comme il y avait dans toutes les villes des fêtes pour la consécration des églises, Venceslas allait séjourner dans toutes ces villes. Il fit donc son entrée dans la cité de Boleslas, un dimanche, en la fête des saints Côme et Damien. Après avoir entendu la messe, il voulut retourner à Prague. Mais Boleslas le retint avec perfidie, en lui disant : « Pourquoi veux-tu partir, mon frère ? » Le lendemain, on sonna la cloche pour les matines. En entendant la cloche, Venceslas dit : « Louange à toi, Seigneur, qui as donné de vivre jusqu’à ce matin. » Il se leva et se rendit aux matines.
        Aussitôt Boleslas le rejoignit à la porte. Venceslas le regarda et lui dit : « Mon frère, tu étais hier un bon compagnon pour nous. » Le diable parla à l’oreille de Boleslas et pervertit son cœur. Tirant son épée, Boleslas répondit :
        « Maintenant, je veux être pour toi un meilleur compagnon », et il lui donna un coup d’épée à la tête.
        Venceslas, tourné vers lui, dit alors : « À quoi penses-tu, mon frère ? » Il l’empoigna et le jeta par terre. Mais un des conseillers de Boleslas accourut et frappa Venceslas à la main. Celui-ci, blessé à la main, épargna son frère et accourut vers l’église. Mais deux assassins l’abattirent à la porte de l’église. Un troisième accourut et de son épée lui transperça le côté. Alors Venceslas expira aussitôt en disant : %En tes mains, Seigneur, je remets mon esprit%.

      responsory: |-
        R/ Le juste vivra par sa fidélité.
        
        Je vais me tenir à mon poste de garde
        et guetter pour voir ce que Dieu me dira.
        
        Encore un peu, bien peu de temps,
        celui qui vient arrivera sans tarder.
        
        Ne soyons pas des hommes
        qui se dérobent et se perdent,
        mais des hommes de foi pour notre salut.