celebration:
  title: Saint Romuald
  subtitle: abbé
  description: Après une jeunesse dissipée, Romuald († vers 1027) se fit moine à Ravenne. Mais il souhaitait unir la vie de communauté et celle des ermites. Il chercha longtemps sa voie avant de se fixer à Camaldoli, dans les Apennins. Chez les Camaldules on peut suivre la Règle de saint Benoît, adopter la vie recluse, ou opter pour une harmonisation des deux.
  commons:
    - saints-male_religious
  color: white

oration:
  - Tu as voulu, Seigneur, que saint Romuald restaure dans l’Église la vie érémitique ; donne-nous de renoncer à nous-mêmes pour suivre le Christ, et de parvenir ainsi au Royaume des cieux.

readings:
  patristicReading:
    - title: VIE DE SAINT ROMUALD, PAR SAINT PIERRE DAMIEN
      content: |-
        Romuald habita trois ans sur le territoire de la ville de Parenzo. La première année, il bâtit un monastère et y installa un abbé avec des frères. Pendant deux ans, il demeura reclus. La bonté divine l’y éleva jusqu’à un haut sommet de perfection au point que, sous l’inspiration du Saint-Esprit, il entrevit plusieurs événements futurs et pénétra des rayons de son intelligence beaucoup de mystères cachés de l’ancien et du nouveau Testament.
        En effet, une si haute contemplation de la divinité le ravissait souvent ; fondant en larmes, embrasé par une ardeur indicible d’amour divin, il s’écriait : Mon cher, cher Jésus, mon doux miel, désir inexprimable, douceur des saints, délices des anges, et autres paroles semblables. Ce qu’il proclamait ainsi, sous la dictée du Saint-Esprit, par une sorte de vocalise, nous sommes incapables de l’exprimer en langage humain.
        Chaque fois que ce saint homme se disposait à résider quelque part, il commençait par aménager dans sa cellule un oratoire avec un autel, puis il condamnait sa porte pour vivre en reclus.
        Après avoir habité ainsi en bien des lieux, voyant que sa fin était imminente, il revint enfin au monastère qu’il avait construit à Val di Castro. Là, pour attendre sans inquiétude sa fin toute proche, il se fit construire une cellule avec un oratoire pour y être reclus et garder le silence jusqu’à sa mort.
        Lorsqu’on eut fait cette cellule, alors qu’il pensait devoir entrer bientôt en réclusion, son corps commença d’être accablé par des infirmités de plus en plus pénibles, et à se courber, beaucoup moins sous le poids de la maladie que de son grand âge. Un jour, son corps perdit progressivement toute vigueur et fut épuisé par le progrès de ses infirmités. Quand le soleil fut sur le point de se coucher, il ordonna aux deux frères qui l’assistaient de sortir et de fermer la porte derrière eux. Ils devaient revenir auprès de lui à l’aube pour célébrer leurs Matines. Et comme ils sortaient de mauvais gré, soucieux de sa fin prochaine, ils ne se hâtèrent pas de prendre aussitôt leur repos : inquiets de voir mourir leur maître, ils restent cachés auprès de sa cellule pour observer celui qu’ils considèrent comme leur plus précieuse richesse. Ils demeurent ainsi quelque temps. Puis, écoutant avec plus d’attention, ils n’entendent plus aucun mouvement ni aucune parole. Devinant ce qui s’était passé, ils enfoncent la porte, se précipitent, font de la lumière et découvrent le cadavre du saint gisant sur le dos, tandis que son âme bienheureuse venait d’être ravie au ciel. Il gisait comme une perle céleste, alors abandonnée, mais qui devait ensuite être déposée avec honneur dans le trésor du souverain Roi.

      responsory: |-
        R/ Ton serviteur
        est devenu ton ami, Seigneur,
        et sa bénédiction passe jusqu’à nous.
        
        Il n’est plus jamais seul, dans la solitude,
        celui dont le silence est habité par Dieu.
        
        Il a trouvé la paix pour la répandre,
        celui qui se donne à ses frères.
        
        Il est comblé d’une joie singulière,
        celui dont le Royaume est l’unique désir.
        
        Il entraîne vers Dieu un grand nombre de fils,
        celui qui a gravi le chemin de l’humilité.