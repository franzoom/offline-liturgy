celebration:
  title: Sainte Rose de Lima
  subtitle: vierge
  description: Rose de Lima (1586-1617) est la première sainte du Nouveau Monde. Retirée dans le jardin de ses parents, elle y vécut l’idéal dominicain de contemplation et de rayonnement apostolique. Pour obtenir le salut des Indiens, elle se livrait à des austérités effrayantes, que seule l’intimité avec le Christ lui donnait la force de supporter.
  commons:
    - virgins
    - saints_female_religious
  color: white

oration:
  - |-
    Dieu qui as inspiré à sainte Rose de Lima un si grand amour qu’elle a tout quitté pour s’attacher à toi seul dans une austère pénitence, accorde-nous, par son intercession, de suivre ici-bas les chemins de la vraie vie, pour goûter dans le ciel des joies inépuisables.

readings:
  patristicReading:
    - title: LETTRE DE SAINTE ROSE AU MÉDECIN CASTILLO
      content: |-
        Le Seigneur notre Sauveur éleva la voix et dit, avec une incomparable majesté : « Tous doivent savoir qu’après l’épreuve vient la grâce ; tous doivent connaître que, sans le poids des afflictions, on ne peut parvenir au sommet de la grâce ; tous doivent comprendre que la mesure des charismes augmente avec l’accroissement des peines. Les hommes doivent se garder d’errer ou de se tromper. C’est la seule véritable échelle du paradis, et hors de la croix on ne trouve pas de chemin pour monter au ciel. »
        Lorsque j’entendis ces paroles, un élan très fort m’emporta, comme pour me faire venir au milieu de la rue, afin que je dise, avec de grands cris, à tous les gens de tout âge, sexe et condition : « Écoutez, peuples ; écoutez, tout le monde. Sur l’ordre du Christ, en employant les paroles sorties de sa bouche, je vous en avertis : nous ne pouvons acquérir la grâce si nous ne souffrons pas d’afflictions ; il faut que les peines s’accumulent les unes sur les autres pour obtenir de participer intimement à la nature divine, à la gloire des fils de Dieu, à la parfaite félicité de l’âme. »
        Le même aiguillon me poussait à prêcher la beauté de la grâce divine ; j’en étais prise d’angoisse et cela me faisait transpirer et haleter. Il me semblait que mon âme ne pouvait plus rester enfermée dans la prison du corps, mais qu’elle devait, après avoir rompu ses liens, s’en aller dans le monde entier, avec une agilité sans entrave, parfaite, et toujours plus grande, en disant : « Si les mortels pouvaient connaître l’importance de la grâce divine, combien elle est belle, noble et précieuse ; combien de richesses elle recèle, combien de trésors, d’allégresse et de délices ! Sans aucun doute ils s’appliqueraient, de toute leur activité et de tous leurs soins, à se procurer peines et afflictions ! Tous, à travers le monde, rechercheraient, au lieu de richesses, ennuis, maladies et tourments, pour acquérir l’inestimable trésor de la grâce. C’est là le butin et le profit ultime de la patience. Personne ne se plaindrait de la croix ni des peines qui pourraient advenir, si l’on connaissait la balance où elles sont pesées pour la rétribution des hommes. »

      responsory: |-
        R/ Ceux qui sèment dans les larmes
        moisonnent en chantant.
        
        Qui sème dans sa chair
        moisonnera de sa chair la destruction.
        
        Qui sème dans l’Esprit
        moisonnera de l’Esprit la vie éternelle.
        
        La chair ne sert de rien
        c’est l’Esprit qui vivifie.