celebration:
  title: Saint Charbel Makhlouf
  subtitle: prêtre
  description: Moine de l’Ordre Libanais maronite, Charbel Makhlouf (1828-1898) est l’un des saints les plus populaires du Liban. Sa vie de prêtre et d’ermite, marquée par l’eucharistie, le jeûne et la pénitence, est un modèle de simplicité et de transparence. Il opérait de nombreuses guérisons de l’âme et du corps, si bien que sa renommée s’est rapidement répandue, même chez les non-chrétiens.
  commons:
    - pastors
    - saints-male_religious
  color: white

oration:
- |-
  Seigneur Dieu, tu as appelé le prêtre saint Charbel au combat singulier du désert, et tu l’as comblé de multiples dons spirituels ; nous t’en supplions : donne-nous d’imiter le Seigneur en sa Passion et d’avoir part à son Royaume.
