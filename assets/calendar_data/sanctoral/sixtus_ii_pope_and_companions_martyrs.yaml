celebration:
  title: Saint Sixte II, pape, et ses compagnons
  subtitle: martyrs
  description: |-
    Le 6 août 258, le pape Sixte II et quatre de ses diacres furent décapités pour avoir tenu au cimetière de Calliste une assemblée liturgique, que venait d’interdire l’édit de Valérien. Le diacre Laurent fut réservé pour être soumis à la torture. Cet événement constitue une page glorieuse entre toutes de l’histoire de l’Église romaine au temps des persécutions.
  commons:
    - martyrs
  color: red

oration:
  - |-
    Tu as donné, Seigneur, au bienheureux Sixte et à ses compagnons la grâce de sacrifier leur vie pour rester fidèles à ta parole et rendre témoignage à Jésus Christ ; accorde-nous la force de l’Esprit Saint pour que nos cœurs soient prompts à croire et résolus à confesser la foi.

readings:
  patristicReading:
    - title: LETTRE DE CYPRIEN À L’ÉVÊQUE SUCCESSUS (258)
      content: |-
        Si je ne vous ai pas écrit immédiatement, frère très cher, voici pourquoi : tout le clergé, exposé au combat, ne pouvait absolument pas s’en aller d’ici ; tous étaient prêts dans leur générosité à recevoir la couronne céleste décernée par Dieu. Mais voici ce que j’ai à vous apprendre : ils sont de retour, ceux que j’avais envoyés à Rome pour découvrir le contenu, quel qu’il soit, du rescrit nous concernant, et nous rapporter la vérité. Il circule en effet beaucoup de bruits contradictoires et incertains à ce sujet.
        Or, voilà ce qu’il y a de vrai. L’empereur Valérien a envoyé un rescrit au Sénat ordonnant que les évêques, les prêtres et les diacres soient exécutés immédiatement; les sénateurs, les dignitaires et les chevaliers romains seront déchus et dépouillés de leurs biens et, s’ils continuent à se dire chrétiens après avoir perdu leurs richesses, ils subiront la peine capitale; les dames de qualité seront dépouillées de leurs biens et envoyées en exil; tous les fonctionnaires impériaux, qu’ils aient confessé le Christ auparavant ou qu’ils le confessent maintenant, auront leurs biens confisqués, seront mis aux fers et envoyés dans les domaines de la couronne après avoir été catalogués.
        L’empereur Valérien a encore ajouté à son rescrit une copie de la lettre nous concernant, qu’il a adressée aux gouverneurs des provinces. Cette lettre, nous espérons chaque jour la voir arriver, fermes dans notre foi, prêts à souffrir, attendant de la bonté du Seigneur et de sa miséricorde la couronne de la vie éternelle. Sachez que Sixte a été exécuté dans un cimetière le 6 août, et quatre diacres avec lui. A Rome, les préfets activent chaque jour la persécution, exécutent ceux qui leur sont amenés et versent leurs biens au trésor.
        Je vous prie de communiquer ces nouvelles à nos autres collègues, afin que partout nos frères puissent être fortifiés par de tels encouragements et se préparer spirituellement au combat ; que chacun des nôtres songe moins à la mort qu’à l’immortalité ; consacrés à Dieu par une foi entière et un courage parfait, qu’ils conçoivent plus de joie que de crainte dans cette confession, car ils savent que les soldats de Dieu et du Christ n’y trouvent pas leur perte, mais leur couronne.
        Je souhaite, frère très cher, que vous vous portiez toujours bien dans le Seigneur.

      responsory: |-
        R/ L’abondance de la grâce
        fait abonder l’action de grâce à la gloire de Dieu.
        
        Nous portons en notre corps la mort de Jésus,
        afin que sa vie
        soit aussi manifestée dans notre corps.
        
        Celui qui a ressuscité le Seigneur Jésus
        nous ressuscitera, nous aussi,
        et nous placera près de lui.