celebration:
  title: Saint Étienne de Hongrie
  description: Étienne (970-1038) fut le premier « roi apostolique de Hongrie ». Le jour de Noël de l’an mil, il ceignit la couronne royale que lui avait envoyée le pape Sylvestre II. Ce souverain de grande classe fut un chrétien soucieux d’implanter l’Église en son pays. Il fonda des diocèses et bâtit des sanctuaires qui sont restés les plus aimés du peuple hongrois.
  commons:
    - saints-male
  color: white

oration: 
  - |-
    Seigneur, ton Église avait en saint Étienne de Hongrie un propagateur de l’Évangile, quand il était roi sur la terre ; permets qu’elle trouve en lui un défenseur, maintenant qu’il est dans la gloire du ciel.

readings:
  patristicReading:
    title: CONSEILS DE SAINT ÉTIENNE À SON FILS
    content: |-
      Avant tout, mon très cher fils, je te l’ordonne, je te le conseille et je t’y invite : si tu veux faire honneur à la couronne royale, tu garderas la foi catholique et apostolique avec tant de zèle et d’exactitude que tu donnes l’exemple à tous ceux que Dieu a soumis à ton autorité ; c’est alors que tous les hommes d’Église reconnaîtront en toi, à juste titre, cette profession de véritable christianisme sans laquelle, sache-le bien, on ne t’appellera pas chrétien ou fils de l’Église. ~ Dans notre palais royal, après la foi, c’est l’Église qui occupe la seconde place, elle qui a été semée d’abord par son chef, le Christ. Ensuite, ses membres, c’est-à-dire les Apôtres et les saints Pères, Tont transplantée, solidement bâtie et répandue dans tout l’univers. Et bien qu’elle engendre toujours de nouveaux enfants, il y a des lieux précis où son antiquité est tenue pour certaine.
      Cette Église, mon très cher fils, dans notre royaume est encore qualifiée de jeune et de toute nouvelle ; et c’est pourquoi elle a particulièrement besoin de protecteurs attentifs et clairvoyants. Sans cela, le bienfait que la bonté divine nous a accordé sans aucun mérite de notre part sera détruit et anéanti par ton inertie, ta paresse et ta négligence. ~
      Mon fils très aimable, douceur de mon cœur, espoir de ma descendance future, je t’en prie et je te l’ordonne : par tous les moyens et en toutes choses, pratique la bonté en étant bienveillant non seulement envers tes parents et tes alliés, envers les princes, les chefs, les riches, les voisins et les compatriotes, mais aussi envers les étrangers et tous ceux qui s’adressent à toi. Car une vie de bonté te conduit au sommet de la béatitude. Sois miséricordieux envers tous ceux qui souffrent violence, gardant toujours au fond de toi l’exemple du Seigneur : %C’est la miséricorde que je désire et non les sacrifices%. Sois patient envers tous, non seulement envers les puissants, mais aussi envers ceux qui sont dépourvus de puissance.
      Sois fort, enfin, pour que la prospérité ne te rende pas trop fier, ni l’adversité trop abattu. Sois humble aussi, pour que ce soit Dieu qui t’élève, ici-bas et dans le monde futur. Sois modéré et ne châtie ni ne condamne personne outre mesure. Sois doux, pour ne jamais violer la justice. Aie le cœur noble ; n’inflige jamais de honte à qui que ce soit, par un premier mouvement. Sois chaste, pour éviter toutes les corruptions de la volupté comme un aiguillon de mort.
      Toutes les vertus que je viens de rappeler composent la couronne d’un roi : sans elles, personne ne peut régner ici-bas, ni parvenir au royaume éternel.

    responsory: |-
      R/ Seigneur, qui habitera sur ta montagne sainte ?
      
      Celui qui juge avec justice
      en écoutant le petit comme le grand.
      
      Celui qui ne craint pas l’homme,
      sachant que le jugement relève de Dieu.
      
      Celui qui refuse d’être acheté
      pour accabler un innocent. (pas de R/)
