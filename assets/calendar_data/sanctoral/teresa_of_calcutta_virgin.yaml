celebration:
  title: Sainte Teresa de Calcutta
  subtitle: vierge 
  description: Agnès Gonxha Bojaxhiu, née en Épire le 26 août 1910, répondant à un appel missionnaire, entra dans la Congrégation des Sœurs de Lorette en 1929, avant d’être envoyée en Inde. Le 10 septembre 1946, elle prit l’engagement de servir le Seigneur dans les plus pauvres, de sorte que, deux ans plus tard, elle se consacra à un apostolat auprès du peuple et des plus humbles, fondant les Congrégations des Missionnaires et des Missionnaires de la Charité. Accueillant avec sérénité la souffrance de l’obscurité intérieure, elle manifesta avec éclat la victoire de la lumière du Christ, jusqu’à ce qu’elle se remît avec confiance au repos éternel, le 5 septembre 1997, à Calcutta.
  commons:
  - virgins
  - saints-female_caritative
  color: white

oration:
  - Dieu qui as suscité par ton Esprit sainte Thérèse d’Avila pour montrer à l’Église le chemin de la perfection, fais-nous trouver notre nourriture dans sa doctrine spirituelle et brûler du désir de la véritable sainteté.

readings:
  hymn:
  - celui-qui-ne-change-pas
  patristicReading:
    - title: LETTRE AU PÈRE NEUNER (vers 1960)
      subtitle: Si mon obscurité est lumière pour quelque âme, je suis parfaitement heureuse (traduction non officielle)
      content: |-
        À Lorette, mon père, j’étais très heureuse, à mon avis la plus heureuse des sœurs. Puis vint la vocation. Notre Seigneur me demanda clairement ; sa voix était claire et pleine de persuasion. Il me demanda encore et encore en 1946. Je savais que c’était lui. Il y avait en moi crainte et sentiments terribles, car je redoutais d’être induite en erreur. Ayant toujours vécu dans l’obéissance, je portai toute la chose à mon père spirituel, espérant sans cesse que tout cela serait jugé par lui comme une tromperie du diable. Pas du tout : lui aussi, comme cette voix, dit : « C’est Jésus lui-même qui te le demande. » La suite, vous la connaissez bien. Ma supérieure m’envoya dans la ville d’Asansol en 1947, où Notre Seigneur sembla se donner tout entier à moi. La douceur, la consolation et l’union de ces six mois passèrent très vite. Enfin, en décembre 1948, l’œuvre fut commencée.
        Mon père, depuis 1949 ou 1950, il y a en moi ce terrible sentiment de perte, cette obscurité indicible, cette solitude, ce désir ardent et continuel de Dieu qui suscite au fond du cœur une très grande douleur. L’obscurité est telle que je ne peux rien voir, ni par l’intelligence ni par la raison. La place de Dieu dans mon âme est vide. Dieu est absent de moi. Quand la douleur du désir est si grande, je désire Dieu et je le désire encore ; mais j’ai ce sentiment : il ne me veut pas, il n’est pas là. Le ciel, les âmes : ne sont-ce que des mots qui n’ont aucune signification pour moi ? Ma vie elle-même me semble discordante. Vers où est-ce que j’aide les âmes à aller ? Pourquoi tout cela ? Où est l’âme dans mon être essentiel ? Dieu ne me veut pas. Parfois mon cœur crie vraiment : « Mon Dieu ! », mais rien ne vient. Je ne puis décrire le tourment et la douleur. Depuis mon enfance j’ai aimé Jésus dans le Très Saint Sacrement avec une très grande tendresse, mais cet amour aussi s’est évanoui. Je ne sens rien devant Jésus, et pourtant je ne veux en aucune façon perdre la Sainte Communion.
        Voyez, mon père, la contradiction de ma vie. Je désire Dieu, je veux l’aimer, l’aimer très fort, ne vivre que pour son amour, n’aimer que lui, et pourtant maintenant il n’y a que douleur, que désir sans amour. Il y a quelques années, environ dix-sept, je voulais donner à Dieu quelque chose de très beau. Je m’y engageai, sous peine de péché mortel, à ne rien lui refuser. Depuis ce temps j’ai tenu cette promesse. Parfois, quand l’obscurité est plus épaisse et que je suis sur le point de refuser quelque chose à Dieu, la pensée de cette promesse me soutient.
        Je ne veux que Dieu dans ma vie. L’« œuvre » est vraiment et uniquement la sienne. C’est lui qui me l’a demandée, lui qui m’a dit ce que je devais faire, lui qui a dirigé chacun de mes pas, lui qui guide chacun de mes mouvements, lui qui met les paroles sur mes lèvres, lui qui m’accorde la capacité d’enseigner la voie aux sœurs. Tout cela et tout ce qui est en moi, c’est lui. C’est pourquoi, quand le monde me loue, mon âme n’en est vraiment aucunement touchée, pas même légèrement. Quant à l’œuvre, je crois qu’elle provient tout entière de lui.
        Autrefois je pouvais passer de nombreuses heures devant Notre Seigneur, l’aimant et m’entretenant avec lui ; mais maintenant la méditation elle-même est difficile : je ne dis rien, ou seulement « Mon Dieu », et parfois même cette invocation ne sort pas. Pourtant, en quelque façon, au fond de mon cœur, le désir de Dieu continue de se frayer un chemin dans les ténèbres. Quand je suis dehors, au travail ou rencontrant certaines personnes, il y a la présence de quelqu’un qui vit plus près de moi, vraiment en moi. Je ne sais ce que c’est, mais souvent, même chaque jour, l’amour envers Dieu devient en moi plus vrai et, sans le savoir clairement, je dis soudain à Jésus des paroles d’amour tout à fait insolites.
        Mon père, je vous ouvre mon cœur : apprenez-moi à aimer Dieu, apprenez-moi à l’aimer vraiment. Je ne suis pas savante, j’ignore beaucoup de choses sur Dieu : je veux aimer Dieu comme et autant qu’il est pour moi « mon Père ».
        Mon cœur, mon âme et mon corps sont à Dieu seul. Il a rejeté la fille de son amour comme indésirable. C’est pourquoi, mon père, j’ai décidé en cette retraite d’être en son pouvoir. Qu’il fasse de moi ce qu’il veut, comme il veut, tout le temps qu’il voudra. Si mon obscurité est lumière pour quelque âme — mais même si elle ne vaut rien pour personne — je suis parfaitement heureuse, car je suis une fleur du champ de Dieu.

      responsory: |-
        R/ J’ai cherché celui qu’aime mon âme ;
        je l’ai cherché et ne l’ai pas trouvé ;
        je l’ai appelé, et il ne m’a pas répondu.
        * Remets au Seigneur ta voie et espère en lui, et il agira.
        V/ J’ai cherché celui qu’aime mon âme :
        « Je me lèverai et parcourrai la ville ;
        par les ruelles et les places,
        je chercherai celui qu’aime mon âme. »
        * Remets au Seigneur.