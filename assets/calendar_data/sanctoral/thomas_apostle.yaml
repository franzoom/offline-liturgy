  psalmody:
    - psalm: PSALM_115
      antiphon:
        - Je suis le chemin, la vérité et la vie, nul ne peut aller au Père si ce n’est par moi.
    - psalm: PSALM_125
      antiphon:
        - |-
          Les disciples dirent à Thomas : Nous avons vu le Seigneur, alléluia.
