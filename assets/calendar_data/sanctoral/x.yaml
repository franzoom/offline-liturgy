Par son travail et son génie créateur, l’homme s’est toujours efforcé de donner un plus large développement à sa vie. Mais aujourd’hui, aidé surtout par la science et la technique, il a étendu sa maîtrise sur presque toute la nature et il ne cesse de l’étendre ; grâce notamment à la multiplication des moyens d’échange de toutes sortes entre les nations, la famille humaine prend conscience d’elle-même et se constitue peu à peu comme formant une seule communauté au sein de l’univers. Il en résulte que l’homme se procure désormais par sa propre industrie des biens qu’autrefois il attendait avant tout de forces supérieures.
Devant cette immense entreprise qui englobe maintenant tout le genre humain, de nombreuses interrogations s’élèvent parmi les hommes. Quels sont le sens et la valeur de toute cette activité ? Comment faut-il employer toutes ces richesses ? À quel but tendent ces efforts individuels et collectifs ?
L’Église garde le dépôt de la parole divine, où elle puise les principes de l’ordre religieux et social. Elle n’a pas toujours, pour autant, une réponse immédiate à chacune de ces questions. Mais elle désire joindre la lumière de la Révélation à l’expérience de tous pour éclairer le chemin où l’humanité vient de s’engager.
Pour les croyants, une chose est certaine : considérée en elle-même, l’activité humaine, individuelle et collective, ce gigantesque effort par lequel les hommes, tout au long des siècles, s’évertuent à améliorer leurs conditions de vie, cet effort répond au dessein de Dieu.
L’homme, en effet, créé à l’image de Dieu, a reçu l’ordre de soumettre la terre et tout ce qu’elle contient, de gouverner l’univers avec sainteté et justice. En reconnaissant Dieu comme le Créateur de toutes choses, il doit rapporter à Lui son être et l’univers entier, afin que, par la soumission de toutes choses à l’homme, le nom de Dieu soit glorifié par toute la terre.
Cela concerne aussi les activités les plus quotidiennes. Car ces hommes et ces femmes qui, en gagnant leur vie et celle de leur famille, exercent leurs activités de manière à bien servir la société, ont le droit de considérer que leur travail développe l’œuvre du Créateur, qu’il contribue au bienêtre de leurs frères, et que leur savoir-faire personnel collabore à l’accomplissement du plan divin dans l’histoire.
Par conséquent, les chrétiens ne doivent pas penser que les résultats du génie et du courage de l’homme contredisent la puissance de Dieu, et que la créature raisonnable se pose en rivale du Créateur. Au contraire, ls sont persuadés que les victoires de l’humanité sont un signe de la grandeur divine et l’aboutissement de son mystérieux dessein.
Mais plus le pouvoir de l’homme progresse, Plus sa responsabilité, individuelle et collective, s’élargit.
On voit par là que le message chrétien ne détourne pas les hommes de la construction du monde et ne les incite pas à se désintéresser du bonheur de leurs semblables ; il les oblige beaucoup plus étroitement au devoir d’y travailler.
Qui pourrait t’affaiblir ?
Le Seigneur est ton roc !
Rien ne peut te décevoir,
puisqu’il est ton regard.
Rien ne peut te dérouter,
toi qui as découvert la trace de ses pas
sur les chemins des hommes.

R/ Le juste vit de la foi 
au Dieu fidèle.

Le juste jamais ne chancelle ;
le cœur ferme, il se fie au Seigneur.

Sa justice demeure à jamais,
son front s’élève en gloire.

Heureux qui craint le Seigneur
et se plaît grandement à ses préceptes.

Son cœur est assuré, il ne craint pas ;
il se lève, lumière des cœurs droits.
