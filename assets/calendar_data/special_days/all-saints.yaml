celebration:
  title: Tous les Saints
  description: La solennité de tous les Saints nous met devant les yeux la foule immense des rachetés, pour nous dévoiler l’avenir vers lequel nous sommes en marche. Mais elle doit aussi nous rendre conscients de notre solidarité avec ceux qui nous ont précédés dans le monde invisible. Vivant près de Dieu, ils intercèdent pour nous ; ils sont des puissances dans nos vies.
  color: white

invitatory:
  antiphon:
  - Adorons le Roi des rois, joie de tous les saints.

oration:
  - Dieu éternel et tout-puissant, tu nous donnes de célébrer dans une même fête la sainteté de tous les élus ; puisqu’une telle multitude intercède pour nous, réponds à nos désirs, accorde-nous largement tes grâces.

firstVespers:
  hymn: 
  - heureux-celui
  psalmody:
    - psalm: PSALM_112
      antiphon:
        - La lumière du Seigneur brillera pour eux, une lumière éternelle, alléluia.
    - psalm: PSALM_147
      antiphon:
        - |-
          Jérusalem, cité de Dieu, réjouis-toi : tous tes enfants te béniront, en toi ils se rassembleront pour louer le Seigneur, alléluia.
    - psalm: NT_12
      antiphon:
        - Les saints chantent le cantique nouveau devant le trône de Dieu et de l’Agneau ; leur voix résonne par toute la terre, alléluia.
  reading:
    biblicalReference: He 12, 22-24
    content: Vous êtes venus vers la montagne de Sion et vers la cité du Dieu vivant, la Jérusalem céleste, vers des milliers d’anges en fête, et vers l’assemblée des premiers-nés dont les noms sont inscrits dans les cieux. Vous êtes venus vers Dieu, le juge de tous les hommes, et vers les âmes des justes arrivés à la perfection. Vous êtes venus vers Jésus, le médiateur d’une Alliance nouvelle, et vers son sang répandu sur les hommes, son sang qui parle plus fort que celui d’Abel.
  responsory: |-
    R/ Que le Seigneur soit votre joie !
    * Exultez, hommes justes !
    V/ Hommes droits, chantez votre allégresse !
    * Exultez, hommes justes !
    Gloire au Père. R/ Que le Seigneur.
  evangelicAntiphon:
    common: Bienheureuse Trinité, un seul Dieu ! Les prophètes, les Apôtres, les martyrs te célèbrent, tous les saints dans le ciel adorent ta gloire.
  intercession:
    content: |-
      Avec toute l’Église, rendons grâce à notre Dieu
      qui nous met dans la communion des saints :
      
      R/ Dieu saint, à toi la puissance et la gloire !
      
      Pour la Vierge Marie, la Mère de Jésus,
      pour saint Joseph, le charpentier de Nazareth :
      
      Pour les patriarches et les prophètes,
      pour les Apôtres et les évangélistes :
      
      Pour tous ceux qui ont subi le martyre,
      pour les hommes et les femmes qui ont suivi le Christ :
      
      Pour tous les membres glorieux du Corps du Christ,
      pour la foule innombrable des saints connus de toi seul :
      
      Accueille nos frères qui sont morts :
      qu’ils partagent le sort des saints dans ta lumière.

morning:
  hymn:
  - aujourd-hui-l-univers
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Heureux le vainqueur entré dans la lumière et dans la paix de son Seigneur, alléluia !
    - psalm: OT_41
      antiphon:
        - Tous les saints du Seigneur, bénissez le Seigneur dans les siècles !
    - psalm: PSALM_149
      antiphon:
        - L’hymne des saints monte vers Dieu, la louange du peuple de ses proches.
  reading:
    biblicalReference: Ep 1, 17-18
    content: Que le Dieu de notre Seigneur Jésus Christ, le Père dans sa gloire, vous donne un esprit de sagesse pour le découvrir et le connaître vraiment. Qu’il ouvre votre cœur à sa lumière, pour vous faire comprendre l’espérance que donne son appel, la gloire sans prix de l’héritage que vous partagez avec les fidèles.
  responsory: |-
    R/ J’ouvrirai mon cœur
    à ta Parole de lumière !
    V/ Béni sois-tu, toi qui révèles aux petits
    le secret du Royaume. R/
    V/ Heureux qui suit jusqu’au bout
    le chemin que tu lui traces. R/
  evangelicAntiphon:
    common: Les justes resplendiront comme le soleil dans le Royaume de leur Père, alléluia.
  intercession:
    content: |-
      Dans la joie, bénissons le Dieu de tous les saints :
      
      R/ Gloire à Dieu au plus haut des cieux !
      
      Avec les anges, les patriarches et les prophètes,
      — Seigneur, nous te louons !
      
      Avec la Vierge Marie, la mère de Dieu,
      — Seigneur, nous t’exaltons !
      
      Avec les Apôtres et les évangélistes,
      — Seigneur, nous te rendons grâce !
      
      Avec les martyrs du Christ,
      — Seigneur, nous t’offrons nos corps en sacrifice !
      
      Avec tous les saints et saintes de l’Église,
      — Seigneur, nous te consacrons notre vie !

readings:
  hymn:
  - comme-ils-etaient-baptises
  psalmody:
    - psalm: PSALM_8
      antiphon:
        - Qu’est-ce que l’homme, Seigneur, que tu partes à sa recherche ?
    - psalm: PSALM_14
      antiphon:
        - |-
          Heureux les cœurs purs : ils verront Dieu.
    - psalm: PSALM_15
      antiphon:
        - En ta présence, la joie est sans mesure, à ta droite, le bonheur ne finit pas.
  verse: |-
    V/ Qui regarde vers Dieu resplendira,
    sans ombre ni trouble au visage.
  biblicalReading:
    - title: LECTURE DU LIVRE DE L’APOCALPYSE
      suntitle: Des rachetés de toute tribu, langue, peuple et nation
      ref: Ap 5, 1-14
      content: |-
        J’ai vu, dans la main droite de celui qui siège sur le Trône, un livre en forme de rouleau, écrit au-dedans et à l’extérieur, scellé de sept sceaux. Puis j’ai vu un ange plein de force, qui proclamait d’une voix puissante : « Qui donc est digne d’ouvrir le Livre et d’en briser les sceaux ? » Mais personne, au ciel, sur terre ou sous la terre, ne pouvait ouvrir le Livre et regarder. Je pleurais beaucoup, parce que personne n’avait été trouvé digne d’ouvrir le Livre et de regarder. Mais l’un des Anciens me dit : « Ne pleure pas. Voilà qu’il a remporté la victoire, le lion de la tribu de Juda, le rejeton de David : il ouvrira le Livre aux sept sceaux. »
        Et j’ai vu, entre le Trône, les quatre Vivants et les Anciens, un Agneau debout, comme égorgé ; ses cornes étaient au nombre de sept, ainsi que ses yeux, qui sont les sept esprits de Dieu envoyés sur toute la terre. Il s’avança et prit le Livre dans la main droite de celui qui siégeait sur le Trône.
        Quand l’Agneau eut pris le Livre, les quatre Vivants et les vingt-quatre Anciens se jetèrent à ses pieds. Ils tenaient chacun une cithare et des coupes d’or pleines de parfums qui sont les prières des saints. Ils chantaient ce cantique nouveau :
        « Tu es digne, de prendre le Livre et d’en ouvrir les sceaux, car tu fus immolé, rachetant pour Dieu, par ton sang, des gens de toute tribu, langue, peuple et nation. Pour notre Dieu, tu en as fait un royaume et des prêtres : ils régneront sur la terre. »
        Alors j’ai vu : et j’entendis la voix d’une multitude d’anges qui entouraient le Trône, les Vivants et les Anciens ; ils étaient des myriades de myriades, par milliers de milliers. Ils disaient d’une voix forte : « Il est digne, l’Agneau immolé, de recevoir puissance et richesse, sagesse et force, honneur, gloire et louange. »
        Toute créature dans le ciel et sur la terre, sous la terre et sur la mer, et tous les êtres qui s’y trouvent, je les entendis proclamer : « À celui qui siège sur le Trône, et à l’Agneau, la louange et l’honneur, la gloire et la souveraineté pour les siècles des siècles. » Et les quatre Vivants disaient : « Amen ! » ; et les Anciens, se jetant devant le Trône, se prosternèrent.
      responsory: |-
        [rubric]Stance[/rubric]
        Il vient en chantant,
        le peuple des sauvés :
        immense fresque de joie,
        amour aux cent visages
        qui forment ensemble, dans la lumière,
        la seule icône de gloire : Jésus Christ !
        
        R/ Louange à toi,
        Seigneur de tous les vivants !

        Tu as partagé leur épreuve,
        dans la puissance de ta résurrection, ils chantent :

        Tu les as purifiés par ton sang répandu,
        ils sont enfants du Père et te rendent grâce :

        Tu les as nourris du pain de la vie,
        vainqueurs de la mort, ils t’acclament :
  patristicReading:
    - title: HOMÉLIE DE SAINT BERNARD POUR LA TOUSSAINT
      subtitle: Dans la communion des saints
      content: |-
        Pourquoi notre louange à l’égard des saints, pourquoi notre chant à leur gloire, pourquoi cette fête même que nous célébrons ? Que leur font ces honneurs terrestres, alors que le Père du ciel, en réalisant la promesse du Fils, les honore lui-même ? De nos honneurs les saints n’ont pas besoin, et rien dans notre culte ne peut leur être utile. De fait, si nous vénérons leur mémoire, c’est pour nous que cela importe, non pour eux. ~ Pour ma part, je l’avoue, je sens que leur souvenir allume en moi un violent désir. ~
        Le premier désir, en effet, que la mémoire des saints éveille, ou plus encore stimule en nous, le voici : nous réjouir dans leur communion tellement désirable et obtenir d’être concitoyens et compagnons des esprits bienheureux, d’être mêlés à l’assemblée des patriarches, à la troupe des prophètes, au groupe des Apôtres, à la foule immense des martyrs, à la communauté des confesseurs ; au chœur des vierges, bref d’être associés à la joie et à la communion de tous les saints. Cette Église des premiers-nés nous attend, et nous n’en aurions cure ! Les saints nous désirent et nous n’en ferions aucun cas ! Les justes nous espèrent et nous nous déroberions !
        Réveillons-nous enfin, frères ; ressuscitons avec le Christ, cherchons les réalités d’en haut ; ces réalités, savourons-les. Désirons ceux qui nous désirent, courons vers ceux qui nous attendent, et puisqu’ils comptent sur nous, accourons avec nos désirs spirituels. ~ Ce qu’il nous faut souhaiter, ce n’est pas seulement la compagnie des saints, mais leur bonheur, si bien qu’en désirant leur présence, nous ayons l’ambition aussi de partager leur gloire, avec toute l’ardeur et les efforts que cela suppose. Car cette ambition-là n’a rien de mauvais : nul danger à se passionner pour une telle gloire. ~
        Et voici le second désir dont la commémoration des saints nous embrase : voir, comme eux, le Christ nous apparaître, lui qui est notre vie, et paraître, nous aussi, avec lui dans la gloire. Jusque là, il ne se présente pas à nous comme il est en lui-même, mais tel qu’il s’est fait pour nous : notre Tête, non pas couronnée de gloire, mais ceinte par les épines de nos péchés. ~ Il serait honteux que, sous cette tête couronnée d’épines, un membre choisisse une vie facile, car toute la pourpre qui le couvre doit être encore non pas tant celle de l’honneur que celle de la dérision. Viendra le jour de l’avènement du Christ : alors on n’annoncera plus sa mort de manière à nous faire savoir que nous aussi sommes morts et que notre vie est cachée avec lui. La Tête apparaîtra dans la gloire, et avec elle les membres resplendiront de gloire, lorsque le Christ restaurera notre corps d’humilité pour le configurer à la gloire de la Tête, puisque c’est lui la Tête.
        Cette gloire, il nous faut la convoiter d’une absolue et ferme ambition. ~ Et vraiment, pour qu’il nous soit permis de l’espérer, et d’aspirer à un tel bonheur, il nous faut rechercher aussi, avec le plus grand soin, l’aide et la prière des saints, afin que leur intercession nous obtienne ce qui demeure hors de nos propres possibilités.
      responsory: |-
        Il vient en chantant,
        le peuple des sauvés :
        immense fresque de joie,
        amour aux cent visages
        qui forment ensemble, dans la lumière,
        la seule icône de gloire : Jésus Christ !
        
        R/ Louange à toi, Seigneur de tous les vivants !

middleOfDay:
  psalmody:
    - psalm: PSALM_122
    - psalm: PSALM_123
    - psalm: PSALM_124
  tierce:
    antiphon: Le Seigneur consolera son peuple ; le temps viendra de l’allégresse et des chants.
    reading:
      biblicalReference: Ap 21, 10-11a ; 22, 3b_4
      content: L’ange m’entraîna par l’esprit sur une grande et haute montagne ; il me montra la cité sainte, Jérusalem, qui descendait du ciel, d’auprès de Dieu. Elle resplendissait de la gloire de Dieu. Le trône de Dieu et de l’Agneau sera dans la ville, et les serviteurs de Dieu lui rendront un culte; ils verront son visage, et son nom sera écrit sur leur front.
    responsory: |-
      V/ Les justes rendront grâce à ton nom, Seigneur,
      ils se tiendront en ta présence.
  sexte:
    antiphon: Les peuples raconteront la sagesse des saints ; toute l’Église proclamera leur louange.
    reading:
      biblicalReference: 1P 1, 15-16
      content: |-
        À l’image du Dieu saint qui vous a appelés, soyez saints, vous aussi, dans toute votre conduite, puisque l’Écriture dit : soyez saints, car moi, je suis saint.
    responsory: |-
      V/ Que le Seigneur soit votre joie, tous les justes !
      rendez grâce, en rappelant son nom très saint.
  none:
    antiphon: Par la foi les saints ont remporté la victoire, ils ont pratiqué la justice et gagné l’héritage promis.
    reading:
      biblicalReference: Ap 21, 10-11a ; 22, 3b_4
      content: L’ange m’entraîna par l’esprit sur une grande et haute montagne ; il me montra la cité sainte, Jérusalem, qui descendait du ciel, d’auprès de Dieu. Elle resplendissait de la gloire de Dieu. Le trône de Dieu et de l’Agneau sera dans la ville, et les serviteurs de Dieu lui rendront un culte; ils verront son visage, et son nom sera écrit sur leur front.
    responsory: |-
      V/ Les justes rendront grâce à ton nom, Seigneur,
      ils se tiendront en ta présence.
vespers:
  hymn:
  - splendeur-du-paradis
  psalmody:
    - psalm: PSALM_109
      antiphon:
        - Je vis une foule immense que nul ne pouvait dénombrer ; un peuple formé de toutes les nations se tenait devant le trône de Dieu.
    - psalm: PSALM_115
      antiphon:
        - Dieu les a mis à l’épreuve et les a trouvés fidèles, il leur a donné la gloire du Royaume.
    - psalm: NT_9
      antiphon:
        - Par ton sang, Seigneur Jésus, tu nous as rachetés pour Dieu, de toute race, langue et nation ; tu as fait de nous un royaume de prêtres.
  reading:
    biblicalReference: 2Co 6, 16b; 7,1
    content: |-
      Nous sommes, nous, le temple du Dieu vivant, comme Dieu l’a dit : Au milieu d’eux, j’habiterai et je marcherai, je serai leur Dieu et ils seront mon peuple. Puisque nous détenons de telles promesses, mes bien-aimés, purifions-nous nous-mêmes de toute souillure de la chair et de l’esprit ; achevons de nous sanctifier dans la crainte de Dieu.
  responsory: |-
    R/ Dieu des vivants,
    louange à toi !
    V/ Tu les as purifiés par ton sang répandu,
    enfants du Père ils te rendent grâce. R/
    V/ Tu les as nourris du pain de la vie,
    vainqueur de la mort, ils t’acclament :R/
    V/ Tu as partagé leur épreuve ;
    vivants, ressuscités, ils chantent :R/
  evangelicAntiphon:
    common: Heureux les saints dans le Royaume du Christ ; vêtus de robes blanches, ils suivent l’Agneau et partagent sa joie.
  intercession:
    content: |-
      Avec toute l’Église, rendons grâce à notre Dieu
      qui nous met dans la communion des saints :
      
      R/ Dieu saint, à toi la puissance et la gloire !
      
      Pour la Vierge Marie, la Mère de Jésus,
      pour saint Joseph, le charpentier de Nazareth :
      
      Pour les patriarches et les prophètes,
      pour les Apôtres et les évangélistes :
      
      Pour tous ceux qui ont subi le martyre,
      pour les hommes et les femmes qui ont suivi le Christ :
      
      Pour tous les membres glorieux du Corps du Christ,
      pour la foule innombrable des saints connus de toi seul :
      
      Accueille nos frères qui sont morts :
      qu’ils partagent le sort des saints dans ta lumière.
