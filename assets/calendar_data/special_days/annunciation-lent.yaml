      antiphon:
        - "Ne crains pas, Marie, tu as trouvé grâce auprès de Dieu ! Tu vas concevoir et enfanter le Fils du Très-Haut."
    - psalm: NT_6
      antiphon:
        - "Je suis la servante du Seigneur : qu’il me soit fait selon ta parole."
  reading:
