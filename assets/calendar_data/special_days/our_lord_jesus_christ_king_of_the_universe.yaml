celebration:
  title: Le Christ Roi de l’univers
  color: white

oration:
  - Dieu éternel, tu as voulu fonder toutes choses en ton Fils bien-aimé, le Roi de l’univers ; fais que toute la création, libérée de la servitude, reconnaisse ta puissance et te glorifie sans fin.

invitatory:
  antiphon:
  - Louange à toi, Jésus, Roi d’éternelle gloire.

firstVespers:
  hymn:
  - jesus-seigneur
  psalmody:
    - psalm: PSALM_112
      antiphon:
        - On l’appellera le Roi de la paix, son trône est établi pour toujours.
    - psalm: PSALM_116
      antiphon:
        - Son règne est un règne éternel, et tous les rois le serviront.
    - psalm: NT_9
      antiphon:
        - Le Christ a reçu l’empire et la royauté, tous les peuples le serviront.
  reading:
    biblicalReference: Ep 1, 20b-23
    content: Dieu a ressuscité le Christ d’entre les morts et il l’a fait asseoir à sa droite dans les cieux. Il l’a établi au-dessus de toutes les puissances et de tous les êtres qui nous dominent, quel que soit leur nom, aussi bien dans le monde présent que dans le monde à venir. Il lui a tout soumis et, le plaçant plus haut que tout, il a fait de lui la tête de l’Église qui est son corps, et l’Église est l’accomplissement total du Christ, lui que Dieu comble totalement de sa plénitude.
  responsory: |-
    R/ Voici le règne de notre Dieu,
    voici le pouvoir de son Christ !
    V/ Premier-né d’entre les morts
    et prince des rois de la terre. R/
    V  Celui qui nous aime
    a fait de nous son Royaume. R/
  evangelicAntiphon:
    common: Le Seigneur lui donnera le trône de David son père, il régnera pour toujours sur la maison de Jacob, et son règne n’aura pas de fin, alléluia.
  intercession:
    content: |-
      Prions le Christ, qui gouverne les puissances de l’univers.
      
      R/ Seigneur, que ton règne arrive !
      
      Ô Christ, notre Roi et notre Berger,
      — conduis-nous vers tes nourritures.
      
      Toi, notre guide et notre Sauveur,
      — viens chercher ceux qui sont perdus.
      
      Toi, le juge éternel,
      — donne-nous part au Royaume préparé pour nous.
      
      Toi, le Prince de la paix,
      — délivre-nous de la guerre.
      
      Toi qui as reçu les nations en héritage,
      — rassemble l’humanité dans ton Église.
      
      Toi, le premier-né d’entre les morts,
      — reçois nos frères défunts dans ton Royaume.

morning:
  hymn:
  - ton-royaume
  psalmody:
    - psalm: PSALM_92
      antiphon:
        - Il germera comme germe la semence, il régnera sur le trône royal, il annoncera la paix.
    - psalm: OT_41
      antiphon:
        - Il sera grand par toute la terre, il sera lui-même notre paix.
    - psalm: PSALM_148
      antiphon:
        - |-
          Le Seigneur Dieu lui a remis puissance, honneur et royauté : tout l’univers le servira.
  reading:
    biblicalReference: Ep 4, 15-16
    content: En vivant dans la vérité de l’amour, nous grandirons dans le Christ pour nous élever en tout jusqu’à lui, car il est la Tête. Et par lui, dans l’harmonie et la cohésion, tout le corps poursuit sa croissance, grâce aux connexions internes qui le maintiennent, selon l’activité qui est à la mesure de chaque membre. Ainsi le corps se construit dans l’amour.
  responsory: |-
    R/ Il est l’image du Dieu invisible,
    le premier-né de toute créature.
    * En lui, toute plénitude !
    V/ Il est la tête de l’Église,
    le premier-né d’entre les morts. *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Premier-né d’entre les morts, souverain des rois de la terre, le Christ a fait de nous le Royaume de Dieu son Père, alléluia !
  intercession:
    content: |-
      À toi, Jésus, qui seul es Roi,
      gloire et puissance dans les siècles !
      
      R/ Règne sur nous, Seigneur !
      
      Christ, notre Dieu et notre Roi,
      gouverne ton peuple et donne-lui ta vie.
      
      Toi, le vrai Berger qui meurs pour tes brebis,
      rassemble-les dans l’unité.
      
      Toi, le Roi de l’univers,
      restaure en toi toute la création.</P> Toi, qui rends témoignage à la vérité,
      sois le maître des esprits et des cœurs.
      
      Toi, notre maître et notre modèle,
      fais-nous paraître purs devant toi.

readings:
  hymn:
  - qu-il-soit-beni-qu-il-vienne
  psalmody:
    - psalm: PSALM_2
      antiphon:
        - |-
          Le Seigneur est roi sur la sainte montagne : à lui l’héritage des nations.
    - psalm: PSALM_71-I
      antiphon:
        - Dieu l’a fait juge des vivants et des morts.
    - psalm: PSALM_71-II
      antiphon:
        - Le règne de Dieu est justice, paix et joie dans l’Esprit Saint.
  verse: |-
    V/ J’ai fait de toi la lumière des peuples :
    porte mon salut jusqu’au bout du monde.
  biblicalReading:
    - title: LECTURE DU LIVRE DE L’APOCALPYSE
      suntitle: Vision du Fils de l’homme
      ref: Ap 1, 46-6.10.12-18; 2, 26.28; 3, 5.12.20-21
      content: |-
        %Dans le style des apocalypses, Jean décrit la venue du Fils de l’homme, en majesté. Toutes les images visent à nous faire comprendre que celui qui est mort sur la croix est vraiment le Vivant.%
        Grâce et paix vous soient données, de la part de Celui qui est, qui était et qui vient, de la part des sept esprits qui sont devant son trône, et de la part de Jésus Christ, le témoin fidèle, le premier-né d’entre les morts et le prince des rois de la terre. À celui qui nous aime, qui nous a délivrés de nos péchés par son sang, qui a fait de nous un royaume, des prêtres pour Dieu son Père, à lui gloire et pouvoir pour les siècles des siècles. Amen.
        Je fus saisi par l’Esprit au jour du Seigneur, et j’entendis derrière moi une puissante voix, telle une trompette. Je me retournai pour regarder la voix qui me parlait ; et, m’étant retourné, je vis sept chandeliers d’or ; et, au milieu des chandeliers, quelqu’un qui semblait un fils d’homme. Il était vêtu d’une longue robe, une ceinture d’or lui serrait la poitrine ; sa tête et ses cheveux étaient blancs comme laine blanche, comme neige, et ses yeux étaient comme une flamme ardente ; ses pieds semblaient d’un bronze précieux, purifié au creuset, et sa voix était comme la voix des océans ; dans sa main droite, il tenait sept étoiles, et de sa bouche sortait un glaive acéré, à deux tranchants. Son visage resplendissait, tel le soleil dans tout son éclat.
        À sa vue, je tombai comme mort à ses pieds, mais il posa sur moi sa droite et dit : Ne crains pas. Je suis le Premier et le Dernier, et le Vivant ; je fus mort, et voici, je suis vivant pour les siècles des siècles, et je tiens les clefs de la mort et de l’Hadès.
        Le vainqueur, celui qui garde jusqu’à la fin mes œuvres, je lui donnerai pouvoir sur les nations, de même que moi aussi, j’en ai reçu pouvoir de mon Père, et je lui donnerai l’étoile du matin. Ainsi le vainqueur portera-t-il des vêtements blancs ; je n’effacerai pas son nom du livre de vie et j’en répondrai devant mon Père et devant ses anges. Le vainqueur, j’en ferai une colonne dans le temple de mon Dieu, il n’en sortira jamais plus, et j’inscrirai sur lui le nom de mon Dieu, et le nom de la cité de mon Dieu, la Jérusalem nouvelle qui descend du ciel d’auprès de mon Dieu, et mon nom nouveau.
        Voici, je me tiens à la porte et je frappe. Si quelqu’un entend ma voix et ouvre la porte, j’entrerai chez lui et je prendrai la cène avec lui et lui avec moi. Le vainqueur, Je lui donnerai de siéger avec moi sur mon trône, comme moi aussi, j’ai remporté la victoire et suis allé siéger avec mon père sur son trône.

      responsory: |-
        R/ Puissance, honneur et gloire à l’Agneau de Dieu !
        
        Tu es digne, Seigneur,
        de recevoir puissance, richesse, sagesse,
        force, honneur, gloire et louange.
        
        Car tu fus immolé,
        et tu as racheté pour Dieu, par ton sang,
        des hommes de toute langue, peuple et nation.
        
        Tu fais de nous, pour notre Dieu,
        un Royaume et des prêtres,
        et nous régnerons sur la terre.
  patristicReading:
    - title: TRAITÉ D’ORIGÈNE SUR LA PRIÈRE
      subtitle: « Que ton règne vienne »
      content: |-
        Comme l’a dit notre Seigneur et Sauveur, le règne de Dieu vient sans qu’on puisse le remarquer. On ne dira pas : %Le voilà, il est ici%, ou bien : %Il est là%. Car voilà que le règne de Dieu est au-dedans de vous. Et en effet, %elle est tout près de nous, cette Parole, elle est dans notre bouche et dans notre cœur%. En ce cas, il est évident que celui qui prie pour que vienne le règne de Dieu a raison de prier pour que ce règne de Dieu germe, porte du fruit et s’accomplisse en lui. Chez tous les saints en lesquels Dieu règne et qui obéissent à ses lois spirituelles, il habite comme dans une cité bien organisée. Le Père est présent en lui et le Christ règne avec le Père dans cette âme parfaite, selon sa parole : %Nous viendrons chez lui, nous irons demeurer auprès de lui%. ~
        Le règne de Dieu qui est en nous, alors que nous progressons toujours, parviendra à sa perfection lorsque la parole de l’Apôtre s’accomplira : le Christ, après avoir soumis tous ses ennemis, %remettra son pouvoir royal à Dieu le Père pour que Dieu soit tout en tous%. C’est pourquoi, priant sans relâche, avec des dispositions divinisées par le Verbe, disons : %Notre Père qui es aux cieux, que ton nom soit sanctifié, que ton Règne vienne%.
        À propos du règne de Dieu, il faut encore remarquer ceci : %comme il n’y a pas d’union entre la justice et l’impiété, entre la lumière et les ténèbres, entre le Christ et Bélial%, le règne du péché est inconciliable avec le règne de Dieu. Si donc nous voulons que Dieu règne sur nous, que %jamais le péché ne règne dans notre corps mortel. Mais faisons mourir nos membres qui appartiennent à la terre%, portons les fruits de l’Esprit. Ainsi, comme dans un paradis spirituel, le Seigneur se promènera en nous, régnant seul sur nous, avec son Christ. Celui-ci %trônera% en nous, %à la droite de la puissance spirituelle%, que nous désirons recevoir, jusqu’à ce que tous ses ennemis qui sont en nous %deviennent l’escabeau de ses pieds%, et que soit chassée loin de nous toute %principauté, puissance et souveraineté%.
        Tout cela peut arriver en chacun de nous jusqu’à ce %que soit détruit le dernier ennemi, la mort%, et que le Christ dise en nous : %Mort, où est ton dard venimeux ? Enfer, où est ta victoire ?% Dès maintenant donc, %que ce qui est périssable en nous devienne saint et impérissable ; que ce qui est mortel%, après la destruction, %revête l’immortalité% du Père. Ainsi Dieu régnera sur nous et nous serons déjà dans le bonheur de la nouvelle naissance et de la résurrection.
      responsory: |-
        [rubric]Stance[/rubric]
        Amour qui nous attends
        au terme de l’histoire,
        ton Royaume s’ébauche à l’ombre de la croix ;
        déjà sa lumière traverse nos vies.
        Jésus, Seigneur, hâte le temps !
        Reviens, achève ton œuvre !
        
        R/ Quand verrons-nous ta gloire 
        transformer l’univers ?
        
        Jusqu’à ce jour, nous le savons,
        la création gémit
        en travail d’enfantement.
        
        Nous attendons les cieux nouveaux,
        la terre nouvelle,
        où régnera la justice.
        
        Nous cheminons dans la foi,
        non dans la claire vision,
        jusqu’à l’heure de ton retour.

middleOfDay:
  psalmody:
    - psalm: PSALM_117-I
    - psalm: PSALM_117-II
    - psalm: PSALM_117-III
  tierce:
    antiphon: Le Seigneur est notre juge, il nous donne sa loi. Le Seigneur est notre roi, il nous donne le salut.
    reading:
      biblicalReference: Col 1, 19-20
      content: Dieu a voulu que, dans le Christ, toute chose ait son accomplissement total. Il a voulu tout réconcilier par lui et pour lui, sur la terre et dans les cieux, en faisant la paix par le sang de sa croix.
    responsory: |-
      V/ Acclamez votre Roi, le Seigneur !
      Il vient pour gouverner la terre !
  sexte:
    antiphon: Des eaux vives sortiront de Jérusalem ; le Seigneur est le roi de toute la terre.
    reading:
      biblicalReference: Col 1, 16-17
      content: |-
        C’est dans le Fils que tout a été créé dans les cieux et sur la terre, les êtres visibles et les puissances invisibles : tout est créé par lui et pour lui. Il est avant tous les êtres, et tout subsiste en lui.
    responsory: |-
      V/ Sonnez pour notre roi, sonnez !
      Il est roi sur toute la terre.
  none:
    antiphon: Son pouvoir s’étendra, la paix sera sans fin.
    reading:
      biblicalReference: Col 1, 19-20
      content: Dieu a voulu que, dans le Christ, toute chose ait son accomplissement total. Il a voulu tout réconcilier par lui et pour lui, sur la terre et dans les cieux, en faisant la paix par le sang de sa croix.
    responsory: |-
      V/ Acclamez votre Roi, le Seigneur !
      Il vient pour gouverner la terre !

vespers:
  hymn:
  - jesus-seigneur
  psalmody:
    - psalm: PSALM_109
      antiphon:
        - Il régnera sur la maison de David et son règne n’aura pas de fin, alléluia !
    - psalm: PSALM_144
      antiphon:
        - Ton règne est un règne éternel, ton empire, pour les âges des âges.
    - psalm: NT_12
      antiphon:
        - Roi des rois et Seigneur des seigneurs, à toi gloire et puissance aux siècles des siècles.
  reading:
    biblicalReference: 1 Co 15, 25-28
    content: |-
      Le Christ doit régner jusqu’au jour où il aura mis sous ses pieds tous ses ennemis. Et le dernier ennemi qu’il détruira, c’est la mort, car il a tout mis sous ses pieds. Mais quand il dira : « Tout est soumis désormais », c’est évidemment à l’exclusion de Celui qui lui a soumis toutes choses. Alors, quand tout sera sous le pouvoir du Fils, il se mettra lui-même sous le pouvoir du Père qui lui aura tout soumis, et ainsi Dieu sera tout en tous.
  responsory: |-
    R/ En ces jours-là fleurira la justice,
    grande paix jusqu’à la fin des âges.
    V/ Les nations verront sa lumière
    et tous les rois, sa gloire. R/
    V/ Il aura souci du faible et du pauvre,
    du pauvre dont il sauve la vie. R/
  evangelicAntiphon:
    common: Tout pouvoir lui a été donné, au ciel et sur la terre, alléluia.
  intercession:
    content: |-
      Prions le Christ, qui gouverne les puissances de l’univers.
      
      R/ Seigneur, que ton règne arrive !
      
      Ô Christ, notre Roi et notre Berger,
      — conduis-nous vers tes nourritures.
      
      Toi, notre guide et notre Sauveur,
      — viens chercher ceux qui sont perdus.
      
      Toi, le juge éternel,
      — donne-nous part au Royaume préparé pour nous.
      
      Toi, le Prince de la paix,
      — délivre-nous de la guerre.
      
      Toi qui as reçu les nations en héritage,
      — rassemble l’humanité dans ton Église.
      
      Toi, le premier-né d’entre les morts,
      — reçois nos frères défunts dans ton Royaume.

mass:
- massType: day_mass
  name: Messe du jour
  note: null
  entranceAntiphon: null
  collect: null
  readingParts:
  - partType: READING
    partContents:
    - biblicalRef: Ez 34, 11-12.15-17
      sundayAndWeekCycles:
      - A
      headline: |-
        « Toi, mon troupeau, voici que je vais juger entre brebis et brebis »
      content: |-
        Ainsi parle le Seigneur Dieu :
        Voici que moi-même, je m’occuperai de mes brebis,
        et je veillerai sur elles.
         Comme un berger veille sur les brebis de son troupeau
        quand elles sont dispersées,
        ainsi je veillerai sur mes brebis,
        et j’irai les délivrer dans tous les endroits où elles ont été dispersées
        un jour de nuages et de sombres nuées.
         C’est moi qui ferai paître mon troupeau,
        et c’est moi qui le ferai reposer,
        – oracle du Seigneur Dieu.
         La brebis perdue, je la chercherai ;
        l’égarée, je la ramènerai.
        Celle qui est blessée, je la panserai.
        Celle qui est malade, je lui rendrai des forces.
        Celle qui est grasse et vigoureuse,
        je la garderai, je la ferai paître selon le droit.
         Et toi, mon troupeau
        – ainsi parle le Seigneur Dieu –,
        voici que je vais juger entre brebis et brebis,
        entre les béliers et les boucs.
    - biblicalRef: Dn 7, 13-14
      sundayAndWeekCycles:
      - B
      headline: |-
        « Sa domination est une domination éternelle »
      content: |-
        Moi, Daniel,
         je regardais, au cours des visions de la nuit,
        et je voyais venir, avec les nuées du ciel,
        comme un Fils d’homme ;
        il parvint jusqu’au Vieillard,
        et on le fit avancer devant lui.
         Et il lui fut donné
        domination, gloire et royauté ;
        tous les peuples, toutes les nations et les gens de toutes langues
        le servirent.
        Sa domination est une domination éternelle,
        qui ne passera pas,
        et sa royauté,
        une royauté qui ne sera pas détruite.
    - biblicalRef: 2 S 5, 1-3
      sundayAndWeekCycles:
      - C
      headline: |-
        « Ils donnèrent l’onction à David pour le faire roi sur Israël »
      content: |-
        En ces jours-là,
         toutes les tribus d’Israël vinrent trouver David à Hébron
        et lui dirent :
        « Vois ! Nous sommes de tes os et de ta chair.
         Dans le passé déjà, quand Saül était notre roi,
        c’est toi qui menais Israël en campagne et le ramenais,
        et le Seigneur t’a dit :
        ‘Tu seras le berger d’Israël mon peuple,
        tu seras le chef d’Israël.’ »
         Ainsi, tous les anciens d’Israël
        vinrent trouver le roi à Hébron.
        Le roi David fit alliance avec eux, à Hébron,
        devant le Seigneur.
        Ils donnèrent l’onction à David
        pour le faire roi sur Israël.
  - partType: PSALM
    partContents:
    - biblicalRef: Ps 22 (23), 1-2ab, 2c-3, 4, 5, 6
      refAbbr: 22, 1…
      sundayAndWeekCycles:
      - A
      chorus:
      - chorusRef: 22, 1
        chorus: |-
          Le Seigneur est mon berger :
          rien ne saurait me manquer.
      content: |-
        Le Seigneur est mon berger :
        je ne manque de rien.
        Sur des prés d’herbe fraîche,
        il me fait reposer.

        Il me mène vers les eaux tranquilles
        et me fait revivre ;
        il me conduit par le juste chemin
        pour l’honneur de son nom.

        Si je traverse les ravins de la mort,
        je ne crains aucun mal,
        car tu es avec moi :
        ton bâton me guide et me rassure.

        Tu prépares la table pour moi
        devant mes ennemis ;
        tu répands le parfum sur ma tête,
        ma coupe est débordante.

        Grâce et bonheur m’accompagnent
        tous les jours de ma vie ;
        j’habiterai la maison du Seigneur
        pour la durée de mes jours.
    - biblicalRef: Ps 92 (93), 1abc, 1d-2, 5
      refAbbr: 92, 1…
      sundayAndWeekCycles:
      - B
      chorus:
      - chorusRef: 92, 1ab
        chorus: |-
          Le Seigneur est roi ;
          il s’est vêtu de magnificence.
      content: |-
        Le Seigneur est roi ;
        il s’est vêtu de magnificence,
        le Seigneur a revêtu sa force.

        Et la terre tient bon, inébranlable ;
        dès l’origine ton trône tient bon,
        depuis toujours, tu es.

        Tes volontés sont vraiment immuables :
        la sainteté emplit ta maison,
        Seigneur, pour la suite des temps.
    - biblicalRef: Ps 121 (122), 1-2, 3-4, 5-6
      refAbbr: 121, 1…
      sundayAndWeekCycles:
      - C
      chorus:
      - chorusRef: 121, 1
        chorus: |-
          Dans la joie, nous irons
          à la maison du Seigneur.
      content: |-
        Quelle joie quand on m’a dit :
        « Nous irons à la maison du Seigneur ! »
        Maintenant notre marche prend fin
        devant tes portes, Jérusalem !

        Jérusalem, te voici dans tes murs :
        ville où tout ensemble ne fait qu’un !
        C’est là que montent les tribus, les tribus du Seigneur,
        là qu’Israël doit rendre grâce au nom du Seigneur.

        C’est là le siège du droit,
        le siège de la maison de David.
        Appelez le bonheur sur Jérusalem :
        « Paix à ceux qui t’aiment ! »
  - partType: READING
    partContents:
    - biblicalRef: 1 Co 15, 20-26.28
      sundayAndWeekCycles:
      - A
      headline: |-
        « Il remettra le pouvoir royal à Dieu le Père, et ainsi, Dieu sera tout en tous »
      content: |-
        Frères,
         le Christ est ressuscité d’entre les morts,
        lui, premier ressuscité parmi ceux qui se sont endormis.
         Car, la mort étant venue par un homme,
        c’est par un homme aussi que vient la résurrection des morts.
         En effet, de même que tous les hommes
        meurent en Adam,
        de même c’est dans le Christ
        que tous recevront la vie,
         mais chacun à son rang :
        en premier, le Christ,
        et ensuite, lors du retour du Christ,
        ceux qui lui appartiennent.
         Alors, tout sera achevé,
        quand le Christ remettra le pouvoir royal à Dieu son Père,
        après avoir anéanti, parmi les êtres célestes,
        toute Principauté, toute Souveraineté et Puissance.
         Car c’est lui qui doit régner
        jusqu’au jour où Dieu aura mis sous ses pieds tous ses ennemis.
         Et le dernier ennemi qui sera anéanti,
        c’est la mort.
         Et, quand tout sera mis sous le pouvoir du Fils,
        lui-même se mettra alors sous le pouvoir du Père
        qui lui aura tout soumis,
        et ainsi, Dieu sera tout en tous.
    - biblicalRef: Ap 1, 5-8
      sundayAndWeekCycles:
      - B
      headline: |-
        « Le prince des rois de la terre a fait de nous un royaume et des prêtres pour son Dieu »
      content: |-
        À vous, la grâce et la paix,
         de la part de Jésus Christ, le témoin fidèle,
        le premier-né des morts,
        le prince des rois de la terre.

        À lui qui nous aime,
        qui nous a délivrés de nos péchés par son sang,
         qui a fait de nous un royaume
        et des prêtres pour son Dieu et Père,
        à lui, la gloire et la souveraineté
        pour les siècles des siècles. Amen.
         Voici qu’il vient avec les nuées,
        tout œil le verra,
        ils le verront, ceux qui l’ont transpercé ;
        _et sur lui se lamenteront toutes les tribus de la terre._
        Oui ! Amen !

        Moi, je suis l’Alpha et l’Oméga,
        dit le Seigneur Dieu,
        Celui qui est, qui était et qui vient,
        le Souverain de l’univers.
    - biblicalRef: Col 1, 12-20
      sundayAndWeekCycles:
      - C
      headline: |-
        « Dieu nous a placés dans le Royaume de son Fils bien-aimé »
      content: |-
        Frères,
         rendez grâce à Dieu le Père,
        qui vous a rendus capables
        d’avoir part à l’héritage des saints,
        dans la lumière.
         Nous arrachant au pouvoir des ténèbres,
        il nous a placés dans le Royaume de son Fils bien-aimé :
         en lui nous avons la rédemption,
        le pardon des péchés.

        Il est l’image du Dieu invisible,
        le premier-né, avant toute créature :
         en lui, tout fut créé,
        dans le ciel et sur la terre.
        Les êtres visibles et invisibles,
        Puissances, Principautés,
        Souverainetés, Dominations,
        tout est créé par lui et pour lui.
         Il est avant toute chose,
        et tout subsiste en lui.

        Il est aussi la tête du corps, la tête de l’Église :
        c’est lui le commencement,
        le premier-né d’entre les morts,
        afin qu’il ait en tout la primauté.
         Car Dieu a jugé bon
        qu’habite en lui toute plénitude
         et que tout, par le Christ,
        lui soit enfin réconcilié,
        faisant la paix par le sang de sa Croix,
        la paix pour tous les êtres
        sur la terre et dans le ciel.
  - partType: GOSPEL
    partContents:
    - biblicalRef: Mt 25, 31-46
      sundayAndWeekCycles:
      - A
      headline: |-
        « Il siégera sur son trône de gloire et séparera les hommes les uns des autres »
      acclamationAntiphon: |-
        Béni soit celui qui vient au nom du Seigneur !
        Béni soit le Règne qui vient,
        celui de David notre père.
      content: |-
        En ce temps-là,
        Jésus disait à ses disciples :
         « Quand le Fils de l’homme viendra dans sa gloire,
        et tous les anges avec lui,
        alors il siégera sur son trône de gloire.
         Toutes les nations seront rassemblées devant lui ;
        il séparera les hommes les uns des autres,
        comme le berger sépare les brebis des boucs :
         il placera les brebis à sa droite, et les boucs à gauche.

        Alors le Roi dira à ceux qui seront à sa droite :
        ‘Venez, les bénis de mon Père,
        recevez en héritage le Royaume
        préparé pour vous depuis la fondation du monde.
         Car j’avais faim, et vous m’avez donné à manger ;
        j’avais soif, et vous m’avez donné à boire ;
        j’étais un étranger, et vous m’avez accueilli ;
         j’étais nu, et vous m’avez habillé ;
        j’étais malade, et vous m’avez visité ;
        j’étais en prison, et vous êtes venus jusqu’à moi !’
         Alors les justes lui répondront :
        ‘Seigneur, quand est-ce que nous t’avons vu… ?
        tu avais donc faim, et nous t’avons nourri ?
        tu avais soif, et nous t’avons donné à boire ?
         tu étais un étranger, et nous t’avons accueilli ?
        tu étais nu, et nous t’avons habillé ?
         tu étais malade ou en prison…
        Quand sommes-nous venus jusqu’à toi ?’
         Et le Roi leur répondra :
        ‘Amen, je vous le dis :
        chaque fois que vous l’avez fait
        à l’un de ces plus petits de mes frères,
        c’est à moi que vous l’avez fait.’

        Alors il dira à ceux qui seront à sa gauche :
        ‘Allez-vous-en loin de moi, vous les maudits,
        dans le feu éternel préparé pour le diable et ses anges.
         Car j’avais faim, et vous ne m’avez pas donné à manger ;
        j’avais soif, et vous ne m’avez pas donné à boire ;
         j’étais un étranger, et vous ne m’avez pas accueilli ;
        j’étais nu, et vous ne m’avez pas habillé ;
        j’étais malade et en prison, et vous ne m’avez pas visité.’
         Alors ils répondront, eux aussi :
        ‘Seigneur, quand t’avons-nous vu
        avoir faim, avoir soif, être nu, étranger, malade ou en prison,
        sans nous mettre à ton service ?’
         Il leur répondra :
        ‘Amen, je vous le dis :
        chaque fois que vous ne l’avez pas fait
        à l’un de ces plus petits,
        c’est à moi que vous ne l’avez pas fait.’

        Et ils s’en iront, ceux-ci au châtiment éternel,
        et les justes, à la vie éternelle. »
    - biblicalRef: Jn 18, 33b-37
      sundayAndWeekCycles:
      - B
      headline: |-
        « C’est toi-même qui dis que je suis roi »
      acclamationAntiphon: |-
        Béni soit celui qui vient au nom du Seigneur !
        Béni soit le Règne qui vient,
        celui de David notre père.
      content: |-
        En ce temps-là,
         Pilate appela Jésus et lui dit :
        « Es-tu le roi des Juifs ? »
         Jésus lui demanda :
        « Dis-tu cela de toi-même,
        ou bien d’autres te l’ont dit à mon sujet ? »
         Pilate répondit :
        « Est-ce que je suis juif, moi ?
        Ta nation et les grands prêtres t’ont livré à moi :
        qu’as-tu donc fait ? »
         Jésus déclara :
        « Ma royauté n’est pas de ce monde ;
        si ma royauté était de ce monde,
        j’aurais des gardes
        qui se seraient battus pour que je ne sois pas livré aux Juifs.
        En fait, ma royauté n’est pas d’ici. »
         Pilate lui dit :
        « Alors, tu es roi ? »
        Jésus répondit :
        « C’est toi-même qui dis que je suis roi.
        Moi, je suis né, je suis venu dans le monde pour ceci :
        rendre témoignage à la vérité.
        Quiconque appartient à la vérité
        écoute ma voix. »
    - biblicalRef: Lc 23, 35-43
      sundayAndWeekCycles:
      - C
      headline: |-
        « Jésus, souviens-toi de moi quand tu viendras dans ton Royaume »
      acclamationAntiphon: |-
        Béni soit celui qui vient au nom du Seigneur !
        Béni soit le Règne qui vient,
        celui de David notre père.
      content: |-
        En ce temps-là,
        on venait de crucifier Jésus,
         et le peuple restait là à observer.
        Les chefs tournaient Jésus en dérision et disaient :
        « Il en a sauvé d’autres :
        qu’il se sauve lui-même,
        s’il est le Messie de Dieu, l’Élu ! »
         Les soldats aussi se moquaient de lui ;
        s’approchant, ils lui présentaient de la boisson vinaigrée,
         en disant :
        « Si tu es le roi des Juifs,
        sauve-toi toi-même ! »

        Il y avait aussi une inscription au-dessus de lui :
        « Celui-ci est le roi des Juifs. »
         L’un des malfaiteurs suspendus en croix
        l’injuriait :
        « N’es-tu pas le Christ ?
        Sauve-toi toi-même, et nous aussi ! »
         Mais l’autre lui fit de vifs reproches :
        « Tu ne crains donc pas Dieu !
        Tu es pourtant un condamné, toi aussi !
         Et puis, pour nous, c’est juste :
        après ce que nous avons fait,
        nous avons ce que nous méritons.
        Mais lui, il n’a rien fait de mal. »
         Et il disait :
        « Jésus, souviens-toi de moi
        quand tu viendras dans ton Royaume. »
         Jésus lui déclara :
        « Amen, je te le dis :
        aujourd’hui, avec moi, tu seras dans le Paradis. »
