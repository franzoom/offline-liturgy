celebration:
  title: Nativité de Saint Jean-Baptiste
  description: |-
    L’Église célèbre dans la joie la naissance de Jean Baptiste, qui est venu pour rendre témoignage à la lumière au seuil des temps nouveaux. Jésus a souligné lui‑même le rôle hors de pair de son Précurseur : « Parmi les enfants des femmes, nul ne s’est levé de plus grand que Jean Baptiste ».
  color: white

oration:
  - Tu as voulu, Seigneur, que saint Jean Baptiste prépare ton peuple à la venue du Messie ; accorde à ton Église le don de la joie spirituelle, et guide l’esprit de tous les croyants dans la voie du salut et de la paix.

firstVespers:
  hymn:
    - saisis-de-joie

  psalmody:
    - psalm: PSALM_112
      antiphon:
        - Élisabeth a mis au monde le Baptiste, le plus grand des enfants des hommes.
    - psalm: PSALM_147
      antiphon:
        - Celle qu’on appelait stérile a mis au monde un fils, Jean, le précurseur du Christ.
    - psalm: NT_4
      antiphon:
        - |-
          L’enfant qui nous est né est plus qu’un prophète : de tous les enfants des hommes, Jean Baptiste est le plus grand.
  reading:
    content: |-
      Comme il l’avait promis, Dieu a fait sortir de la descendance de David un sauveur pour Israël : c’est Jésus, dont Jean Baptiste a préparé la venue en proclamant avant lui un baptême de conversion pour tout le peuple d’Israël. Au moment d’achever sa route, Jean disait : Celui auquel vous pensez, ce n’est pas moi. Mais le voici qui vient après moi, et je ne suis pas digne de lui défaire ses sandales.
  responsory: |-
    R/ Préparez le chemin du Seigneur.
    V/ Le voici, il vient dans le désert. R/
    V/ Il sera la lumière des nations. R/
    R/ Gloire au Père et au Fils et au Saint-Esprit.
  evangelicAntiphon:
    common: À l’heure où l’on offre l’encens, l’Ange Gabriel apparut à Zacharie.
  intercession:
    content: |-
      Dieu notre Père a choisi Jean Baptiste pour annoncer le Christ aux hommes, prions-le dans la joie :
      
      R/Conduis nos pas au chemin de la paix !
      
      Jean a été appelé dès le sein de sa mère à préparer la route pour ton Fils,
      — maintenant tu nous appelles à le suivre.
      
      Jean, le Baptiste, a reconnu l’Agneau de Dieu en Jésus qui venait à lui,
      — maintenant ton Église le montre aux hommes.
      
      Jean ton prophète, disait : « Il faut qu’il croisse et que je diminue »,
      — maintenant tu nous invites à céder la place pour que le Christ soit manifesté.
      
      Jean, ton martyr, a défendu la justice jusqu’à la mort,
      — maintenant tu nous envoies témoigner de la vérité.

invitatory:
  antiphon:
    - Puissance, honneur et gloire à l’Agneau de Dieu.

readings:
  hymn: toi-qui-veilles-en-la-nuit

  psalmody:
    - psalm: PSALM_20
      antiphon:
        - J’étais encore dans le sein de ma mère lorsque Dieu m’a appelé.
    - psalm: PSALM_91-I
      antiphon:
        - Dieu a fait de ma bouche une épée tranchante, il m’a protégé par l’ombre de sa main.
    - psalm: PSALM_91-II
      antiphon:
        - |-
          Jean a rendu témoignage à Jésus : Lui qui vient après moi, avant moi il était.
  verse: |-
    V/ Il est venu pour rendre témoignage à la lumière
    afin que tous croient par lui.
  biblicalReading:
    -
      - title: LECTURE DU LIVRE DE JÉRÉMIE
        subtitle: Vocation du prophète
        ref: Jr 1, 4-10.17-19
        content: |-
          Paroles de Jérémie, fils de Helkias, l’un des prêtres qui étaient à Anatoth, au pays de Benjamin. La parole du SEIGNEUR me fut adressée : « Avant même de te façonner dans le sein de ta mère, je te connaissais ; avant que tu viennes au jour, je t’ai consacré ; je fais de toi un prophète pour les nations. » Et je dis : « Ah ! SEIGNEUR mon Dieu ! Vois donc : je ne sais pas parler, je suis un enfant ! » Le SEIGNEUR reprit : « Ne dis pas : “Je suis un enfant !” Tu iras vers tous ceux à qui je t’enverrai ; tout ce que je t’ordonnerai, tu le diras. Ne les crains pas, car je suis avec toi pour te délivrer — oracle du SEIGNEUR. » Puis le SEIGNEUR étendit la main et me toucha la bouche. Il me dit : « Voici, je mets dans ta bouche mes paroles ! Vois : aujourd’hui, je te donne autorité sur les nations et les royaumes, pour arracher et renverser, pour détruire et démolir, pour bâtir et planter.
          Toi, mets ta ceinture autour des reins et lève-toi, tu diras contre eux tout ce que je t’ordonnerai. Ne tremble pas devant eux, sinon c’est moi qui te ferai trembler devant eux. Moi, je fais de toi aujourd’hui une ville fortifiée, une colonne de fer, un rempart de bronze, pour faire face à tout le pays, aux rois de Juda et à ses princes, à ses prêtres et à tout le peuple du pays. Ils te combattront, mais ils ne pourront rien contre toi, car je suis avec toi pour te délivrer — oracle du SEIGNEUR. »
        responsory: |-
          [rubric](Stance)[/rubric]
          Saisis de joie, vous demandez :
          « Quel sera cet enfant ? »
          C’est lui le Messager de la grande espérance ;
          accueillez-le de la part du Seigneur
          Il vient tracer le chemin de l’Époux
          et préluder au chant des Noces.
          
          R/ Béni soit le Dieu fidèle,
          il vient nous donner son amour !
          
          Il se souvient de l’Alliance sainte,
          jadis annoncée par les prophètes.
          
          Il nous suscite une force de salut
          dans la maison de David son serviteur.
  patristicReading:
    -
      - title: HOMÉLIE DE SAINT AUGUSTIN POUR LA NATIVITÉ DE JEAN BAPTISTE
        content: |-
          L’Église considère la naissance de Jean comme particulièrement sacrée : on ne trouve aucun des saints qui nous ont précédés dont nous célébrions solennellement la naissance. Nous ne célébrons que celle de Jean et celle du Christ. Ce ne peut être sans motif ; et si peut-être nous n’y voyons pas très clair en raison de la noblesse d’un tel mystère, nous le méditerons cependant de façon fructueuse et profonde.
          Jean naît d’une vieille femme stérile ; le Christ naît d’une jeune fille vierge. ~ La naissance de Jean rencontre l’incrédulité, et son père devient muet ; Marie croit à celle du Christ, et elle le conçoit par la foi. ~ Nous vous avons proposé d’en chercher la raison, nous vous avons annoncé que nous allions y réfléchir. Mais c’était un simple préambule, et si nous ne sommes pas capables de scruter les replis d’un si grand mystère, faute de capacité ou de temps, vous serez mieux instruits par celui qui parle en vous, même en notre absence, celui à qui vous pensez avec affection, celui que vous avez accueilli dans votre cœur, celui dont vous êtes devenus les temples. ~
          Jean apparaît donc comme une frontière placée entre les deux testaments, l’ancien et le nouveau. Qu’il forme une sorte de frontière, le Seigneur lui-même l’atteste lorsqu’il dit : %La Loi et les Prophètes vont jusqu’à Jean%. Il est donc un personnage de l’antiquité et le héraut de la nouveauté. Parce qu’il représente l’antiquité, il naît de deux vieillards ; parce qu’il représente la nouveauté, il se révèle prophète dans les entrailles de sa mère. En effet, avant sa naissance, lorsque Marie s’approcha, il bondit dans le sein de sa mère. Là déjà il était désigné pour sa mission, désigné avant d’être né. Il apparaît déjà comme le précurseur du Christ, avant que celui-ci puisse le voir. Ces choses-là sont divines et elles dépassent la capacité de la faiblesse humaine. Enfin a lieu sa naissance, il reçoit son nom, son père retrouve la parole. Il faut rattacher ces événements à leur symbolisme profond. ~
          Zacharie se tait et perd la parole jusqu’à la naissance de Jean, précurseur du Seigneur, qui lui rend la parole. Que signifie le silence de Zacharie sinon que la prophétie a disparu, et qu’avant l’annonce du Christ, elle est comme cachée et close ? Elle s’ouvre à son avènement, elle devient claire pour l’arrivée de celui qui était prophétisé. La parole rendue à Zacharie à la naissance de Jean correspond au voile déchiré à la mort de Jésus sur la croix. Si Jean s’était annoncé lui-même, la bouche de Zacharie ne se serait pas rouverte. La parole lui est rendue à cause de la naissance de celui qui est la voix ; car on demandait à Jean qui annonçait déjà le Seigneur : %Toi, qui es-tu ?% Et il répondit : %Je suis la voix qui crie dans le désert%. La voix, c’est Jean, tandis que le Seigneur est la Parole : %Au commencement était le Verbe%. Jean, c’est la voix pour un temps ; le Christ, c’est le Verbe au commencement, c’est le Verbe éternel.
        responsory: |-
          R/ Prophète du Très-Haut,
          tu marcheras devant le Seigneur
          pour préparer ses voies.

          Dieu enverra son messager devant lui,
          et soudain il entrera dans son temple,
          le Seigneur que vous cherchez.

          Pour vous qui craignez le nom du Seigneur,
          le Soleil de justice va briller
          avec le salut dans ses rayons.

morning:
  hymn:
   - ce-n-est-pas-moi
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - On lui donnera le nom de Jean. Beaucoup se réjouiront de sa naissance.
    - psalm: AT_41
      antiphon:
        - Il marchera devant le Seigneur avec l’esprit et la puissance d’Élie, afin de préparer à Dieu un peuple.
    - psalm: PSALM_149
      antiphon:
        - Tu marcheras devant, à la face du Seigneur, et tu prépareras ses chemins.
  reading:
    content: Voici que je vais vous envoyer Élie, le prophète, avant que vienne le jour du Seigneur, jour grand et redoutable. Il ramènera le cœur des pères vers leurs fils, et le cœur des fils vers leurs pères, pour que je ne vienne pas frapper le pays de malédiction.
  responsory: |-
    R/ Que vienne le prophète :
    *  Il ouvrira le chemin du Seigneur !
    V/ Il sera grand devant le Seigneur
    et rempli de l’Esprit Saint. *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Zacharie, rempli de l’Esprit Saint, prophétisa en bénissant le Dieu d’Israël.
  intercession:
    content: |-
      Dans la foi, prions le Christ qui envoie devant lui Jean, son précurseur :
      
      R/ Béni sois-tu, Agneau de Dieu !
      
      Pour toi, Jean a tressailli dans le sein d’Élisabeth,
      — aujourd’hui, tu nous combles de joie en venant à nous.
      
      Par sa parole et sa vie, Jean le Baptiste nous a montré un chemin de conversion,
      — aujourd’hui, tu veux tourner nos cœurs vers toi.
      
      Jean, un homme, t’a annoncé avec les mots des hommes,
      — aujourd’hui, tu envoies par le monde des messagers de ta Bonne Nouvelle.
      
      Jean t’a baptisé au Jourdain pour que soit accomplie toute justice,
      — aujourd’hui, tu nous donnes d’être justifiés devant toi.

middleOfDay:
  tierce:
    antiphon: Il sera grand devant le Seigneur, rempli de l’Esprit Saint dès avant sa naissance.
    reading:
      content: Des rois verront et se lèveront, des princes aussi, et ils se prosterneront, par égard pour le Seigneur qui est fidèle, pour le Saint d’Israël qui t’a choisi.
    responsory: |-
      V/ Je mets dans ta bouche mes paroles !
      Je te donne autorité sur les peuples et les royaumes.
  sexte:
    antiphon: Quand Élisabeth entendit la salutation de Marie, l’enfant qu’elle portait tressaillit d’allégresse.
    reading:
      content: |-
        Le Seigneur parle, lui qui m’a formé dès le sein de ma mère pour que je sois son serviteur : « Je vais faire de toi la lumière des nations pour que mon salut parvienne jusqu’aux extrémités de la terre. »
    responsory: |-
      V/ À toi, je fus confié dès ma naissance ;
      dès le ventre de ma mère, tu es mon Dieu.
  none:
    antiphon: Cet enfant est grand devant Dieu, la main de Dieu est sur lui.
    reading:
      content: Des rois verront et se lèveront, des princes aussi, et ils se prosterneront, par égard pour le Seigneur qui est fidèle, pour le Saint d’Israël qui t’a choisi.
    responsory: |-
      V/ Je mets dans ta bouche mes paroles !
      Je te donne autorité sur les peuples et les royaumes.

vespers:
  hymn:
    - depuis-les-jours-de-jean
    
  psalmody:
    - psalm: PSALM_14
      antiphon:
        - Un homme fut envoyé de Dieu, un homme appelé Jean.
    - psalm: PSALM_111
      antiphon:
        - |-
          Jean Baptiste est venu : il a rendu témoignage à la vérité.
    - psalm: NT_11
      antiphon:
        - Jean Baptiste était la lampe, la lampe qu’on allume et qui brille.
