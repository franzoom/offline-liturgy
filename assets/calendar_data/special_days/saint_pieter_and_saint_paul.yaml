celebration:
  title: S. Pierre et S. Paul
  subtitle: Apôtres
  description: |-
    Pierre et Paul, les deux figures de proue de l’Église naissante, sont différents l’un de l’autre, mais admirablement complémentaires. Les conditions dans lesquelles ils ont rencontré le Seigneur ont marqué diversement leur apostolat. Mais ils se rejoignent dans la profondeur de leur foi et la ferveur de leur amour pour le Christ. À la parole de Pierre : « Seigneur, tu sais bien que je t’aime », fait écho celle de Paul : « Pour moi, vivre, c’est le Christ ». Ils ont versé leur sang pour lui à Rome, sans doute en l’an 64 pour Pierre et en 67 pour Paul.
  color: red

oration:
  - Seigneur, tu nous as donné ce jour de sainte joie pour fêter les bienheureux Apôtres Pierre et Paul ; accorde à ton Église une fidélité parfaite à leur enseignement, puisqu’elle reçut par eux la première annonce de la foi.

firstVespers:
  hymn:
    - puissance-de-ta-misericorde
  psalmody:
    - psalm: PSALM_116
      antiphon:
        - |-
          Heureux es-tu, Simon, fils de Yonas : le Père ta révélé le mystère du Christ.
    - psalm: PSALM_147
      antiphon:
        - Paul, apôtre des nations, tu es l’instrument que Dieu s’est choisi pour annoncer la vérité dans le monde.
    - psalm: NT_4
      antiphon:
        - Tu es Pierre, et sur cette pierre, je bâtirai mon Église.
  reading:
    biblicalReference: Rm 1, 1-2.7
    content: Moi Paul, serviteur de Jésus Christ, appelé par Dieu pour être Apôtre, mis à part pour annoncer la Bonne Nouvelle que Dieu avait déjà promise par ses prophètes dans les saintes Écritures, je m’adresse à vous, bien-aimés de Dieu qui êtes à Rome. Vous, les fidèles, qui êtes par appel de Dieu le peuple saint, que la grâce et la paix soient avec vous tous, de la part de Dieu notre Père et de Jésus Christ le Seigneur.
  responsory: |-
    R/ Allez par le monde entier :
    * Proclamez la Bonne Nouvelle !
    V/ Qui croira et sera baptisé sera sauvé !*
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: Unis par l’amour de l’Évangile, Pierre et Paul sont unis dans la gloire du martyre.
  intercession:
    content: |-
      En la fête des Apôtres Pierre et Paul, les colonnes de l’Église, nous te prions, Jésus, Fils de Dieu :

      R/ Sois avec ton peuple, Seigneur !

      Tu as fait de Simon le pêcheur, un pêcheur d’hommes,
      — envoie de nouveaux apôtres pour que la multitude entende la Parole.

      Sur le lac, tu as commandé au vent pour que la barque des disciples ne sombre pas,
      — garde ton Église au milieu des tempêtes et donne ta force à ceux qui la conduisent.

      Après ta résurrection, tu as rassemblé les disciples autour de Pierre,
      — toi, le Bon Pasteur, rassemble ton peuple en un seul troupeau.

      Tu as envoyé ton Apôtre Paul annoncer l’Évangile aux païens,
      — fais que ta parole parvienne à toute créature.

      Tu as remis à ton Église les clés du Royaume,
      — ouvre les portes du ciel à tous les hommes qui ont cru à ta tendresse.

invitatory:
  antiphon:
    - Seigneur Jésus, roi des apôtres, louange à toi !

morning:
  hymn:
    - faconnes-par-la-parole-du-seigneur
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Je sais en qui j’ai mis ma foi, je sais qu’il me gardera fidèle pour le jour du jugement.
    - psalm: OT_41
      antiphon:
        - Ce que je suis, je le dois à la grâce de Dieu, et sa grâce est toujours avec moi.
    - psalm: PSALM_149
      antiphon:
        - J’ai mené le bon combat, j’ai achevé ma course, j’ai gardé la foi.
  reading:
    biblicalReference: 1P 4, 13-14
    content: Puisque vous communiez aux souffrances du Christ, réjouissez-vous, afin d’être dans la joie et l’allégresse quand sa gloire se révélera. Si l’on vous insulte à cause du nom du Christ, heureux êtes-vous, puisque l’Esprit de gloire, l’Esprit de Dieu, repose sur vous.
  responsory: |-
    R/ Ils allaient, tout joyeux d’avoir souffert
    pour le nom de Jésus, alléluia.
    V/ Qui sème dans les larmes, moissonne dans la joie. R/
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: À qui donc irions-nous, Seigneur ? Tu as les paroles de la vie. Nous croyons que tu es le Fils de Dieu, alléluia.
  intercession:
    content: |-
      En la fête des Apôtres Pierre et Paul, les colonnes de l’Église, nous te prions, Seigneur Jésus :

      R/ Dans ta bonté, regarde ton peuple.

      Tu as prié pour que la foi de Pierre ne sombre pas,
      — affermis aujourd’hui la foi de ton peuple.

      Après ta résurrection, tu t’es manifesté à Pierre, puis à Paul,
      — éclaire nos cœurs pour que nous affirmions que tu es le Vivant.

      Tu as choisi Paul comme apôtre des nations paîennes,
      — donne-nous d’annoncer l’Évangile par toute notre vie.

      Dans ta miséricorde, tu as pardonné à Pierre son reniement,
      — oublie aussi tous nos péchés.

readings:
  hymn:
    - les-voici-rassemblés
  psalmody:
    - psalm: PSALM_18A
      antiphon:
        - Si tu m’aimes, Simon Pierre, sois le berger de mes brebis.
    - psalm: PSALM_63
      antiphon:
        - |-
          Pour moi, vivre, c’est le Christ et mourir est un gain : la croix de Jésus Christ est ma seule gloire.
    - psalm: PSALM_96
      antiphon:
        - Seigneur, si c’est bien toi, ordonne-moi de venir vers toi sur l’eau.
  verse: |-
    V/ La Parole du Seigneur demeure pour l’éternité,
    c’est l’Évangile qui vous a été annoncé.
  biblicalReading:
    - title: LECTURE DE L'ÉPITRE AUX GALATES
      subtitle: |-
        Deux apôtres du Christ : Pierre et Paul
      ref: Ga 1, 15– 2,10
      content: |-
        Lorsque Celui qui m'a mis à part depuis le sein de ma mère et m'a appelé par sa grâce, a jugé bon de révéler en moi son Fils afin que je l'annonce parmi les païens, aussitôt, sans recourir à aucun conseil humain, ni monter à Jérusalem auprès de ceux qui étaient apôtres avant moi, je suis parti pour l'Arabie, puis je suis revenu à Damas. Ensuite, trois ans après, je suis monté à Jérusalem pour faire la connaissance de Céphas et je suis resté quinze jours auprès de lui, sans voir cependant aucun autre apôtre, mais seulement Jacques, le frère du Seigneur. Ce que je vous écris, je le dis devant Dieu, ce n'est pas un mensonge. Ensuite, je me suis rendu dans les régions de Syrie et de Cilicie. Mais mon visage était inconnu aux églises du Christ en Judée ; simplement, elles avaient entendu dire : « Celui qui nous persécutait naguère annonce maintenant la foi qu'il détruisait alors » et elles glorifiaient Dieu à mon sujet.
        Ensuite, au bout de quatorze ans, je suis monté de nouveau à Jérusalem avec Barnabas ; j'emmenai aussi Tite avec moi. Or, j'y montai à la suite d'une révélation et je leur exposai l'Évangile que je prêche parmi les païens ; je l'exposai aussi dans un entretien particulier aux personnes les plus considérées, de peur de courir ou d'avoir couru en vain. Mais on ne contraignit même pas Tite, mon compagnon, un Grec, à la circoncision ; c'aurait été à cause des taux frères, intrus qui, s'étant insinués, épiaient notre liberté, celle qui nous vient de Jésus Christ, afin de nous réduire en servitude. A ces gens-là, nous ne nous sommes pas soumis, même pour une concession momentanée, afin que la vérité de l'Évangile fût maintenue pour vous. Mais, en ce qui concerne les personnalités — ce qu'ils étaient alors, peu m’importe : Dieu ne regarde pas à la situation des hommes — ces personnages ne m'ont rien imposé de plus. Au contraire, ils virent que l'évangélisation des incirconcis m'avait été confiée, comme à Pierre celle des circoncis — car Celui qui avait agi en Pierre pour l'apostolat des circoncis avait aussi agi en moi en faveur des païens — et, reconnaissant la grâce qui m'a été donnée, Jacques, Céphas et Jean, considérés comme des colonnes, nous donnèrent la main, à moi et à Barnabas, en signe de communion, afin que nous allions, nous vers les païens, eux vers les circoncis. Simplement, nous aurions à nous souvenir des pauvres, ce que j'ai eu bien soin de faire.
      responsory: |-
        R/ La grâce de Dieu est apparue
        apportant le salut à tous les hommes.

        Celui qui mena Pierre vers les Juifs,
        celui-là me conduisit aux païens.

        Par la grâce de Dieu, je suis ce que je suis,
        et sa grâce envers moi n’a pas été vaine.
  patristicReading:
    - title: HOMÉLIE DE SAINT AUGUSTIN POUR LA FÊTE DES APÔTRES PIERRE ET PAUL
      subtitle: Ils ont vu ce qu’ils ont prêché
      content: |-
        Le martyre des saints Apôtres Pierre et Paul a fait pour nous de ce jour un jour sacré. Nous ne parlons pas de quelques martyrs obscurs : %Ce qu’ils proclament a retenti par toute la terre, et leur parole, jusqu’au bout du monde%. Ces martyrs ont vu ce qu’ils ont prêché, après avoir vécu selon la justice, en proclamant la vérité, en mourant pour la vérité.
        C’est le bienheureux Pierre, le premier des Apôtres, celui qui aimait fougueusement le Christ, qui a eu le bonheur de s’entendre dire : %Et moi, je te le déclare : Tu es Pierre%. Car lui-même venait de dire : %Tu es le Messie, le Fils du Dieu vivant%. Et le Christ lui dit alors : %Et moi, je te le déclare : Tu es Pierre, et sur cette pierre je bâtirai mon Église%. Sur cette pierre je bâtirai la foi que tu viens de confesser. Sur cette parole que tu viens de dire : %Tu es le Messie, le Fils du Dieu vivant%, je bâtirai mon Église. Car tu es Pierre. Le nom de Pierre vient de la pierre, et non l’inverse. Le nom de Pierre vient de la pierre, comme « chrétien » vient de Christ. ~
        Ainsi que vous le savez, le Seigneur Jésus, avant sa passion, choisit ses disciples, et leur donna le nom d’Apôtres. Parmi eux, c’est Pierre qui, presque en toute circonstance, mérita de personnifier toute l’Église à lui seul. C’est parce qu’il personnifiait l’Église à lui seul qu’il a eu le bonheur de s’entendre dire : %Je te donnerai les clefs du Royaume des cieux%. En effet, ce n’est pas un homme seul, mais l’Église dans son unité, qui a reçu ces clefs. Ceci met en relief la prééminence de Pierre, car il a représenté l’universalité et l’unité de l’Église lorsqu’il lui fut dit : Je te confie, alors que c’était confié à tous. En effet, pour que vous sachiez que c’est l’Église qui a reçu les clefs du Royaume des cieux, écoutez ce que le Seigneur dit à tous ses Apôtres dans un autre endroit : %Recevez l’Esprit Saint%. Et aussitôt : %Tout homme à qui vous remettrez ses péchés, ils lui seront remis ; tout homme à qui vous maintiendrez ses péchés, ils lui seront maintenus%. ~
        Et c’est encore à juste titre que le Seigneur, après sa résurrection, confia à Pierre en personne la charge de faire paître ses brebis. Car il n’est pas le seul parmi les disciples qui méritait de faire paître les brebis du Seigneur ; mais si le Christ parle à un seul, c’est pour mettre en valeur l’unité. Et il s’adresse en premier à Pierre parce que Pierre est le premier parmi les Apôtres. ~ Ne sois pas triste, Apôtre, d’être interrogé trois fois : réponds une fois, réponds deux fois, réponds trois fois. Que ta confession soit victorieuse trois fois par l’amour, parce que ta présomption a été trois fois vaincue par la crainte. Il faut délier trois fois ce que tu avais lié trois fois. Délie par l’amour ce que tu avais lié par la crainte. Et cependant le Seigneur, une fois, deux fois, et trois fois, a confié ses brebis à Pierre. ~
        En un même jour, on célèbre la passion de deux Apôtres ! Mais ces deux ne faisaient qu’un : bien qu’ils aient souffert à des jours différents, ils ne faisaient qu’un. Pierre a précédé, Paul a suivi. ~ Nous célébrons le jour de fête de ces Apôtres, consacré pour nous par leur sang. Aimons leur foi, leur vie, leurs labeurs, leurs souffrances, ce qu’ils confessaient, ce qu’ils prêchaient.
      responsory: |-
        R/ Jésus, tu es le Messie,
        le Fils du Dieu vivant !

        Simon, j’ai prié pour toi
        afin que ta foi ne sombre pas.
        Affermis tes frères.

        Paul, ma grâce te suffit,
        ma puissance donne toute sa mesure
        dans la faiblesse.

middleOfDay:
  psalmody:
    - psalm: PSALM_122
    - psalm: PSALM_123
    - psalm: PSALM_124
  tierce:
    antiphon: |-
      Tous ceux qui écoutaient Pierre reçurent l’Esprit : ils chantèrent la gloire de Dieu.
    reading:
      biblicalReference: 2Co 4, 13-14
      content: |-
        L’Écriture dit : J’ai cru, c’est pourquoi j’ai parlé. Et nous, les Apôtres, animés de cette même foi, nous croyons, nous aussi, et c’est pourquoi nous parlons. Car, nous le savons, celui qui a ressuscité le Seigneur Jésus nous ressuscitera, nous aussi, avec Jésus, et il nous placera près de lui avec vous.
    responsory: |-
      V/ Réjouissez-vous, exultez, dit le Seigneur,
      vos noms sont inscrits dans les cieux.
  sexte:
    antiphon: |-
      Pierre était monté sur la terrasse, pour prier ; une extase le surprit : il contempla le ciel ouvert.
    reading:
      biblicalReference: Ga 1, 15-16a.17b-18a
      content: Dieu m’avait mis à part dès le sein de ma mère, dans sa grâce il m’a appelé, et un jour, il a trouvé bon de mettre en moi la révélation de son Fils, pour que moi, je l’annonce parmi les nations païennes. Je suis parti pour l’Arabie ; de là je suis revenu à Damas. Puis, au bout de trois ans, je suis monté à Jérusalem pour faire la connaissance de Pierre.
    responsory: |-
      V/ Ils ont gardé les volontés du Seigneur,
      les lois qu’il leur donna.
  none:
    antiphon: Pierre et Jean montaient au Temple pour la prière.
    reading:
      biblicalReference: 2Co 4, 13-14
      content: |-
        L’Écriture dit : J’ai cru, c’est pourquoi j’ai parlé. Et nous, les Apôtres, animés de cette même foi, nous croyons, nous aussi, et c’est pourquoi nous parlons. Car, nous le savons, celui qui a ressuscité le Seigneur Jésus nous ressuscitera, nous aussi, avec Jésus, et il nous placera près de lui avec vous.
    responsory: |-
      V/ Réjouissez-vous, exultez, dit le Seigneur,
      vos noms sont inscrits dans les cieux.
vespers:
  hymn:
    - un-grand-vent-s-est-leve-alleluia
  psalmody:
    - psalm: PSALM_115
      antiphon:
        - J’ai prié pour toi, Simon, pour que ta foi ne défaille pas ! Quand tu seras revenu, affermis tes frères.
    - psalm: PSALM_125
      antiphon:
        - Je me glorifierai de ma faiblesse, afin qu’habite en moi la puissance du Christ.
    - psalm: NT_4
      antiphon:
        - Pasteur du troupeau et chef des Apôtres, tu détiens les clés du Royaume des cieux.
  reading:
    biblicalReference: 1Co 15, 3-5.8
    content: |-
      Avant tout, je vous ai transmis ceci, que j’ai moi-même reçu : le Christ est mort pour nos péchés, conformément aux Écritures, et il a été mis au tombeau ; il est ressuscité le troisième jour, conformément aux Écritures, et il est apparu à Pierre, puis aux Douze. Et en tout dernier lieu, il est même apparu à l’avorton que je suis.
  responsory: |-
    R/ Racontez à tous les peuples
    * la gloire du Seigneur.
    V/ À toutes les nations ses merveilles, *
    V/ De jour en jour proclamez son salut, *
    Gloire au Père et au Fils et au Saint-Esprit. R/
  evangelicAntiphon:
    common: |-
      Bénis soient les Apôtres Pierre et Paul : ils nous ont transmis la Loi du Seigneur.
  intercession:
    content: |-
      En la fête des Apôtres Pierre et Paul, les colonnes de l’Église, nous te prions, Jésus, Fils de Dieu :

      R/ Sois avec ton peuple, Seigneur !

      Tu as fait de Simon le pêcheur, un pêcheur d’hommes,
      — envoie de nouveaux apôtres pour que la multitude entende la Parole.

      Sur le lac, tu as commandé au vent pour que la barque des disciples ne sombre pas,
      — garde ton Église au milieu des tempêtes et donne ta force à ceux qui la conduisent.

      Après ta résurrection, tu as rassemblé les disciples autour de Pierre,
      — toi, le Bon Pasteur, rassemble ton peuple en un seul troupeau.

      Tu as envoyé ton Apôtre Paul annoncer l’Évangile aux païens,
      — fais que ta parole parvienne à toute créature.

      Tu as remis à ton Église les clés du Royaume,
      — ouvre les portes du ciel à tous les hommes qui ont cru à ta tendresse.
