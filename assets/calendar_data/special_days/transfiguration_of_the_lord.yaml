celebration:
  title: La Transfiguration du Seigneur
  description: |-
    Quarante jours avant l'Exaltation de la Croix, la Transfiguration du Seigneur rappelle comment le Christ voulut « préparer le cœur de ses disciples à surmonter le scandale de la Croix », mais elle est aussi une annonce de la « merveilleuse adoption » qui fait de tous les croyants des fils de Dieu en son Fils Jésus, et de la clarté dont resplendira un jour le corps entier de l'Église.
  color: white

oration:
  - Seigneur, dans la transfiguration de ton Christ, tu as confirmé par le témoignage de Moïse et d’Élie la vérité des mystères de la foi, et tu as annoncé notre merveilleuse adoption ; accorde-nous d’écouter la voix de ton Fils bien-aimé, afin de pouvoir un jour partager avec lui son héritage. Lui qui règne.

firstVespers:
  hymn:
    - dans-cette-intime-communion
  psalmody:
    - psalm: PSALM_112
      antiphon:
        - Jésus prit avec lui Pierre, Jacques et Jean ; il les mena sur une haute montagne et fut transfiguré devant eux.
    - psalm: PSALM_116
      antiphon:
        - Le visage du Christ resplendissait comme un soleil ; Élie et Moïse s’entretenaient avec lui.
    - psalm: NT_12
      antiphon:
        - Seigneur, il est bon de contempler ta gloire.
  reading:
    biblicalReference: Ph 3, 20-21
    content: Nous sommes citoyens des cieux ; c’est à ce titre que nous attendons comme Sauveur le Seigneur Jésus Christ, lui qui transformera nos pauvres corps à l’image de son corps glorieux, avec la puissance qui le rend capable aussi de tout dominer.
  responsory: |-
    R/ De gloire et d’honneur,
    tu le couronnes, Seigneur.
    V/ Tu mets toute chose à ses pieds. R/
    V/ Qu’il est grand, ton nom, par toute la terre. R/
  evangelicAntiphon:
    common: Splendeur du Père, le Christ qui porte l’univers par sa parole, le Christ qui purifie de tout péché, apparaît aujourd’hui dans sa gloire.
  intercession:
    content: |-
      Ô Christ, merveilleusement transfiguré devant tes disciples, nous te prions :

      R/ Éclaire notre nuit, Seigneur notre Dieu !

      Avant de mourir sur la croix, tu as manifesté à tes disciples la gloire de ta résurrection :
      — que la joie de ta victoire transfigure ton Église.

      Tu as pris avec toi Pierre, Jacques et Jean et tu les as conduits sur la montagne :
      — que tous les croyants soient prêts à rendre compte de l’espérance de la Transfiguration.

      Debout sur la montagne, tu as fait resplendir ton visage devant Moïse et Élie :
      — que le peuple de la première Alliance reconnaisse en toi son messie.

      Tu as illuminé la terre quand la gloire du Créateur s’est levée sur toi :
      — que l’humanité tout entière marche vers ta clarté.

      Tu veux rendre nos corps de misère semblables à ton corps de gloire :
      — que nos frères défunts soient transformés à ton image.

readings:
  hymn:
    - nous-avons-quitte.yaml
  psalmody:
    - psalm: PSALM_83
      antiphon:
        - Un jour dans tes parvis en vaut pour moi plus que mille.
    - psalm: PSALM_96
      antiphon:
        - Une lumière est semée pour le juste, et pour le cœur simple, une joie, alléluia.
    - psalm: PSALM_98
      antiphon:
        - Exaltez le Seigneur, notre Dieu, prosternez-vous devant sa sainte montagne.
  verse: |-
    V/ Dans la colonne de nuée, le Seigneur parlait avec eux.
    Ils ont gardé son témoignage.
  biblicalReading:
    - title: LECTURE DE LA 2^ème ÉPÎTRE AUX CORINTHIENS
      subtitle: La gloire de la nouvelle alliance en Christ
      ref: 2Co 3, 7 – 4, 6
      content: |-
        Le ministère de la mort, celui de la Loi gravée en lettres sur des pierres, avait déjà une telle gloire que les fils d’Israël ne pouvaient pas fixer le visage de Moïse à cause de la gloire, pourtant passagère, qui rayonnait de son visage. Combien plus grande alors sera la gloire du ministère de l’Esprit ! Le ministère qui entraînait la condamnation, celui de la Loi, était déjà rayonnant de gloire ; combien plus grande sera la gloire du ministère qui fait de nous des justes ! Non, vraiment, ce qui, dans une certaine mesure, a été glorieux ne l’est plus, parce qu’il y a maintenant une gloire incomparable. Si, en effet, ce qui était passager a connu un moment de gloire, combien plus ce qui demeure restera-t-il dans la gloire !
        Et puisque nous avons une telle espérance, c’est avec grande assurance que nous nous comportons ; nous ne sommes pas comme Moïse qui mettait un voile sur son visage pour empêcher les fils d’Israël de voir la fin de ce rayonnement passager. Mais leurs pensées se sont endurcies. Jusqu’à ce jour, en effet, le même voile demeure quand on lit l’Ancien Testament ; il n’est pas retiré car c’est dans le Christ qu’il disparaît ; et aujourd’hui encore, quand les fils d’Israël lisent les livres de Moïse, un voile couvre leur cœur. Quand on se convertit au Seigneur, le voile est enlevé. Or, le Seigneur, c’est l’Esprit, et là où l’Esprit du Seigneur est présent, là est la liberté. Et nous tous qui n’avons pas de voile sur le visage, nous reflétons la gloire du Seigneur, et nous sommes transformés en son image avec une gloire de plus en plus grande, par l’action du Seigneur qui est Esprit.
        C’est pourquoi, ayant reçu ce ministère par la miséricorde de Dieu, nous ne perdons pas courage : nous avons rejeté toute dissimulation honteuse, nous n’agissons pas avec ruse, et nous ne falsifions pas la parole de Dieu. Au contraire, nous manifestons la vérité, et ainsi nous nous recommandons nous-mêmes à toute conscience humaine devant Dieu. Et même si l’Évangile que nous annonçons reste voilé, il n’est voilé que pour ceux qui vont à leur perte, pour les incrédules dont l’intelligence a été aveuglée par le dieu mauvais de ce monde ; celui-ci les empêche de voir clairement, dans la splendeur de l’Évangile, la gloire du Christ, lui qui est l’image de Dieu. En effet, ce que nous proclamons, ce n’est pas nous-mêmes ; c’est ceci : Jésus Christ est le Seigneur ; et nous sommes vos serviteurs, à cause de Jésus. Car Dieu qui a dit :%Du milieu des ténèbres brillera la lumière%, a lui-même brillé dans nos cœurs pour faire resplendir la connaissance de sa gloire qui rayonne sur le visage du Christ.
      responsory: |-
        R/ Voyez quel grand amour nous est donné !

        Dieu lui-même fait resplendir dans nos cœurs
        la connaissance de sa gloire
        qui rayonne sur le visage du Christ.

        Lorsque le Fils de Dieu paraîtra,
        nous lui serons semblables :
        nous le verrons tel qu’il est.
  patristicReading:
    - title: HOMÉLIE D’ANASTASE DU SINAÏ POUR LA TRANSFIGURATION
      subtitle: « Il nous est bon d’être ici »
      content: |-
        Jésus montra ce mystère à ses disciples sur le mont Thabor. Tandis qu’il cheminait au milieu d’eux, il les avait entretenus de son règne et de son deuxième avènement dans la gloire. Mais parce qu’ils n’étaient peut-être pas suffisamment certains de ce qu’il leur avait annoncé au sujet de son règne, il voulut qu’ils finissent par être très fermement convaincus au fond de leur cœur, et que les événements présents les aident à croire aux événements à venir. C’est pourquoi, sur le mont Thabor, il leur fit voir une merveilleuse manifestation divine, comme une image préfigurative du royaume des cieux. C’est exactement comme s’il leur disait : « Pour que le retard n’engendre pas en vous l’incrédulité, dès maintenant, immédiatement, %vraiment, je vous le dis, il y en a parmi ceux, qui sont ici qui ne connaîtront pas la mort avant qu’ils voient venir le Fils de l’homme% dans la gloire de son Père. »
        Et, voulant montrer que la puissance du Christ s’accorde avec sa propre volonté, l’évangéliste ajoute : %Six jours après, Jésus prend avec lui Pierre, Jacques et Jean et les emmène à l’écart sur une haute montagne. Et il fut transfiguré devant eux, son visage devint brillant comme le soleil et ses vêtements, blancs comme la neige. Et voici que leur apparurent Moïse et Élie, qui s’entretenaient avec lui%.
        Telles sont les merveilles divines de la présente solennité ; tel est le mystère, accompli pour nous sur la montagne aujourd’hui, mystère qui est en même temps un acte sauveur. Car ce qui nous réunit est en même temps initiation au mystère du Christ et rassemblement pour sa célébration. Afin donc que nous pénétrions dans les mystères sacrés et inexprimables avec ceux qui ont été choisis parmi les disciples inspirés par Dieu, écoutons la voix divine et très sainte qui, comme d’en haut et du sommet de la montagne, nous convoque de la façon la plus persuasive. ~
        C’est donc vers la montagne qu’il faut nous hâter, j’ose le dire, comme l’a fait Jésus qui, là comme dans le ciel, est notre guide et notre avant-coureur. Avec lui nous brillerons pour les regards spirituels, nous serons renouvelés et divinisés dans les structures de notre âme et, avec lui, comme lui, nous serons transfigurés, divinisés pour toujours et transférés dans les hauteurs. ~
        Accourons donc, dans la confiance et l’allégresse, et pénétrons dans la nuée, ainsi que Moïse et Élie, ainsi que Jacques et Jean. Comme Pierre, sois emporté dans cette contemplation et cette manifestation divines, sois magnifiquement transformé, sois emporté hors du monde, enlevé de cette terre ; abandonne la chair, quitte la création et tourne-toi vers le Créateur à qui Pierre disait, ravi hors de lui-même : %Seigneur, il nous est bon d’être ici !%
        Certainement, Pierre, %il est% vraiment %bon% d’être ici avec Jésus, et d’y être pour toujours. Qu’y a-t-il de plus heureux, qu’y a-t-il de plus sublime, qu’y a-t-il de plus noble que d’être avec Dieu, que d’être transfiguré en Dieu dans la lumière ? Certes, chacun de nous, possédant Dieu dans son cœur, et transfiguré à l’image de Dieu doit dire avec joie : %Il nous est bon d’être ici%, où tout est lumineux, où il y a joie, plaisir et allégresse, où tout, dans notre cœur, est paisible, calme et imperturbable, où l’on voit Dieu : là il fait sa demeure avec le Père et il dit, en y arrivant : %Aujourd’hui le salut est arrivé pour cette maison%. Là tous les trésors des biens éternels sont présents et accumulés. Là sont présentées comme dans un miroir les prémices et les images de toute l’éternité à venir.
      responsory: |-
        R/ Le Seigneur, c’est l’Esprit, l’Esprit du Seigneur est la liberté.
        Nous tous, à visage découvert, réfléchissons comme en un miroir la gloire de Dieu.
        Laissons-nous transformer en l’image du Seigneur, toujours plus glorieuse.

invitatory:
  common: Sainte lumière, splendeur du Père, louange à toi, Jésus Christ.

morning:
  hymn:
    - o-toi-dont-le-chant-eclaire
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Le visage de Jésus resplendit comme le soleil, ses vêtements devinrent blancs comme la neige.
    - psalm: OT_41
      antiphon:
        - Pour nous le Christ est transfiguré, Élie et Moïse parlent avec lui, la voix de son Père lui rend témoignage.
    - psalm: PSALM_149
      antiphon:
        - Dans la gloire de la montagne, la Loi et les prophètes ont témoigné pour lui.
  reading:
    biblicalReference: Ap 21, 10.23
    content: Un ange m’entraîna par l’esprit sur une grande et haute montagne ; il me montra la cité sainte, Jérusalem, qui descendait du ciel, d’auprès de Dieu. La cité n’a pas besoin de la lumière du soleil ni de la lune, car la gloire de Dieu l’illumine, et sa source de lumière, c’est l’Agneau.
  responsory: |-
    R/ Seigneur mon Dieu, tu es si grand ;
    * Tu as pour manteau la lumière !
    V/ Tu es le Fils de David,
    l’étoile radieuse du matin. *
    Gloire au Père.
    R/ Seigneur mon Dieu.
  evangelicAntiphon:
    common: |-
      Une voix disait depuis la nuée : Celui-ci est mon Fils bien-aimé, en lui j’ai mis tout mon amour, écoutez-le. Alléluia.
  intercession:
    content: |-
      Prions le Père pour qui la nuit comme le jour est lumière :

      R/ Par ta lumière, nous voyons la lumière !

      Tu transfigures le Christ, tu manifestes ton Esprit dans la nuée,
      — tu nous dis d’écouter la voix de ton Fils.

      Dans le corps du Christ, tu fais resplendir les ténèbres,
      — tu fais briller en nos cœurs la connaissance de ta gloire.

      Dans le corps du Christ, nous savourons les festins de ta maison,
      — en lui tu nous abreuves aux torrents du paradis.

      La vie éternelle et l’immortalité nous sont manifestées par ton Fils ;
      — il est la Bonne Nouvelle parmi les hommes.

      Lorsque ton Fils paraîtra au dernier jour, nous lui serons semblables car nous portons son nom ;
      — nous sommes tes fils, les fils de ton amour.

middleOfDay:
  tierce:
    antiphon: |-
      Jésus apparut, transfiguré, entouré de Moïse et d’Élie : la Loi et les prophètes ont témoigné pour lui.
    reading:
      biblicalReference: 2Co 3, 18b
      content: Nous reflétons tous la gloire du Seigneur, et nous sommes transfigurés en son image avec une gloire de plus en plus grande, par l’action du Seigneur qui est Esprit.
    responsory: |-
      V/ En toi, Seigneur, la source de vie ;
      par ta lumière, nous voyons la lumière.
  sexte:
    antiphon: L’Évangile de Dieu est lumière, il donne la vie.
    reading:
      biblicalReference: Ex 33, 9.11a
      content: Au moment où Moïse entrait dans la tente de la Rencontre, la colonne de nuée descendait, se posait à l’entrée de la Tente, et Dieu s’entretenait avec Moïse. Le Seigneur s’entretenait avec Moïse face à face, comme on s’entretient d’homme à homme.
    responsory: |-
      V/ Qui regarde vers lui, resplendira,
      sans ombre, ni trouble au visage.
  none:
    antiphon: Jésus, notre Sauveur, la gloire de ta croix illumine le monde.
    reading:
      biblicalReference: 2Co 3, 18b
      content: Nous reflétons tous la gloire du Seigneur, et nous sommes transfigurés en son image avec une gloire de plus en plus grande, par l’action du Seigneur qui est Esprit.
    responsory: |-
      V/ En toi, Seigneur, la source de vie ;
      par ta lumière, nous voyons la lumière.

vespers:
  hymn:
    - aujourd-hui-revetu-de-lumiere
  psalmody:
    - psalm: PSALM_109
      antiphon:
        - Jésus prend avec lui Pierre, Jacques et Jean, et, devant eux, il est transfiguré.
    - psalm: PSALM_120
      antiphon:
        - |-
          Sur la montagne, une voix disait : Voilà mon Fils bien-aimé. Tout mon amour est en lui !
    - psalm: NT_7
  reading:
    biblicalReference: Rm 8, 16-17
    content: C’est l’Esprit lui-même qui affirme à notre esprit que nous sommes enfants de Dieu. Puisque nous sommes ses enfants, nous sommes aussi ses héritiers ; héritiers de Dieu, héritiers avec le Christ, à condition de souffrir avec lui pour être avec lui dans la gloire.
  responsory: |-
    R/ Voyez quel grand amour nous est donné !
    V/ Dieu lui-même fait resplendir en nos cœurs
    la connaissance de sa gloire. R/
    V/ Lorsque le Fils de Dieu paraîtra,
    nous le verrons tel qu’il est. R/
  evangelicAntiphon:
    common: Relevez-vous ! Ne craignez pas ! La gloire du Seigneur est apparue sur le visage du Christ, sa lumière a brillé dans nos cœurs, alléluia.
  intercession:
    content: |-
      Ô Christ, merveilleusement transfiguré devant tes disciples, nous te prions :

      R/ Éclaire notre nuit, Seigneur notre Dieu !

      Avant de mourir sur la croix, tu as manifesté à tes disciples la gloire de ta résurrection :
      — que la joie de ta victoire transfigure ton Église.

      Tu as pris avec toi Pierre, Jacques et Jean et tu les as conduits sur la montagne :
      — que tous les croyants soient prêts à rendre compte de l’espérance de la Transfiguration.

      Debout sur la montagne, tu as fait resplendir ton visage devant Moïse et Élie :
      — que le peuple de la première Alliance reconnaisse en toi son messie.

      Tu as illuminé la terre quand la gloire du Créateur s’est levée sur toi :
      — que l’humanité tout entière marche vers ta clarté.

      Tu veux rendre nos corps de misère semblables à ton corps de gloire :
      — que nos frères défunts soient transformés à ton image.
