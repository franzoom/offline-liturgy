celebration:
  title: Mémoire de Vierge Marie (le samedi)
  color: white
  description:
  commons:
    - virgin-mary

oration:
  - Accorde à tes serviteurs, Dieu très bon, de posséder la santé de l’âme et du corps, et par la glorieuse intercession de la sainte Vierge Marie, d’être libérés des tristesses de ce monde, et de goûter les joies de l’éternité.
  - Seigneur Jésus, toi qui as choisi pour mère la bienheureuse Vierge Marie, permets qu’assurés de sa protection nous puissions l’honorer d’un cœur joyeux.

morning:
  reading:
    biblicalReference: Is 61, 10
    content: Je tressaille de joie dans le Seigneur, mon âme exulte en mon Dieu. Car il m’a enveloppé du manteau de l’innocence, il m’a fait revêtir les vêtements du salut, comme une mariée met ses bijoux.
  responsory: |
    R/ Mon âme exalte le Seigneur :
    Éternel est son amour !
    V/ Chante et réjouis-toi, fille de Sion. R/
    Gloire au Père. R/
  evangelicAntiphon:
    common:
      - Célébrons dans la joie, Marie, la Vierge très sainte, qu’elle Intercède pour nous auprès de son Fils.
      - Tu es bénie du Très Haut, Vierge Marie, tu es bénie entre toutes les femmes.
      - |-
        Vierge immaculée, par toi nous est rendue la vie : tu as enfanté le Sauveur du monde.
      - Avec l’ange, nous te saluons, Marie, comblée de grâce ! Le Seigneur est avec toi ; tu es bénie plus que toutes les femmes.
      - Ô Vierge sainte et pure, quels chants pourraient te louer ? toi qui nous as donné le Rédempteur, Jésus, le Christ, notre Seigneur !
      - Tu es la gloire de Jérusalem, tu es la joie de ton peuple, tu es l’honneur de toute l’Église !

readings:
  patristicReading:
    - title: HOMÉLIE DE SAINT PROCLUS DE CONSTANTINOPLE POUR LA NATIVITÉ DU SEIGNEUR
      subtitle: « Il a pris chair de la Vierge Marie »
      content: |
        Que les cieux là-haut se réjouissent et que les nuages répandent la justice parce que le Seigneur a pris son peuple en pitié. Que les cieux là-haut se réjouissent, parce que, lorsqu’ils furent créés, au commencement, Adam lui aussi fut formé de la terre vierge, par le Créateur, et se montra l’ami et le familier de Dieu.
        Que les cieux là-haut se réjouissent, car maintenant, par l’avènement du Seigneur dans la chair, la terre a été sanctifiée, et l’humanité a été délivrée des sacrifices idolâtriques.
        Que les nuages répandent la justice, parce qu’aujourd’hui l’erreur commise par Ève a été enlevée par la pureté de la Vierge Marie, a été sauvée par l’Homme-Dieu qui est né de la Vierge. Aujourd’hui Adam, qui avait été condamné, est délivré de l’effroyable sentence de mort. ~ Aujourd’hui le Christ est né de la Vierge selon le plan de Dieu, car le Verbe s’est fait chair, il a établi sa demeure parmi nous. Et c’est pourquoi la Vierge est devenue Mère de Dieu. Elle est mère tout en restant vierge, parce qu’elle a engendré le Verbe sans intervention de l’homme ; c’est ainsi qu’elle a gardé sa virginité à cause de la miraculeuse nativité de celui qui en avait décidé ainsi. Elle est sa mère selon la substance de la nature humaine prise par le Verbe de Dieu ; car c’est en elle qu’il s’est incarné, qu’il s’est manifesté, et qu’il s’est uni à nous, selon la sagesse et la volonté de celui qui fait des prodiges. C’est de notre race que le Christ est né dans la chair, comme dit saint Paul.
        En effet, il a été tel qu’il est maintenant, tel qu’il sera et demeurera. Mais c’est pour nous qu’il s’est fait homme ; parce qu’il aimait l’homme, il s’est fait homme, ce qu’il n’était pas auparavant ; mais il s’est fait homme tout en demeurant Dieu sans aucun changement. Il est donc devenu semblable à moi à cause de moi, il est devenu ce qu’il n’était pas, tout en gardant ce qu’il était auparavant. Enfin, il s’est fait homme : ainsi, en s’appropriant nos faiblesses, il nous rend capables d’être des fils d’adoption, et nous accorde son Royaume. Puissions-nous en être rendus dignes par la grâce et la miséricorde du Seigneur Jésus Christ ! A lui, avec le Père et le Saint-Esprit, gloire, honneur et puissance, maintenant et toujours, pour les siècles des siècles. Amen.
      responsory: |
        R/ Mon âme exalte le Seigneur :
        éternel est son amour !

        Chante et réjouis-toi, fille de Sion,
        voici que ton Dieu vient demeurer au milieu de toi.

        Dieu pour toi exulte de joie,
        il te renouvelle par son amour.

        Le Seigneur, comme au jour de fête,
        dansera pour toi avec des cris de joie.

    - title: SERMON DE GUERRIC D’IGNY POUR L’ASSOMPTION
      subtitle: Marie, mère des vivants
      content: |
        Marie a engendré un fils ; et comme celui-ci est le Fils unique du Père dans les cieux, il est le fils unique de sa mère sur la terre. Cependant cette vierge mère unique, qui eut la gloire de mettre au monde le Fils unique de Dieu embrasse ce même Fils dans tous ses membres et ne rougit pas d’être appelée la mère de tous ceux en qui elle reconnaît le Christ déjà formé ou en train de l’être. Ève fut moins une mère qu’une marâtre, elle qui jadis a légué à ses enfants la condamnation à mort avant même qu’ils aient vu le jour. Elle a bien été appelée %la mère des vivants%, pourtant elle s’est révélée en fait bien plutôt la meurtrière des vivants, ou la mère des mourants, Puisqu’en mettant au monde, elle mettait à mort. Ainsi, puisqu’elle n’a pas répondu au sens de son nom, c’est Marie qui en a réalisé le mystère. Comme l’Église dont elle est la figure, elle est la mère de tous ceux qui renaissent à la vie. Elle est vraiment la mère de la Vie qui fait vivre tous les hommes ; et en l’engendrant, elle a en quelque sorte régénéré tous ceux qui allaient en vivre.
        Cette bienheureuse mère du Christ, qui se sait mère des chrétiens en raison de ce mystère, se montre aussi leur mère par le soin qu’elle prend d’eux et l’affection qu’elle leur témoigne. Elle n’est pas dure envers eux comme s’ils n’étaient pas à elle. Ses entrailles fécondées une seule fois, mais non pas épuisées, ne cessent d’enfanter le fruit de la bonté.
        Si l’apôtre, serviteur du Christ, continue de mettre au monde ses enfants par sa sollicitude et son ardent désir, jusqu’à ce que le Christ soit formé en eux, combien plus cela est-il vrai de la propre mère du Christ ! Paul les a engendrés en prêchant la Parole de vérité qui les régénérait ; Marie l’a fait de façon bien plus sainte et plus divine en engendrant la Parole elle-même. Je loue en Paul le ministère de la prédication, mais j’admire et je vénère davantage en Marie le mystère de la génération.
        Voyez si de leur côté les fils ne reconnaissent pas leur mère. Poussés par une sorte d’instinct naturel inspiré par la foi, ils recourent spontanément et irrésistiblement à l’invocation de son nom en toutes nécessités et dans tous les dangers, comme des enfants se jettent dans les bras de leur mère. Aussi je ne crois pas absurde de penser que c’est bien de ces enfants-là que parle le prophète quand il fait cette promesse : %Tes fils habiteront en toi% ; sans perdre de vue que cette prophétie s’applique principalement à l’Église. Car dès maintenant nous habitons à l’abri de la mère du Très-Haut, nous reposons sous sa protection et comme à l’ombre de ses ailes. Plus tard nous partagerons sa gloire, et nous serons comme réchauffés en son sein. Alors retentira ce cri unanime et joyeux des enfants acclamant leur mère : %Nous tous qui sommes dans la joie, notre demeure est en toi, sainte Mère de Dieu%.
      responsory: |
        [rubric]Stance[/rubric]
        Voici la nouvelle Genèse :
        en toi, Vierge immaculée,
        la grâce originelle refleurit.
        Notre terre n’est plus maudite,
        nous la verrons bientôt
        donner le fruit de vie.

        R/ Avec toi, Marie, Mère du Sauveur,
        nous glorifions la puissance de Dieu.

        J’exulte de joie dans le Seigneur,
        et mon esprit tressaille en mon Dieu.

        Il m’a revêtue des vêtements du salut
        et m’a couverte du manteau de la justice.

        Le Seigneur fera germer l’action de grâce
        devant toutes les nations.

    - title: SERMON DE SAINT JEAN CHRYSOSTOME SUR LA CROIX
      subtitle: Marie au pied de la croix
      content: |
        Vois-tu cette victoire admirable ? Vois-tu les réussites de la Croix ? Vais-je maintenant te dire quelque chose de plus admirable ? Apprends la manière dont cette victoire s’est réalisée et tu seras plus stupéfait encore. Ce qui a permis au démon de vaincre, c’est par cela même que le Christ l’a dominé. Il l’a combattu par les armes que le démon avait employées. Écoute comment.
        Une vierge, le bois et la mort, voilà les symboles de la défaite. La vierge, c’était Ève, car elle ne s’était pas unie à l’homme ; le bois, c’était l’arbre ; et la mort, la peine encourue par Adam. Mais voici, en revanche, que la vierge, le bois et la mort, ces symboles de la défaite, sont devenus les symboles de la victoire. Au lieu d’Ève, Marie ; au lieu du bois de la connaissance du bien et du mal, le bois de la Croix ; au lieu de la mort d’Adam, la mort du Christ.
        Tu vois que le démon a été vaincu par ce qui lui avait donné la victoire ? Avec l’arbre, il avait vaincu Adam ; avec la croix, le Christ a triomphé du démon. L’arbre envoyait en enfer, la croix en a fait revenir ceux qui y étaient descendus. En outre, l’arbre servit à cacher l’homme honteux de sa nudité, tandis que la croix a élevé aux yeux de tous un homme nu, mais vainqueur. Cette mort-là condamna ceux qui sont nés ensuite ; celle-ci ressuscita même ceux qui étaient nés auparavant. %Qui dira les grandes œuvres du Seigneur ?% Par sa mort nous sommes devenus immortels : voilà la puissance merveilleuse de la Croix.
        As-tu compris cette victoire ? As-tu compris comment elle s’est réalisée ? Apprends maintenant comment elle a été obtenue sans qu’il nous en coûte. Nous n’avons pas ensanglanté nos armes, nous n’avons pas pris place dans l’armée, nous n’avons pas reçu de blessure, nous n’avons pas vu la guerre, et nous avons remporté la victoire. Au Seigneur, le combat ; à nous, la couronne. Puisque cette victoire est la nôtre, comme des soldats chantons tous aujourd’hui l’hymne de la victoire, disons à la louange du Seigneur : %La mort a été engloutie dans la victoire. Ô mort, où est ta victoire ? Ô mort, où est ton dard venimeux ?%
        Voilà le prodige que la Croix a réalisé en notre faveur ; la Croix, c’est le trophée dressé contre les démons, l’épée tirée contre le péché, l’épée dont le Christ a transpercé le serpent. La Croix, c’est la volonté du père, la gloire du Fils unique, la joie du Saint-Esprit, la splendeur des anges, l’assurance de l’Église, l’orgueil de saint Paul, le rempart des élus, la lumière du monde entier.

      responsory: |
        R/ Heureux qui craint le Seigneur
        et marche en ses voies.

        La Vierge a enfanté un fils,
        Jésus, le Premier-né.

        Le Fils de Dieu a été présenté au Seigneur.
        Il est venu accomplir la loi
        et achever sur la croix l’œuvre du Père.

    - title: ACTES DU II^ème CONCILE DU VATICAN (L’Église)
      subtitle: Marie et l’Église
      content: |
        La bienheureuse Vierge Marie, par le don et la fonction de la maternité divine qui l’unit au Rédempteur son Fils, par ses grâces et ses fonctions sans pareilles, est unie aussi de façon intime à l’Église. La Mère de Dieu est la figure de l’Église, comme l’enseignait déjà saint Ambroise, et cela au plan de la foi, de la charité et de la parfaite union avec le Christ.
        En effet, dans le mystère de l’Église, elle qui est appelée aussi à bon droit mère et vierge, la bienheureuse Vierge Marie est venue la première, elle qui présente, a un titre éminent et unique, le modèle aussi bien de la vierge que de ta mère. En pratiquant la foi et l’obéissance, elle a engendré sur terre le Fils même du Père. Elle n’avait pas été unie à un homme mais enveloppée par la nuée de l’Esprit Saint, comme l’Eve nouvelle, accordant non pas à l’antique serpent, mais au messager de Dieu, une foi qui n’est altérée par aucun doute. Elle engendra son Fils, que Dieu a établi premier-né d’une multitude de frères, c’est-à-dire de croyants ; elle coopère donc par son amour maternel à leur génération et à leur éducation.
        Mais l’Église en contemplant sa sainteté mystérieuse et en imitant sa charité, en accomplissant fidèlement la volonté du Père, devient elle-même une mère du fait qu’elle accueille avec foi la parole de Dieu. Par la prédication et le baptême, en effet, elle engendre à la vie nouvelle et immortelle les enfants conçus du Saint-Esprit et nés de Dieu. Elle-même, l’Église est vierge car elle garde intègre et pure la foi qu’elle a donnée à son Époux ; imitant la mère de son Seigneur, elle conserve de façon virginale, par la vertu du Saint-Esprit, une foi entière, une espérance ferme, une charité sincère.
        Mais tandis que l’Église, en la personne de la Vierge bienheureuse, atteint déjà la perfection, puisqu’elle est sans tache ni ride, les fidèles du Christ s’efforcent de vaincre le mal et de grandir en sainteté. C’est pourquoi ils lèvent les yeux vers Marie qui rayonne sur toute la communauté des élus comme un modèle de vertus. L’Église, en méditant sur elle avec piété, et en la contemplant dans la lumière du Verbe fait homme, pénètre plus profondément, avec un grand respect, dans le mystère capital de l’Incarnation et devient de plus en plus conforme à son Époux.
        Du fait que Marie se trouve située au cœur de l’histoire du salut, elle rassemble en quelque sorte en elle-même et elle rend plus évidentes les données essentielles du salut ; lorsqu’on prêche sur elle et qu’on lui rend un culte, elle attire les croyants vers son Fils et le sacrifice de celui-ci, ainsi que vers l’amour du Père. Quant à l’Église, en recherchant la gloire du Christ, elle ressemble davantage à son modèle sublime, puisqu’elle progresse continuellement dans la foi, l’espérance et la charité, puisqu’en toutes choses elle recherche la volonté divine et lui obéit.
        Aussi, dans son labeur apostolique également, l’Église a bien raison de regarder vers celle qui a engendré le Christ. Car, si celui-ci a été conçu du Saint-Esprit et est né de la Vierge, c’est afin de naître et de grandir aussi dans les cœurs des fidèles, par le ministère de l’Église. La Vierge a donné par sa vie l’exemple de cet amour maternel dont doivent être animés tous ceux qui coopèrent à la mission apostolique de l’Église pour procurer aux hommes la nouvelle naissance.
      responsory: |
        [rubric]Stance[/rubric]
        Mère immaculée de l’Agneau sans tache
        et première des sauvés,
        le sang rédempteur t’illumine.
        Devant ta beauté radieuse,
        tes enfants s’émerveillent.

        R/ Le Seigneur est avec toi,
        Marie, pleine de grâce.

        Il est avec toi,
        car le Père t’a créée dans l’amour :
        tu es un miroir très pur de sa gloire.

        Il est avec toi,
        Car le Sauveur du monde est ton Fils :
        Sa puissance agit ta faiblesse.
