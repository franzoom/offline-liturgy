title: Âpre surgeon
author: CFC / CNPL
content: |-
    Apre surgeon
    du jardin d’agonie,
    arbre sans rameau
    en qui tout porte fruit,
    Croix de Jésus Christ,
    tu plonges tes racines
    dans le rocher
    et le rocher devient
    terre propice aux semailles.
    
    Signe d’alliance
    de l’Esprit et du sang,
    pôle du monde,
    axe du temps,
    jalon d’un passage
    et d’un dépassement.
    Croix de Jésus Christ,
    tu es le mémorial
    de notre avenir.
    
    Croix si haut dressée,
    bras si large ouverts,
    croix où s’est écrit
    le commandement nouveau,
    tu traces la voie
    de Dieu dans l’homme.
    
    Montrant le prix
    de l’homme en Dieu,
    Croix de Jésus Christ,
    tu annules
    la dette des anciens jours,
    tu nous rends
    débiteurs de l’Amour.
    
    Sceau d’infamie
    et sceau de gloire,
    tu déclares le Seigneur
    Serviteur.
    Signature de Dieu
    au bas de son histoire,
    tu nous appelles
    à vivre aujourd’hui
    dans la mort d’un Autre
    devenu nôtre,
    Croix de Jésus Christ.