title: Au seul combat
author: W85
content: |-
  Au seul combat
  >contre soi,
  ton cœur nous prépare,
  Ignace de Loyola,
  pour la plus grande gloire
  >du Dieu Fort
  qui triomphe de la mort.
    
  R/ Prêts,
  pour les œuvres de lumière,
  >prêts,
  >sur toute la terre
  pour l’annonce du salut,
  >nous aurons le visage
  >de ton courage
  jusqu’au retour de Jésus.
    
  Tu nous conduis,
  >dans la nuit
  de l’intime espace
  et dans le temps reconstruit,
  à contempler la face
  >du Dieu Bon
  qui propose le pardon.
    
  Tu fais grandir
  >le désir
  de l’âme en alerte,
  l’espérance de servir,
  toute faiblesse offerte,
  >le Dieu Saint
  qui travaille avec les siens.