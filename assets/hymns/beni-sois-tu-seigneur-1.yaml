title: Béni sois-tu et loué
author: D. Rimaud / Desclée
context: François d'Assise (laudes)
content: |-
    Béni sois-tu et loué
    pour la lune et les étoiles :
    tu fais tenir le Baudrier d’Orion ;
    tu conduis la Grande Ourse et ses petits
    autour de la Polaire immobile ;
    tu sais le nom de leurs myriades,
    et chacune obéit à ta voix.
    
    R/ Bénis le Seigneur, ô mon âme,
    n’oublie aucun de ses bienfaits.
    
    Béni sois-tu et loué
    pour notre sœur la pluie :
    c’est toi qui es son père,
    c’est toi qui engendres la rosée,
    et les sillons se détrempent ;
    tu enfantes les cristaux de la neige,
    tu enserres de givre les brins d’herbe
    et les eaux se figent comme pierre.
    
    Béni sois-tu, oui, béni
    pour notre sœur la mort ;
    car cette mort ouvre à la vie
    depuis que ton Fils Jésus
    l’a prise et piégée sur la croix,
    depuis qu’il est tombé en terre,
    qu’il rapporte plus de cent pour un
    et nous greffe à son corps. (…)