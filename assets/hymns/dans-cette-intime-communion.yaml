title: Dans cette intime communion
author: La Tour du Pin / Revue des 2 Mondes
content: |-
  Dans cette intime communion
  Avec la vie de l’avenir,
  Les yeux fermés nous te suivons ;
  Un jour, tu les feras s’ouvrir...
  C’est la nouvelle création.
    
  Ceux qui te croient sans t’avoir vu,
  Tu les as dits vraiment heureux !
  Nous n’étions pas de tes élus
  Qui ont pu te voir tout en feu :
  Bien plus au cœur, tu es venu.
    
  Et le signe de ta lumière
  Est plus stupéfiant qu’autrefois !
  Tu es le soleil et la terre
  De l’avenir, tout est en toi,
  Tout est pour toi dans l’univers.