title: Des quatre coins du monde
author: H. Trouillet / Caecilia
content: |-
  Des quatre coins du monde,
  Peuples venez, peuples chantez :
  Le Seigneur est là, le Seigneur vous attend.

  Comme la pluie sur le regain,
  Comme la bruine mouillant la terre
  Il viendra.
  Son règne s’étendra sur chaque continent,
  Son règne durera, siècle après siècle sans fin.

  Quand il viendra, justice fleurira,
  Jusqu’à la fin des fins la paix
  nous reviendra.
  Le pauvre qui appelle, il le délivrera,
  Le faible et le petit sans appui, il les sauvera.
  
  Qu’à jamais son Nom soit béni,
  Qu’en lui soient bénis tous les peuples
  Et qu’ils chantent son nom !
  Béni soit le Seigneur qui seul accomplit des merveilles
  Que toute la terre soit remplie de sa gloire,
  Dans les siècles des siècles !