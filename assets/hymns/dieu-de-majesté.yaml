title: Dieu de majesté
author: B. Geoggroy - J. Gelineau / Seuil
content: |-
  Dieu de majesté, nous te louons, Seigneur.
  Toute la terre chante ta gloire,
  Père très saint, Roi très grand !
  
  R/ Dieu tout puissant
  gloire à ton nom, par ton Fils, dans l’Esprit Saint.
  
  Toi, le Roi de gloire, ô Christ,
  Toi le Fils de Dieu, né d’une Vierge Mère sans péché,
  Toi qui as vaincu les Enfers et la Mort,
  Tu as ouvert à ceux qui croient ton Royaume :
  Ton sang versé nous rachète ;
  Avec les saints fais-nous vivre éternellement !
  
  Viens transformer le monde, Souffle de Dieu,
  Viens, mets en nos cœurs tes dons.
  Au feu de l’amour brûle-nous
  Pour que, libres du péché,
  Tous les hommes soient unis
  Et qu’au ciel ils chantent ta gloire immense,
  Dieu éternel !