title: Elle est bénie de Dieu
feast: assumption_of_the_blessed_virgin_mary (morning)
author: V216
content: |-
    Elle est bénie de Dieu,
    La Vierge
    Docile au souffle de l’Esprit,
    Elle est bénie de Dieu !
    Voici la nouvelle Ève
    Promise aux joies du paradis.
    
    Elle est bénie de Dieu,
    La Femme
    Qui met au jour le premier-né,
    Elle est bénie de Dieu !
    Tout homme la proclame :
    « Heureuse » en son humilité.
    
    Elle est bénie de Dieu,
    La Mère
    Qui voit mourir son fils en croix,
    Elle est bénie de Dieu !
    Debout près du calvaire,
    Elle ouvre l’âge de la foi.
    
    Elle est bénie de Dieu,
    La Reine
    Qui prie pour nous, pauvres pécheurs,
    Elle est bénie de Dieu !
    Sa gloire nous entraîne
    Au jour promis par le Seigneur.