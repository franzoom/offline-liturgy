title: Esprit, toi qui guides
author: D. Rimaud / Seuil
content: |-
  Esprit, toi qui guides tous les hommes,
  Garde-les pour la gloire du Père ;
  Unis-les dans ton peuple de la terre ;
  Conduis-les par la route qui mène au Royaume.
  
  R/ Guide-nous sur les routes de la terre,
  Conduis-nous vers les hommes, nos frères.
  
  Esprit, toi qui souffles sur le monde,
  Brûle-nous de ta flamme si claire.
  Purifie tous nos gestes de misère,
  Conduis-nous où la grâce du Christ surabonde.
  
  Esprit, toi qui donnes la justice,
  Donne-nous de combattre la haine ;
  Force-nous à défendre ceux qui peinent,
  Conduis-nous vers les pauvres qui sont ton Église.