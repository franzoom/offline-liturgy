title: Flamme de charité
author: W84
content: |-
    R/ Flamme de charité,
    gloire d’humilité,
    sœur de lumière,
    sainte Claire,
    conduis-nous !
    
    Enseigne-nous le silence,
    la maîtrise de l’âme et du corps.
    Ni dedans, ni dehors,
    que le bruit
    n’empêche en nous l’esprit
    d’écouter la Présence.
    
    Enseigne-nous la patience,
    l’humble attente,
    l’effort de la foi.
    Qu’un regard sur la croix,
    dans l’amour,
    nous presse à notre tour
    de pardonner l’offense.
    
    Enseigne-nous la prudence,
    la sagesse au service de tous.
    Fais jaillir, des remous
    nos cœurs,
    la force du Seigneur.
    Lui seul a la puissance.
    
    Enseigne-nous l’espérance,
    le désir de répondre à l’appel
    qui résonne, éternel,
    dans le fond
    de notre être profond.
    Que toute âme s’élance !