title: Frère François
author: J.-F. Frié / CNPL
context: François d'Assise (vêpres)
content: |-
    Frère François,
    qui parles de joie
    parfaite
    en parfait dénuement,
    que rien n’arrête
    notre élan
    vers le partage,
    le pur courage
    et la transparence du cœur
    jusqu’au jour du Seigneur !
    
    R/ Ta prière nous garde,
    et nous aide à prier !
    Ton amour nous regarde,
    et nous aide à aimer !
    
    Frère François,
    les clous de la croix
    pesante
    sont entrés dans ton corps !
    Que chacun tente
    son effort
    jusqu’à usure
    de sa mesure
    et souffre l’entière douleur
    pour l’amour du Seigneur !
    
    Frère François,
    qui chantes ta foi
    sereine
    à la face du ciel,
    que nous entraîne
    l’éternel
    don de lumière
    à cette terre
    dans l’universelle ferveur :
    bénissons le Seigneur !
    
    Frère François,
    quand il reviendra
    en gloire,
    Celui qui t’a choisi,
    pour qu’il s’empare
    de tes fils,
    mets à l’avance
    ta ressemblance
    dans leur âme offerte à l’ardeur
    de l’Esprit du Seigneur !