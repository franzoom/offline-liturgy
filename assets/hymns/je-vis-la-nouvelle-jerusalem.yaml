title: Jour de Résurrection
feast: assumption_of_the_blessed_virgin_mary (first vespers)
content: |-
  R/ Je vis la nouvelle Jérusalem
  Descendre du ciel d’auprès de Dieu,
  Belle comme une épouse parée pour son époux.
    
  Voici la demeure de Dieu parmi les hommes,
  il aura sa demeure avec eux.
    
  Ils seront son peuple
  et Dieu-avec-eux sera leur Dieu !
  Il essuiera toute larme de leurs yeux.
    
  Plus de mort, ni de pleur, ni de cri, ni de peine,
  car l’ancien monde s’en est allé.