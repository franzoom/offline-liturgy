title: La Parole en silence (v. 3-4)
author: CFC — CNPL
content: |-
  Maintenant tout repose
  dans l’unique oblation.
  Les mains du Père
  ont recueilli le souffle.
  Le visage incliné
  s'apaise aux ténèbres,
  le coup de lance a scellé
  la passion.
  
  Le rideau se déchire
  dans le Temple désert.
  La mort du juste
  a consommé la faute,
  et l'Amour a gagné
  l’immense défaite :
  demain, le Jour surgira
  du tombeau.
