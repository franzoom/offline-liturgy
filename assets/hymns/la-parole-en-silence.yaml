id: la-parole-en-silence
title: La Parole en silence
author: CFC — CNPL
content: |-
  La Parole en silence
  se consume pour nous.
  L'espoir du monde
  a parcouru sa route.
  Voici l'heure où la vie
  retourne à la source :
  dernier labeur de la chair
  mise en croix.
  
  Serviteur inutile,
  les yeux clos désormais,
  le Fils de l'homme
  a terminé son œuvre.
  La lumière apparue
  rejoint l’invisible,
  la nuit s’étend sur le corps :
  Jésus meurt.
  
  Maintenant tout repose
  dans l’unique oblation.
  Les mains du Père
  ont recueilli le souffle.
  Le visage incliné
  s'apaise aux ténèbres,
  le coup de lance a scellé
  la passion.
  
  Le rideau se déchire
  dans le Temple désert.
  La mort du juste
  a consommé la faute,
  et l'Amour a gagné
  l’immense défaite :
  demain, le Jour surgira
  du tombeau.
