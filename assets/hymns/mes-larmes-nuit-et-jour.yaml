title: Mes larmes, nuit et jour
content: |-
  Mes larmes, nuit et jour,
  Pourraient-elles effacer
  La souillure
  Qui marque mon passage ?
  >Non pas tes larmes,
  >Mais la tendresse qu’elles implorent
  >Et l’amour dont elles sont le gage.
    
  La crainte qui m’étreint
  De manquer à la vie
  Saurait-elle
  Changer mon cœur de pierre
  >Non pas ta crainte,
  >Mais le regard qui la fait naître
  >Et l’amour que, tremblante, elle espère.
    
  Mon zèle pourrait-il
  Réparer tout le mal
  Qui jalonne
  Ma route et ses méandres ?
  >Non pas ton zèle,
  >Mais le pardon qui l’émerveille
  >Et l’amour qui chaque jour l’engendre.
    
  Ces mains n’ont-elles rien
  Qu’un parfum à t’offrir
  Pour te plaire,
  Seigneur de ma louange ?
  >Tes mains sont vides,
  >Mais c’est leur chance et ton offrande :
  >M’accueillir, te donner en échange.