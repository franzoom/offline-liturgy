title: Pour ton corps qui se livre aux pécheurs
author: D. Rimaud / CNPL
content: |-
  R/ Béni sois-tu pour ton sang !
  Béni sois-tu pour ton sang qui consacre le monde !
  
  1. Pour ton corps qui se livre aux pécheurs, béni sois-tu !
  Pour ton corps partagé comme un pain, béni sois-tu !
  Ton corps de Dieu où ton peuple prend corps, béni sois-tu !
  Ton corps de Dieu où chaque homme est vivant, béni sois-tu !
  Pour ton corps abattu de tristesse, béni sois-tu !
  Pour ton corps enfermé dans la nuit, béni sois-tu !
  Ton corps de Dieu où revivent les morts, béni sois-tu !
  Ton corps de Dieu où se lève le jour, béni sois-tu !
  
  2. Pour ton corps que l´on jette en prison, béni sois-tu !
  Pour ton corps condamné à mourir, béni sois-tu !
  Ton corps de Dieu qui grandit parmi nous, béni sois-tu !
  Ton corps de Dieu qui remplit l´univers, béni sois-tu !
  Pour ton corps tout couvert de crachats, béni sois-tu !
  Pour ton corps lacéré par les fouets, béni sois-tu !
  Ton corps de Dieu où la guerre est vaincue, béni sois-tu !
  Ton corps de Dieu où la terre est nouvelle, béni sois-tu !
  
  3. Pour ton corps d´innocent humilié, béni sois-tu !
  Pour ton corps couronné de chardons, béni sois-tu !
  Ton corps de Dieu où les pauvres sont rois, béni sois-tu !
  Ton corps de Dieu où les hommes sont Dieu, béni sois-tu !
  Pour ton corps méprisé comme un ver, béni sois-tu !
  Pour ton corps déchiré par les clous, béni sois-tu !
  Ton corps de Dieu où les faibles sont forts, béni sois-tu !
  Ton corps de Dieu accueillant l´étranger, béni sois-tu !
  
  4. Pour ton corps étendu sur la croix, béni sois-tu !
  Pour ton corps dévoré par la soif, béni sois-tu !
  Ton corps de Dieu pour la paix des nations, béni sois-tu !
  Ton corps de Dieu pour la joie de la terre, béni sois-tu !
  Pour ton corps qui connaît toute mort, béni sois-tu !
  Pour ton corps transpercé de la lance, béni sois-tu !
  Ton corps de Dieu pour le riche et le pauvre, béni sois-tu !
  Ton corps de Dieu pour les noirs et les blancs, béni sois-tu !
  
  5. Pour ton corps sans éclat ni beauté, béni sois-tu !
  Pour ton corps qui n´est rien qu´une plaie, béni sois-tu !
  Ton corps de Dieu où chaque homme a son nom, béni sois-tu !
  Ton corps de Dieu où tout homme est aimé, béni sois-tu !
  Pour ton corps qui se livre à la terre, béni sois-tu !
  Pour ton corps prisonnier du tombeau, béni sois-tu !
  Ton corps de Dieu où se brise la haine, béni sois-tu !
  Ton corps de Dieu où l´amour est plus fort, béni sois-tu !