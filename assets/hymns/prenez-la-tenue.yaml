title: Prenez la tenue de service
author: D. Rimaud - J. Berthier / CNPL - SM
content: |-
  Prenez la tenue de service,
  Servants de Dieu, servez vos frères ;
  Soyez du peuple des souffrants !
  Que vos sueurs et votre sang
  Fassent lever pour cette terre
  des fruits de paix pour la justice !
  
  R/ C’est le vivant qui te rend toute gloire,
  À toi qui es le Dieu vivant !
  
  Vêtus de la robe nuptiale,
  Accueillez l’aube qui s’annonce ;
  Soyez un peuple de veilleurs :
  Reconnaissez à ses lueurs
  L’Homme accompli qui vient aux noces
  Nimbé du jour dont il tressaille !
  
  Restez en tenue de louange,
  Tout habillés hymnes nouvelles :
  Soyez le peuple des chanteurs !
  Devenez l’arbre ivre de fleurs
  Où les humains que Dieu appelle
  Feront concert avec les anges.