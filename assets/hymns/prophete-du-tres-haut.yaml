title: Prophète du Très-Haut
author: CFC / CNPL
context: Martyre de Saint Jean-Baptiste
content: |-
  Prophète du Très-Haut,
  Tu n’es pas la Lumière
  Mais son témoin.
  Avant même de naître,
  Tu la révèles :
  Joie sans parole !
  
  Tu cries dans le désert,
  Tout un peuple se lève
  Vers le Jourdain ;
  Ton baptême réveille
  La soif d’eau vive :
  Proche est la Source !
  
  Voici l’Agneau de Dieu, 
  Tes disciples le suivent,
  Tu restes là ;
  Mais ton âme jubile
  Quand ils l’écoutent :
  Noces du Verbe !
  
  Plus libre que les rois,
  Tu contestes ce monde
  Sans infini ;
  Ton martyre dans l’ombre
  Prévient l’aurore :
  Christ est lumière !