title: Quand l’Esprit-Dieu
author: J.-F. Frié / CNPL
context: ND du Rosaire
content: |-
    Quand l’Esprit-Dieu vient sur toi,
    ô notre Mère,
    tu nous reçois
    au cœur du mystère,
    dans la croissance sainte
    de ta joie !
    Ô notre Mère !
    
    Quand il paraît, le seul Roi,
    ô notre Mère :
    tu nous reçois !
    Tu prends nos misères
    avec le Fils de l’homme
    dans tes bras !
    Ô notre Mère !
    
    Quand il descend de la croix,
    ô notre Mère,
    tu nous reçois !
    Tu tends vers le Père
    tous les enfants des larmes
    de ta foi !
    Ô notre Mère !
    
    Le jour où l’homme s’en va,
    ô notre Mère,
    tu le reçois !
    Il voit la lumière,
    Jésus, Seigneur de gloire,
    né de toi !
    Ô notre mère !