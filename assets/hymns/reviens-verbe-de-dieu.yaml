title: Regarde où nous risquons d’aller
feast: bernard_of_clairvaux_abbot
content: |-
    [rubric](Stance)[/rubric]
    Reviens, Verbe de Dieu,
    qui nous visites comme en passant.
    Inconsolable en ton absence,
    notre cœur te réclame.
    Par ton départ, tu l’éprouves
    et tu avives son désir
    de connaître à nouveau la rencontre.
    
    R/ Reviens à nous, Seigneur,
    toi, notre bien-aimé.
    
    Ta venue nous échappe toujours,
    chaque fois ton départ nous surprend,
    mais le goût reste en nous de ton passage.
    
    D’où venais-tu, où allais-tu, nous l’ignorons,
    mais la mémoire demeure en nous
    d’un grand bonheur furtif et redoutable.
    
    Très au-delà des sens et du savoir,
    en grand secret tu nous visites :
    pour un instant nous touchons l’infini.
    
    Nous n’avons pu te voir ni te saisir ;
    par où es-tu passé ? Nous ne savons,
    mais notre cœur reste blessé d’amour.