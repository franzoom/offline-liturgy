title: Toi qui triomphes du serpent
content: |-
  Toi qui triomphes du serpent, 
  Tu es la seule sans péché,
  Ô Mère, lys immaculé qui jaillit 
  Du buisson d’épines.

  Que nous protège ta lumière,
  Si douce à nos cœurs pénitents :
  Près de ton Fils l’unique juste, 
  Sois pour nous le havre de paix.

  Nous avons péché, submergés
  Dans les flots souillés de ce siècle : 
  Prends pitié de nous, ô Marie, 
  Accueille les larmes de nos repentirs.

  Si toi, tu nous abandonnais, 
  Qui exaucerait nos prières ? 
  Qui d’entre nous éviterait
  Le feu de l’horrible géhenne ?

  Sur l’arbre sanglant de la croix, 
  Le Christ nous a donnés à toi : 
  Ô Mère, accorde aux naufragés
  D’atteindre le port du salut.

  À toi la gloire, ô Jésus Christ, 
  Qui voulus naître de la Vierge, 
  Gloire au Père et au Saint-Esprit,
  Jusque dans les siècles sans fin. Amen.


