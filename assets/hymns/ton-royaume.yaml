title: Toi qui veilles en la nuit
author: CFC / CFC
context: Christ-Roi
content: |-
    Ton Royaume
    N’est pas de ce monde,
    Seigneur Jésus,
    Puisque tu portes
    Ce monde sur tes épaules,
    Comme un berger
    Sa brebis perdue.
    
    Point de sceptre
    Par quoi tu domines,
    Sinon ta croix,
    Point d’autre force,
    Sinon ta miséricorde :
    L’amour vainqueur,
    Ton unique droit.
    
    Tu nous offres
    Ta vie en échange
    De notre mort,
    Car ta puissance
    Veut rendre l’homme à lui-même,
    Et l’arracher
    Au joug du remords.
    
    Ton Royaume
    Déjà nous habite,
    Seigneur Jésus ;
    Sur ta parole,
    En nous l’enfant ressuscite,
    Tu le recrées
    Presque à notre insu.
    
    Toute chose
    En toi s’achemine
    Vers sa beauté ;
    Encor fragile,
    La joie effleure la terre :
    Proche est le ciel,
    Proche, sa clarté.