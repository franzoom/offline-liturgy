title: Un nouveau matin se lève
content: |-
  Un nouveau matin se lève,
  Premier jour de la semaine.
  Regardez ma joie briller,
  C’est Jésus qui se relève.
    
  R/ Alléluia, alléluia !
    
  Tombeau vide et plus de gardes,
  Seuls les anges me regardent,
  Entonnez de nouveaux chants,
  C’est Jésus qui nous fait vivre.
    
  Le jardin est clair et calme,
  Le Seigneur est là qui parle,
  J’ai cru voir le jardinier,
  C’est Jésus qui est lumière.
    
  Il m’envoie vers vous, mes frères,
  Lui déjà il nous précède,
  Écoutez, mes compagnons,
  C’est Jésus qui nous appelle.
