title: Une femme dont on n’a rien dit
feast: assumption_of_the_blessed_virgin_mary (readings Office)
author: V180
content: |-
    Une femme dont on n’a rien dit,
    Si ce n’est qu’elle était fiancée
    Et qu’un ange lui vint annoncer :
    « Te voilà entre toutes choisie. »
    
    R/ Aujourd’hui la terre et le paradis
    La proclament heureuse et bénie :
    Bienheureuse Vierge Marie !
    
    Une femme dont on n’a rien dit,
    Si ce n’est qu’elle avait accouché
    D’un garçon au pays de Judée ;
    Des bergers en ont fait le récit.
    
    Une femme dont on n’a rien dit,
    Si ce n’est qu’elle a trois jours cherché
    Son enfant qui semblait l’oublier,
    Et son cœur n’y avait rien compris.
    
    Une femme dont on n’a rien dit,
    Si ce n’est qu’elle était à Cana
    Pour la noce où Jésus transforma
    L’eau en vin et l’on put croire en lui.
    
    Une femme dont on n’a rien dit,
    Si ce n’est sa présence à la croix,
    Quand son Fils étendait ses deux bras
    Pour mourir au milieu des bandits.
    
    Une femme dont on n’a rien dit,
    Si ce n’est sa prière avec ceux
    Que brûlèrent les langues de feu,
    Baptisés du baptême en Esprit.