title: Vivre à Dieu seul
content: |-
  Vivre à Dieu seul
  Et se tenir en sa présence,
  Tout quitter pour atteindre la paix,
  Choisir le silence
  Pour saisir la Parole,
  Pour être ce disciple aux aguets
  D’un mot, d’un ordre.
    
  Fuir au désert
  Mais rassembler dans la louange,
  Consentir à toujours commencer,
  Traduire en patience
  Le désir du Royaume ;
  Pouvoir être trahi sans cesser
  De croire aux hommes.
    
  Voir l’univers
  À sa mesure véritable,
  L’univers comme un point lumineux,
  Léger grain de sable
  Que l’Amour transfigure ;
  Savoir que toute chose est en Dieu
  Précieuse et pure.
    
  Craindre sans peur
  Dans l’abandon de tout son être,
  N’avoir rien de plus cher que le Christ,
  Servir le seul Maître
  Dont le joug rende libre :
  Ainsi dans la douceur de l’Esprit,
  Benoît se livre.