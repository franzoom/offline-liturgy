title: Psaume 16
subtitle: Dieu, espérance de l’innocent persécuté
commentary: Pendant les jours de sa vie mortelle, il a présenté sa supplication à Dieu qui pouvait le sauver de la mort ; et il a été exaucé. (He 5, 7)
biblicalReference: Ps 16, 1-15
shortReference: Ps 16
content: |-
  {1}Seigneur, éco_u_te la justice ! +
  Entends ma plainte, accu_e_ille ma prière :
  mes lèvres ne m_e_ntent pas.

  {2}De ta face, me viendr_a_ la sentence :
  tes yeux verr_o_nt où est le droit.

  {3}Tu sondes mon cœur, tu me vis_i_tes la nuit, +
  tu m’éprouves, sans ri_e_n trouver ;
  mes pensées n’ont pas franch_i_ mes lèvres.

  {4}Pour me conduire sel_o_n ta parole,
  j’ai gardé le chem_i_n prescrit ;
  {5}j’ai tenu mes p_a_s sur tes traces :
  jamais mon pi_e_d n’a trébuché.

  {6}Je t’appelle, toi, le Die_u_ qui répond :
  écoute-moi, ent_e_nds ce que je dis.

  {7}Montre les merv_e_illes de ta grâce,
  toi qui libères de l’agresseur
  >ceux qui se réfug_i_ent sous ta droite.

  {8}Garde-moi comme la prun_e_lle de l’œil ;
  à l’ombre de tes _a_iles, cache-moi,
  {9}loin des méch_a_nts qui m’ont ruiné,
  des ennemis mort_e_ls qui m’entourent.

  {10}Ils s’enferment d_a_ns leur suffisance ;
  l’arrogance à la bo_u_che, ils parlent.

  {11}Ils sont sur mes pas : mainten_a_nt ils me cernent,
  l’œil sur moi, pour me jet_e_r à terre,
  {12}comme des lions pr_ê_ts au carnage,
  de jeunes fauves tap_i_s en embuscade.

  {13}Lève-toi, Seigneur, affronte-l_e_s, renverse-les ;
  par ton épée, libère-m_o_i des méchants.

  {14}Que ta main, Seigneur, les excl_u_e d’entre les hommes, *
  hors de l’humanité, hors de ce monde :
  >tel soit le s_o_rt de leur vie !

  Réserve-leur de qu_o_i les rassasier : +
  que leurs fils en s_o_ient saturés,
  qu’il en reste enc_o_re pour leurs enfants !

  {15}Et moi, par ta justice, je verr_a_i ta face :
  au réveil, je me rassasier_a_i de ton visage.

