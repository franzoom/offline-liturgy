title: Psaume 21
subtitle: Prière du serviteur souffrant
commentary: Ne fallait-il pas que le Messie souffrît pour entrer dans sa gloire ? (Lc 24, 26)
biblicalReference: Ps 21, 2-32
shortReference: Ps 21
content: |-
  {2}Mon Die_u_, mon Dieu,
  >pourquoi m’as-t_u_ abandonné ? *
  Le sal_u_t est loin de moi,
  >loin des m_o_ts que je rugis.

  {3}Mon Dieu, j’app_e_lle tout le jour,
  >et tu ne r_é_ponds pas ; *
  m_ê_me la nuit,
  >je n’ai p_a_s de repos.

  {4}Toi, pourt_a_nt, tu es saint,
  toi qui habites les h_y_mnes d’Israël !
  {5}C’est en toi que nos p_è_res espéraient,
  ils espéraient et tu les d_é_livrais.
  {6}Quand ils criaient vers t_o_i, ils échappaient ;
  en toi ils espéraient et n’étaient p_a_s déçus.

  {7}Et moi, je suis un v_e_r, pas un homme,
  raillé par les gens, rejet_é_ par le peuple.
  {8}Tous ceux qui me v_o_ient me bafouent,
  ils ricanent et h_o_chent la tête :
  {9}« Il comptait sur le Seigne_u_r : qu’il le délivre !
  Qu’il le sauve, puisqu’il _e_st son ami ! »

  {10}C’est toi qui m’as tiré du v_e_ntre de ma mère,
  qui m’as mis en sûret_é_ entre ses bras.
  {11}À toi je fus confi_é_ dès ma naissance ;
  dès le ventre de ma m_è_re, tu es mon Dieu.

  {12}Ne sois pas loin : l’ang_o_isse est proche,
  je n’ai pers_o_nne pour m’aider.
  {13}Des fauves nombre_u_x me cernent,
  des taureaux de Bas_a_n m’encerclent.
  {14}Des lions qui déch_i_rent et rugissent
  ouvrent leur gue_u_le contre moi.

  {15}Je suis comme l’ea_u_ qui se répand,
  tous mes m_e_mbres se disloquent.
  Mon cœur est c_o_mme la cire,
  il fond au milie_u_ de mes entrailles.
  {16}Ma vigueur a séch_é_ comme l’argile,
  ma langue c_o_lle à mon palais.

  Tu me mènes à la poussi_è_re de la mort. +

  {17}Oui, des chi_e_ns me cernent,
  une bande de vauri_e_ns m’entoure.
  Ils me percent les m_a_ins et les pieds ;
  {18}je peux compt_e_r tous mes os.

  Ces gens me v_o_ient, ils me regardent. +
  {19}Ils partagent entre e_u_x mes habits
  et tirent au s_o_rt mon vêtement.

  {20}Mais toi, Seigne_u_r, ne sois pas loin :
  ô ma force, viens v_i_te à mon aide !
  {21}Préserve ma v_i_e de l’épée,
  arrache-moi aux gr_i_ffes du chien ;
  {22}sauve-moi de la gue_u_le du lion
  et de la c_o_rne des buffles.

  Tu m’as répondu ! +
  {23}Et je proclame ton n_o_m devant mes frères,
  je te loue en pl_e_ine assemblée.

  {24}Vous qui le craignez, lou_e_z le Seigneur, +
  glorifiez-le, vous tous, descend_a_nts de Jacob,
  vous tous, redoutez-le, descend_a_nts d’Israël.

  {25}Car il n’a p_a_s rejeté,
  il n’a pas réprouvé le malheure_u_x dans sa misère ;
  il ne s’est pas voilé la f_a_ce devant lui,
  mais il ent_e_nd sa plainte.

  {26}Tu seras ma louange dans la gr_a_nde assemblée ;
  devant ceux qui te craignent, je tiendr_a_i mes promesses.
  {27}Les pauvres mangeront : ils ser_o_nt rassasiés ;
  ils loueront le Seigneur, ceux qui le cherchent :
  >« À vous, toujours, la v_i_e et la joie ! »

  {28}La terre entière se souviendra
  >et reviendr_a_ vers le Seigneur, *
  chaque famille de nations se prosterner_a_ devant lui :
  {29}« Oui, au Seigne_u_r la royauté,
  le pouv_o_ir sur les nations ! »

  {30}Tous ceux qui festoy_a_ient s’inclinent ;
  promis à la mort, ils pl_i_ent en sa présence.

  {31}Et moi, je vis pour lui : ma descend_a_nce le servira ;
  on annoncera le Seigneur aux générati_o_ns à venir.
  {32}On proclamera sa justice au pe_u_ple qui va naître :
  Voil_à_ son œuvre !

