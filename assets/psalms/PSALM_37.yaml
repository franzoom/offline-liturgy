title: Psaume 37
subtitle: Supplication d’un pénitent
commentary: Tous ses amis se tenaient à distance. (Lc 23, 49)
biblicalReference: Ps 37, 2-23
shortReference: Ps 37
content: |-
  {2}Seigneur, corrige-m_o_i sans colère
  et reprends-m_o_i sans violence.

  {3}Tes fl_è_ches m’ont frappé,
  ta main s’est abatt_u_e sur moi.
  {4}Rien n’est sain dans ma ch_a_ir sous ta fureur,
  rien d’intact en mes _o_s depuis ma faute.

  {5}Oui, mes péch_é_s me submergent,
  leur poids trop pes_a_nt m’écrase.
  {6}Mes plaies sont puante_u_r et pourriture :
  c’est là le pr_i_x de ma folie.

  {7}Accablé, prostr_é_, à bout de forces,
  tout le jour j’av_a_nce dans le noir.
  {8}La fièvre m’envah_i_t jusqu’aux moelles,
  plus rien n’est s_a_in dans ma chair.

  {8}Maintenant, que puis-je att_e_ndre, Seigneur ?
  Elle est en t_o_i, mon espérance.
  {9}Délivre-moi de to_u_s mes péchés,
  épargne-moi les inj_u_res des fous.

  {10}Je me suis tu, je n’ouvre p_a_s la bouche,
  car c’est t_o_i qui es à l’œuvre.
  {11}Éloigne de m_o_i tes coups :
  je succombe sous ta m_a_in qui me frappe.

  {12}Tu redresses l’homme en corrigeant sa faute, +
  tu ronges comme un v_e_r son désir ; *
  l’h_o_mme n’est qu’un souffle.

  {13}Entends ma prière, Seigneur, éco_u_te mon cri ;
  ne reste pas so_u_rd à mes pleurs.
  Je ne suis qu’un h_ô_te chez toi,
  un passant, comme to_u_s mes pères.

  {14}Détourne de moi tes ye_u_x, que je respire
  avant que je m’en _a_ille et ne sois plus.

  {14}Moi, comme un so_u_rd, je n’entends rien,
  comme un muet, je n’ouvre p_a_s la bouche,
  {15}pareil à celu_i_ qui n’entend pas,
  qui n’a pas de répl_i_que à la bouche.

  {16}C’est toi que j’esp_è_re, Seigneur :
  Seigneur mon Dieu, t_o_i, tu répondras.
  {17}J’ai dit : « Qu’ils ne tri_o_mphent pas,
  ceux qui rient de m_o_i quand je trébuche ! »

  {18}Et maintenant, je suis pr_è_s de tomber,
  ma douleur est toujo_u_rs devant moi.
  {19}Oui, j’avo_u_e mon péché,
  je m’effr_a_ie de ma faute.

  {20}Mes ennemis sont f_o_rts et vigoureux,
  ils sont nombreux à m’en voul_o_ir injustement.
  {21}Ils me rendent le m_a_l pour le bien ;
  quand je cherche le bi_e_n, ils m’accusent.

  {22}Ne m’abandonne jam_a_is, Seigneur,
  mon Dieu, ne sois p_a_s loin de moi.
  {23}Viens v_i_te à mon aide,
  Seigne_u_r, mon salut !
