celebration:
  title: Saint Michel, saint Gabriel et saint Raphaël
  subtitle: archanges
  description: Avec les archanges Michel, Gabriel, et Raphaël nous célébrons tous les anges qui, du Paradis de la Genèse à celui de l’Apocalypse, remplissent de leur présence invisible le déroulement de l’histoire du salut. Messagers du Seigneur pour révéler ses desseins et porter ses ordres, ils constituent d’abord la foule immense des adorateurs du Dieu Vivant.
  color: white

oration:
  - Dans ta sagesse admirable, Seigneur, tu assignes leurs fonctions aux anges et aux hommes ; fais que nous soyons protégés sur cette terre par ceux qui dans le ciel servent toujours devant ta face.

readings:
  hymn:
  - victoire-de-lumiere
  - point-de-voyage
  psalmody:
    - psalm: PSALM_96
      antiphon:
        - |-
          Tandis que Michel combattait le dragon, tous acclamaient : Salut à notre Dieu ! Alléluia !
    - psalm: PSALM_102-1
      antiphon:
        - |-
          L’ange Gabriel apparut à Zacharie et lui dit : Élisabeth, ta femme, enfantera un fils, tu lui donneras le nom de Jean.
    - psalm: PSALM_102-2
      antiphon:
        - Je suis l’ange Raphaël, je me tiens devant le Seigneur. Bénissez Dieu, proclamez ses merveilles.
  verse: |-
    V/ Messagers du Seigneur, bénissez le Seigneur,
    attentifs au son de sa parole.
  biblicalReading:
    - title: LECTURE DU LVRE DE L’APOCALPYSE
      subtitle: Lutte de Michel et du dragon
      ref: Ap 12, 1-17
      content: |-
        Un grand signe apparut dans le ciel : une Femme, ayant le soleil pour manteau, la lune sous les pieds, et sur la tête une couronne de douze étoiles. Elle est enceinte, elle crie, dans les douleurs et la torture d’un enfantement.
        Un autre signe apparut dans le ciel : un grand dragon, rouge feu, avec sept têtes et dix cornes, et, sur chacune des sept têtes, un diadème. Sa queue, entraînant le tiers des étoiles du ciel, les précipita sur la terre. Le Dragon vint se poster devant la femme qui allait enfanter, afin de dévorer l’enfant dès sa naissance. Or, elle mit au monde un fils, un enfant mâle, celui qui sera le berger de toutes les nations, les conduisant avec un sceptre de fer. L’enfant fut enlevé jusqu’auprès de Dieu et de son Trône, et la Femme s’enfuit au désert, où Dieu lui a préparé une place, pour qu’elle y soit nourrie pendant mille deux cent soixante jours.
        Il y eut alors un combat dans le ciel : Michel, avec ses anges, dut combattre le Dragon. Le Dragon, lui aussi, combattait avec ses anges, mais il ne fut pas le plus fort ; pour eux désormais, nulle place dans le ciel. Oui, il fut rejeté, le grand Dragon, le Serpent des origines, celui qu’on nomme Diable et Satan, le séducteur du monde entier. Il fut jeté sur la terre, et ses anges furent jetés avec lui.
        Alors j’entendis dans le ciel une voix forte, qui proclamait : « Maintenant voici le salut, la puissance et le règne de notre Dieu, voici le pouvoir de son Christ ! Car il est rejeté, l’accusateur de nos frères, lui qui les accusait, jour et nuit, devant notre Dieu. Eux-mêmes l’ont vaincu par le sang de l’Agneau, par la parole dont ils furent les témoins ; détachés de leur propre vie, ils sont allés jusqu’à mourir. Cieux, soyez donc dans la joie, et vous qui avez aux cieux votre demeure ! Malheur à la terre et à la mer : le diable est descendu vers vous, plein d’une grande fureur ; il sait qu’il lui reste peu de temps. »
        Et quand le Dragon vit qu’il était jeté sur la terre, il se mit à poursuivre la Femme qui avait mis au monde l’enfant mâle. Alors furent données à la Femme les deux ailes du grand aigle pour qu’elle s’envole au désert, à la place où elle doit être nourrie pour un temps, deux temps et la moitié d’un temps, loin de la présence du Serpent. Puis, de sa gueule, le Serpent projeta derrière la Femme de l’eau comme un fleuve, pour qu’elle soit emportée par ce fleuve. Mais la terre vint au secours de la Femme : la terre ouvrit la bouche et engloutit le fleuve projeté par la gueule du Dragon. Alors le Dragon se mit en colère contre la Femme, il partit faire la guerre au reste de sa descendance, ceux qui observent les commandements de Dieu et gardent le témoignage de Jésus.
      responsory: |-
        R/ Voici le temps du salut,
        de la puissance et du règne de Dieu !

        Le dragon a poursuivi la femme
        mais Michel et ses anges
        combattirent le dragon.

        L’ange Gabriel a été envoyé par Dieu
        à une jeune fille nommée Marie ;
        il lui annonça : tu enfanteras un Fils.

        Raphaël dit au jeune Tobie :
        Bientôt les yeux de ton père s’ouvriront,
        il se réjouira de voir la lumière.
  patristicReading:
    - title: HOMÉLIE DE SAINT GRÉGOIRE LE GRAND
      subtitle: Les noms des anges
      content: |-
        Il faut savoir que le nom d’anges désigne leur fonction, et non leur nature. Car ces esprits bienheureux de la patrie céleste sont bien toujours des esprits, mais on ne peut les appeler toujours des « anges », parce qu’ils ne sont des anges que lorsqu’ils portent un message. On appelle « anges » ceux qui portent les messages moins importants, et « archanges » ceux qui annoncent les plus grands événements.
        C’est pourquoi l’archange Gabriel fut envoyé à la Vierge Marie, et non pas un ange quelconque : pour ce ministère, il s’imposait d’envoyer un ange du plus haut rang annoncer le plus haut de tous les événements.
        En outre, certains d’entre eux sont désignés par un nom propre, afin de signifier par les mots la nature de leur action. En effet, ce n’est pas dans la sainte cité, où la vision de Dieu tout-puissant confère une connaissance parfaite, qu’ils reçoivent leurs noms particuliers, comme si, sans l’aide de ces noms, on n’avait pas pu connaître leurs personnes. C’est lorsqu’ils viennent vers nous pour exercer un ministère qu’ils reçoivent chez nous des noms tirés de leur fonction. C’est ainsi que Michel veut dire « Qui est comme Dieu ? », Gabriel : « Force de Dieu ». Raphaël : « Dieu guérit ».
        Chaque fois qu’il est besoin d’un déploiement de force extraordinaire, c’est Michel qui est envoyé : son action et son nom font comprendre que nul ne peut faire ce qu’il appartient à Dieu seul de faire. L’antique ennemi, qui a désiré par orgueil être semblable à Dieu, disait : %J’escaladerai les cieux, par-dessus les étoiles du ciel j’érigerai mon trône, je ressemblerai au Très-Haut%. Or, l’Apocalypse nous dit qu’à la fin du monde, lorsqu’il sera laissé à sa propre force, avant d’être éliminé par le supplice final, il devra combattre contre l’archange Michel : %Il y eut un combat contre l’archange Michel%.
        À la Vierge Marie, c’est Gabriel qui est envoyé, dont le nom signifie « Force de Dieu » : ne venait-il pas annoncer celui qui voulut se manifester dans une humble condition pour triompher des puissances démoniaques ? C’est donc par la « force de Dieu » qu’il devait être annoncé, celui qui venait comme %le Dieu des armées, le vaillant des combats%.
        Raphaël, comme nous l’avons dit, se traduit : « Dieu guérit ». En effet, il délivra des ténèbres les yeux de Tobie lorsqu’il les toucha comme pour remplir l’office de soignant. Celui qui fut envoyé pour soigner est bien digne d’être appelé « Dieu guérit ».
      responsory: |-
        R/ Que monte notre prière
        comme l’encens devant ta face, alléluia !

        L’ange tenait une coupe
        pleine de parfum :
        la prière des saints.

        De la main de l’ange,
        la fumée des parfums montait devant Dieu,
        avec la prière des saints.

invitatory:
  antiphon:
  - En présence des anges, venez, adorons le Seigneur.

morning:
  hymn:
  - anges-du-seigneur
  psalmody:
    - psalm: PSALM_62
      antiphon:
        - Dieu très saint, les anges du ciel adorent ta gloire ; avec eux nous te louons, nous te bénissons.
    - psalm: OT_41
      antiphon:
        - Tous les anges du Seigneur, bénissez le Seigneur !
    - psalm: PSALM_149
      antiphon:
        - |-
          La voix des anges clame dans le ciel : il est beau de te louer, Dieu très saint.
  reading:
    biblicalReference: Gn 28, 12-13a
    content: |-
      Jacob eut un songe : une échelle était dressée sur la terre, et son sommet touchait le ciel ; des anges de Dieu montaient et descendaient. Le Seigneur se tenait près de lui. Il lui dit : Je suis le Seigneur, le Dieu d’Abraham, ton père, le Dieu d’Isaac.
  responsory: |-
    R/ Je te chante en présence des anges :
    * Seigneur, éternel est ton amour !
    V/ Tu fais grandir en mon âme ta force. * Seigneur.
    Gloire au Père.
    R/ Je te chante.
  evangelicAntiphon:
    common: Vous verrez les cieux ouverts, et les anges de Dieu monter et descendre au-dessus du Fils de l’homme.
  intercession:
    content: |-
      Que les anges du ciel nous aident à bénir notre Dieu et Père :
      
      R/ Anges du Seigneur, bénissez le Seigneur !
      
      Dieu notre Père, tu as donné mission à tes anges de veillez sur nos routes,
      — tiens-nous fidèles au long de ce jour.
      
      Dieu notre Père, les anges qui nous gardent te contemplent sans cesse :
      — donne-nous de chercher ton visage.
      
      Dieu notre Père, tes élus seront comme les anges dans le ciel :
      — donne-nous la chasteté du cœur et du corps.
      
      Dieu notre Père, envoie à ton peuple ton archange Michel :
      — qu’il nous protège dans les combats contre l’Adversaire.

middleOfDay:
  tierce:
    antiphon: L’ange Michel, le prince des anges, est venu à mon secours.
    reading:
      biblicalReference: Tb 12, 15.18.20a
      content: Je suis Raphaël, l’un des sept anges qui se tiennent devant la gloire du Seigneur et pénètrent en sa présence. Quand j’étais avec vous, ce n’était pas par un effet de ma bienveillance que j’étais avec vous, mais par la volonté de Dieu. C’est lui que vous devez bénir tout au long des jours. C’est lui que vous devez chanter. Bénissez donc le Seigneur sur cette terre et célébrez Dieu. Voici que je remonte vers celui qui m’a envoyé.
    responsory: |-
      V/ Le Seigneur donne mission à ses anges
      de te garder sur tous tes chemins.
  sexte:
    antiphon: Celui que j’avais vu, l’ange Gabriel, s’est approché de moi pour me parler.
    reading:
      biblicalReference: Dn 9, 22-23
      content: |-
        Gabriel m’instruisit et me dit : Daniel, maintenant je suis sorti pour te conférer l’intelligence. Au début de tes supplications a surgi une parole et je suis venu te l’annoncer, car tu es l’homme des prédilections ! Comprends la parole et aie l’intelligence de la vision !
    responsory: |-
      V/ Armées du Seigneur, bénissez-le,
      serviteurs qui exécutez ses désirs.
  none:
    antiphon: L’ange Raphaël fut envoyé par Dieu pour guérir Tobie et Sara.
    reading:
      biblicalReference: Tb 12, 15.18.20a
      content: Je suis Raphaël, l’un des sept anges qui se tiennent devant la gloire du Seigneur et pénètrent en sa présence. Quand j’étais avec vous, ce n’était pas par un effet de ma bienveillance que j’étais avec vous, mais par la volonté de Dieu. C’est lui que vous devez bénir tout au long des jours. C’est lui que vous devez chanter. Bénissez donc le Seigneur sur cette terre et célébrez Dieu. Voici que je remonte vers celui qui m’a envoyé.
    responsory: |-
      V/ Le Seigneur donne mission à ses anges
      de te garder sur tous tes chemins.

vespers:
  hymn:
  - gloire-a-toi-seigneur-des-anges
  psalmody:
    - psalm: PSALM_8
      antiphon:
        - Seigneur des anges, jusqu’aux cieux est chantée ta splendeur !
    - psalm: PSALM_137
      antiphon:
        - Mon Dieu, je te chante en présence des anges.
    - psalm: NT_6
      antiphon:
        - J’ai vu l’Agneau debout, comme immolé, j’ai entendu les anges par milliers autour du trône de Dieu.
  reading:
    biblicalReference: Ap 1,4b-5
    content: Que la grâce et la paix vous soient données, de la part de Celui qui est, qui était et qui vient, de la part des sept esprits qui sont devant son trône, et de la part de Jésus Christ, le témoin fidèle, le premier-né d’entre les morts, le souverain des rois de la terre, lui qui nous aime, qui nous a délivrés de nos péchés par son sang.
  responsory: |-
    R/ Que nos prières devant toi
    s’élèvent comme un encens.
    V/ Servez le Seigneur dans l’allégresse,
    venez à lui avec des chants de joie ! R/
    V/ Reconnaissez que le Seigneur est Dieu :
    il nous a faits et nous sommes à lui. R/
  evangelicAntiphon:
    common: |-
      L’ange Gabriel fut envoyé à Marie pour lui annoncer : Tu enfanteras un fils et tu lui donneras le nom de Jésus.
  intercession:
    content: |-
      Demandons à Dieu de nous rendre, à l’image des anges du ciel, prompts à faire sa volonté et toujours attentifs à sa parole :
      
      R/ Nous t’en prions, écoute-nous !
      
      Que notre prière, offerte par la main des anges,
      s’élève devant toi comme un encens.
      
      Que notre offrande soit portée par ton ange
      en présence de ta gloire.
      
      Que nous chantions avec la foule des anges :
      Gloire à Dieu dans le ciel, paix aux hommes sur la terre.
      
      Qu’à la fin de notre vie dans ce monde
      les anges nous conduisent au paradis.
      
      Que ton archange saint Michel
      guide vers ta lumière tous les fidèles défunts.
